<script>const STORY_DATA = {"meta": {"title": "The Virtue Ethics", "subtitle": "Aristotle asked not 'What should I do?' but 'What kind of person should I be?'", "subject": "Religious Studies", "topic": "Virtue Ethics (Aristotle)", "level": "A-Level", "tags": ["🕊️ Religious Studies", "A-Level", "Virtue Ethics", "~10 min", "3 questions"], "intro": "You are studying Aristotle's virtue ethics — an approach to morality focused on character rather than rules or consequences. The good life is achieved by developing virtues through practice and habit."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><rect x='50' y='30' width='300' height='15' fill='#8a7868'/><rect x='70' y='45' width='25' height='165' fill='#a09080'/><rect x='145' y='45' width='25' height='165' fill='#a09080'/><rect x='230' y='45' width='25' height='165' fill='#a09080'/><rect x='305' y='45' width='25' height='165' fill='#a09080'/><rect x='60' y='25' width='280' height='10' fill='#706860'/><rect x='60' y='205' width='280' height='10' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='220' width='400' height='30' fill='#706860'/><rect x='195' y='60' width='10' height='160' fill='#8a7868'/><rect x='160' y='215' width='80' height='10' fill='#8a7868'/><rect x='100' y='60' width='200' height='6' fill='#706860'/><circle cx='200' cy='63' r='10' fill='#706860'/><path d='M110,66 L80,130 L140,130 Z' fill='#c8b8a8' stroke='#8a7868' stroke-width='1'/><path d='M290,66 L260,150 L320,150 Z' fill='#c8b8a8' stroke='#8a7868' stroke-width='1'/><ellipse cx='110' cy='130' rx='30' ry='6' fill='#b0a898'/><ellipse cx='290' cy='150' rx='30' ry='6' fill='#b0a898'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><polygon points='200,30 60,220 340,220' fill='none' stroke='#8a7868' stroke-width='3'/><circle cx='200' cy='30' r='8' fill='#706860'/><circle cx='60' cy='220' r='8' fill='#706860'/><circle cx='340' cy='220' r='8' fill='#706860'/><circle cx='200' cy='140' r='25' fill='#b0a898' stroke='#706860' stroke-width='1'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Good Life", "scene": "scene1", "body": "<p><strong>Aristotle</strong> (384-322 BCE) proposed virtue ethics in his <em>Nicomachean Ethics</em>. Unlike deontological ethics (what rules to follow) or utilitarianism (what consequences to aim for), virtue ethics asks: <strong>what kind of person should I be?</strong></p><p>The goal of life is <strong>eudaimonia</strong> — often translated as 'happiness' but better understood as 'human flourishing' or 'living well'. Eudaimonia is achieved by developing <strong>virtues</strong> (excellent character traits) through practice and habit.</p><p>Virtues are found at the <strong>golden mean</strong> — the balance between two extremes (vices). Courage, for example, is the mean between cowardice (deficiency) and recklessness (excess).</p>", "factBox": {"label": "The Golden Mean", "text": "Aristotle's doctrine of the mean: every virtue is a mean between two vices. Courage is the mean between cowardice and recklessness. Generosity is the mean between meanness and extravagance. The right balance depends on the person and situation."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Virtue Ethics", "title": "Aristotle's Birth", "scene": "scene2", "body": "<p>Aristotle was born in 384 BCE in Stagira, Greece. He studied under Plato at the Academy and later tutored Alexander the Great.</p>", "workedBox": {"label": "How to approach it", "steps": "<p>Aristotle: 384-322 BCE. Born in 384 BCE.</p>"}, "question": "In what year BCE was Aristotle born?", "unit": "BCE", "answer": 384, "tolerance": 0, "maxAttempts": 2, "hintText": "He was born in the 380s BCE.", "feedbackCorrect": "384 BCE. Aristotle's ethical philosophy continues to influence moral thinking over 2,300 years later.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The answer is 384 BCE.", "consequence": "<strong>The father of virtue ethics dated.</strong> 384 BCE — the birth of one of philosophy's greatest minds.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Cardinal Virtues", "title": "The Core Four", "scene": "scene1", "body": "<p>Aristotle identified many virtues, but four became known as the <strong>cardinal virtues</strong> (from Latin <em>cardo</em> = hinge, because all other virtues hinge on them):</p><p><strong>1. Prudence</strong> (practical wisdom) — knowing the right thing to do in any situation.</p><p><strong>2. Justice</strong> — giving each person their due; fairness.</p><p><strong>3. Temperance</strong> — self-control; moderation in desires.</p><p><strong>4. Fortitude</strong> (courage) — bravery in the face of difficulty.</p><p>These four virtues were later adopted by <strong>Thomas Aquinas</strong>, who added three <strong>theological virtues</strong>: faith, hope, and charity (love).</p>", "factBox": {"label": "Aquinas's Addition", "text": "Aquinas combined Aristotle's four cardinal virtues with three theological virtues from St Paul (1 Corinthians 13): faith, hope, and charity. Together, these seven virtues form the foundation of Christian virtue ethics."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Virtue Ethics", "title": "Cardinal Count", "scene": "scene2", "body": "<p>How many cardinal virtues did Aristotle identify?</p>", "workedBox": {"label": "How to approach it", "steps": "<p>Cardinal virtues: prudence, justice, temperance, fortitude.</p><p>Count: 4.</p>"}, "question": "How many cardinal virtues are there?", "unit": "virtues", "answer": 4, "tolerance": 0, "maxAttempts": 2, "hintText": "Prudence, justice, temperance, fortitude — count them.", "feedbackCorrect": "Four cardinal virtues: prudence, justice, temperance, and fortitude. All other virtues 'hinge' on these.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The answer is 4. The cardinal virtues are prudence, justice, temperance, and fortitude.", "consequence": "<strong>The cardinal virtues memorised.</strong> Four pillars of excellent character.", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "Strengths and Weaknesses", "title": "Evaluating Virtue Ethics", "scene": "scene3", "body": "<p><strong>Strengths:</strong> Virtue ethics focuses on the whole person, not just individual actions. It recognises that morality is about character development, not just following rules. It is flexible — the golden mean adapts to different situations.</p><p><strong>Weaknesses:</strong> It does not give clear guidance for specific dilemmas (what exactly should I do?). The golden mean is vague — who decides where the balance lies? It may be culturally relative — what counts as virtuous varies across societies. <strong>Alasdair MacIntyre</strong> tried to address this in <em>After Virtue</em> (1981).</p>", "factBox": {"label": "MacIntyre's Revival", "text": "Alasdair MacIntyre's After Virtue (1981) revived virtue ethics for the modern age. He argued that modern moral philosophy has failed because it abandoned the Aristotelian tradition. We need to return to virtue-based thinking within communities and traditions."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Virtue Ethics", "title": "Eudaimonia", "scene": "scene3", "body": "<p>What is the best translation of Aristotle's concept of eudaimonia?</p>", "question": "What does eudaimonia mean in Aristotle's ethics?", "options": [{"text": "Pleasure and the avoidance of pain", "correct": false}, {"text": "Human flourishing — living well and doing well", "correct": true}, {"text": "Obedience to God's divine commands", "correct": false}, {"text": "The greatest happiness for the greatest number", "correct": false}], "maxAttempts": 2, "hintText": "It is often translated as 'happiness' but is better understood as a broader concept of flourishing.", "feedbackCorrect": "Eudaimonia means human flourishing — living well, doing well, and fulfilling one's potential through the development of virtues.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The correct answer is human flourishing. Eudaimonia is broader than mere happiness — it encompasses the whole of a good life.", "consequence": "<strong>Virtue ethics fully explored.</strong> Aristotle, the golden mean, and eudaimonia — a complete ethical framework.", "next": "end", "examTip": "In the exam, present multiple religious viewpoints with specific textual references. Evaluate by considering both agreement and disagreement within traditions.", "bloomsLevel": "Evaluate"}], "ending": {"title": "The Virtue Ethics", "perfect": "Outstanding ethical philosophy. You know Aristotle (384 BCE), four cardinal virtues, and the meaning of eudaimonia. Virtue ethics is mastered.", "partial": "Good foundations. Review Aristotle (384 BCE), the four cardinal virtues, and eudaimonia as human flourishing.", "retry": "Want to practice virtue ethics again?", "topic": "Virtue Ethics (Aristotle)"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
