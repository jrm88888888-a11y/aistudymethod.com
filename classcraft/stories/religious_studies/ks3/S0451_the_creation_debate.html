ions of years."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Creationism vs Evolution", "title": "Days of Creation", "scene": "scene2", "body": "<p>The RE teacher reads from Genesis Chapter 1. The passage describes God creating the universe in a series of distinct days — light, sky, land and plants, sun and moon, sea creatures and birds, land animals and humans, then rest.</p><p><em>\"According to the Genesis account,\"</em> she asks the audience, <em>\"over how many days did God create everything — including the day of rest?\"</em></p><p>You count through the days described in the text. Each day has its own set of creations, and the final day is reserved for rest.</p>", "workedBox": {"label": "How to approach it", "steps": "<p>List the days from Genesis 1-2:</p><p><strong>Day 1:</strong> Light · <strong>Day 2:</strong> Sky · <strong>Day 3:</strong> Land & plants · <strong>Day 4:</strong> Sun, moon & stars · <strong>Day 5:</strong> Sea creatures & birds · <strong>Day 6:</strong> Land animals & humans · <strong>Day 7:</strong> Rest</p><p>Count all days including the day of rest.</p>"}, "question": "How many days does the Genesis creation account describe (including the day of rest)?", "unit": "days", "answer": 7, "tolerance": 0, "maxAttempts": 2, "hintText": "Count from Day 1 (light) through to the day God rested. Don't forget the rest day.", "feedbackCorrect": "Seven days exactly. Genesis describes creation over six days with the seventh as a day of rest — the origin of the Sabbath.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The answer is 7. Genesis describes six days of creation plus one day of rest, totalling seven days.", "consequence": "<strong>You note down '7 days' in your article.</strong> This is fundamental to the creationist account — whether interpreted literally or symbolically.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "The Science Response", "title": "Millions of Years", "scene": "scene2", "body": "<p>The science teacher responds with the evolutionary timeline. Life on Earth began approximately <strong>3.8 billion years ago</strong> with simple single-celled organisms. Through natural selection — where organisms with advantageous traits survive and reproduce more — species gradually diversified.</p><p>She explains that <strong>Charles Darwin</strong> published <em>On the Origin of Species</em> in 1859, presenting evidence from fossils, comparative anatomy, and biogeography. Modern genetics has since provided further support.</p><p>Some audience members ask whether you must choose one view or the other. The RE teacher points out that many religious believers accept evolution as the mechanism God used — a position sometimes called <strong>theistic evolution</strong>.</p>", "factBox": {"label": "Compatibility?", "text": "Some Christians see no conflict between faith and evolution. They interpret Genesis metaphorically — the 'days' represent long ages or stages. Others insist on a literal six-day creation. This spectrum of views is important to understand for exams."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Creationism vs Evolution", "title": "Darwin's Year", "scene": "scene3", "body": "<p>Your editor wants you to include a timeline in the article. You need the exact year Darwin published his famous work.</p><p>The science teacher mentioned it during the debate, and you scribbled it in your notes. Darwin published <em>On the Origin of Species</em> in a specific year in the mid-nineteenth century.</p><p>You check your notes to confirm the date.</p>", "workedBox": {"label": "How to approach it", "steps": "<p>Darwin's <em>On the Origin of Species</em> was published in the mid-1800s.</p><p>The year is commonly taught as 1859.</p>"}, "question": "In what year did Darwin publish On the Origin of Species?", "unit": "", "answer": 1859, "tolerance": 0, "maxAttempts": 2, "hintText": "It was published in the 1850s — the last year of that decade.", "feedbackCorrect": "1859 is correct. Darwin's publication revolutionised biology and sparked debates with religious institutions that continue today.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The answer is 1859. Darwin published On the Origin of Species in 1859, transforming scientific understanding of life's diversity.", "consequence": "<strong>You add 1859 to your timeline.</strong> This date marks one of the most significant moments in the history of science and religion.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Finding Common Ground", "title": "The Audience Questions", "scene": "scene1", "body": "<p>During the Q&A, a student asks: <em>\"Can you believe in both God and evolution?\"</em></p><p>The RE teacher explains that many Christians, Muslims, and Jews accept scientific evidence while maintaining that God is the ultimate cause behind creation. <strong>Theistic evolution</strong> holds that God used evolution as the mechanism for creating life.</p><p>The science teacher adds that science investigates <em>how</em> things happen, while religion often addresses <em>why</em> — questions of purpose and meaning that science does not claim to answer.</p><p>You realise your article must present this nuance. The debate is not simply two sides shouting — there are multiple positions along a spectrum.</p>", "factBox": {"label": "The Spectrum of Views", "text": "Young Earth Creationism (literal Genesis), Old Earth Creationism (long ages), Intelligent Design (a designer is detectable in nature), Theistic Evolution (God works through evolution), and Atheistic Evolution (no divine involvement) — these represent the range of positions."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Creationism vs Evolution", "title": "The Middle Ground", "scene": "scene3", "body": "<p>You need to describe the position of someone who believes God created life but accepts that evolution is the process through which this happened. This is a widely held view among many modern religious believers.</p><p>What is the correct term for this position?</p>", "question": "What term describes the belief that God used evolution as the mechanism for creation?", "options": [{"text": "Young Earth Creationism — God created everything in six literal days", "correct": false}, {"text": "Theistic evolution — God guided the evolutionary process", "correct": true}, {"text": "Atheistic evolution — life evolved with no divine involvement", "correct": false}, {"text": "Intelligent Design — a designer can be scientifically detected", "correct": false}], "maxAttempts": 2, "hintText": "The prefix 'theistic' means relating to belief in God. Which option combines belief in God with acceptance of evolution?", "feedbackCorrect": "Theistic evolution is the view that God works through the evolutionary process. Many mainstream Christians, including the Catholic Church, hold a version of this position.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The correct answer is theistic evolution — the belief that God used evolution as the mechanism for creating life. It bridges religious faith and scientific evidence.", "consequence": "<strong>Your article is complete.</strong> You have fairly represented creationism, evolution, and the middle ground of theistic evolution — your editor will be impressed.", "next": "end", "examTip": "In the exam, present multiple religious viewpoints with specific textual references. Evaluate by considering both agreement and disagreement within traditions.", "bloomsLevel": "Understand"}], "ending": {"title": "The Creation Debate", "perfect": "Outstanding journalism. You represented both creationism and evolution fairly, understood the Genesis account, and identified the spectrum of views including theistic evolution. Your balanced article will inform the whole school.", "partial": "Your article covers the basics well, though some details need tightening. Review the seven days of Genesis, Darwin's 1859 publication, and the meaning of theistic evolution for a stronger piece.", "retry": "Want to revisit the debate and perfect your article?", "topic": "Creationism vs Evolution"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
