<script>const STORY_DATA = {"meta": {"title": "The Charity Mission", "subtitle": "A community needs help. Your understanding of stewardship and charity will guide the response.", "subject": "Religious Studies", "topic": "Stewardship & Charity", "level": "KS3", "tags": ["🕊️ Religious Studies", "KS3 · Year 7–9", "Stewardship & Charity", "~10 min", "3 questions"], "intro": "You volunteer at an interfaith charity coordinating disaster relief. Different faith groups have pledged support based on their teachings about stewardship — the belief that humans are caretakers of God's creation. You must understand these principles to allocate resources wisely."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='220' width='400' height='30' fill='#706860'/><ellipse cx='150' cy='130' rx='50' ry='35' fill='#a09080' stroke='#8a7868' stroke-width='2'/><ellipse cx='250' cy='130' rx='50' ry='35' fill='#a09080' stroke='#8a7868' stroke-width='2'/><ellipse cx='200' cy='130' rx='25' ry='25' fill='#c8b8a8'/><rect x='90' y='155' width='30' height='50' fill='#a09080'/><rect x='280' y='155' width='30' height='50' fill='#a09080'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='220' width='400' height='30' fill='#706860'/><rect x='195' y='60' width='10' height='160' fill='#8a7868'/><rect x='160' y='215' width='80' height='10' fill='#8a7868'/><rect x='100' y='60' width='200' height='6' fill='#706860'/><circle cx='200' cy='63' r='10' fill='#706860'/><path d='M110,66 L80,130 L140,130 Z' fill='#c8b8a8' stroke='#8a7868' stroke-width='1'/><path d='M290,66 L260,150 L320,150 Z' fill='#c8b8a8' stroke='#8a7868' stroke-width='1'/><ellipse cx='110' cy='130' rx='30' ry='6' fill='#b0a898'/><ellipse cx='290' cy='150' rx='30' ry='6' fill='#b0a898'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><rect x='120' y='80' width='160' height='130' fill='#8a7868'/><polygon points='200,20 120,80 280,80' fill='#a09080'/><rect x='190' y='30' width='20' height='30' fill='#706860'/><rect x='185' y='25' width='30' height='8' fill='#706860'/><rect x='160' y='140' width='30' height='50' fill='#706860'/><rect x='210' y='140' width='30' height='50' fill='#706860'/><rect x='175' y='170' width='50' height='40' fill='#706860'/><circle cx='200' cy='110' r='18' fill='#c8b8a8' fill-opacity='0.5'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Relief Centre", "scene": "scene1", "body": "<p>The interfaith charity centre buzzes with activity. A flood has devastated a nearby town, and religious communities have come together to help. The coordinator explains that <strong>stewardship</strong> — the idea that humans are entrusted by God to care for the world and its people — motivates all the faith groups present.</p><p>In Christianity, stewardship comes from Genesis: God gave humans <strong>dominion</strong> over the Earth, meaning responsibility to care for it. In Islam, humans are <strong>khalifah</strong> (trustees or stewards) of Allah's creation. Both traditions emphasise <strong>charity</strong> as a religious duty.</p><p>Christians practise tithing (giving a portion of income), while Muslims pay <strong>Zakat</strong> — one of the Five Pillars of Islam — donating a fixed percentage of savings to those in need.</p>", "factBox": {"label": "Stewardship", "text": "Stewardship is the belief that humans have a God-given responsibility to care for the world. In Christianity, this is rooted in Genesis 1:28. In Islam, the concept of khalifah means humans are trustees of Allah's creation. Both faiths see charity as an expression of stewardship."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Stewardship & Charity", "title": "The Pillars of Islam", "scene": "scene2", "body": "<p>The Muslim community group arrives with a substantial donation. Their leader explains that giving to charity is not optional in Islam — it is one of the <strong>Five Pillars</strong>, the foundational practices every Muslim must follow.</p><p>The Five Pillars are: Shahada (declaration of faith), Salah (prayer), Zakat (charitable giving), Sawm (fasting during Ramadan), and Hajj (pilgrimage to Mecca).</p><p>The coordinator asks you to note how many Pillars of Islam there are for the charity's interfaith education display.</p>", "workedBox": {"label": "How to approach it", "steps": "<p>List the Five Pillars:</p><p><strong>1.</strong> Shahada · <strong>2.</strong> Salah · <strong>3.</strong> Zakat · <strong>4.</strong> Sawm · <strong>5.</strong> Hajj</p><p>Count them carefully.</p>"}, "question": "How many Pillars of Islam are there?", "unit": "pillars", "answer": 5, "tolerance": 0, "maxAttempts": 2, "hintText": "The clue is in the name — they are called the Five Pillars.", "feedbackCorrect": "Five Pillars exactly. Zakat (charitable giving) is the third pillar, making charity a fundamental obligation in Islam.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The answer is 5. The Five Pillars of Islam are Shahada, Salah, Zakat, Sawm, and Hajj.", "consequence": "<strong>You update the education display.</strong> Visitors will now understand that charity in Islam is not optional — it is a foundational religious duty.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Christian Giving", "title": "The Tithe Tradition", "scene": "scene1", "body": "<p>The Christian group explains their tradition of <strong>tithing</strong> — giving a tenth of one's income to the church or charity. This practice comes from the Old Testament, where Israelites gave a tenth of their produce to God.</p><p>Jesus also taught extensively about generosity. In the <strong>Parable of the Good Samaritan</strong>, he showed that charity should cross social and ethnic boundaries. In the <strong>Parable of the Sheep and the Goats</strong> (Matthew 25), he taught that serving the poor is the same as serving God.</p><p>The coordinator notes that both Christian and Muslim donors see their giving as a <strong>religious obligation</strong>, not merely a nice gesture. Stewardship means using your resources — time, money, skills — for others.</p>", "factBox": {"label": "Zakat Rate", "text": "Zakat requires Muslims to give 2.5% of their qualifying savings each year to those in need. This is calculated on wealth held for a full lunar year above a minimum threshold called the nisab. It must go to specific categories of recipients including the poor, the needy, and travellers."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Stewardship & Charity", "title": "The Zakat Percentage", "scene": "scene2", "body": "<p>A local school visits the relief centre for an educational trip. A student asks: <em>\"How much do Muslims have to give for Zakat?\"</em></p><p>The Muslim community leader explains that Zakat is calculated as a fixed percentage of qualifying savings held for one full year. This percentage is well-established in Islamic law and has remained the same for over 1,400 years.</p><p>You recall from the briefing materials that the standard Zakat rate is a specific percentage of savings.</p>", "workedBox": {"label": "How to approach it", "steps": "<p>Zakat is a fixed percentage of qualifying wealth/savings.</p><p>The standard rate taught in Islamic studies is 2.5% of savings above the nisab threshold.</p>"}, "question": "What percentage of qualifying savings must Muslims give as Zakat?", "unit": "%", "answer": 2.5, "tolerance": 0, "maxAttempts": 2, "hintText": "It is between 2% and 3% — a specific figure with one decimal place.", "feedbackCorrect": "2.5% is correct. Muslims must give 2.5% of their qualifying savings annually as Zakat — one of the Five Pillars of Islam.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The answer is 2.5%. Zakat requires Muslims to donate 2.5% of their qualifying savings each year.", "consequence": "<strong>The students scribble notes eagerly.</strong> Understanding Zakat helps them see that charity in Islam is structured, obligatory, and precisely defined.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Stewardship in Action", "title": "Putting Beliefs into Practice", "scene": "scene3", "body": "<p>As the day ends, you reflect on what you have seen. Christians and Muslims working side by side, motivated by their shared belief in stewardship. Both traditions teach that wealth is a trust from God — not something to hoard but something to share.</p><p>The Christian idea of <strong>agape</strong> (selfless love) and the Islamic concept of <strong>ummah</strong> (community responsibility) both drive charitable action. These are not abstract ideas — they translate directly into food parcels, clothing donations, and rebuilding funds.</p><p>For your final task, you must identify which specific teaching of Jesus most directly commands care for the needy.</p>", "factBox": {"label": "Key Teaching", "text": "In the Parable of the Sheep and the Goats (Matthew 25:31-46), Jesus teaches that whatever you do for the least of these brothers and sisters, you do for him. Those who feed the hungry, clothe the naked, and visit the sick are welcomed into the kingdom."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Stewardship & Charity", "title": "The Teaching of Jesus", "scene": "scene3", "body": "<p>The coordinator asks you to select the correct teaching for the centre's display board. Which parable or teaching of Jesus specifically states that caring for the poor and vulnerable is equivalent to serving God himself?</p>", "question": "Which teaching of Jesus says that serving the poor is the same as serving God?", "options": [{"text": "The Parable of the Prodigal Son — about forgiveness and repentance", "correct": false}, {"text": "The Parable of the Sheep and the Goats — serving the needy is serving God", "correct": true}, {"text": "The Parable of the Sower — about how people receive God's word", "correct": false}, {"text": "The Beatitudes — blessings for the meek and merciful", "correct": false}], "maxAttempts": 2, "hintText": "This parable involves a separation at judgement — one group cared for others, the other did not. Think of farm animals.", "feedbackCorrect": "The Parable of the Sheep and the Goats (Matthew 25) directly equates caring for the vulnerable with serving Christ himself.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The correct answer is the Parable of the Sheep and the Goats. In Matthew 25, Jesus teaches that whatever you do for the least of these, you do for him.", "consequence": "<strong>The display board is complete.</strong> The interfaith charity centre now showcases how both Christianity and Islam motivate charitable action through stewardship.", "next": "end", "examTip": "In the exam, present multiple religious viewpoints with specific textual references. Evaluate by considering both agreement and disagreement within traditions.", "bloomsLevel": "Understand"}], "ending": {"title": "The Charity Mission", "perfect": "Exceptional work at the relief centre. You understand the Five Pillars, Zakat, and Christian teachings on stewardship. Your interfaith knowledge helped coordinate a successful response.", "partial": "Good effort at the centre. Review the Five Pillars of Islam, the Zakat rate of 2.5%, and the Parable of the Sheep and the Goats for stronger exam answers.", "retry": "Want to return to the relief centre and strengthen your knowledge?", "topic": "Stewardship & Charity"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
