<script>const STORY_DATA = {"meta": {"title": "The Rite of Passage", "subtitle": "Birth, coming of age, marriage, death — every faith marks life's transitions.", "subject": "Religious Studies", "topic": "Rites of Passage", "level": "KS3", "tags": ["🕊️ Religious Studies", "KS3 · Year 7–9", "Rites of Passage", "~10 min", "3 questions"], "intro": "You are making a documentary about how different religions mark the key moments of life. From baptism to Bar Mitzvah, from Aqiqah to funeral rites — you must understand the ceremonies and their meanings."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='220' width='400' height='30' fill='#706860'/><rect x='80' y='60' width='40' height='160' fill='#8a7868'/><rect x='280' y='60' width='40' height='160' fill='#8a7868'/><path d='M80,60 Q200,0 320,60' fill='#8a7868' stroke='#706860' stroke-width='2'/><rect x='120' y='80' width='160' height='140' fill='#b0a898'/><path d='M120,80 Q200,30 280,80' fill='#b0a898'/><circle cx='200' cy='160' r='8' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#706860'/><rect x='180' y='100' width='40' height='120' fill='#c8b8a8'/><rect x='170' y='215' width='60' height='10' fill='#8a7868'/><ellipse cx='200' cy='100' rx='20' ry='5' fill='#b0a898'/><ellipse cx='200' cy='75' rx='12' ry='20' fill='#a09080'/><ellipse cx='200' cy='65' rx='6' ry='12' fill='#c8b8a8'/><rect x='198' y='85' width='4' height='15' fill='#8a7868'/><circle cx='120' cy='150' r='3' fill='#c8b8a8' fill-opacity='0.3'/><circle cx='300' cy='100' r='2' fill='#c8b8a8' fill-opacity='0.2'/><circle cx='80' cy='80' r='2' fill='#c8b8a8' fill-opacity='0.2'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><rect x='120' y='80' width='160' height='130' fill='#8a7868'/><polygon points='200,20 120,80 280,80' fill='#a09080'/><rect x='190' y='30' width='20' height='30' fill='#706860'/><rect x='185' y='25' width='30' height='8' fill='#706860'/><rect x='160' y='140' width='30' height='50' fill='#706860'/><rect x='210' y='140' width='30' height='50' fill='#706860'/><rect x='175' y='170' width='50' height='40' fill='#706860'/><circle cx='200' cy='110' r='18' fill='#c8b8a8' fill-opacity='0.5'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Documentary", "scene": "scene1", "body": "<p>Your documentary explores how religions mark life's major transitions. A <strong>rite of passage</strong> is a ceremony that marks a significant change in a person's life — birth, coming of age, marriage, or death.</p><p>In Christianity, <strong>baptism</strong> marks entry into the faith (for infants or adults). <strong>Confirmation</strong> is when a person affirms their faith as a young adult. In Judaism, a <strong>Bar Mitzvah</strong> (boys, age 13) or <strong>Bat Mitzvah</strong> (girls, age 12-13) marks coming of age.</p><p>In Islam, the <strong>Aqiqah</strong> ceremony celebrates a newborn — the baby's head is shaved, the hair is weighed, and an equivalent weight in silver or gold is given to charity.</p>", "factBox": {"label": "Sacraments", "text": "In Catholic and Orthodox Christianity, there are seven sacraments: Baptism, Confirmation, Eucharist, Reconciliation, Anointing of the Sick, Holy Orders, and Matrimony. Protestants generally recognise only two: Baptism and Holy Communion (Eucharist)."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Rites of Passage", "title": "Catholic Sacraments", "scene": "scene2", "body": "<p>Your documentary visits a Catholic church. The priest explains that Catholicism recognises seven sacraments — sacred rituals that mark key moments of spiritual life. These include baptism, confirmation, the Eucharist, reconciliation (confession), anointing of the sick, holy orders (ordination), and matrimony (marriage).</p><p>The director asks you to confirm the number for the voiceover script.</p>", "workedBox": {"label": "How to approach it", "steps": "<p>Catholic sacraments:</p><p><strong>1.</strong> Baptism · <strong>2.</strong> Confirmation · <strong>3.</strong> Eucharist · <strong>4.</strong> Reconciliation · <strong>5.</strong> Anointing of the Sick · <strong>6.</strong> Holy Orders · <strong>7.</strong> Matrimony</p>"}, "question": "How many sacraments does the Catholic Church recognise?", "unit": "sacraments", "answer": 7, "tolerance": 0, "maxAttempts": 2, "hintText": "Count all seven: Baptism, Confirmation, Eucharist, Reconciliation, Anointing of the Sick, Holy Orders, Matrimony.", "feedbackCorrect": "Seven sacraments in Catholicism. Each marks a sacred moment in a believer's spiritual journey from birth to death.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The answer is 7. The Catholic Church recognises seven sacraments: Baptism, Confirmation, Eucharist, Reconciliation, Anointing of the Sick, Holy Orders, and Matrimony.", "consequence": "<strong>The voiceover script is updated.</strong> Seven sacraments — a complete spiritual framework from cradle to grave.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Coming of Age", "title": "Bar Mitzvah", "scene": "scene1", "body": "<p>You film a Bar Mitzvah ceremony at a synagogue. A Jewish boy turns 13 and becomes a <strong>Bar Mitzvah</strong> — literally 'son of the commandment'. He reads from the Torah scroll in Hebrew for the first time and takes on adult religious responsibilities.</p><p>For girls, the equivalent is a <strong>Bat Mitzvah</strong> ('daughter of the commandment'), usually at age 12 or 13 depending on the denomination. The ceremony varies — in Orthodox Judaism, girls may have a different format than boys.</p><p>After the ceremony, the young person is considered a full member of the religious community, responsible for following all 613 commandments in the Torah.</p>", "factBox": {"label": "613 Commandments", "text": "Judaism identifies 613 mitzvot (commandments) in the Torah — 248 positive ('do this') and 365 negative ('don't do this'). A Bar/Bat Mitzvah becomes responsible for following all of them."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Rites of Passage", "title": "Age of Responsibility", "scene": "scene2", "body": "<p>The director wants to know the exact age at which a Jewish boy becomes a Bar Mitzvah. This age is fixed in Jewish law and has been the same for centuries.</p>", "workedBox": {"label": "How to approach it", "steps": "<p>Bar Mitzvah occurs at a specific age for boys.</p><p>This is a well-established tradition: boys become Bar Mitzvah at age 13.</p>"}, "question": "At what age does a Jewish boy become a Bar Mitzvah?", "unit": "years old", "answer": 13, "tolerance": 0, "maxAttempts": 2, "hintText": "It is a teenage year — the first year of teenhood.", "feedbackCorrect": "Age 13. A Jewish boy becomes a Bar Mitzvah at 13, taking on full religious responsibilities under Jewish law.", "feedbackWrong": "A common mistake is presenting only one religious viewpoint. The exam requires you to discuss multiple perspectives and evaluate them critically. The answer is 13. Boys become Bar Mitzvah at age 13 in Jewish tradition.", "consequence": "<strong>The documentary footage is annotated correctly.</strong> At 13, a Jewish boy transitions from childhood to adult religious responsibility.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Marriage & Death", "title": "Life's Final Passages", "scene": "scene3", "body": "<p>Your documentary's final section covers marriage and death rites. Christian marriage takes place in a church with ed in white cloth, and buried facing Mecca. Islamic funeral rites emphasise simplicity and prompt burial.", "consequence": "<strong>The documentary is fact-checked and approved.</strong> Your accurate portrayal of rites of passage across faiths will educate millions.", "next": "end", "examTip": "In the exam, present multiple religious viewpoints with specific textual references. Evaluate by considering both agreement and disagreement within traditions.", "bloomsLevel": "Understand"}], "ending": {"title": "The Rite of Passage", "perfect": "A powerful documentary. You correctly identified seven Catholic sacraments, the Bar Mitzvah age, and Islamic funeral practices. Your interfaith knowledge shines.", "partial": "Good documentary material. Review the seven Catholic sacraments, Bar Mitzvah at age 13, and Islamic burial practices (washing, wrapping, burial facing Mecca).", "retry": "Want to reshoot the documentary with perfect accuracy?", "topic": "Rites of Passage"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
