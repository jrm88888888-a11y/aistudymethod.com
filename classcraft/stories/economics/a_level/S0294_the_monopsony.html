<script>const STORY_DATA = {"meta": {"title": "The Monopsony", "subtitle": "One buyer dominates the labour market — wages fall below competitive levels.", "subject": "Economics", "topic": "Monopsony Power", "level": "A-Level", "tags": ["💰 Economics", "A-Level", "Monopsony", "~10 min", "3 questions"], "intro": "A large hospital is the only major employer in a small town. As a monopsony buyer of labour, it can set wages below the competitive level. Calculate the wage gap and the welfare loss."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='50' y='20' width='320' height='200' fill='#c8b8a8'/><line x1='70' y1='200' x2='350' y2='200' stroke='#706860' stroke-width='2'/><line x1='70' y1='200' x2='70' y2='30' stroke='#706860' stroke-width='2'/><line x1='90' y1='50' x2='330' y2='180' stroke='#8a7868' stroke-width='2.5'/><line x1='90' y1='180' x2='330' y2='50' stroke='#a09080' stroke-width='2.5'/><circle cx='210' cy='115' r='5' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='60' y='30' width='310' height='180' fill='#c8b8a8'/><line x1='80' y1='190' x2='350' y2='190' stroke='#706860' stroke-width='2'/><line x1='80' y1='190' x2='80' y2='40' stroke='#706860' stroke-width='2'/><rect x='100' y='140' width='30' height='50' fill='#8a7868'/><rect x='150' y='110' width='30' height='80' fill='#8a7868'/><rect x='200' y='80' width='30' height='110' fill='#8a7868'/><rect x='250' y='60' width='30' height='130' fill='#8a7868'/><rect x='300' y='100' width='30' height='90' fill='#a09080'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='205' width='400' height='45' fill='#706860'/><circle cx='100' cy='100' r='18' fill='#8a7868'/><rect x='88' y='120' width='24' height='60' fill='#8a7868'/><circle cx='200' cy='95' r='18' fill='#706860'/><rect x='188' y='115' width='24' height='65' fill='#706860'/><circle cx='300' cy='100' r='18' fill='#8a7868'/><rect x='288' y='120' width='24' height='60' fill='#8a7868'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Dominant Employer", "scene": "scene1", "body": "<p>In a competitive labour market, the equilibrium wage for nurses would be <strong>£18 per hour</strong> with <strong>200 nurses</strong> employed.</p><p>But the hospital is a monopsony — the sole large employer. It faces an upward-sloping labour supply curve. To hire more nurses, it must raise the wage for <strong>all</strong> existing workers, making the <strong>marginal cost of labour (MCL)</strong> higher than the wage.</p><p>The hospital maximises profit by hiring where <strong>MCL = MRPL</strong> (marginal revenue product of labour). This gives <strong>150 nurses at £15 per hour</strong>.</p>", "factBox": {"label": "Key Concept — Monopsony", "text": "A monopsony is a single buyer in a market. In labour markets, a monopsony employer faces the entire market supply curve. To attract more workers, it must raise wages for all, making MCL > wage. The result: fewer workers hired at a lower wage than competitive equilibrium."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Monopsony", "title": "The Wage Gap", "scene": "scene1", "body": "<p>Competitive wage: <strong>£18/hr</strong>. Monopsony wage: <strong>£15/hr</strong>.</p><p>What is the hourly wage gap?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Wage gap = competitive wage − monopsony wage</p><p>= £18 − £15</p>"}, "question": "What is the hourly wage gap (in £)?", "unit": "£", "answer": 3, "tolerance": 0, "maxAttempts": 2, "hintText": "£18 − £15 = ?", "feedbackCorrect": "£3 per hour wage gap is correct.", "feedbackWrong": "A common mistake is failing to consider both sides of an economic argument. Evaluate the costs and benefits for different stakeholders. The answer is £3. £18 − £15 = £3 per hour.", "consequence": "<strong>Nurses earn £3 less per hour than they would in a competitive market.</strong> Over a year of full-time work (2,000 hours), that is £6,000 less per nurse.", "next": "mid1", "nextWrong": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "The Story Continues", "title": "Employment and Welfare", "scene": "scene2", "body": "<p>Competitive employment: <strong>200 nurses</strong>. Monopsony employment: <strong>150 nurses</strong>.</p><p>The monopsony causes two forms of welfare loss: (1) workers who are employed earn less, and (2) 50 potential workers are not hired despite being willing to work at the competitive wage.</p>", "factBox": {"label": "Welfare Loss", "text": "Monopsony creates deadweight loss: some mutually beneficial employment transactions do not occur. The employer gains surplus at workers' expense, and some workers are excluded entirely."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Monopsony", "title": "Annual Wage Bill Saving", "scene": "scene2", "body": "<p>The hospital employs <strong>150 nurses at £15/hr</strong> instead of 200 at £18/hr. Each works <strong>2,000 hours/year</strong>.</p><p>Competitive wage bill = 200 × £18 × 2,000. Monopsony wage bill = 150 × £15 × 2,000.</p><p>How much does the hospital save annually by exerting monopsony power?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Competitive bill = 200 × 18 × 2000 = £7,200,000</p><p>Monopsony bill = 150 × 15 × 2000 = £4,500,000</p><p>Saving = competitive − monopsony</p>"}, "question": "How much does the hospital save per year (in £)?", "unit": "£", "answer": 2700000, "tolerance": 0, "maxAttempts": 2, "hintText": "£7,200,000 − £4,500,000 = ?", "feedbackCorrect": "£2,700,000 annual saving is correct. The hospital benefits enormously from its monopsony power.", "feedbackWrong": "A common mistake is failing to consider both sides of an economic argument. Evaluate the costs and benefits for different stakeholders. The answer is £2,700,000. £7.2m − £4.5m = £2.7m.", "consequence": "<strong>£2.7 million saved by the hospital at workers' expense.</strong> But 50 nurses who would have worked at £18/hr are not employed, and 150 nurses are underpaid.", "next": "mid2", "nextWrong": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Final Challenge", "title": "The Minimum Wage Solution", "scene": "scene3", "body": "<p>In a monopsony, a <strong>minimum wage set at the competitive level</strong> can actually <strong>increase both wages and employment</strong>. This is the opposite of the standard competitive market prediction.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Monopsony", "title": "The Paradox of Minimum Wage", "scene": "scene3", "body": "<p>In a competitive market, a binding minimum wage causes unemployment. But in a monopsony, setting the minimum at £18 could increase employment from 150 to 200 nurses.</p>", "question": "Why can a minimum wage increase BOTH wages and employment in a monopsony?", "options": [{"text": "It flattens the labour supply curve up to the minimum, so the MCL equals the wage — removing the monopsonist's incentive to restrict hiring", "correct": true}, {"text": "Workers become more productive when paid more, increasing labour demand", "correct": false}, {"text": "The monopsony is forced to close, allowing competitive firms to enter", "correct": false}, {"text": "The government subsidises the difference between old and new wages", "correct": false}], "maxAttempts": 2, "hintText": "In a monopsony, MCL > wage because hiring one more worker means raising all wages. A minimum wage makes MCL = wage (flat supply curve), so the firm hires up to where wage = MRPL.", "feedbackCorrect": "Correct. The minimum wage flattens the supply curve, making MCL = wage up to the minimum. The monopsonist's incentive to restrict employment vanishes.", "feedbackWrong": "A common mistake is failing to consider both sides of an economic argument. Evaluate the costs and benefits for different stakeholders. A minimum wage at £18 makes the supply curve flat up to 200 workers. MCL now equals the wage, so the firm hires until MRPL = £18, reaching 200 — the competitive outcome.", "consequence": "<strong>Both wages and employment rise to the competitive level.</strong> This is one of the strongest economic arguments for minimum wages in concentrated labour markets.", "next": "end", "nextWrong": "end", "examTip": "In the exam, use economic diagrams to support your written analysis. Evaluate by considering short-run vs long-run effects and different stakeholders.", "bloomsLevel": "Evaluate"}], "ending": {"title": "Mission Complete", "perfect": "Outstanding monopsony analysis. You calculated wage gaps, annual savings from market power, and explained the paradox of minimum wages in monopsony markets.", "partial": "Review: monopsony sets wage below competitive level and hires fewer workers. A minimum wage at the competitive level can restore both wages and employment.", "topic": "You practised monopsony power: calculating wage gaps, comparing wage bills, and understanding how minimum wages work differently in monopsony versus competitive markets.", "retry": "The labour market needs regulation — try again."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
