<script>const STORY_DATA = {"meta": {"title": "The Crowd Effect", "subtitle": "A man collapses in a busy street. Why does nobody help? You must explain the bystander effect.", "subject": "Psychology", "topic": "Social Influence & Conformity", "level": "KS3", "tags": ["🧠 Psychology", "KS3 · Year 7–9", "Bystander Effect", "~10 min", "3 questions"], "intro": "You are a social psychology researcher observing a disturbing scene: a man has collapsed on a crowded high street, yet dozens of people walk past without stopping. You must analyse why the crowd fails to act and calculate the likelihood of intervention based on classic research."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><circle cx='150' cy='170' r='14' fill='#8a7868'/><circle cx='200' cy='160' r='14' fill='#8a7868'/><circle cx='250' cy='175' r='14' fill='#8a7868'/><circle cx='300' cy='155' r='14' fill='#8a7868'/><circle cx='350' cy='170' r='14' fill='#706860'/><circle cx='400' cy='160' r='14' fill='#8a7868'/><circle cx='450' cy='175' r='14' fill='#8a7868'/><circle cx='500' cy='165' r='14' fill='#8a7868'/><circle cx='550' cy='170' r='14' fill='#8a7868'/><rect x='100' y='50' width='500' height='90' fill='#8a7868'/><rect x='120' y='30' width='460' height='25' fill='#b0a898'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><line x1='100' y1='30' x2='100' y2='210' stroke='#706860' stroke-width='2'/><line x1='100' y1='210' x2='620' y2='210' stroke='#706860' stroke-width='2'/><rect x='140' y='160' width='60' height='50' fill='#8a7868'/><rect x='240' y='120' width='60' height='90' fill='#8a7868'/><rect x='340' y='80' width='60' height='130' fill='#a09080'/><rect x='440' y='50' width='60' height='160' fill='#706860'/><rect x='540' y='100' width='60' height='110' fill='#8a7868'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='210' width='700' height='52' fill='#706860'/><rect x='250' y='40' width='200' height='120' fill='#8a7868'/><rect x='260' y='50' width='180' height='100' fill='#706860'/><rect x='100' y='170' width='50' height='40' fill='#8a7868'/><rect x='200' y='170' width='50' height='40' fill='#8a7868'/><rect x='325' y='170' width='50' height='40' fill='#8a7868'/><rect x='450' y='170' width='50' height='40' fill='#8a7868'/><rect x='550' y='170' width='50' height='40' fill='#8a7868'/><circle cx='125' cy='155' r='12' fill='#c8b8a8'/><circle cx='225' cy='155' r='12' fill='#c8b8a8'/><circle cx='350' cy='155' r='12' fill='#c8b8a8'/><circle cx='475' cy='155' r='12' fill='#c8b8a8'/><circle cx='575' cy='155' r='12' fill='#c8b8a8'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Frozen Crowd", "scene": "scene1", "body": "<p>It's 3 PM on a Saturday. A man stumbles and collapses outside a busy shopping centre. At least <strong>38 people</strong> are within sight. Yet for nearly two minutes, nobody approaches him. People glance, then look away. Some check if others are reacting. Nobody moves.</p><p>This is the <strong>bystander effect</strong> — the phenomenon where individuals are less likely to help when other people are present. First studied by <strong>Darley and Latané (1968)</strong> after the famous Kitty Genovese case, it reveals something unsettling about group behaviour.</p><p>The key finding: as the number of bystanders increases, the probability that any single person will help <strong>decreases</strong>. This is called <strong>diffusion of responsibility</strong>.</p>", "factBox": {"label": "Diffusion of Responsibility", "text": "When many people witness an emergency, each individual feels less personally responsible for acting. They assume someone else will help. Darley and Latané (1968) demonstrated that participants who believed they were the only witness helped 85% of the time, but when they believed 4 others were also listening, helping dropped to just 31%."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Social Influence", "title": "The Helping Rate", "scene": "scene2", "body": "<p>You recall Darley and Latané's (1968) classic experiment. Participants believed they were in a discussion group over an intercom when one 'participant' (actually a confederate) appeared to have a seizure.</p><p>When participants believed they were the <strong>only witness</strong>, <strong>85%</strong> helped within the time limit. But when they believed <strong>4 other people</strong> were also listening, the helping rate dropped dramatically to just <strong>31%</strong>.</p><p>The police officer on scene wants to know: in Darley and Latané's experiment, what percentage of people helped when they thought they were the only witness?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Key data", "steps": "<p>Darley & Latané (1968) found two key rates:</p><p>• Alone (sole witness): <strong>85%</strong> helped</p><p>• With 4 others present: <strong>31%</strong> helped</p><p>What was the helping rate when the participant was alone?</p>"}, "question": "What percentage of participants helped when they believed they were the only witness?", "unit": "%", "answer": 85, "tolerance": 0, "maxAttempts": 2, "hintText": "When participants thought they were the ONLY person who could hear the seizure, the vast majority helped. The figure is 85%.", "feedbackCorrect": "Correct — 85%. When people believe they are the sole witness, the sense of personal responsibility is high and most people act quickly.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 85%. Darley and Latané found that 85% of sole witnesses helped, compared to only 31% when four others were believed to be present.", "consequence": "<strong>The contrast is stark.</strong> From 85% down to 31% — simply because other people were believed to be present. Responsibility is shared, so nobody feels it is specifically their duty to act.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Analysing the Scene", "title": "Pluralistic Ignorance", "scene": "scene1", "body": "<p>You notice something else happening in the crowd. People are looking at each other's reactions — and seeing that nobody else looks alarmed, they conclude the situation must not be serious. This is <strong>pluralistic ignorance</strong>.</p><p>Everyone is privately uncertain, but because nobody is showing concern, each person interprets the group's calm as evidence that help is not needed. It's a vicious cycle: uncertainty leads to inaction, and inaction reinforces uncertainty.</p><p>Finally, at 3:02 PM, a single person breaks the spell. A young woman rushes forward to check on the collapsed man. Within seconds, three more people join her. The <strong>social proof</strong> of one helper breaks the bystander effect.</p>", "factBox": {"label": "Pluralistic Ignorance", "text": "When people are unsure how to react, they look to others for cues. If everyone is doing this simultaneously, the group collectively appears unconcerned — even though individually they may all be worried. This compounds the bystander effect."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Social Influence", "title": "The Drop in Helping", "scene": "scene2", "body": "<p>A journalist arrives and asks you to quantify how much the bystander effect reduced helping in Darley and Latané's study.</p><p>You explain: when alone, <strong>85%</strong> helped. When 4 others were present, only <strong>31%</strong> helped. The journalist wants to know the <strong>percentage point drop</strong> — how many percentage points did helping decrease by?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculate the drop", "steps": "<p>Helping rate alone: 85%</p><p>Helping rate with 4 others: 31%</p><p>Drop = 85 − 31 = ?</p>"}, "question": "By how many percentage points did helping drop when 4 others were present?", "unit": "percentage points", "answer": 54, "tolerance": 0, "maxAttempts": 2, "hintText": "Simply subtract: 85 minus 31.", "feedbackCorrect": "Correct — a 54 percentage point drop. The presence of other bystanders reduced helping by more than half.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 54 percentage points (85 − 31 = 54). The bystander effect cut helping rates dramatically.", "consequence": "<strong>A 54-point drop.</strong> The journalist scribbles furiously. 'So just knowing other people are there makes us more than twice as unlikely to help?' Exactly.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Breaking the Effect", "title": "The First Mover", "scene": "scene1", "body": "<p>The paramedics arrive and the man is taken to hospital — he had a diabetic episode but will recover. You reflect on what you witnessed.</p><p>The bystander effect is powerful, but it can be broken. Research shows that <strong>pointing directly at one person</strong> and asking them specifically for help is the most effective way to overcome diffusion of responsibility. When responsibility is directed at a specific individual, the social pressure to act becomes personal.</p><p>The journalist asks one final question about the psychology behind the crowd's behaviour.</p>", "factBox": {"label": "How to Beat the Bystander Effect", "text": "If you need help in a crowd: single out one person, make eye contact, and give them a specific instruction ('You in the red jacket — call 999'). This overcomes diffusion of responsibility by making one person feel personally accountable."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Social Influence", "title": "The Core Explanation", "scene": "scene3", "body": "<p>The journalist summarises your explanation for the evening news. She asks you to confirm: what is the <strong>main psychological reason</strong> why people in a large crowd are less likely to help in an emergency?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What is the main reason bystanders in a large group fail to help?", "options": [{"text": "Diffusion of responsibility — each person assumes someone else will act", "correct": true}, {"text": "People in crowds become physically unable to move", "correct": false}, {"text": "Large groups always contain more selfish people", "correct": false}, {"text": "Emergencies are less serious when more people are watching", "correct": false}], "maxAttempts": 2, "hintText": "Think about what happens to personal responsibility when it is shared among many people.", "feedbackCorrect": "Exactly right. Diffusion of responsibility means each individual feels less personally obligated to act because they assume others will take charge.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The correct answer is diffusion of responsibility. When many people are present, each individual feels less personal obligation to help, assuming someone else will step in.", "consequence": "<strong>The news piece airs that evening.</strong> Your explanation helps viewers understand why crowds freeze — and what they can do to break the spell next time.", "next": "end", "examTip": "In the exam, describe the key study in detail (aim, method, results, conclusion) before evaluating its strengths and limitations.", "bloomsLevel": "Understand"}], "ending": {"perfect": "Brilliant analysis. You explained the bystander effect with precision, using real experimental data to illuminate why crowds sometimes fail to act. Your understanding of social influence is outstanding.", "partial": "Good work. You grasped the core concepts of the bystander effect, though some of the numerical details need revision. Review Darley and Latané's key findings.", "retry": "Want to revisit the crowd and sharpen your understanding of the bystander effect?", "topic": "The bystander effect (Darley & Latané, 1968) shows that people are less likely to help in emergencies when others are present, due to diffusion of responsibility and pluralistic ignorance. Sole witnesses helped 85% of the time vs 31% with 4 others present."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
