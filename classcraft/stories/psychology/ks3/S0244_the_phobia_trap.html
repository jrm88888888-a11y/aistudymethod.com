<script>const STORY_DATA = {"meta": {"title": "The Phobia Trap", "subtitle": "A patient is terrified of dogs — but wasn't always. Can you trace how the phobia was learned?", "subject": "Psychology", "topic": "Classical Conditioning", "level": "KS3", "tags": ["🧠 Psychology", "KS3 · Year 7–9", "Classical Conditioning", "~10 min", "3 questions"], "intro": "You are a clinical psychologist treating a patient with a severe phobia of dogs. She wasn't born afraid — the fear was learned through a traumatic experience. Using classical conditioning theory, you must trace exactly how the phobia developed and help her understand the process."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><ellipse cx='350' cy='120' rx='40' ry='30' fill='#706860'/><circle cx='350' cy='95' r='18' fill='#706860'/><circle cx='343' cy='90' r='4' fill='#c8b8a8'/><circle cx='357' cy='90' r='4' fill='#c8b8a8'/><line x1='310' y1='110' x2='240' y2='80' stroke='#706860' stroke-width='3'/><line x1='310' y1='120' x2='230' y2='120' stroke='#706860' stroke-width='3'/><line x1='310' y1='130' x2='240' y2='160' stroke='#706860' stroke-width='3'/><line x1='310' y1='140' x2='250' y2='190' stroke='#706860' stroke-width='3'/><line x1='390' y1='110' x2='460' y2='80' stroke='#706860' stroke-width='3'/><line x1='390' y1='120' x2='470' y2='120' stroke='#706860' stroke-width='3'/><line x1='390' y1='130' x2='460' y2='160' stroke='#706860' stroke-width='3'/><line x1='390' y1='140' x2='450' y2='190' stroke='#706860' stroke-width='3'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><path d='M280 80 Q280 30 350 30 Q420 30 420 80' fill='none' stroke='#8a7868' stroke-width='4'/><rect x='280' y='80' width='140' height='100' fill='#8a7868'/><ellipse cx='350' cy='185' rx='90' ry='20' fill='#706860'/><circle cx='350' cy='200' r='10' fill='#c8b8a8'/><circle cx='200' cy='150' r='25' fill='#a09080'/><circle cx='200' cy='150' r='4' fill='#706860'/><circle cx='500' cy='150' r='25' fill='#a09080'/><line x1='480' y1='135' x2='520' y2='165' stroke='#706860' stroke-width='3'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='200' y='50' width='300' height='160' fill='#b0a898'/><line x1='240' y1='50' x2='240' y2='210' stroke='#8a7868' stroke-width='3'/><line x1='280' y1='50' x2='280' y2='210' stroke='#8a7868' stroke-width='3'/><line x1='320' y1='50' x2='320' y2='210' stroke='#8a7868' stroke-width='3'/><line x1='360' y1='50' x2='360' y2='210' stroke='#8a7868' stroke-width='3'/><line x1='400' y1='50' x2='400' y2='210' stroke='#8a7868' stroke-width='3'/><line x1='440' y1='50' x2='440' y2='210' stroke='#8a7868' stroke-width='3'/><line x1='460' y1='50' x2='460' y2='210' stroke='#8a7868' stroke-width='3'/><circle cx='350' cy='170' r='15' fill='#706860'/><rect x='100' y='100' width='60' height='40' fill='#8a7868'/><circle cx='130' cy='90' r='10' fill='#c8b8a8'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Learned Fear", "scene": "scene1", "body": "<p>Sarah, aged 14, sits in your office shaking. She cannot walk past a dog without experiencing a full panic response — racing heart, sweating, trembling, an overwhelming urge to flee. Yet she loved dogs until age 8.</p><p>What happened? At age 8, a large dog jumped on her and bit her hand. The pain and terror of that moment created a powerful association in her brain.</p><p><strong>Classical conditioning</strong>, first described by <strong>Ivan Pavlov</strong>, explains how a neutral stimulus can become associated with an automatic response through pairing with an unconditioned stimulus.</p><p>Before the bite: dogs = neutral (no fear). The bite = unconditioned stimulus (UCS), causing pain/fear = unconditioned response (UCR). After the bite: dogs = conditioned stimulus (CS), triggering fear = conditioned response (CR).</p>", "factBox": {"label": "Pavlov's Classical Conditioning", "text": "Pavlov discovered classical conditioning while studying digestion in dogs. He noticed that dogs began salivating not just to food (UCS), but to the sound of a bell (originally neutral) that had been repeatedly paired with food. The bell became a conditioned stimulus (CS) that produced salivation as a conditioned response (CR)."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Classical Conditioning", "title": "Watson's Little Albert", "scene": "scene2", "body": "<p>To explain Sarah's condition, you describe the famous <strong>Little Albert</strong> experiment by <strong>Watson and Rayner (1920)</strong>. They conditioned a fear of white rats in a baby called Albert B.</p><p>Albert was shown a white rat (neutral stimulus) while a loud, frightening noise was made behind him (UCS). After just <strong>7 pairings</strong> of the rat with the noise, Albert cried and tried to crawl away whenever the rat appeared — even without the noise.</p><p>Sarah asks: how many times was the rat paired with the loud noise before Albert became afraid?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Watson & Rayner (1920)", "steps": "<p>The experiment involved pairing a neutral stimulus (white rat) with an unconditioned stimulus (loud noise).</p><p>After a specific number of pairings, Albert showed a conditioned fear response to the rat alone.</p>"}, "question": "How many pairings of the rat and loud noise were needed to condition Albert's fear?", "unit": "pairings", "answer": 7, "tolerance": 0, "maxAttempts": 2, "hintText": "Watson and Rayner reported that it took 7 pairings before Albert consistently showed fear of the rat.", "feedbackCorrect": "Correct — just 7 pairings. This shows how quickly classical conditioning can create a fear response, especially when the UCS is frightening.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 7. Watson and Rayner needed only 7 pairings of the rat with the loud noise to produce a conditioned fear response in Little Albert.", "consequence": "<strong>Sarah nods slowly.</strong> 'So it only took one really scary experience with a dog to make me afraid of all dogs?' Exactly — and with a highly traumatic event, even a single pairing can be enough.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Understanding Generalisation", "title": "Beyond Dogs", "scene": "scene1", "body": "<p>You notice something else about Sarah's fear. She tells you she is also nervous around <strong>cats, foxes, and even large stuffed animals</strong>. This is not random — it's <strong>stimulus generalisation</strong>.</p><p>In Little Albert's case, his fear generalised too. After being conditioned to fear the white rat, Albert also showed fear towards a rabbit, a fur coat, and even a Santa Claus mask with a white beard — anything that resembled the original stimulus.</p><p>The more similar a new stimulus is to the original conditioned stimulus, the stronger the fear response. This is called the <strong>generalisation gradient</strong>.</p>", "factBox": {"label": "Stimulus Generalisation", "text": "When a conditioned response transfers to stimuli similar to the original CS, this is generalisation. Albert feared not just the white rat but other furry objects. Similarly, someone bitten by a German Shepherd might fear all dogs, then all large animals, with fear intensity decreasing as similarity decreases."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Classical Conditioning", "title": "Albert's Age", "scene": "scene2", "body": "<p>Sarah asks about Little Albert. 'How old was he when they did the experiment?' You recall the details of Watson and Rayner's 1920 study.</p><p>Albert B. was <strong>9 months old</strong> when the conditioning began (some sources say 11 months when testing was complete). He was chosen because he was described as emotionally stable and rarely cried, making him a clear baseline.</p><p>The experiment is now considered deeply unethical — Albert was never 'de-conditioned', meaning his fears may have persisted.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Study details", "steps": "<p>Watson & Rayner selected Albert at a very young age.</p><p>The conditioning began when Albert was 9 months old.</p><p>He was chosen for his calm temperament.</p>"}, "question": "How old (in months) was Little Albert when the conditioning experiment began?", "unit": "months", "answer": 9, "tolerance": 0, "maxAttempts": 2, "hintText": "Albert was less than a year old — specifically 9 months when the experiment started.", "feedbackCorrect": "Correct — 9 months old. Albert was chosen precisely because he was so calm and emotionally stable, making any fear responses clearly the result of conditioning.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 9 months. Little Albert was 9 months old when Watson and Rayner began the conditioning procedure.", "consequence": "<strong>Sarah looks troubled.</strong> 'They did that to a baby and never fixed it?' You explain that this is why we now have strict ethical guidelines in psychology — no study like this could be conducted today.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Treatment Plan", "title": "Undoing the Conditioning", "scene": "scene3", "body": "<p>Now you explain how classical conditioning can also be used to <strong>treat</strong> phobias. The process is called <strong>systematic desensitisation</strong>, developed by Joseph Wolpe (1958).</p><p>It works by gradually exposing the patient to the feared stimulus while they remain relaxed. Because fear and relaxation cannot coexist (a principle called <strong>reciprocal inhibition</strong>), the fear response is gradually replaced with calm.</p><p>You create a <strong>fear hierarchy</strong> for Sarah — a list of dog-related situations ranked from least to most frightening, and she will work through them one step at a time.</p>", "factBox": {"label": "Systematic Desensitisation", "text": "Wolpe's technique involves three steps: (1) learn relaxation techniques, (2) create a fear hierarchy from least to most anxiety-provoking situations, (3) work through the hierarchy while staying relaxed. If anxiety rises, you return to the previous step."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Classical Conditioning", "title": "Identifying the CS", "scene": "scene1", "body": "<p>Before treatment begins, you check Sarah's understanding. You ask her to identify the components of her conditioning.</p><p>Remember: the dog bite was the <strong>unconditioned stimulus (UCS)</strong> that naturally caused pain and fear (UCR). After the pairing, dogs themselves became associated with that fear.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "In Sarah's phobia, what is the conditioned stimulus (CS)?", "options": [{"text": "Dogs — previously neutral, now they trigger fear due to association with the bite", "correct": true}, {"text": "The pain from the bite — this is what naturally causes fear", "correct": false}, {"text": "Sarah's fear response — this is the reaction, not the stimulus", "correct": false}, {"text": "The park where the bite happened — this is the location, not the CS", "correct": false}], "maxAttempts": 2, "hintText": "The CS is the stimulus that was originally neutral (caused no fear) but now triggers fear after being paired with the UCS (the bite).", "feedbackCorrect": "Exactly right. Dogs are the conditioned stimulus — they were originally neutral (Sarah liked dogs) but became fear-triggering after being paired with the painful bite.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The correct answer is dogs. Before the bite, dogs were neutral (Sarah liked them). After pairing with the bite (UCS), dogs became the conditioned stimulus (CS), triggering fear (CR).", "consequence": "<strong>Sarah smiles for the first time.</strong> 'So my brain learned to be scared — which means it can learn to be unafraid too?' Exactly. With systematic desensitisation, the association can be broken.", "next": "end", "examTip": "In the exam, support every claim with named research evidence. State the study, its findings, and then evaluate its methodology.", "bloomsLevel": "Understand"}], "ending": {"perfect": "Outstanding clinical work. You correctly traced the classical conditioning process, recalled key study details, and identified conditioning components. Your understanding of how phobias are learned is excellent.", "partial": "Good progress. You understand the basics of classical conditioning, but review the specific details of Watson & Rayner's Little Albert study and the terminology (UCS, UCR, CS, CR).", "retry": "Want to revisit the phobia case and master classical conditioning?", "topic": "Classical conditioning (Pavlov) explains how neutral stimuli become associated with automatic responses. Watson & Rayner (1920) conditioned fear in 'Little Albert' with just 7 pairings. Phobias can be treated through systematic desensitisation."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
