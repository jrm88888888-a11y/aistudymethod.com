<script>const STORY_DATA = {"meta": {"title": "The Schizophrenia Evidence", "subtitle": "A patient presents with hallucinations. Evaluate the dopamine hypothesis and biological evidence for schizophrenia.", "subject": "Psychology", "topic": "Biological Explanations of SZ", "level": "A-Level", "tags": ["🧠 Psychology", "A-Level", "Schizophrenia", "~12 min", "3 questions"], "intro": "You are a clinical researcher evaluating the biological evidence for schizophrenia. A patient presents with auditory hallucinations and thought disorder. You must assess the dopamine hypothesis, genetic evidence, and neural correlates to build a comprehensive picture."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#706860'/><rect x='150' y='20' width='400' height='220' fill='#8a7868'/><ellipse cx='350' cy='130' rx='120' ry='90' fill='#a09080'/><ellipse cx='310' cy='110' rx='60' ry='50' fill='#b0a898'/><ellipse cx='390' cy='110' rx='60' ry='50' fill='#b0a898'/><circle cx='300' cy='100' r='20' fill='#c8b8a8'/><circle cx='400' cy='100' r='20' fill='#c8b8a8'/><ellipse cx='350' cy='170' rx='40' ry='20' fill='#b0a898'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><line x1='100' y1='30' x2='100' y2='210' stroke='#706860' stroke-width='2'/><line x1='100' y1='210' x2='620' y2='210' stroke='#706860' stroke-width='2'/><rect x='140' y='160' width='60' height='50' fill='#8a7868'/><rect x='240' y='120' width='60' height='90' fill='#8a7868'/><rect x='340' y='80' width='60' height='130' fill='#a09080'/><rect x='440' y='50' width='60' height='160' fill='#706860'/><rect x='540' y='100' width='60' height='110' fill='#8a7868'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='150' y='60' width='120' height='140' fill='#8a7868'/><rect x='160' y='40' width='100' height='25' fill='#a09080'/><ellipse cx='210' cy='110' rx='20' ry='12' fill='#c8b8a8'/><ellipse cx='210' cy='140' rx='20' ry='12' fill='#c8b8a8'/><ellipse cx='210' cy='170' rx='20' ry='12' fill='#c8b8a8'/><rect x='400' y='80' width='150' height='110' fill='#8a7868'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Dopamine Hypothesis", "scene": "scene1", "body": "<p>Marcus, aged 22, has been admitted to hospital experiencing <strong>auditory hallucinations</strong> (hearing voices), <strong>delusions of persecution</strong> (believing MI5 is monitoring him), and <strong>thought disorder</strong> (disorganised, incoherent speech).</p><p>These are <strong>positive symptoms</strong> of schizophrenia — additional experiences beyond normal functioning. He also shows <strong>negative symptoms</strong>: social withdrawal, flat affect (reduced emotional expression), and avolition (lack of motivation).</p><p>The <strong>dopamine hypothesis</strong> proposes that schizophrenia is caused by excessive dopamine activity in certain brain pathways. Evidence comes from the fact that <strong>antipsychotic drugs</strong> (which block dopamine receptors) reduce positive symptoms, while drugs that increase dopamine (e.g., amphetamines) can induce psychotic symptoms.</p>", "factBox": {"label": "The Dopamine Hypothesis", "text": "The original hypothesis proposed hyperdopaminergia (excess dopamine) caused schizophrenia. The revised hypothesis is more nuanced: excess dopamine in the mesolimbic pathway causes positive symptoms (hallucinations, delusions), while dopamine deficiency in the mesocortical pathway causes negative symptoms (withdrawal, flat affect). This explains why antipsychotics help positive but not negative symptoms."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Schizophrenia", "title": "Concordance Rates", "scene": "scene2", "body": "<p>The strongest evidence for a biological basis of schizophrenia comes from <strong>twin studies</strong>. <strong>Gottesman (1991)</strong> conducted a meta-analysis of twin studies and found:</p><p>• <strong>Monozygotic (MZ) twins:</strong> concordance rate of approximately <strong>48%</strong><br/>• <strong>Dizygotic (DZ) twins:</strong> concordance rate of approximately <strong>17%</strong></p><p>Since MZ twins share 100% of genes and DZ twins share only 50%, the higher MZ concordance rate suggests a strong genetic component.</p><p>What is the concordance rate for schizophrenia in MZ twins according to Gottesman?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Twin study data", "steps": "<p>Gottesman (1991) meta-analysis:</p><p>MZ concordance: ~48%</p><p>DZ concordance: ~17%</p><p>MZ rate is much higher, suggesting genetic influence.</p>"}, "question": "What is the concordance rate for schizophrenia in MZ twins (Gottesman)?", "unit": "%", "answer": 48, "tolerance": 2, "maxAttempts": 2, "hintText": "MZ concordance is approximately 48% — nearly half.", "feedbackCorrect": "Correct — approximately 48%. However, note this is NOT 100%. If schizophrenia were purely genetic, MZ concordance would be 100%. The fact that it's 48% proves that environmental factors also play a crucial role — it's a diathesis-stress interaction.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is approximately 48%. Gottesman found that about 48% of MZ co-twins of schizophrenia patients also develop the disorder — higher than the 17% DZ rate but far from 100%.", "consequence": "<strong>48% — strong genetic influence, but not destiny.</strong> Over half of MZ co-twins do NOT develop schizophrenia, proving that genes alone cannot explain the disorder. The diathesis-stress model is needed.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Neural Evidence", "title": "Brain Abnormalities", "scene": "scene1", "body": "<p>Brain imaging studies have identified structural differences in people with schizophrenia:</p><p><strong>Enlarged ventricles:</strong> The fluid-filled spaces in the brain are larger, suggesting loss of brain tissue. Found in many but not all patients.</p><p><strong>Reduced prefrontal cortex activity:</strong> fMRI studies show 'hypofrontality' — reduced blood flow and activity in the frontal lobes. This may explain negative symptoms and cognitive deficits.</p><p><strong>Reduced hippocampal volume:</strong> The hippocampus (involved in memory) is smaller in many schizophrenia patients.</p><p>However, it's unclear whether these changes <strong>cause</strong> schizophrenia or are <strong>effects</strong> of the disorder (or its treatment with antipsychotic medication).</p>", "factBox": {"label": "Correlation vs Causation", "text": "Brain abnormalities are found in many schizophrenia patients, but correlation does not prove causation. Antipsychotic medication can itself cause brain changes (e.g., dopamine receptor upregulation). Long-term institutionalisation may also affect brain structure. Prospective studies (scanning before onset) are needed to establish causation."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Schizophrenia", "title": "The DZ Rate", "scene": "scene2", "body": "<p>Gottesman's meta-analysis also reported the concordance rate for DZ (fraternal) twins, who share approximately 50% of their genes.</p><p>The DZ concordance rate was approximately <strong>17%</strong> — much lower than the 48% for MZ twins, but still higher than the general population risk of about 1%.</p><p>What is the concordance rate for schizophrenia in DZ twins?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "DZ data", "steps": "<p>DZ twins share ~50% of genes.</p><p>Concordance rate: approximately 17%</p><p>This is higher than population risk (1%) but lower than MZ (48%).</p>"}, "question": "What is the concordance rate for schizophrenia in DZ twins?", "unit": "%", "answer": 17, "tolerance": 1, "maxAttempts": 2, "hintText": "The DZ concordance rate is approximately 17%.", "feedbackCorrect": "Correct — approximately 17%. The gradient (MZ 48% > DZ 17% > general population 1%) strongly suggests a genetic component — the more genes shared, the higher the concordance.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is approximately 17%. DZ twins have a 17% concordance rate — higher than the population rate (1%) but much lower than MZ twins (48%).", "consequence": "<strong>The genetic gradient is clear:</strong> MZ (100% genes) = 48%, DZ (50% genes) = 17%, general population = 1%. More shared genes means more shared risk.", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "Treatment Implications", "title": "Antipsychotics", "scene": "scene3", "body": "<p>Marcus is prescribed an <strong>atypical antipsychotic</strong> (e.g., clozapine). These drugs block dopamine receptors (particularly D2) and also affect serotonin receptors.</p><p><strong>Typical antipsychotics</strong> (e.g., chlorpromazine) primarily block D2 dopamine receptors and are effective for positive symptoms but have significant side effects including <strong>tardive dyskinesia</strong> (involuntary movements).</p><p><strong>Atypical antipsychotics</strong> have a broader receptor profile and may be more effective for negative symptoms with fewer movement side effects — though they carry risks of weight gain and metabolic syndrome.</p><p>The fact that dopamine-blocking drugs reduce symptoms supports the dopamine hypothesis, but it doesn't prove it — aspirin reduces headaches, but headaches aren't caused by a lack of aspirin.</p>", "factBox": {"label": "Treatment Aetiology Fallacy", "text": "Just because a drug that blocks dopamine reduces symptoms doesn't prove excess dopamine caused the symptoms. This is the treatment aetiology fallacy. The relationship between neurotransmitters and disorders is far more complex than simple excess or deficiency — multiple systems interact."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Schizophrenia", "title": "The Evidence Evaluation", "scene": "scene1", "body": "<p>The MZ twin concordance rate for schizophrenia is approximately 48%, not 100%. What does this tell us?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What does the 48% MZ concordance rate indicate about the causes of schizophrenia?", "options": [{"text": "Both genetic and environmental factors contribute — it is a diathesis-stress interaction", "correct": true}, {"text": "Schizophrenia is entirely genetic — the 52% discordance is measurement error", "correct": false}, {"text": "Schizophrenia has no genetic basis at all — the 48% is coincidence", "correct": false}, {"text": "Only environmental factors matter — genes play no role in schizophrenia", "correct": false}], "maxAttempts": 2, "hintText": "If it were 100% genetic, MZ concordance would be 100%. If it were 0% genetic, MZ and DZ rates would be equal. 48% suggests BOTH genes and environment matter.", "feedbackCorrect": "Exactly right. The 48% rate shows strong genetic influence (much higher than DZ at 17%), but the fact it's not 100% proves environment also matters. The diathesis-stress model best explains this: a genetic predisposition (diathesis) is triggered by environmental stressors.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The correct answer is that both genetic and environmental factors contribute. 48% shows genes matter (higher than DZ and population rates), but <100% proves environment matters too. This supports the diathesis-stress model.", "consequence": "<strong>Marcus's treatment plan reflects this complexity:</strong> antipsychotic medication addresses the biological component, while CBT and family therapy address psychological and social factors. No single explanation is sufficient.", "next": "end", "examTip": "In the exam, support every claim with named research evidence. State the study, its findings, and then evaluate its methodology.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Outstanding evaluation of the biological evidence for schizophrenia. You accurately recalled concordance rates, understood the dopamine hypothesis, and correctly applied the diathesis-stress model.", "partial": "Good work. Review the key figures: MZ concordance 48%, DZ 17%. Understand the revised dopamine hypothesis and why concordance rates support a diathesis-stress model.", "retry": "Want to revisit the schizophrenia evidence and master biological explanations?", "topic": "The dopamine hypothesis proposes excess mesolimbic dopamine causes positive symptoms and mesocortical deficiency causes negative symptoms. Gottesman (1991): MZ concordance 48%, DZ 17%. The <100% MZ rate supports a diathesis-stress model combining genetic predisposition with environmental triggers."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
