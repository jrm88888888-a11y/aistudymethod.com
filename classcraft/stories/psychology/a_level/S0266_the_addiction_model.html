<script>const STORY_DATA = {"meta": {"title": "The Addiction Model", "subtitle": "A patient struggles with gambling addiction. Should treatment target biology, psychology, or both?", "subject": "Psychology", "topic": "Biological & Psychological Addiction", "level": "A-Level", "tags": ["🧠 Psychology", "A-Level", "Addiction", "~12 min", "3 questions"], "intro": "You are an addiction specialist treating a patient with severe gambling disorder. You must evaluate biological explanations (dopamine reward system), psychological explanations (cognitive biases, learning theory), and decide on the most effective treatment approach."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#706860'/><rect x='150' y='20' width='400' height='220' fill='#8a7868'/><ellipse cx='350' cy='130' rx='120' ry='90' fill='#a09080'/><ellipse cx='310' cy='110' rx='60' ry='50' fill='#b0a898'/><ellipse cx='390' cy='110' rx='60' ry='50' fill='#b0a898'/><circle cx='300' cy='100' r='20' fill='#c8b8a8'/><circle cx='400' cy='100' r='20' fill='#c8b8a8'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><line x1='100' y1='30' x2='100' y2='210' stroke='#706860' stroke-width='2'/><line x1='100' y1='210' x2='620' y2='210' stroke='#706860' stroke-width='2'/><rect x='140' y='160' width='60' height='50' fill='#8a7868'/><rect x='240' y='120' width='60' height='90' fill='#8a7868'/><rect x='340' y='80' width='60' height='130' fill='#a09080'/><rect x='440' y='50' width='60' height='160' fill='#706860'/><rect x='540' y='100' width='60' height='110' fill='#8a7868'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='150' y='60' width='120' height='140' fill='#8a7868'/><rect x='160' y='40' width='100' height='25' fill='#a09080'/><ellipse cx='210' cy='110' rx='20' ry='12' fill='#c8b8a8'/><ellipse cx='210' cy='140' rx='20' ry='12' fill='#c8b8a8'/><ellipse cx='210' cy='170' rx='20' ry='12' fill='#c8b8a8'/><rect x='400' y='80' width='150' height='110' fill='#8a7868'/><rect x='420' y='100' width='110' height='8' fill='#c8b8a8'/><rect x='420' y='120' width='90' height='8' fill='#c8b8a8'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Dopamine Trap", "scene": "scene1", "body": "<p>James, aged 40, has lost his savings, his marriage, and nearly his home to gambling. He knows it's destructive but cannot stop. He describes an intense 'rush' when placing bets and a crushing emptiness when he tries to abstain.</p><p>The <strong>biological model</strong> of addiction focuses on the brain's <strong>dopamine reward system</strong>. Gambling (like drugs) triggers dopamine release in the <strong>nucleus accumbens</strong>, the brain's reward centre. Over time, the brain adapts — requiring more stimulation to achieve the same reward (tolerance). When the behaviour stops, withdrawal symptoms (anxiety, restlessness, irritability) occur.</p><p>Brain imaging studies show that pathological gamblers have <strong>reduced dopamine receptor density</strong>, similar to drug addicts — they need more stimulation to feel pleasure.</p>", "factBox": {"label": "The Mesolimbic Dopamine Pathway", "text": "Addictive behaviours activate the mesolimbic pathway from the ventral tegmental area (VTA) to the nucleus accumbens, releasing dopamine. This pathway evolved to reinforce survival behaviours (eating, sex). Addictive substances/behaviours hijack this system, producing artificial reward signals that override natural reinforcers."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Addiction", "title": "Heritability of Gambling", "scene": "scene2", "body": "<p>Twin studies suggest a genetic component to gambling addiction. <strong>Shah et al. (2005)</strong> found that the heritability of pathological gambling is approximately <strong>50%</strong> — meaning about half of the variation in gambling susceptibility can be attributed to genetic factors.</p><p>What is the approximate heritability estimate for pathological gambling?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Heritability data", "steps": "<p>Shah et al. (2005) twin study</p><p>Heritability of pathological gambling: ~50%</p><p>This means ~50% of variation is genetic, ~50% environmental.</p>"}, "question": "What is the approximate heritability of pathological gambling (Shah et al.)?", "unit": "%", "answer": 50, "tolerance": 4, "maxAttempts": 2, "hintText": "The heritability is about half — approximately 50%.", "feedbackCorrect": "Correct — approximately 50%. Like many psychological conditions, gambling addiction shows moderate heritability, suggesting both genetic predisposition and environmental factors contribute.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is approximately 50%. Shah et al. (2005) found that about 50% of the variation in pathological gambling can be attributed to genetic factors.", "consequence": "<strong>Half genetic, half environmental.</strong> James's father was also a heavy gambler — the genetic predisposition may have been there, but environmental factors (access to betting, peer influence, stress) triggered the addiction.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Cognitive Biases", "title": "The Gambler's Fallacy", "scene": "scene2", "body": "<p>The <strong>psychological model</strong> highlights cognitive biases that maintain gambling:</p><p><strong>The gambler's fallacy:</strong> Believing that past outcomes affect future probability ('I've lost 10 times in a row — I'm due a win!'). In reality, each bet is independent.</p><p><strong>Illusion of control:</strong> Believing you can influence random outcomes (choosing 'lucky' numbers, blowing on dice).</p><p><strong>Recall bias:</strong> Remembering wins more vividly than losses, distorting the perceived win rate.</p><p><strong>Near-miss effect:</strong> Treating near-misses as evidence of almost winning rather than losing, which maintains motivation to continue gambling. <strong>Griffiths (1994)</strong> found that regular gamblers made more irrational verbalisations and were more likely to treat outcomes as 'skilful'.</p>", "factBox": {"label": "Griffiths (1994)", "text": "Griffiths compared 30 regular and 30 non-regular fruit machine gamblers using a 'thinking aloud' method. Regular gamblers made significantly more irrational verbalisations (14% of their statements were irrational vs 2.5% for non-regulars) and were more likely to personify the machine and treat near-misses as near-wins."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Addiction", "title": "Irrational Thinking", "scene": "scene2", "body": "<p>In Griffiths' (1994) study, <strong>14%</strong> of regular gamblers' verbalisations were irrational (e.g., personifying the machine, treating outcomes as skilful), compared to only <strong>2.5%</strong> for non-regular gamblers.</p><p>What percentage of regular gamblers' verbalisations were classified as irrational?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Griffiths' data", "steps": "<p>Regular gamblers: 14% irrational verbalisations</p><p>Non-regular gamblers: 2.5% irrational</p><p>Regular gamblers were nearly 6 times more irrational.</p>"}, "question": "What percentage of regular gamblers' verbalisations were irrational in Griffiths' study?", "unit": "%", "answer": 14, "tolerance": 0, "maxAttempts": 2, "hintText": "Regular gamblers showed 14%  "examTip": "In the exam, support every claim with named research evidence. State the study, its findings, and then evaluate its methodology.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Outstanding addiction knowledge. You accurately evaluated biological and psychological models, recalled key research, and identified the biopsychosocial approach as most comprehensive.", "partial": "Good work. Review the dopamine reward system, Griffiths' (1994) cognitive bias findings, and why the biopsychosocial model is superior to single-factor explanations.", "retry": "Want to revisit the addiction case and master the models?", "topic": "Gambling addiction involves dopamine reward system hijacking (biological), cognitive biases like gambler's fallacy (psychological), and social triggers. Shah et al.: ~50% heritability. Griffiths: 14% irrational verbalisations in regular gamblers. Biopsychosocial treatment is most effective."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
