<script>const STORY_DATA = {"meta": {"title": "The Gender Debate", "subtitle": "Is gender determined by biology or shaped by society? Evaluate the competing explanations.", "subject": "Psychology", "topic": "Biological vs Social Explanations of Gender", "level": "A-Level", "tags": ["🧠 Psychology", "A-Level", "Gender", "~12 min", "3 questions"], "intro": "You are chairing an academic debate between a biological psychologist and a social constructionist on the origins of gender differences. Both present compelling evidence. You must evaluate both sides and reach a nuanced conclusion."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><path d='M300 20 Q380 70 300 120 Q220 170 300 220' fill='none' stroke='#8a7868' stroke-width='4'/><path d='M400 20 Q320 70 400 120 Q480 170 400 220' fill='none' stroke='#8a7868' stroke-width='4'/><line x1='310' y1='40' x2='390' y2='40' stroke='#706860' stroke-width='2'/><line x1='280' y1='70' x2='420' y2='70' stroke='#706860' stroke-width='2'/><line x1='300' y1='100' x2='400' y2='100' stroke='#706860' stroke-width='2'/><line x1='280' y1='130' x2='420' y2='130' stroke='#706860' stroke-width='2'/><line x1='300' y1='160' x2='400' y2='160' stroke='#706860' stroke-width='2'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><line x1='100' y1='30' x2='100' y2='210' stroke='#706860' stroke-width='2'/><line x1='100' y1='210' x2='620' y2='210' stroke='#706860' stroke-width='2'/><rect x='140' y='160' width='60' height='50' fill='#8a7868'/><rect x='240' y='120' width='60' height='90' fill='#8a7868'/><rect x='340' y='80' width='60' height='130' fill='#a09080'/><rect x='440' y='50' width='60' height='160' fill='#706860'/><rect x='540' y='100' width='60' height='110' fill='#8a7868'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><rect x='345' y='60' width='10' height='140' fill='#8a7868'/><polygon points='350,50 320,60 380,60' fill='#706860'/><line x1='200' y1='80' x2='500' y2='80' stroke='#8a7868' stroke-width='3'/><path d='M170 80 L200 130 L230 80' fill='none' stroke='#706860' stroke-width='2'/><path d='M470 80 L500 130 L530 80' fill='none' stroke='#706860' stroke-width='2'/><ellipse cx='200' cy='135' rx='35' ry='10' fill='#a09080'/><ellipse cx='500' cy='135' rx='35' ry='10' fill='#a09080'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "Nature vs Nurture", "scene": "scene1", "body": "<p>The question is ancient but unresolved: are gender differences <strong>biological</strong> (innate, determined by genes, hormones, and brain structure) or <strong>social</strong> (learned through socialisation, culture, and upbringing)?</p><p><strong>The biological argument:</strong> Chromosomes (XX/XY), hormones (testosterone, oestrogen), and brain differences produce innate gender-typical behaviour. Evidence: cross-cultural universals, animal studies, intersex cases.</p><p><strong>The social argument:</strong> Gender is a social construction, learned through reinforcement, role models, and cultural expectations. Evidence: cross-cultural variations, changes over time, socialisation studies.</p><p>The case of <strong>David Reimer</strong> (Money, 1975; Diamond & Sigmundson, 1997) dramatically illustrates the stakes of this debate.</p>", "factBox": {"label": "The David Reimer Case", "text": "David Reimer (born Bruce) was raised as a girl ('Brenda') after a botched circumcision at 8 months. John Money (1975) reported the case as evidence for social construction of gender. However, David rejected his female identity, transitioned back to male at age 14, and tragically died by suicide aged 38. Diamond & Sigmundson (1997) revealed the truth — challenging Money's claims and supporting biological influences."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Gender", "title": "Reimer's Age", "scene": "scene2", "body": "<p>David Reimer was raised as 'Brenda' from infancy but never felt female. Despite hormone treatment and socialisation as a girl, he experienced severe gender dysphoria.</p><p>At what age did David Reimer transition back to living as male?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "The timeline", "steps": "<p>Born as Bruce Reimer, 1965</p><p>Circumcision accident at 8 months</p><p>Raised as 'Brenda' from infancy</p><p>Told the truth and transitioned to male at age 14</p>"}, "question": "At what age did David Reimer transition back to male?", "unit": "years", "answer": 14, "tolerance": 0, "maxAttempts": 2, "hintText": "David learned the truth about his past and chose to live as male at age 14.", "feedbackCorrect": "Correct — age 14. David's rejection of his female identity, despite years of socialisation as a girl, provides powerful evidence that biological factors (particularly prenatal testosterone exposure) strongly influence gender identity.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 14. David Reimer transitioned to living as male at age 14, rejecting the female identity he had been raised with since infancy.", "consequence": "<strong>David's case challenged the social constructionist view.</strong> If gender were entirely socially learned, he should have developed a female identity. The fact that he didn't suggests biology plays a powerful role.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Hormonal Evidence", "title": "Testosterone and Behaviour", "scene": "scene1", "body": "<p>The biological psychologist presents hormonal evidence. <strong>Testosterone</strong> influences gender-typed behaviour even before birth:</p><p><strong>Congenital adrenal hyperplasia (CAH):</strong> Girls with CAH are exposed to high levels of prenatal androgens. Studies show they prefer 'masculine' toys and activities more than unaffected girls — despite being raised as girls by parents who know their condition.</p><p><strong>Animal studies:</strong> Castrating male rats shortly after birth produces 'feminised' behaviour. Injecting female rats with testosterone produces 'masculinised' behaviour. Hormones clearly organise brain development and behaviour in non-human animals.</p><p>However, the social psychologist argues that parents, teachers, and peers also powerfully shape gender behaviour through <strong>differential reinforcement</strong> (rewarding gender-appropriate behaviour) and <strong>modelling</strong> (children imitating same-sex role models).</p>", "factBox": {"label": "Kohlberg's Cognitive Development Theory", "text": "Kohlberg (1966) proposed children develop gender identity in stages: Gender Identity (2-3 years: knowing your own gender), Gender Stability (4 years: understanding gender is stable over time), and Gender Constancy (6-7 years: understanding gender is consistent across situations). Only at constancy do children actively seek gender-appropriate behaviour."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Gender", "title": "Kohlberg's Stages", "scene": "scene2", "body": "<p>Kohlberg (1966) proposed that children's understanding of gender develops through <strong>three stages</strong>: Gender Identity, Gender Stability, and Gender Constancy.</p><p>How many stages are in Kohlberg's gender development theory?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Count the stages", "steps": "<p>1. Gender Identity (2-3 years)</p><p>2. Gender Stability (4 years)</p><p>3. Gender Constancy (6-7 years)</p>"}, "question": "How many stages are in Kohlberg's gender development theory?", "unit": "stages", "answer": 3, "tolerance": 0, "maxAttempts": 2, "hintText": "Identity, Stability, Constancy — three stages.", "feedbackCorrect": "Correct — 3 stages. Kohlberg's cognitive approach suggests that children actively construct their understanding of gender, and only seek out gender-appropriate behaviour once they achieve gender constancy (around age 6-7).", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 3 stages: Gender Identity (knowing your gender), Gender Stability (knowing it's permanent), and Gender Constancy (knowing it's consistent across situations).", "consequence": "<strong>Kohlberg's theory bridges biology and social learning</strong> — it acknowledges cognitive maturation (biological) but emphasises that children actively seek gender-typed information (social).", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Resolution", "title": "The Interactionist View", "scene": "scene3", "body": "<p>The debate concludes with the recognition that <strong>both biology and socialisation matter</strong>. The most scientific position is the <strong>interactionist approach</strong>:</p><p>Biology provides <strong>predispositions</strong> (chromosomes, hormones, brain structure), while social and cultural factors <strong>shape the expression</strong> of these predispositions. Gender differences are neither purely innate nor purely learned — they emerge from a complex interaction between nature and nurture.</p><p>Cross-cultural research shows <strong>some universal gender differences</strong> (e.g., males are more physically aggressive across virtually all cultures) alongside <strong>significant cultural variation</strong> in gender roles, expectations, and behaviours.</p>", "factBox": {"label": "The Interactionist Approach", "text": "Modern psychology rejects the nature vs nurture dichotomy in favour of nature VIA nurture. Genes and hormones create predispositions, but these are shaped by socialisation, culture, and individual experience. The same biological predisposition may produce different behaviours depending on the social context."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Gender", "title": "The Best Explanation", "scene": "scene1", "body": "<p>Based on the evidence from biological research, social learning theory, and cases like David Reimer, which conclusion about gender is best supported?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Which conclusion about the origins of gender differences is best supported by evidence?", "options": [{"text": "Gender results from an interaction between biological predispositions and social/cultural influences", "correct": true}, {"text": "Gender is entirely determined by chromosomes and hormones — socialisation has no effect", "correct": false}, {"text": "Gender is entirely socially constructed — biology plays no role whatsoever", "correct": false}, {"text": "Gender differences do not exist — males and females are identical in every way", "correct": false}], "maxAttempts": 2, "hintText": "The David Reimer case shows biology matters (he rejected female socialisation). Cross-cultural variation shows culture matters too. The answer combines both.", "feedbackCorrect": "Exactly right. The evidence strongly supports an interactionist view: biology (genes, hormones, brain structure) creates predispositions, while socialisation and culture shape how these are expressed. Neither alone is sufficient to explain gender.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The correct answer is that gender results from an interaction between biology and social influences. David Reimer shows biology matters; cross-cultural variation shows culture matters. Both are needed.", "consequence": "<strong>The debate ends with a consensus:</strong> the nature vs nurture dichotomy is false. Gender, like most complex human characteristics, emerges from the interplay of biology and experience.", "next": "end", "examTip": "In the exam, describe the key study in detail (aim, method, results, conclusion) before evaluating its strengths and limitations.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Excellent evaluation. You demonstrated nuanced understanding of biological and social explanations, recalled key case studies, and correctly identified the interactionist position as best supported.", "partial": "Good work. Review the David Reimer case, Kohlberg's 3 stages, and why the interactionist approach best explains gender differences.", "retry": "Want to revisit the gender debate and master biological vs social explanations?", "topic": "Gender differences arise from biology-socialisation interaction. David Reimer's case (transitioned at 14) supports biological influence. Kohlberg proposed 3 stages of gender development. CAH studies show hormonal effects. Modern psychology favours the interactionist approach: nature via nurture."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
