<script>const STORY_DATA = {"meta": {"title": "The Psychopathology", "subtitle": "Is this behaviour abnormal? Apply multiple definitions and discover their limitations.", "subject": "Psychology", "topic": "Definitions of Abnormality", "level": "A-Level", "tags": ["🧠 Psychology", "A-Level", "Abnormality", "~12 min", "3 questions"], "intro": "You are an ethics committee member reviewing a clinical case. A man has been referred for assessment — but is his behaviour truly 'abnormal'? You must apply the four definitions of abnormality and evaluate their strengths and limitations."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='150' y='120' width='400' height='80' fill='#8a7868'/><rect x='130' y='100' width='40' height='120' fill='#706860'/><rect x='530' y='100' width='40' height='120' fill='#706860'/><rect x='160' y='100' width='380' height='25' fill='#b0a898'/><circle cx='350' cy='70' r='25' fill='#8a7868'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><line x1='100' y1='30' x2='100' y2='210' stroke='#706860' stroke-width='2'/><line x1='100' y1='210' x2='620' y2='210' stroke='#706860' stroke-width='2'/><rect x='140' y='160' width='60' height='50' fill='#8a7868'/><rect x='240' y='120' width='60' height='90' fill='#8a7868'/><rect x='340' y='80' width='60' height='130' fill='#a09080'/><rect x='440' y='50' width='60' height='160' fill='#706860'/><rect x='540' y='100' width='60' height='110' fill='#8a7868'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><rect x='345' y='60' width='10' height='140' fill='#8a7868'/><polygon points='350,50 320,60 380,60' fill='#706860'/><line x1='200' y1='80' x2='500' y2='80' stroke='#8a7868' stroke-width='3'/><path d='M170 80 L200 130 L230 80' fill='none' stroke='#706860' stroke-width='2'/><path d='M470 80 L500 130 L530 80' fill='none' stroke='#706860' stroke-width='2'/><ellipse cx='200' cy='135' rx='35' ry='10' fill='#a09080'/><ellipse cx='500' cy='135' rx='35' ry='10' fill='#a09080'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "Defining Abnormality", "scene": "scene1", "body": "<p>Mr Okoro, a 45-year-old accountant, has been referred for assessment. He washes his hands exactly 50 times per day, refuses to touch door handles, and spends 4 hours daily on cleaning rituals. He is distressed by these behaviours but cannot stop them.</p><p>Is this 'abnormal'? Psychology uses four main definitions:</p><p><strong>1. Statistical infrequency:</strong> Behaviour is abnormal if it is statistically rare (more than 2 standard deviations from the mean).</p><p><strong>2. Deviation from social norms:</strong> Behaviour that violates society's unwritten rules.</p><p><strong>3. Failure to function adequately (FFA):</strong> When behaviour prevents normal daily functioning.</p><p><strong>4. Deviation from ideal mental health:</strong> Jahoda's (1958) criteria — not meeting standards of positive mental health.</p>", "factBox": {"label": "Jahoda's Ideal Mental Health (1958)", "text": "Jahoda proposed 6 criteria for ideal mental health: (1) Positive self-attitude, (2) Self-actualisation, (3) Resistance to stress, (4) Personal autonomy, (5) Accurate perception of reality, (6) Environmental mastery. Failing to meet these criteria indicates abnormality. But critics argue almost nobody meets ALL six criteria — making most people 'abnormal'."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Abnormality", "title": "Jahoda's Criteria", "scene": "scene2", "body": "<p>Jahoda (1958) proposed a set of criteria for ideal mental health. The idea was that deviation from these criteria could define abnormality.</p><p>How many criteria did Jahoda propose for ideal mental health?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Count them", "steps": "<p>Jahoda's criteria: (1) positive self-attitude, (2) self-actualisation, (3) resistance to stress, (4) autonomy, (5) accurate perception, (6) environmental mastery.</p>"}, "question": "How many criteria did Jahoda propose for ideal mental health?", "unit": "criteria", "answer": 6, "tolerance": 0, "maxAttempts": 2, "hintText": "Count the list: self-attitude, self-actualisation, stress resistance, autonomy, accurate perception, environmental mastery — that's 6.", "feedbackCorrect": "Correct — 6 criteria. However, a major criticism is that very few people meet all six, making the definition overly inclusive — by this standard, most people would be considered abnormal.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 6. Jahoda proposed 6 criteria for ideal mental health, though critics argue the standard is unrealistically high.", "consequence": "<strong>Six criteria — and Mr Okoro fails several of them.</strong> His OCD behaviours interfere with autonomy, environmental mastery, and resistance to stress. But so would many 'normal' people's behaviours under scrutiny.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Applying the Definitions", "title": "Testing Mr Okoro", "scene": "scene1", "body": "<p>You apply each definition to Mr Okoro:</p><p><strong>Statistical infrequency:</strong> Washing hands 50 times daily is statistically rare — most people wash 6-10 times. This qualifies as abnormal. But this definition has problems: very high IQ is also statistically rare but not considered a disorder.</p><p><strong>Social norms:</strong> Excessive hand-washing violates social expectations. But social norms vary across cultures and time periods — homosexuality was once classified as a mental disorder (until DSM-III, 1980).</p><p><strong>FFA:</strong> Mr Okoro's rituals consume 4 hours daily, affecting his work and relationships. He clearly fails to function adequately. This is perhaps the most practical definition.</p><p><strong>Ideal mental health:</strong> He fails several of Jahoda's criteria. But as noted, this definition is overly inclusive.</p>", "factBox": {"label": "Limitations of Definitions", "text": "No single definition is sufficient alone. Statistical infrequency cannot distinguish desirable from undesirable rarity. Social norms are culturally relative. FFA depends on subjective judgement. Ideal mental health sets unrealistic standards. Most clinicians use a combination of all four, alongside clinical judgement."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Abnormality", "title": "Statistical Thresholds", "scene": "scene2", "body": "<p>In the statistical infrequency definition, behaviour is typically considered 'abnormal' if it falls more than <strong>2 standard deviations</strong> from the mean of a normal distribution.</p><p>On a normal distribution, approximately <strong>95%</strong> of the population falls within 2 standard deviations of the mean. This means only about <strong>5%</strong> falls outside this range (2.5% at each extreme).</p><p>What percentage of the population falls within 2 standard deviations of the mean?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Normal distribution", "steps": "<p>Within 1 SD: ~68% of population</p><p>Within 2 SD: ~95% of population</p><p>Within 3 SD: ~99.7% of population</p>"}, "question": "What percentage of the population falls within 2 standard deviations of the mean?", "unit": "%", "answer": 95, "tolerance": 1, "maxAttempts": 2, "hintText": "The 68-95-99.7 rule: approximately 95% falls within 2 standard deviations.", "feedbackCorrect": "Correct — approximately 95%. This means only about 5% of the population would be classified as 'statistically abnormal' by this criterion — 2.5% at the very low end and 2.5% at the very high end.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is approximately 95%. Under the normal distribution, about 95% of scores fall within 2 standard deviations of the mean, leaving only 5% in the 'abnormal' tails.", "consequence": "<strong>By statistical definition alone, 5% of the population is 'abnormal' on any given measure.</strong> But this includes geniuses as well as people with disorders — showing why this definition alone is insufficient.", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Decision", "title": "Multiple Definitions", "scene": "scene3", "body": "<p>The committee concludes that no single definition of abnormality is adequate. Each has strengths but also significant limitations.</p><p>The most clinically useful approach is to use <strong>multiple definitions together</strong>, combined with clinical expertise and consideration of the individual's cultural context. A diagnosis should consider:</p><p>— Whether the behaviour is statistically unusual<br/>— Whether it deviates from cultural norms<br/>— Whether it interferes with daily functioning<br/>— Whether the person experiences distress<br/>— Whether it meets diagnostic criteria (DSM-5/ICD-11)</p><p>Mr Okoro's case clearly meets criteria for OCD across multiple definitions. He will receive appropriate treatment.</p>", "factBox": {"label": "Cultural Relativism", "text": "What counts as 'abnormal' varies across cultures. Hearing voices is pathologised in Western culture but may be valued as spiritual experiences in other cultures. Social norms change over time — homosexuality was removed from the DSM in 1973. Any definition must account for cultural context."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Abnormality", "title": "The Best Approach", "scene": "scene1", "body": "<p>Which approach to defining abnormality is considered most appropriate in modern clinical psychology?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What is the most appropriate approach to defining abnormality?", "options": [{"text": "Using multiple definitions together alongside clinical judgement and cultural context", "correct": true}, {"text": "Relying solely on statistical infrequency — if behaviour is rare, it is abnormal", "correct": false}, {"text": "Only using social norms — if society disapproves, it must be a disorder", "correct": false}, {"text": "Ignoring all definitions and letting the patient decide if they are abnormal", "correct": false}], "maxAttempts": 2, "hintText": "No SINGLE definition is sufficient. Modern practice combines multiple approaches with professional judgement.", "feedbackCorrect": "Exactly right. Modern clinical psychology recognises that no single definition captures the complexity of abnormality. The best approach combines statistical, social, functional, and ideal health criteria with clinical expertise and cultural sensitivity.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The correct answer is using multiple definitions together with clinical judgement. No single definition is adequate — each captures a different aspect of abnormality but has significant limitations when used alone.", "consequence": "<strong>Mr Okoro receives a comprehensive assessment and appropriate treatment.</strong> By considering multiple definitions and his cultural context, the committee ensures a fair and accurate evaluation.", "next": "end", "examTip": "In the exam, support every claim with named research evidence. State the study, its findings, and then evaluate its methodology.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Excellent knowledge of abnormality definitions. You correctly recalled Jahoda's criteria, understood statistical thresholds, and recognised the need for a multi-definition approach.", "partial": "Good work. Review the four definitions (statistical infrequency, social norms, FFA, ideal mental health), Jahoda's 6 criteria, and the limitations of each definition.", "retry": "Want to revisit the psychopathology case and master definitions of abnormality?", "topic": "Four definitions of abnormality: statistical infrequency, deviation from social norms, failure to function adequately, deviation from ideal mental health (Jahoda's 6 criteria, 1958). No single definition is sufficient — modern practice uses multiple definitions with clinical judgement and cultural awareness."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
