<script>const STORY_DATA = {"meta": {"title": "The Stress at Work", "subtitle": "Workers are falling ill. Is chronic workplace stress destroying their immune systems?", "subject": "Psychology", "topic": "Workplace Stress & Immune System", "level": "GCSE", "tags": ["🧠 Psychology", "GCSE", "Stress & Immunity", "~12 min", "3 questions"], "intro": "You are an occupational health psychologist investigating why employees at a high-pressure firm are constantly ill. Using Kiecolt-Glaser's research on stress and the immune system, you must demonstrate the link between chronic stress and health."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='210' width='700' height='52' fill='#706860'/><rect x='200' y='100' width='300' height='110' fill='#8a7868'/><rect x='210' y='60' width='120' height='100' fill='#706860'/><rect x='220' y='70' width='100' height='80' fill='#a09080'/><rect x='380' y='110' width='100' height='40' fill='#a09080'/><circle cx='430' cy='90' r='15' fill='#c8b8a8'/><rect x='100' y='150' width='80' height='60' fill='#8a7868'/><rect x='520' y='150' width='80' height='60' fill='#8a7868'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><line x1='100' y1='30' x2='100' y2='210' stroke='#706860' stroke-width='2'/><line x1='100' y1='210' x2='620' y2='210' stroke='#706860' stroke-width='2'/><rect x='140' y='160' width='60' height='50' fill='#8a7868'/><rect x='240' y='120' width='60' height='90' fill='#8a7868'/><rect x='340' y='80' width='60' height='130' fill='#a09080'/><rect x='440' y='50' width='60' height='160' fill='#706860'/><rect x='540' y='100' width='60' height='110' fill='#8a7868'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><circle cx='350' cy='50' r='25' fill='#8a7868'/><rect x='330' y='75' width='40' height='80' fill='#8a7868'/><line x1='330' y1='90' x2='280' y2='130' stroke='#8a7868' stroke-width='8'/><line x1='370' y1='90' x2='420' y2='130' stroke='#8a7868' stroke-width='8'/><line x1='340' y1='155' x2='310' y2='220' stroke='#8a7868' stroke-width='8'/><line x1='360' y1='155' x2='390' y2='220' stroke='#8a7868' stroke-width='8'/><circle cx='200' cy='100' r='15' fill='#c8b8a8'/><circle cx='500' cy='100' r='15' fill='#c8b8a8'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Sick Company", "scene": "scene1", "body": "<p>Meridian Finance has a problem: sickness absence is <strong>40% above</strong> the national average. Employees report frequent colds, infections, and slow wound healing. The CEO suspects it's 'bad luck' — you suspect it's <strong>chronic stress</strong>.</p><p>Research by <strong>Kiecolt-Glaser et al. (1984)</strong> demonstrated a direct link between stress and immune function. They studied <strong>75 medical students</strong> during exam periods and found that immune function was significantly reduced during high-stress times.</p><p>Specifically, they measured <strong>natural killer (NK) cell</strong> activity — a key component of the immune system that fights viruses and tumours. NK cell activity was significantly lower during exams compared to one month before.</p>", "factBox": {"label": "Kiecolt-Glaser et al. (1984)", "text": "75 first-year medical students had blood samples taken one month before exams (low stress) and during the exam period (high stress). NK cell activity was significantly reduced during exams. Students who reported higher levels of loneliness and life events showed the greatest immune suppression."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Stress & Immunity", "title": "The Sample Size", "scene": "scene2", "body": "<p>You present Kiecolt-Glaser's research to the board. In the 1984 study, blood samples were taken from medical students at two time points: one month before exams and during the exam period.</p><p>How many medical students participated in this study?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Study details", "steps": "<p>Kiecolt-Glaser et al. (1984):</p><p>Sample: 75 first-year medical students</p><p>Design: Natural experiment (exams as natural stressor)</p><p>Measure: NK cell activity at two time points</p>"}, "question": "How many medical students participated in Kiecolt-Glaser's 1984 study?", "unit": "students", "answer": 75, "tolerance": 0, "maxAttempts": 2, "hintText": "The study used 75 first-year medical students.", "feedbackCorrect": "Correct — 75 medical students. This was a natural experiment using the stress of medical exams as the independent variable, making it more ecologically valid than laboratory stress studies.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 75. Kiecolt-Glaser studied 75 first-year medical students, measuring their immune function before and during exams.", "consequence": "<strong>The board listens intently.</strong> Real medical students, real exam stress, real immune changes — this isn't theoretical. Stress measurably weakens the body's defences.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "The Mechanism", "title": "How Stress Kills Immunity", "scene": "scene3", "body": "<p>You explain the biological mechanism. When stress is <strong>chronic</strong> (long-lasting), the body produces sustained high levels of <strong>cortisol</strong> — the stress hormone released by the adrenal cortex via the HPA axis.</p><p>Short-term cortisol is useful — it provides energy and reduces inflammation. But <strong>chronic cortisol</strong> suppresses the immune system by:</p><p>1. Reducing the production of <strong>lymphocytes</strong> (white blood cells)<br/>2. Reducing <strong>NK cell activity</strong><br/>3. Increasing vulnerability to infections and slowing wound healing</p><p>Kiecolt-Glaser also studied wound healing (1995): wounds on caregivers of Alzheimer's patients (chronic stress) took <strong>40% longer</strong> to heal than wounds on a control group.</p>", "factBox": {"label": "The HPA Axis", "text": "Chronic stress activates the hypothalamic-pituitary-adrenal (HPA) axis, leading to sustained cortisol release. While short-term cortisol is adaptive, chronic elevation suppresses immune function, increases blood pressure, and damages hippocampal neurons (impairing memory)."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Stress & Immunity", "title": "The Healing Delay", "scene": "scene2", "body": "<p>In Kiecolt-Glaser's 1995 wound-healing study, stressed caregivers' wounds took <strong>40% longer</strong> to heal compared to controls.</p><p>If a control group wound healed in <strong>25 days</strong>, how many days would the caregiver wound take (40% longer)?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculate the delay", "steps": "<p>Control healing time: 25 days</p><p>40% longer = 25 + (40% of 25)</p><p>40% of 25 = 0.4 × 25 = 10</p><p>Total = 25 + 10 = ?</p>"}, "question": "If controls healed in 25 days, how many days for the stressed caregivers (40% longer)?", "unit": "days", "answer": 35, "tolerance": 0, "maxAttempts": 2, "hintText": "40% of 25 is 10. Add that to the original 25 days: 25 + 10 = 35.", "feedbackCorrect": "Correct — 35 days. A 40% increase in healing time is a dramatic real-world consequence of chronic stress. The body's repair mechanisms are significantly impaired.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 35 days. 40% of 25 = 10, so 25 + 10 = 35. Chronic stress caused a 10-day delay in wound healing — a measurable, clinically significant effect.", "consequence": "<strong>Ten extra days to heal a wound.</strong> The CEO shifts in her seat. Chronic workplace stress isn't just a morale problem — it's literally making employees' bodies break down more slowly.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Solution", "title": "Reducing Workplace Stress", "scene": "scene1", "body": "<p>You recommend evidence-based interventions to reduce workplace stress:</p><p><strong>1. Increase control:</strong> Karasek's demand-control model shows that high demands combined with low control produce the most stress. Giving employees more autonomy reduces stress.</p><p><strong>2. Social support:</strong> Strong workplace relationships buffer against stress effects.</p><p><strong>3. Workload management:</strong> Realistic deadlines and manageable workloads prevent chronic activation of the stress response.</p><p><strong>4. Relaxation programmes:</strong> Mindfulness and relaxation training can activate the parasympathetic nervous system, reducing cortisol levels.</p>", "factBox": {"label": "Individual Differences", "text": "Not everyone responds to stress the same way. Factors that moderate the stress-illness link include: personality type (Type A vs Type B), social support, perceived control, coping style (problem-focused vs emotion-focused), and hardiness (Kobasa's concept of commitment, control, and challenge)."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Stress & Immunity", "title": "The Key Hormone", "scene": "scene3", "body": "<p>Which hormone, when chronically elevated, is primarily responsible for stress-related immune suppression?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Which hormone suppresses the immune system during chronic stress?", "options": [{"text": "Cortisol — released by the adrenal cortex via the HPA axis during prolonged stress", "correct": true}, {"text": "Adrenaline — the acute fight-or-flight hormone released in immediate danger", "correct": false}, {"text": "Testosterone — a reproductive hormone unrelated to immune function", "correct": false}, {"text": "Insulin — a metabolic hormone that regulates blood sugar levels", "correct": false}], "maxAttempts": 2, "hintText": "This hormone is released via the HPA axis (not the sympathetic nervous system). It's associated with CHRONIC (long-term) stress, not acute fight-or-flight.", "feedbackCorrect": "Exactly right. Cortisol, released by the adrenal cortex through the HPA axis, is the primary culprit in stress-related immune suppression. While short-term cortisol is adaptive, chronic elevation damages immune function.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The correct answer is cortisol. While adrenaline handles acute stress (fight-or-flight), cortisol is released during chronic stress via the HPA axis and is responsible for long-term immune suppression.", "consequence": "<strong>The board approves a comprehensive stress-reduction programme.</strong> Within six months, sickness absence drops by 25%. The evidence was clear: reduce cortisol, restore immunity, save the workforce.", "next": "end", "examTip": "In the exam, support every claim with named research evidence. State the study, its findings, and then evaluate its methodology.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Excellent occupational health work. You accurately presented the stress-immunity link, recalled Kiecolt-Glaser's key findings, and identified cortisol as the primary mechanism.", "partial": "Good work. Review Kiecolt-Glaser's studies (75 students, 1984; wound healing 40% slower, 1995) and the role of cortisol in chronic stress.", "retry": "Want to revisit the stressed workplace and master psychoneuroimmunology?", "topic": "Kiecolt-Glaser (1984) showed 75 students had reduced NK cell activity during exams. Chronic stress elevates cortisol via the HPA axis, suppressing immune function. Wound healing is 40% slower in chronically stressed individuals. Workplace interventions can reduce stress and improve health."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
