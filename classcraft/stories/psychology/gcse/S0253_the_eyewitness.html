<script>const STORY_DATA = {"meta": {"title": "The Eyewitness", "subtitle": "A car crash. A courtroom. Two very different memories. How reliable is eyewitness testimony?", "subject": "Psychology", "topic": "Memory & EWT", "level": "GCSE", "tags": ["🧠 Psychology", "GCSE", "Eyewitness Testimony", "~12 min", "3 questions"], "intro": "You are an expert witness called to evaluate eyewitness testimony in a car accident case. Loftus and Palmer's research shows how easily memory can be distorted by leading questions. You must demonstrate to the court why eyewitness evidence is not as reliable as it seems."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='250' y='50' width='200' height='100' fill='#8a7868'/><rect x='270' y='30' width='160' height='25' fill='#b0a898'/><circle cx='350' cy='90' r='20' fill='#c8b8a8'/><rect x='80' y='160' width='120' height='50' fill='#8a7868'/><rect x='500' y='160' width='120' height='50' fill='#8a7868'/><circle cx='140' cy='145' r='12' fill='#c8b8a8'/><circle cx='560' cy='145' r='12' fill='#c8b8a8'/><rect x='300' y='180' width='100' height='30' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><line x1='100' y1='30' x2='100' y2='210' stroke='#706860' stroke-width='2'/><line x1='100' y1='210' x2='620' y2='210' stroke='#706860' stroke-width='2'/><rect x='140' y='160' width='60' height='50' fill='#8a7868'/><rect x='240' y='120' width='60' height='90' fill='#8a7868'/><rect x='340' y='80' width='60' height='130' fill='#a09080'/><rect x='440' y='50' width='60' height='160' fill='#706860'/><rect x='540' y='100' width='60' height='110' fill='#8a7868'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><circle cx='300' cy='110' r='70' fill='#8a7868'/><circle cx='300' cy='110' r='55' fill='#a09080'/><line x1='350' y1='160' x2='450' y2='220' stroke='#706860' stroke-width='8'/><rect x='150' y='80' width='30' height='8' fill='#c8b8a8'/><rect x='150' y='100' width='50' height='8' fill='#c8b8a8'/><rect x='150' y='120' width='40' height='8' fill='#c8b8a8'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Crash", "scene": "scene1", "body": "<p>Two drivers collided at a junction. Both witnesses saw the same accident — but in court, Witness 1 estimates the cars were travelling at <strong>40 mph</strong>, while Witness 2 says <strong>30 mph</strong>. The discrepancy could determine who is at fault.</p><p>You know from <strong>Loftus and Palmer's (1974)</strong> classic study that the way a question is <strong>worded</strong> can dramatically alter a witness's memory of an event. In their experiment, participants watched films of car accidents and were asked to estimate speed — but the critical verb in the question was changed.</p><p>'About how fast were the cars going when they <strong>___</strong> each other?'</p><p>The verb used (smashed, collided, bumped, hit, or contacted) significantly affected speed estimates.</p>", "factBox": {"label": "Loftus & Palmer (1974) — Experiment 1", "text": "45 participants watched films of car accidents, then answered questions about speed. The critical verb was varied: 'smashed' produced a mean estimate of 40.5 mph, 'collided' = 39.3, 'bumped' = 38.1, 'hit' = 34.0, and 'contacted' = 31.8 mph. The choice of one word altered memory by nearly 9 mph."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — EWT", "title": "The Smashed Estimate", "scene": "scene2", "body": "<p>In Loftus and Palmer's first experiment, participants who were asked 'How fast were the cars going when they <strong>smashed</strong> into each other?' gave the highest speed estimate.</p><p>The mean estimate for 'smashed' was <strong>40.5 mph</strong>, compared to only <strong>31.8 mph</strong> for 'contacted.' The same event — same film — but a single word changed the memory by nearly 9 mph.</p><p>What was the mean speed estimate when the verb 'smashed' was used?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "The verb effect", "steps": "<p>Mean speed estimates by verb:</p><p>Smashed: 40.5 mph</p><p>Contacted: 31.8 mph</p><p>Difference: 40.5 − 31.8 = 8.7 mph</p>"}, "question": "What was the mean speed estimate (in mph) for the verb 'smashed'?", "unit": "mph", "answer": 40.5, "tolerance": 0.5, "maxAttempts": 2, "hintText": "The 'smashed' condition produced the highest estimate at 40.5 mph.", "feedbackCorrect": "Correct — 40.5 mph. The aggressive verb 'smashed' led participants to recall the accident as faster and more severe, demonstrating how post-event information distorts memory.", "feedbackWrong": "A common mistake is confusing short-term memory and working memory. They are different models — the Working Memory Model (Baddeley & Hitch) replaced the simpler STM concept. The answer is 40.5 mph. The verb 'smashed' produced the highest speed estimate of 40.5 mph, compared to just 31.8 mph for the neutral verb 'contacted'.", "consequence": "<strong>A single word — 'smashed' versus 'contacted' — changed memory by nearly 9 mph.</strong> This has enormous implications for police interviews and courtroom questioning.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "The False Memory", "title": "Broken Glass", "scene": "scene3", "body": "<p>Loftus and Palmer conducted a second experiment that was even more striking. Participants watched a film of a car accident, then were asked speed questions using either 'smashed' or 'hit.' One week later, they were asked: 'Did you see any broken glass?'</p><p>There was <strong>no broken glass</strong> in the film. But participants in the 'smashed' condition were more than twice as likely to falsely remember seeing broken glass: <strong>32%</strong> said yes, compared to only <strong>14%</strong> in the 'hit' condition.</p><p>The leading question didn't just distort existing memory — it actually <strong>created a false memory</strong> that didn't exist.</p>", "factBox": {"label": "Experiment 2 — False Memories", "text": "One week after viewing the film, participants were asked about broken glass (which was not present). Results: 'Smashed' group: 32% reported seeing broken glass. 'Hit' group: 14% reported seeing broken glass. Control group: 12%. This demonstrates that leading questions can create entirely false memories."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — EWT", "title": "The False Memory Rate", "scene": "scene2", "body": "<p>The prosecution lawyer challenges your testimony. 'Surely people don't actually create false memories from a single question?'</p><p>You present Loftus and Palmer's Experiment 2 data: <strong>32%</strong> of participants in the 'smashed' condition falsely reported seeing broken glass that was never there, compared to only <strong>14%</strong> in the 'hit' condition.</p><p>What percentage of participants in the 'smashed' condition falsely reported seeing broken glass?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "False memory data", "steps": "<p>'Smashed' condition: 32% falsely reported broken glass</p><p>'Hit' condition: 14% falsely reported broken glass</p><p>Control: 12% falsely reported broken glass</p>"}, "question": "What percentage of the 'smashed' group falsely reported seeing broken glass?", "unit": "%", "answer": 32, "tolerance": 0, "maxAttempts": 2, "hintText": "Nearly one in three participants in the 'smashed' condition remembered something that never happened — 32%.", "feedbackCorrect": "Correct — 32%. Nearly one-third of participants in the 'smashed' condition developed a completely false memory of broken glass, demonstrating that leading questions can implant new 'memories' that never occurred.", "feedbackWrong": "A common mistake is confusing short-term memory and working memory. They are different models — the Working Memory Model (Baddeley & Hitch) replaced the simpler STM concept. The answer is 32%. In the 'smashed' condition, 32% of participants falsely remembered seeing broken glass in the film — more than double the 14% in the 'hit' condition.", "consequence": "<strong>The prosecution lawyer falls silent.</strong> A 32% false memory rate from a single word change. This is why leading questions in police interviews are so dangerous.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Implications for Justice", "title": "Protecting Witnesses", "scene": "scene1", "body": "<p>Your testimony helps the court understand that eyewitness memory is reconstructive — we don't replay events like a video recording. Instead, we reconstruct memories from fragments, and these reconstructions are vulnerable to distortion.</p><p>To combat this, the <strong>cognitive interview</strong> was developed by Fisher and Geiselman (1984). It uses four techniques to improve witness recall without introducing bias:</p><p>1. <strong>Mental reinstatement of context</strong> — recreating the scene mentally<br/>2. <strong>Report everything</strong> — even seemingly trivial details<br/>3. <strong>Recall in different orders</strong> — forward and backward<br/>4. <strong>Change perspective</strong> — describe from a different viewpoint</p>", "factBox": {"label": "The Cognitive Interview", "text": "Fisher & Geiselman (1984) developed the cognitive interview to reduce the effect of leading questions and improve accurate recall. Studies show it increases correct information by 25-35% compared to standard police interviews, without significantly increasing false information."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — EWT", "title": "The Core Problem", "scene": "scene3", "body": "<p>Based on Loftus and Palmer's research, what is the main problem with eyewitness testimony?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What did Loftus and Palmer's research demonstrate about eyewitness testimony?", "options": [{"text": "Leading questions can distort existing memories and even create entirely false ones", "correct": true}, {"text": "Eyewitnesses always lie deliberately to help one side in court", "correct": false}, {"text": "Memory for events is perfect and cannot be influenced by later information", "correct": false}, {"text": "Only elderly witnesses have unreliable memories", "correct": false}], "maxAttempts": 2, "hintText": "Loftus and Palmer showed that changing ONE WORD in a question altered speed estimates and even created false memories of broken glass.", "feedbackCorrect": "Exactly right. Loftus and Palmer demonstrated that post-event information — particularly leading questions — can both distort existing memories (speed estimates) and create entirely new false memories (broken glass). Memory is reconstructive, not reproductive.", "feedbackWrong": "A common mistake is confusing short-term memory and working memory. They are different models — the Working Memory Model (Baddeley & Hitch) replaced the simpler STM concept. The correct answer is that leading questions distort existing memories and create false ones. Witnesses aren't lying — their memories have been genuinely altered by post-event information.", "consequence": "<strong>The judge instructs the jury to treat the eyewitness speed estimates with caution.</strong> Your expert testimony has ensured that the limitations of human memory are properly understood in the pursuit of justice.", "next": "end", "examTip": "In the exam, name the specific model (e.g., Multi-Store Model, Working Memory Model) and evaluate it with research evidence for and against.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Exceptional expert testimony. You accurately presented Loftus and Palmer's findings, including precise figures, and clearly explained why eyewitness testimony requires careful evaluation.", "partial": "Good knowledge of EWT research. Review the specific figures: 40.5 mph for 'smashed', 31.8 for 'contacted', and 32% false memory rate for broken glass.", "retry": "Want to revisit the courtroom and master eyewitness testimony research?", "topic": "Loftus & Palmer (1974) showed leading questions distort EWT. 'Smashed' produced 40.5 mph estimates vs 31.8 for 'contacted'. 32% of the 'smashed' group falsely remembered broken glass. The cognitive interview (Fisher & Geiselman, 1984) improves recall accuracy."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
