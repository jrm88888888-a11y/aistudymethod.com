<script>const STORY_DATA = {"meta": {"title": "The Diagnosis", "subtitle": "A patient presents with troubling symptoms. Can you identify which diagnosis fits using diagnostic criteria?", "subject": "Psychology", "topic": "Classification of Mental Disorder", "level": "GCSE", "tags": ["🧠 Psychology", "GCSE", "Mental Health Classification", "~12 min", "3 questions"], "intro": "You are a trainee clinical psychologist observing a diagnostic assessment. A patient presents with a constellation of symptoms, and you must use classification systems and research evidence to determine the correct diagnosis and understand the challenges of classification."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><rect x='250' y='30' width='200' height='190' fill='#8a7868'/><rect x='300' y='20' width='100' height='20' fill='#706860'/><rect x='270' y='60' width='160' height='8' fill='#c8b8a8'/><rect x='270' y='80' width='140' height='8' fill='#c8b8a8'/><rect x='270' y='100' width='155' height='8' fill='#c8b8a8'/><rect x='270' y='120' width='120' height='8' fill='#c8b8a8'/><rect x='270' y='150' width='50' height='20' fill='#706860'/><rect x='340' y='150' width='50' height='20' fill='#b0a898'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='230' width='700' height='32' fill='#706860'/><line x1='100' y1='30' x2='100' y2='210' stroke='#706860' stroke-width='2'/><line x1='100' y1='210' x2='620' y2='210' stroke='#706860' stroke-width='2'/><rect x='140' y='160' width='60' height='50' fill='#8a7868'/><rect x='240' y='120' width='60' height='90' fill='#8a7868'/><rect x='340' y='80' width='60' height='130' fill='#a09080'/><rect x='440' y='50' width='60' height='160' fill='#706860'/><rect x='540' y='100' width='60' height='110' fill='#8a7868'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='250' y='50' width='200' height='100' fill='#8a7868'/><rect x='270' y='30' width='160' height='25' fill='#b0a898'/><circle cx='350' cy='90' r='20' fill='#c8b8a8'/><rect x='80' y='160' width='120' height='50' fill='#8a7868'/><rect x='500' y='160' width='120' height='50' fill='#8a7868'/><circle cx='140' cy='145' r='12' fill='#c8b8a8'/><circle cx='560' cy='145' r='12' fill='#c8b8a8'/><rect x='300' y='180' width='100' height='30' fill='#706860'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Assessment", "scene": "scene1", "body": "<p>Mr Harris, aged 34, has been referred by his GP. He reports persistent low mood lasting over two years, loss of interest in activities he once enjoyed, difficulty sleeping, fatigue, poor concentration, and feelings of worthlessness. He has lost 8 kg without dieting.</p><p>To diagnose mental disorders, clinicians use classification systems. The two main systems are the <strong>DSM-5</strong> (Diagnostic and Statistical Manual, American Psychiatric Association) and the <strong>ICD-11</strong> (International Classification of Diseases, World Health Organization).</p><p>For a diagnosis of <strong>major depressive disorder</strong>, the DSM-5 requires at least <strong>5 symptoms</strong> (from a list of 9) to be present for at least <strong>2 weeks</strong>, including at least one of: depressed mood or loss of interest/pleasure.</p>", "factBox": {"label": "DSM-5 Criteria for Depression", "text": "At least 5 of 9 symptoms for 2+ weeks, including depressed mood or anhedonia (loss of pleasure). Other symptoms: weight change, sleep disturbance, psychomotor agitation/retardation, fatigue, feelings of worthlessness/guilt, concentration difficulties, suicidal thoughts. Symptoms must cause significant distress or functional impairment."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Classification", "title": "Meeting the Criteria", "scene": "scene2", "body": "<p>Count Mr Harris's symptoms from the DSM-5 list of 9:</p><p>1. Depressed mood (persistent low mood) ✓<br/>2. Loss of interest/pleasure ✓<br/>3. Weight change (8 kg loss) ✓<br/>4. Sleep disturbance ✓<br/>5. Fatigue ✓<br/>6. Feelings of worthlessness ✓<br/>7. Concentration difficulties ✓</p><p>How many DSM-5 symptoms does Mr Harris display?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Count the symptoms", "steps": "<p>Go through each symptom mentioned:</p><p>Low mood, loss of interest, weight loss, sleep problems, fatigue, worthlessness, poor concentration.</p><p>Count them carefully.</p>"}, "question": "How many DSM-5 depressive symptoms does Mr Harris display?", "unit": "symptoms", "answer": 7, "tolerance": 0, "maxAttempts": 2, "hintText": "Count each distinct symptom from the list: low mood, loss of interest, weight change, sleep disturbance, fatigue, worthlessness, concentration. That's 7.", "feedbackCorrect": "Correct — 7 symptoms. This clearly exceeds the threshold of 5 required for diagnosis, and includes both depressed mood and loss of interest. Mr Harris meets the criteria for major depressive disorder.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 7 symptoms: (1) depressed mood, (2) loss of interest, (3) weight change, (4) sleep disturbance, (5) fatigue, (6) worthlessness, (7) concentration difficulties. This exceeds the 5-symptom threshold.", "consequence": "<strong>Seven out of nine symptoms.</strong> Mr Harris clearly meets the diagnostic threshold. Your supervising clinician nods — this is a textbook presentation of major depressive disorder.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Reliability & Validity", "title": "The Classification Debate", "scene": "scene1", "body": "<p>Your supervisor discusses two key concepts in psychiatric diagnosis: <strong>reliability</strong> (consistency of diagnosis — would two clinicians diagnose the same condition?) and <strong>validity</strong> (accuracy — does the diagnosis truly reflect a real, distinct disorder?).</p><p><strong>Rosenhan's (1973)</strong> famous study 'On Being Sane in Insane Places' dramatically challenged both. Eight pseudo-patients (including Rosenhan himself) presented at psychiatric hospitals claiming to hear a voice saying 'empty', 'hollow', and 'thud.' All were admitted and diagnosed with schizophrenia.</p><p>Once admitted, they behaved completely normally. Yet staff interpreted normal behaviour as symptomatic. It took between <strong>7 and 52 days</strong> (average <strong>19 days</strong>) for them to be discharged.</p>", "factBox": {"label": "Rosenhan (1973)", "text": "8 pseudo-patients gained admission to 12 different psychiatric hospitals by reporting auditory hallucinations. All were diagnosed with schizophrenia (except one diagnosed with bipolar). Despite behaving normally after admission, they were hospitalised for 7-52 days (mean 19 days). This challenged the validity and reliability of psychiatric diagnosis."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Classification", "title": "The Rosenhan Average", "scene": "scene2", "body": "<p>In Rosenhan's study, the pseudo-patients were kept in hospital despite behaving normally after admission. The average length of hospitalisation was <strong>19 days</strong> — with a range from 7 to 52 days.</p><p>What was the mean number of days the pseudo-patients were hospitalised?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Key study data", "steps": "<p>8 pseudo-patients across 12 hospitals.</p><p>Range of stay: 7-52 days.</p><p>The average (mean) stay was 19 days.</p>"}, "question": "What was the mean number of days the pseudo-patients were hospitalised?", "unit": "days", "answer": 19, "tolerance": 0, "maxAttempts": 2, "hintText": "The average hospital stay for Rosenhan's pseudo-patients was 19 days.", "feedbackCorrect": "Correct — 19 days on average. Healthy individuals, behaving normally, were kept in psychiatric hospitals for nearly three weeks on average because the initial label of 'schizophrenia' coloured how all subsequent behaviour was interpreted.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The answer is 19 days. Rosenhan's pseudo-patients spent an average of 19 days in psychiatric hospitals despite being mentally healthy and behaving normally after admission.", "consequence": "<strong>Nineteen days.</strong> The diagnostic label became a self-fulfilling prophecy — once labelled 'schizophrenic', even normal behaviour was interpreted as symptomatic. This demonstrates the danger of labelling.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Modern Classification", "title": "Improvements Since Rosenhan", "scene": "scene3", "body": "<p>Your supervisor reassures you that classification has improved significantly since Rosenhan's study. The DSM has been revised multiple times (now DSM-5, published 2013), with more specific diagnostic criteria and better inter-rater reliability.</p><p>However, challenges remain. Cultural differences affect how symptoms are expressed and interpreted. What is considered 'abnormal' varies across cultures, and diagnosis rates differ significantly between countries.</p><p>The debate continues: are mental disorders discrete categories (like physical diseases), or do they exist on a <strong>spectrum</strong>? Modern approaches increasingly favour dimensional models over rigid categories.</p>", "factBox": {"label": "Improvements in Classification", "text": "The DSM-5 (2013) has more specific criteria, better reliability, and considers cultural factors. However, concerns remain about cultural bias, labelling effects, and whether categorical diagnosis accurately reflects the dimensional nature of mental health problems."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Classification", "title": "The Rosenhan Lesson", "scene": "scene1", "body": "<p>What was the main conclusion of Rosenhan's (1973) 'On Being Sane in Insane Places' study?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What did Rosenhan's study primarily demonstrate?", "options": [{"text": "Psychiatric diagnosis lacked validity — clinicians could not distinguish sane from insane in hospital settings", "correct": true}, {"text": "All psychiatric patients are actually faking their symptoms", "correct": false}, {"text": "The DSM classification system is perfectly reliable and valid", "correct": false}, {"text": "Mental disorders do not exist and are entirely made up by psychiatrists", "correct": false}], "maxAttempts": 2, "hintText": "Rosenhan showed that once a diagnostic label was applied, clinicians could not tell the difference between genuinely ill patients and healthy pseudo-patients.", "feedbackCorrect": "Exactly right. Rosenhan demonstrated that psychiatric diagnosis lacked validity — the diagnostic process could not reliably distinguish mentally healthy individuals from those with genuine disorders, especially once a label had been applied.", "feedbackWrong": "A common mistake is describing a study without evaluating it. Always discuss methodological strengths and weaknesses alongside the findings. The correct answer is that psychiatric diagnosis lacked validity. Rosenhan's pseudo-patients were healthy but were diagnosed and hospitalised, showing that clinicians could not distinguish sane from insane in institutional settings.", "consequence": "<strong>Mr Harris's diagnosis is made carefully and with full awareness of these limitations.</strong> Good clinical practice means treating the person, not just the label — a lesson Rosenhan's study taught the entire profession.", "next": "end", "examTip": "In the exam, support every claim with named research evidence. State the study, its findings, and then evaluate its methodology.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Outstanding clinical knowledge. You correctly counted diagnostic criteria, recalled Rosenhan's key findings, and understood the challenges of psychiatric classification.", "partial": "Good work. Review the DSM-5 criteria for depression (5 of 9 symptoms, 2 weeks) and Rosenhan's findings (19-day average stay, 8 pseudo-patients).", "retry": "Want to revisit the diagnostic assessment and master classification?", "topic": "The DSM-5 classifies mental disorders using specific criteria (e.g., 5/9 symptoms for depression). Rosenhan (1973) showed 8 pseudo-patients diagnosed as schizophrenic (mean 19-day stay) despite being healthy, challenging diagnostic validity. Classification has improved but challenges remain."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
