<script>const STORY_DATA = {"meta": {"title": "The Identity", "subtitle": "A psychology student discovers that who we are is shaped by the groups we belong to. Identity is never just personal.", "subject": "Sociology", "topic": "Social Identity", "level": "KS3", "tags": ["📖 Sociology", "KS3 · Year 7–9", "Social Identity", "~10 min", "3 questions"], "intro": "You are Zara, a Year 9 student working on a sociology project about identity. Your teacher asks: 'Who are you?' You start to answer — but quickly realise that your identity is not just about your personality. It is shaped by your gender, ethnicity, class, age, religion, and the groups you belong to. Can you untangle the social forces that make you, you?"}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><circle cx='200' cy='100' r='50' fill='#8a7868'/><circle cx='120' cy='160' r='30' fill='#a09080'/><circle cx='200' cy='180' r='30' fill='#a09080'/><circle cx='280' cy='160' r='30' fill='#a09080'/><line x1='200' y1='100' x2='120' y2='160' stroke='#706860' stroke-width='2'/><line x1='200' y1='100' x2='200' y2='180' stroke='#706860' stroke-width='2'/><line x1='200' y1='100' x2='280' y2='160' stroke='#706860' stroke-width='2'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><rect x='50' y='50' width='300' height='150' fill='#8a7868'/><circle cx='120' cy='100' r='20' fill='#b0a898'/><circle cx='200' cy='100' r='20' fill='#706860'/><circle cx='280' cy='100' r='20' fill='#c8b8a8'/><circle cx='160' cy='160' r='20' fill='#a09080'/><circle cx='240' cy='160' r='20' fill='#a09080'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><rect x='80' y='50' width='240' height='150' fill='#8a7868'/><rect x='100' y='70' width='200' height='30' fill='#a09080'/><rect x='100' y='110' width='150' height='30' fill='#706860'/><rect x='100' y='150' width='100' height='30' fill='#a09080'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "Who Are You?", "scene": "scene1", "body": "<p>Your sociology teacher writes on the board: <em>WHO ARE YOU?</em> The class is silent. It seems like a simple question, but it is not.</p><p>You are not just 'Zara'. You are a teenager, a student, a daughter, British-Pakistani, working-class, Muslim, a football fan, and a member of your friend group. Each of these is part of your <strong>social identity</strong>.</p><p>Sociologists argue that identity is <strong>socially constructed</strong> — shaped by the groups we belong to and the labels society gives us. Our identity is influenced by <strong>class, gender, ethnicity, age, religion, disability,</strong> and <strong>sexuality</strong>.</p>", "factBox": {"label": "Social Identity", "text": "Social identity is the sense of who we are based on our membership of social groups. It includes ascribed identities (given at birth — ethnicity, sex) and achieved identities (earned through effort — qualifications, career). Socialisation shapes identity through family, peers, media, and education. In postmodern society, some argue identity is more fluid and chosen than ever before."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Social Identity", "title": "The Identity Factors", "scene": "scene2", "body": "<p>Your teacher lists the main social factors that shape identity in sociology: <strong>social class, gender, ethnicity, age, religion, disability, and sexuality</strong>.</p><p><em>\"How many identity factors have I listed?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Count each factor listed:</p><p>1. Social class, 2. Gender, 3. Ethnicity, 4. Age, 5. Religion, 6. Disability, 7. Sexuality</p>"}, "question": "How many social factors shaping identity were listed?", "unit": "factors", "answer": 7, "tolerance": 0, "maxAttempts": 2, "hintText": "Count them: class, gender, ethnicity, age, religion, disability, sexuality.", "feedbackCorrect": "Seven key factors. Each one shapes how society sees us and how we see ourselves.", "feedbackWrong": "A common mistake is using everyday language instead of sociological concepts. Use terms like 'socialisation', 'norms', 'values', and name specific theorists. The answer is 7: social class, gender, ethnicity, age, religion, disability, and sexuality.", "consequence": "<strong>Seven intersecting factors.</strong> No wonder identity is so complex — each person sits at a unique intersection of all seven.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Hybrid Identity", "title": "The Modern Self", "scene": "scene2", "body": "<p>Your teacher introduces the idea of <strong>hybrid identities</strong>. In multicultural Britain, many people blend different cultural influences. You might celebrate Eid and Christmas. You might listen to Punjabi MC and Arctic Monkeys. Your identity is not one thing — it is a mix.</p><p><strong>Postmodernists</strong> argue that in today's world, identity is increasingly fluid and chosen. We 'pick and mix' from different cultures, subcultures, and lifestyles. Social media allows us to construct and perform different identities online.</p><p>But <strong>structuralists</strong> argue that class, gender, and ethnicity still powerfully constrain who we can be.</p>", "factBox": {"label": "Hybrid Identity", "text": "Hybrid identities combine elements from multiple cultures or social groups. Examples include British-Asian, working-class university graduate, or religious feminist. Postmodernists celebrate this fluidity. C f origin. You do not choose it. <strong>Achieved identity</strong> is earned through your own actions — your qualifications, career, hobbies, and achievements.</p><p>The debate is whether modern society allows people to overcome ascribed identities through achievement, or whether birth still determines destiny.</p>", "factBox": {"label": "Ascribed vs Achieved Identity", "text": "Ascribed identity: assigned at birth (ethnicity, sex, class of origin, nationality). Achieved identity: earned through effort and choice (education, career, lifestyle). Functionalists argue modern society is meritocratic — achieved status matters more. Marxists and feminists argue ascribed characteristics (class, gender, ethnicity) still powerfully determine life chances regardless of individual effort."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Social Identity", "title": "The Key Concept", "scene": "scene1", "body": "<p>Your teacher asks the final question of your presentation: <em>\"What is the difference between ascribed and achieved identity?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What is the difference between ascribed and achieved identity?", "options": [{"text": "Ascribed identity is chosen by the individual; achieved identity is given by society", "correct": false}, {"text": "Ascribed identity is given at birth or by society; achieved identity is earned through personal effort and choices", "correct": true}, {"text": "There is no difference — all identity is socially constructed", "correct": false}, {"text": "Achieved identity is more important than ascribed identity in all societies", "correct": false}], "maxAttempts": 2, "hintText": "Ascribed = given TO you (birth, society). Achieved = earned BY you (effort, choices).", "feedbackCorrect": "Ascribed identity is given — your ethnicity, sex, and class at birth. Achieved identity is earned — your qualifications, career, and lifestyle choices.", "feedbackWrong": "A common mistake is using everyday language instead of sociological concepts. Use terms like 'socialisation', 'norms', 'values', and name specific theorists. The correct answer is that ascribed identity is given at birth or by society, while achieved identity is earned through personal effort and choices.", "consequence": "<strong>The class applauds your presentation.</strong> Identity is never simple — it is shaped by both the circumstances of your birth and the choices you make.", "next": "end", "examTip": "In the exam, use named sociological perspectives and theorists. Evaluate each viewpoint by considering its strengths and at least one criticism.", "bloomsLevel": "Understand"}], "ending": {"title": "The Identity", "perfect": "Brilliant project, Zara. You mapped the factors shaping identity, measured social media's influence, and explained ascribed versus achieved identity with precision.", "partial": "Good effort on the identity project, but some concepts need revisiting. Review the seven identity factors and the difference between ascribed and achieved identity.", "retry": "Want to explore social identity again?", "topic": "Social Identity"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
