<script>const STORY_DATA = {"meta": {"title": "The Religion", "subtitle": "A researcher surveys a multi-faith town. Every percentage tells a story about belief and belonging.", "subject": "Sociology", "topic": "Religion & Social Function", "level": "KS3", "tags": ["📖 Sociology", "KS3 · Year 7–9", "Religion & Society", "~10 min", "3 questions"], "intro": "You are Ria, a sociology researcher studying the role of religion in Fairhaven, a diverse town with churches, mosques, temples, and a growing number of people who claim no religion at all. The local council wants data on belief, attendance, and what sociologists think religion actually does for society."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='60' y='100' width='60' height='100' fill='#8a7868'/><polygon points='60,100 90,50 120,100' fill='#a09080'/><rect x='170' y='80' width='60' height='120' fill='#8a7868'/><circle cx='200' cy='65' r='15' fill='#a09080'/><rect x='280' y='90' width='60' height='110' fill='#8a7868'/><polygon points='280,90 310,55 340,90' fill='#c8b8a8'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><circle cx='200' cy='120' r='80' fill='#8a7868'/><circle cx='200' cy='120' r='55' fill='#a09080'/><circle cx='200' cy='120' r='30' fill='#b0a898'/><line x1='200' y1='40' x2='200' y2='200' stroke='#706860' stroke-width='1'/><line x1='120' y1='120' x2='280' y2='120' stroke='#706860' stroke-width='1'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><rect x='40' y='50' width='320' height='150' fill='#8a7868'/><rect x='60' y='70' width='80' height='50' fill='#a09080'/><rect x='160' y='70' width='80' height='50' fill='#706860'/><rect x='260' y='70' width='80' height='50' fill='#a09080'/><rect x='60' y='140' width='80' height='40' fill='#706860'/><rect x='160' y='140' width='80' height='40' fill='#a09080'/><rect x='260' y='140' width='80' height='40' fill='#706860'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Faith Survey", "scene": "scene1", "body": "<p>Fairhaven's high street tells the story: a Victorian church, a modern mosque, a Hindu temple, and a humanist meeting hall sit within walking distance of each other. Religion — or the lack of it — shapes this town's identity.</p><p>Sociologists study religion not to judge beliefs but to understand their <strong>social functions</strong>. <strong>Functionalists</strong> like Durkheim argued religion creates social solidarity — a sense of belonging and shared identity. It provides comfort in times of crisis and reinforces moral values.</p><p>But not everyone agrees. <strong>Marxists</strong> called religion 'the opium of the people' — a tool used by the powerful to keep the oppressed accepting their lot.</p>", "factBox": {"label": "Sociological Views of Religion", "text": "Functionalism (Durkheim): Religion creates social cohesion through shared rituals, beliefs, and moral codes. It helps people cope with life crises. Marxism (Marx): Religion is a form of social control — it justifies inequality by promising rewards in the afterlife, discouraging revolution. Feminism: Religion often reinforces patriarchy through male-dominated leadership and gendered moral codes."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Religion & Society", "title": "The Census Data", "scene": "scene2", "body": "<p>Your survey of Fairhaven's <strong>10,000 residents</strong> reveals the following religious affiliations:</p><p>• Christian: 3,700<br>• Muslim: 1,200<br>• Hindu: 800<br>• No religion: 3,500<br>• Other/not stated: 800</p><p>The council asks: <em>\"What percentage of Fairhaven residents identify as having no religion?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Percentage = (no religion ÷ total population) × 100</p><p>= (3,500 ÷ 10,000) × 100 = ?</p>"}, "question": "What percentage of residents have no religion?", "unit": "%", "answer": 35, "tolerance": 0, "maxAttempts": 2, "hintText": "3,500 ÷ 10,000 = 0.35. Multiply by 100.", "feedbackCorrect": "35% — more than a third. The non-religious group is now the second largest category, reflecting a national trend towards secularisation.", "feedbackWrong": "A common mistake is using everyday language instead of sociological concepts. Use terms like 'socialisation', 'norms', 'values', and name specific theorists. The answer is 35%. 3,500 ÷ 10,000 = 0.35 = 35%.", "consequence": "<strong>Over a third claim no faith.</strong> This mirrors the 2021 Census, where 'no religion' became the second most common response in England and Wales.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Declining Attendance", "title": "Empty Pews", "scene": "scene2", "body": "<p>Even among those who identify as religious, attendance at services is declining. Fairhaven's churches report congregations shrinking year on year. The mosque and temple have younger, more active congregations — but overall, fewer people attend weekly worship than ever before.</p><p>This process is called <strong>secularisation</strong> — the declining influence of religion in society. Evidence includes falling church attendance, fewer religious marriages, and the growing number of people who say they have no religion.</p>", "factBox": {"label": "Secularisation", "text": "Secularisation is the process by which religion loses its social significance. Evidence includes: declining church attendance (under 5% attend weekly in the UK), fewer religious marriages, growth of the 'no religion' category in censuses, and reduced political influence of religious leaders. However, some argue religion is changing rather than disappearing — new religious movements and non-Christian faiths are growing."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Religion & Society", "title": "The Attendance Calculation", "scene": "scene3", "body": "<p>Of Fairhaven's <strong>3,700 Christians</strong>, only <strong>5%</strong> attend church weekly. Meanwhile, of the <strong>1,200 Muslims</strong>, approximately <strong>40%</strong> attend mosque weekly.</p><p><em>\"How many more Muslims attend weekly worship than Christians in Fairhaven?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Christians attending: 5% of 3,700 = 0.05 × 3,700 = 185</p><p>Muslims attending: 40% of 1,200 = 0.40 × 1,200 = 480</p><p>Difference = 480 − 185 = ?</p>"}, "question": "How many more Muslims attend weekly worship than Christians?", "unit": "people", "answer": 295, "tolerance": 0, "maxAttempts": 2, "hintText": "Calculate each group's attendance separately, then subtract. Christians: 0.05 × 3,700 = 185. Muslims: 0.40 × 1,200 = 480.", "feedbackCorrect": "295 more Muslim worshippers attend weekly, despite the Christian population being three times larger. Active practice varies enormously between faiths.", "feedbackWrong": "A common mistake is using everyday language instead of sociological concepts. Use terms like 'socialisation', 'norms', 'values', and name specific theorists. The answer is 295. Christians attending: 185. Muslims attending: 480. Difference: 480 − 185 = 295.", "consequence": "<strong>Nearly 300 more weekly worshippers from a smaller faith community.</strong> Identifying as religious and practising religion are very different things.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Final Debate", "title": "Is Religion Dying?", "scene": "scene3", "body": "<p>The council hosts a public debate: <em>Is religion dying in Britain?</em> The evidence seems to say yes — falling attendance, growing secularism, less influence on politics.</p><p>But others argue religion is <strong>transforming</strong>, not disappearing. New Age movements, megachurches, online faith communities, and the growth of Islam and Pentecostalism suggest belief is evolving rather than vanishing. The sociologist Grace Davie describes Britain as 'believing without belonging' — many people hold private beliefs without attending organised worship.</p>", "factBox": {"label": "Believing Without Belonging", "text": "Grace Davie argued that declining attendance does not mean declining belief. Many people maintain private spiritual beliefs without attending church — a phenomenon she called 'believing without belonging'. This challenges simple secularisation theory and suggests religion is changing form rather than disappearing entirely."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Religion & Society", "title": "The Core Function", "scene": "scene1", "body": "<p>The debate moderator turns to you: <em>\"According to Durkheim, what is the main social function of religion?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "According to Durkheim, what is the main function of religion?", "options": [{"text": "To generate profit for religious organisations", "correct": false}, {"text": "To create social solidarity and a sense of shared identity through collective worship and moral codes", "correct": true}, {"text": "To keep the working class oppressed and prevent revolution", "correct": false}, {"text": "To provide scientific explanations of the natural world", "correct": false}], "maxAttempts": 2, "hintText": "Durkheim was a functionalist. He focused on what religion DOES for society — how it brings people together.", "feedbackCorrect": "Durkheim argued religion's primary function is creating social solidarity — bringing people together through shared beliefs, rituals, and moral values.", "feedbackWrong": "A common mistake is using everyday language instead of sociological concepts. Use terms like 'socialisation', 'norms', 'values', and name specific theorists. The correct answer is that Durkheim saw religion as creating social solidarity through collective worship and shared moral codes. Note: keeping the working class oppressed is the Marxist view, not Durkheim's.", "consequence": "<strong>The audience applauds.</strong> Whether religion is dying or transforming, its sociological significance remains profound.", "next": "end", "examTip": "In the exam, use named sociological perspectives and theorists. Evaluate each viewpoint by considering its strengths and at least one criticism.", "bloomsLevel": "Understand"}], "ending": {"title": "The Religion", "perfect": "Brilliant research, Ria. You mapped Fairhaven's faiths, calculated attendance patterns, and navigated the secularisation debate with precision.", "partial": "Good fieldwork, but some religious sociology concepts need revision. Review the differences between Durkheim, Marx, and the secularisation debate.", "retry": "Want to survey Fairhaven's faiths again?", "topic": "Religion & Social Function"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
