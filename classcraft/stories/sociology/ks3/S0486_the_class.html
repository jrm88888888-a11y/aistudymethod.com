<script>const STORY_DATA = {"meta": {"title": "The Class", "subtitle": "A community worker maps the social classes of a town. The divides run deeper than anyone expected.", "subject": "Sociology", "topic": "Social Class", "level": "KS3", "tags": ["📖 Sociology", "KS3 · Year 7–9", "Social Class", "~10 min", "3 questions"], "intro": "You are Dani, a community worker in the town of Stonebridge. The council wants to understand why some neighbourhoods thrive while others struggle. Your task: map the social class structure of the town, calculate inequality, and explain why class still matters in modern Britain."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='190' width='400' height='60' fill='#706860'/><rect x='50' y='60' width='60' height='130' fill='#8a7868'/><rect x='130' y='90' width='60' height='100' fill='#a09080'/><rect x='210' y='120' width='60' height='70' fill='#8a7868'/><rect x='290' y='140' width='60' height='50' fill='#706860'/><line x1='50' y1='60' x2='350' y2='140' stroke='#c8b8a8' stroke-width='2' stroke-dasharray='6,4'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='100' y='40' width='200' height='150' fill='#8a7868'/><rect x='130' y='60' width='140' height='3' fill='#b0a898'/><rect x='130' y='90' width='140' height='3' fill='#b0a898'/><rect x='130' y='120' width='140' height='3' fill='#b0a898'/><rect x='130' y='150' width='140' height='3' fill='#b0a898'/><circle cx='160' cy='75' r='8' fill='#c8b8a8'/><circle cx='240' cy='75' r='8' fill='#706860'/><circle cx='160' cy='105' r='8' fill='#706860'/><circle cx='240' cy='105' r='8' fill='#c8b8a8'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><polygon points='200,30 50,200 350,200' fill='#8a7868' stroke='#706860' stroke-width='2'/><line x1='100' y1='140' x2='300' y2='140' stroke='#a09080' stroke-width='2'/><line x1='140' y1='90' x2='260' y2='90' stroke='#a09080' stroke-width='2'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Divided Town", "scene": "scene1", "body": "<p>Stonebridge is a town of contrasts. The north side has detached houses, private schools, and organic delis. The south side has council estates, food banks, and boarded-up shops. Everyone knows the divide exists — but your job is to measure it.</p><p><strong>Social class</strong> refers to a person's position in society based on their occupation, income, and wealth. In the UK, sociologists traditionally identify three broad classes: <strong>upper class</strong> (wealthy elites), <strong>middle class</strong> (professionals and managers), and <strong>working class</strong> (manual and routine workers).</p><p>Class affects everything — health, education, life expectancy, and opportunity.</p>", "factBox": {"label": "Social Class in the UK", "text": "Social class is a system of stratification based on economic factors. The Great British Class Survey (2013) identified 7 classes, from the 'elite' to the 'precariat'. Traditional Marxist analysis divides society into the bourgeoisie (owners) and proletariat (workers). Weber added status and power alongside wealth as dimensions of class."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Social Class", "title": "The Income Gap", "scene": "scene2", "body": "<p>Your survey reveals that the average household income in north Stonebridge is <strong>£52,000</strong> per year. In south Stonebridge, it is <strong>£21,000</strong>.</p><p>The council asks: <em>\"What is the income gap between the two areas?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Income gap = higher income − lower income</p><p>= £52,000 − £21,000 = ?</p>"}, "question": "What is the income gap between north and south Stonebridge?", "unit": "£ thousands", "answer": 31, "tolerance": 0, "maxAttempts": 2, "hintText": "Subtract: 52,000 − 21,000. Express your answer in thousands.", "feedbackCorrect": "£31,000 — a massive gap. People in the north earn more than double those in the south, in the same town.", "feedbackWrong": "A common mistake is presenting only one sociological perspective. Compare functionalist, Marxist, and interactionist viewpoints for a balanced answer. The answer is 31 (£31,000). 52,000 − 21,000 = 31,000.", "consequence": "<strong>A £31,000 divide within one town.</strong> The council members exchange uneasy glances. Class inequality is not abstract — it is measured in pounds and pence.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "The Class Effect", "title": "Life Chances", "scene": "scene2", "body": "<p>Your data reveals that class does not just affect income. In south Stonebridge, <strong>life expectancy</strong> is 7 years lower than in the north. Children from the south are <strong>half as likely</strong> to attend university. Obesity rates are <strong>twice as high</strong>.</p><p>Sociologists call these differences <strong>life chances</strong> — the opportunities and outcomes a person can expect based on their social position. Weber argued that class, status, and power all shape life chances.</p>", "factBox": {"label": "Life Chances", "text": "Life chances (a concept from Max Weber) are the opportunities a person has for achieving economic and social rewards. They include health, education, housing, and employment prospects. In the UK, working-class people have lower life expectancy, higher rates of chronic illness, lower educational attainment, and less job security than middle-class people."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Social Class", "title": "The University Gap", "scene": "scene3", "body": "<p>In north Stonebridge, <strong>60%</strong> of young people go to university. In south Stonebridge, the figure is <strong>24%</strong>.</p><p>The council asks you to express the difference as a ratio. <em>\"How many times more likely is a young person from the north to attend university compared to someone from the south?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Ratio = north rate ÷ south rate</p><p>= 60 ÷ 24 = ?</p>"}, "question": "How many times more likely are northern young people to go to university?", "unit": "times", "answer": 2.5, "tolerance": 0.1, "maxAttempts": 2, "hintText": "Divide 60 by 24. Simplify: 60 ÷ 24 = 5 ÷ 2 = ?", "feedbackCorrect": "2.5 times more likely. Where you grow up in Stonebridge dramatically affects your chances of going to university.", "feedbackWrong": "A common mistake is presenting only one sociological perspective. Compare functionalist, Marxist, and interactionist viewpoints for a balanced answer. The answer is 2.5. 60 ÷ 24 = 2.5 — young people in the north are two and a half times more likely to attend university.", "consequence": "<strong>Two and a half times the chance.</strong> This is not about talent — it is about class. The postcode lottery of opportunity is stark.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Big Picture", "title": "Marx vs Weber", "scene": "scene3", "body": "<p>The council debates what to do. You explain that sociologists have two main perspectives on class.</p><p><strong>Marx</strong> argued society is divided into two classes: the <strong>bourgeoisie</strong> (who own the means of production) and the <strong>proletariat</strong> (who sell their labour). The conflict between them drives social change.</p><p><strong>Weber</strong> agreed class matters but added two more dimensions: <strong>status</strong> (social prestige) and <strong>power</strong> (ability to influence others). A teacher may have moderate income but high status; a plumber may earn well but have lower status.</p>", "factBox": {"label": "Marx vs Weber on Class", "text": "Marx: two classes (bourgeoisie vs proletariat), defined by ownership of production. Conflict between them is inevitable. Weber: class is one of three dimensions of stratification — class (economic), status (social prestige), and party/power (political influence). Weber's model is more nuanced and allows for social mobility between groups."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Social Class", "title": "The Key Difference", "scene": "scene1", "body": "<p>The council chair asks you to summarise: <em>\"What is the key difference between Marx and Weber's views on social class?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What is the key difference between Marx and Weber on social class?", "options": [{"text": "Marx believed class did not exist, while Weber thought it was the most important factor", "correct": false}, {"text": "Marx focused only on economic class (ownership), while Weber added status and power as additional dimensions", "correct": true}, {"text": "Weber argued there were only two classes, while Marx identified seven", "correct": false}, {"text": "Both Marx and Weber agreed that class no longer matters in modern society", "correct": false}], "maxAttempts": 2, "hintText": "Marx focused on who OWNS the means of production. Weber agreed class matters but added STATUS and POWER as extra dimensions.", "feedbackCorrect": "Marx saw class purely in economic terms — owners vs workers. Weber expanded this to include social status and political power, giving a more complex picture of inequality.", "feedbackWrong": "A common mistake is presenting only one sociological perspective. Compare functionalist, Marxist, and interactionist viewpoints for a balanced answer. The correct answer is that Marx focused only on economic ownership, while Weber added status and power as additional dimensions of stratification.", "consequence": "<strong>The council has its report.</strong> Stonebridge's class divide is not just about money — it is about power, prestige, and life chances too.", "next": "end", "examTip": "In the exam, use named sociological perspectives and theorists. Evaluate each viewpoint by considering its strengths and at least one criticism.", "bloomsLevel": "Understand"}], "ending": {"title": "The Class", "perfect": "Outstanding analysis, Dani. You measured the income gap, calculated the university divide, and navigated Marx and Weber with confidence. Stonebridge owes you a debt.", "partial": "Good community work, but some class concepts or calculations need revisiting. Review the differences between Marx and Weber's approaches to stratification.", "retry": "Want to map Stonebridge's class structure again?", "topic": "Social Class"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
