<script>const STORY_DATA = {"meta": {"title": "The Gravity Well", "subtitle": "Gravity shapes every orbit in the cosmos.", "subject": "Astronomy & Space Science", "topic": "Gravity & Orbital Motion", "level": "KS3", "tags": ["🔭 Astronomy", "KS3 · Year 7–9", "Gravity", "~10 min", "3 questions"], "intro": "You are training for a Moon mission. Understanding gravity — how it changes with location and why objects orbit — is essential for survival. One miscalculation and you could drift into the void."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#706860'/><circle cx='200' cy='200' r='80' fill='#8a7868'/><circle cx='200' cy='200' r='75' fill='#a09080'/><rect x='195' y='115' width='10' height='15' fill='#c8b8a8'/><circle cx='200' cy='112' r='5' fill='#c8b8a8'/><circle cx='100' cy='50' r='2' fill='#c8b8a8'/><circle cx='300' cy='30' r='2' fill='#c8b8a8'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#706860'/><circle cx='200' cy='125' r='30' fill='#a09080'/><circle cx='200' cy='125' r='70' fill='none' stroke='#b0a898' stroke-width='1' stroke-dasharray='4,4'/><circle cx='270' cy='125' r='6' fill='#c8b8a8'/><polygon points='270,117 275,110 280,117' fill='#b0a898'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#706860'/><circle cx='200' cy='125' r='40' fill='#a09080'/><rect x='185' y='55' width='30' height='15' fill='#8a7868'/><rect x='190' y='50' width='20' height='5' fill='#b0a898'/><circle cx='200' cy='125' r='60' fill='none' stroke='#c8b8a8' stroke-width='1' stroke-dasharray='3,3'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Gravity Training", "title": "Weight on the Moon", "scene": "scene1", "body": "<p>On Earth, gravity pulls objects toward the centre of the planet. The strength of this pull is measured by <strong>gravitational field strength (g)</strong>. On Earth, g ≈ <strong>9.8 N/kg</strong>. On the Moon, g is only <strong>1.6 N/kg</strong>.</p><p>Your mass stays the same wherever you go, but your <strong>weight</strong> (the gravitational force on you) changes depending on the local value of g.</p>", "factBox": {"label": "Mass vs Weight", "text": "Mass is the amount of matter in an object (measured in kg) and stays constant. Weight is the gravitational force acting on that mass (measured in N) and depends on where you are."}, "formulaBox": {"label": "Key formula", "formula": "weight = mass × g", "vars": "weight (N) · mass (kg) · g (N/kg)"}, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Weight on the Moon", "title": "Your Lunar Weight", "scene": "scene1", "body": "<p>An astronaut has a mass of <strong>70 kg</strong>. The Moon's gravitational field strength is <strong>1.6 N/kg</strong>.</p><p>Calculate their weight on the Moon.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Use: <strong>weight = mass × g</strong></p><p>Substitute: weight = 70 × 1.6</p>"}, "question": "What is the astronaut's weight on the Moon (in N)?", "unit": "N", "answer": 112, "tolerance": 0, "maxAttempts": 2, "hintText": "70 × 1.6. Try: 70 × 1 = 70, 70 × 0.6 = 42, total = 112.", "feedbackCorrect": "112 N on the Moon. Compare that to their weight on Earth...", "feedbackWrong": "A common mistake is confusing similar astronomical terms. Be precise — a 'solar system' is not the same as a 'galaxy' or a 'universe'. The answer is 112 N. 70 × 1.6 = 112 N.", "consequence": "<strong>Only 112 N on the Moon.</strong> On Earth, the same astronaut weighs much more. Let's find out how much more.", "next": "mid1", "nextWrong": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Act II — Comparing Worlds", "title": "Earth vs Moon", "scene": "scene2", "body": "<p>On Earth, g = <strong>9.8 N/kg</strong>. The same astronaut (mass 70 kg) weighs 70 × 9.8 = <strong>686 N</strong> on Earth but only <strong>112 N</strong> on the Moon.</p><p>How many times stronger is gravity on Earth compared to the Moon? This is simply the ratio of the two g values.</p>", "factBox": {"label": "Why the difference?", "text": "The Moon has much less mass than Earth and is smaller. Gravitational field strength depends on the mass of the body and the distance from its centre. Less mass means weaker gravity."}, "formulaBox": {"label": "Gravity ratio", "formula": "ratio = g(Earth) ÷ g(Moon)", "vars": "g(Earth) = 9.8 N/kg · g(Moon) = 1.6 N/kg"}, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Gravity Ratio", "title": "How Much Stronger Is Earth's Gravity?", "scene": "scene2", "body": "<p>Earth's g = <strong>9.8 N/kg</strong>. Moon's g = <strong>1.6 N/kg</strong>.</p><p>How many times stronger is Earth's gravitational field? Give your answer to 1 decimal place.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Structure your working", "steps": "<p>ratio = 9.8 ÷ 1.6</p><p>Calculate the division.</p>"}, "question": "How many times stronger is Earth's gravity than the Moon's?", "unit": "times", "answer": 6.1, "tolerance": 0.1, "maxAttempts": 2, "hintText": "9.8 ÷ 1.6. Multiply both by 10: 98 ÷ 16 = 6.125.", "feedbackCorrect": "About 6.1 times — Earth's gravity is roughly six times stronger than the Moon's.", "feedbackWrong": "A common mistake is confusing similar astronomical terms. Be precise — a 'solar system' is not the same as a 'galaxy' or a 'universe'. The answer is about 6.1. 9.8 ÷ 1.6 = 6.125, which rounds to 6.1.", "consequence": "<strong>Gravity on Earth is about 6 times stronger.</strong> This is why astronauts can jump so high and bounce along on the Moon.", "next": "mid2", "nextWrong": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Act III — Orbiting Earth", "title": "Why Do Astronauts Float?", "scene": "scene3", "body": "<p>On the International Space Station (ISS), astronauts appear to float weightlessly. But the ISS orbits only about 400 km above Earth's surface, where gravity is still about <strong>90%</strong> as strong as on the ground.</p><p>So why do they float? The answer is that the ISS and everything inside it are in <strong>free fall</strong> — continuously falling toward Earth while moving forward fast enough to keep missing it. This is what an orbit is.</p>", "factBox": {"label": "Free fall", "text": "An orbit is a state of continuous free fall. The ISS falls toward Earth at the same rate as the astronauts inside it, so relative to the station, they appear weightless. Gravity is still very much present — it's what keeps them in orbit."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Orbital Motion", "title": "Why Do ISS Astronauts Float?", "scene": "scene3", "body": "<p>Why do astronauts on the ISS appear to be weightless?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What causes apparent weightlessness on the ISS?", "options": [{"text": "There is no gravity in space — the ISS is too far from Earth", "correct": false}, {"text": "The ISS and astronauts are in free fall together, orbiting Earth", "correct": true}, {"text": "The ISS generates an anti-gravity field to protect astronauts", "correct": false}, {"text": "The astronauts' spacesuits cancel out the effects of gravity", "correct": false}], "maxAttempts": 2, "hintText": "Gravity at the ISS altitude is about 90% of surface gravity. The key is that both the station and astronauts are falling together.", "feedbackCorrect": "Correct — the ISS and astronauts fall toward Earth at the same rate, creating the sensation of weightlessness.", "feedbackWrong": "A common mistake is confusing similar astronomical terms. Be precise — a 'solar system' is not the same as a 'galaxy' or a 'universe'. The ISS and astronauts are both in free fall (orbiting), so they fall at the same rate and appear weightless relative to each other.", "consequence": "<strong>Orbiting is just falling and missing the ground.</strong> An elegant idea that Newton first described centuries ago.", "next": "end", "nextWrong": "end", "examTip": "In the exam, use precise scientific terminology and include scale or distance values where relevant. Compare objects using quantitative data, not just qualitative descriptions.", "bloomsLevel": "Understand"}], "ending": {"title": "Mission Complete", "perfect": "Excellent work. You calculated weight using W = mg, compared gravitational field strengths, and understood why astronauts appear weightless in orbit.", "partial": "Good effort — review the formula W = mg and remember that weightlessness in orbit is caused by free fall, not absence of gravity.", "retry": "Try again to master gravity, weight, and orbital motion.", "topic": "Weight = mass × g, comparing gravity on Earth and Moon, and understanding free fall in orbit."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
