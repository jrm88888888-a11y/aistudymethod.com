<script>const STORY_DATA = {"meta": {"title": "The Space Mission", "subtitle": "Every metre per second of delta-v must be earned in fuel.", "subject": "Astronomy & Space Science", "topic": "Mission Planning & Delta-V", "level": "GCSE", "tags": ["🔭 Astronomy", "GCSE · Year 10–11", "Delta-V", "~10 min", "3 questions"], "intro": "You are a mission planner calculating how much fuel a spacecraft needs. The Tsiolkovsky rocket equation — the fundamental equation of spaceflight — tells you how much velocity change (delta-v) your rocket can achieve based on its fuel and exhaust speed."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#706860'/><rect x='170' y='50' width='60' height='120' fill='#8a7868'/><polygon points='175,50 200,20 225,50' fill='#a09080'/><rect x='160' y='170' width='80' height='20' fill='#8a7868'/><polygon points='175,190 200,240 225,190' fill='#c8b8a8'/><rect x='165' y='105' width='70' height='2' fill='#b0a898' stroke-dasharray='3,3'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#706860'/><rect x='50' y='100' width='140' height='50' fill='#8a7868'/><rect x='50' y='100' width='80' height='50' fill='#a09080'/><rect x='210' y='100' width='80' height='50' fill='#8a7868'/><polygon points='290,110 310,125 290,140' fill='#c8b8a8'/><rect x='130' y='110' width='2' height='30' fill='#b0a898'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#706860'/><circle cx='100' cy='200' r='40' fill='#a09080'/><circle cx='300' cy='80' r='25' fill='#8a7868'/><path d='M140,180 Q200,60 275,90' fill='none' stroke='#c8b8a8' stroke-width='1.5' stroke-dasharray='6,4'/><rect x='200' y='110' width='15' height='8' fill='#b0a898'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Rocket Science", "title": "The Tsiolkovsky Equation", "scene": "scene1", "body": "<p>The <strong>Tsiolkovsky rocket equation</strong> is the foundation of space mission planning. It relates the change in velocity (delta-v) to the exhaust velocity and the ratio of initial to final mass.</p><p>A rocket with exhaust velocity <strong>v_e = 3,000 m/s</strong> has an initial mass (with fuel) of <strong>10,000 kg</strong> and a final mass (after burning fuel) of <strong>4,000 kg</strong>.</p>", "factBox": {"label": "Delta-v", "text": "Delta-v (Δv) is the total velocity change a spacecraft can achieve. Every manoeuvre — launch, orbit change, landing — costs delta-v. Mission planners must budget their delta-v carefully, like fuel in a car."}, "formulaBox": {"label": "Tsiolkovsky equation", "formula": "Δv = v_e × ln(m₀ ÷ m_f)", "vars": "v_e = exhaust velocity · m₀ = initial mass · m_f = final mass · ln = natural log"}, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Delta-V Calculation", "title": "How Much Velocity Change?", "scene": "scene2", "body": "<p>v_e = <strong>3,000 m/s</strong>. m₀ = <strong>10,000 kg</strong>. m_f = <strong>4,000 kg</strong>.</p><p>Calculate Δv. Note: ln(2.5) ≈ 0.916.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Mass ratio = m₀/m_f = 10,000/4,000 = 2.5</p><p>ln(2.5) ≈ 0.916</p><p>Δv = 3,000 × 0.916 = ?</p>"}, "question": "What is the delta-v (in m/s)?", "unit": "m/s", "answer": 2748, "tolerance": 5, "maxAttempts": 2, "hintText": "3000 × 0.916 = 2748.", "feedbackCorrect": "2,748 m/s of delta-v available for manoeuvres.", "feedbackWrong": "A common mistake is confusing similar astronomical terms. Be precise — a 'solar system' is not the same as a 'galaxy' or a 'universe'. The answer is 2,748 m/s. Δv = 3,000 × ln(2.5) = 3,000 × 0.916 = 2,748.", "consequence": "<strong>2,748 m/s.</strong> Is this enough for the mission? It depends on the orbital manoeuvres required.", "next": "mid1", "nextWrong": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Act II — Mass Ratio", "title": "The Tyranny of the Rocket Equation", "scene": "scene2", "body": "<p>What if the mission requires <strong>Δv = 4,000 m/s</strong>? With the same exhaust velocity of 3,000 m/s, what mass ratio is needed?</p><p>Rearranging: ln(m₀/m_f) = Δv/v_e = 4,000/3,000 = 1.333</p><p>So m₀/m_f = e^1.333. Note: e^1.333 ≈ 3.79.</p>", "factBox": {"label": "The tyranny of the rocket equation", "text": "Because of the exponential relationship, increasing Δv requires exponentially more fuel. To double the Δv, you need much more than double the fuel. This fundamental constraint shapes every space mission ever planned."}, "formulaBox": {"label": "Mass ratio", "formula": "m₀/m_f = e^(Δv/v_e)", "vars": "e ≈ 2.718 · Δv = required velocity change · v_e = exhaust velocity"}, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Mass Ratio", "title": "How Much Fuel Is Needed?", "scene": "scene2", "body": "<p>Required Δv = <strong>4,000 m/s</strong>. Exhaust velocity = <strong>3,000 m/s</strong>.</p><p>Calculate the required mass ratio m₀/m_f to 1 decimal place. Use e^1.333 ≈ 3.79.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Structure your working", "steps": "<p>m₀/m_f = e^(Δv/v_e) = e^(4000/3000) = e^1.333</p><p>e^1.333 ≈ ?</p>"}, "question": "What is the required mass ratio m₀/m_f?", "unit": "", "answer": 3.8, "tolerance": 0.1, "maxAttempts": 2, "hintText": "e^1.333 ≈ 3.79, which rounds to 3.8.", "feedbackCorrect": "About 3.8 — meaning the rocket must be 3.8 times heavier at launch than when empty. Most of that is fuel.", "feedbackWrong": "A common mistake is confusing similar astronomical terms. Be precise — a 'solar system' is not the same as a 'galaxy' or a 'universe'. The answer is about 3.8. e^1.333 ≈ 3.79 ≈ 3.8.", "consequence": "<strong>A mass ratio of 3.8.</strong> If the empty spacecraft weighs 2,000 kg, the total launch mass must be 7,600 kg — with 5,600 kg of fuel.", "next": "mid2", "nextWrong": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Act III — Budget Your Delta-V", "title": "Planning a Mission", "scene": "scene3", "body": "<p>Real missions require delta-v for multiple manoeuvres: launching from Earth, entering orbit, transferring to the destination, braking to arrive, and possibly returning. Each step costs delta-v, and every gram of fuel for later manoeuvres must also be accelerated during earlier ones.</p>", "factBox": {"label": "Gravity assists", "text": "To save delta-v, missions use gravity assists (flybys of planets) to gain speed for free. The Voyager missions used Jupiter and Saturn flybys to reach the outer Solar System — a journey that would have been impossible with fuel alone."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Mission Planning", "title": "The Rocket Equation Challenge", "scene": "scene3", "body": "<p>Why is the Tsiolkovsky rocket equation sometimes called 'the tyranny of the rocket equation'?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Why is the rocket equation considered 'tyrannical'?", "options": [{"text": "Because rockets are difficult to build", "correct": false}, {"text": "Because increasing delta-v requires exponentially more fuel, and that extra fuel also needs fuel to accelerate it", "correct": true}, {"text": "Because rocket fuel is extremely expensive", "correct": false}, {"text": "Because rockets can only be launched at certain times of year", "correct": false}], "maxAttempts": 2, "hintText": "Think about the exponential relationship — e^(Δv/v_e). Small increases in Δv demand large increases in fuel.", "feedbackCorrect": "Correct — the exponential relationship means each additional m/s of delta-v costs disproportionately more fuel.", "feedbackWrong": "A common mistake is confusing similar astronomical terms. Be precise — a 'solar system' is not the same as a 'galaxy' or a 'universe'. The rocket equation is 'tyrannical' because the fuel requirement grows exponentially with delta-v, and fuel to carry fuel creates a compounding problem.", "consequence": "<strong>The rocket equation is the fundamental constraint of spaceflight.</strong> Every mission ever flown has been shaped by this unforgiving mathematics.", "next": "end", "nextWrong": "end", "examTip": "In the exam, use precise scientific terminology and include scale or distance values where relevant. Compare objects using quantitative data, not just qualitative descriptions.", "bloomsLevel": "Analyse"}], "ending": {"title": "Mission Complete", "perfect": "Brilliant mission planning. You applied the Tsiolkovsky equation, calculated mass ratios, and understood the exponential fuel-delta-v relationship.", "partial": "Good effort — review Δv = v_e × ln(m₀/m_f) and why the exponential makes fuel budgeting so challenging.", "retry": "Try again to master delta-v calculations and the rocket equation.", "topic": "The Tsiolkovsky rocket equation (Δv = v_e ln(m₀/m_f)), mass ratios, and the exponential fuel-delta-v relationship."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
