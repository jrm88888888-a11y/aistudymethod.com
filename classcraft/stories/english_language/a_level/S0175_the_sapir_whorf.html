<script>const STORY_DATA = {"meta": {"title": "The Sapir-Whorf: Linguistic Relativity", "subtitle": "Does your language shape the way you think? The data might surprise you.", "subject": "English Language", "topic": "Linguistic Relativity", "level": "A-Level", "tags": ["📝 English Language", "A-Level", "Linguistic Relativity", "~10 min", "3 questions"], "intro": "You have been seconded to a cross-cultural psychology lab investigating the Sapir-Whorf hypothesis. Researchers are testing whether speakers of different languages perceive the world differently. Your task is to analyse the lexical data, calculate the results of a colour perception study, and articulate the strongest version of this controversial theory."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='100' y='50' width='220' height='160' fill='#8a7868'/><rect x='380' y='50' width='220' height='160' fill='#8a7868'/><circle cx='210' cy='130' r='50' fill='#a09080'/><circle cx='490' cy='130' r='50' fill='#a09080'/><rect x='185' y='120' width='50' height='5' fill='#706860'/><rect x='465' y='120' width='50' height='5' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='80' y='70' width='100' height='130' fill='#8a7868'/><rect x='200' y='100' width='100' height='100' fill='#8a7868'/><rect x='320' y='130' width='100' height='70' fill='#8a7868'/><rect x='440' y='150' width='100' height='50' fill='#8a7868'/><rect x='560' y='160' width='100' height='40' fill='#8a7868'/><rect x='80' y='200' width='580' height='3' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='150' y='50' width='400' height='160' fill='#8a7868'/><circle cx='260' cy='130' r='45' fill='#a09080'/><circle cx='440' cy='130' r='45' fill='#706860'/><line x1='305' y1='130' x2='395' y2='130' stroke='#b0a898' stroke-width='3' stroke-dasharray='6,4'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Cross-Cultural Lab", "scene": "scene1", "body": "<p>You push open the door of the Cross-Cultural Cognition Lab. Screens display word lists from dozens of languages, colour charts, and brain scan images. The lead researcher gestures to a whiteboard covered in data.</p><p><em>\"The Sapir-Whorf hypothesis proposes that the language you speak influences — or even determines — the way you think,\"</em> she explains. <em>\"We are testing this with two approaches: lexical analysis and perceptual experiments. Your job is to crunch the numbers and see whether the data supports the theory.\"</em></p><p>The hypothesis exists in two forms: the <strong>strong version</strong> (linguistic determinism — language determines thought) and the <strong>weak version</strong> (linguistic relativity — language influences thought).</p>", "factBox": {"label": "Key Concept — The Sapir-Whorf Hypothesis", "text": "The Sapir-Whorf hypothesis (also called linguistic relativity) proposes that the structure of a language affects the way its speakers perceive and conceptualise the world. The strong version (linguistic determinism) claims language determines thought entirely. The weak version (linguistic relativity) claims language influences thought and perception. Evidence from colour perception, spatial reasoning, and time conceptualisation provides partial support for the weak version."}, "formulaBox": {"label": "Difference and Percentage", "formula": "Difference = Value A − Value B", "vars": "Percentage = (Part ÷ Whole) × 100"}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Lexical Differences", "title": "The Snow Vocabulary Gap", "scene": "scene2", "body": "<p>The first dataset compares the vocabulary of two languages for describing snow.</p><p><strong>Language A</strong> (spoken in an Arctic region) has <strong>12 distinct words for snow</strong>. <strong>Language B</strong> (spoken in a tropical region) has only <strong>3 words for snow</strong>.</p><p><em>\"Calculate the difference,\"</em> the researcher instructs.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Identify the two values.<br>Language A = 12 snow words · Language B = 3 snow words</p><p><strong>Step 2:</strong> Subtract.<br>Difference = 12 − 3</p>"}, "question": "What is the difference in the number of snow-related words between Language A and Language B?", "unit": "words", "answer": 9, "tolerance": 0, "maxAttempts": 2, "hintText": "Subtract Language B's count from Language A's count: 12 minus 3.", "feedbackCorrect": "Nine words. Language A has nine more terms for snow than Language B — a lexical gap that may correlate with differences in perception.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is 9. Language A has 12 snow words and Language B has 3: 12 − 3 = 9.", "consequence": "<strong>The researcher circles the number.</strong> <em>\"Nine additional terms. The question is whether having more words for snow means Arctic speakers actually perceive more types of snow — or whether they simply label distinctions that all humans can see. That is the heart of the debate.\"</em>", "next": "q2", "bloomsLevel": "Analyse"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Colour Perception Study", "title": "The Colour Categorisation Results", "scene": "scene3", "body": "<p>The second dataset comes from a colour perception experiment. Researchers tested <strong>50 speakers</strong> of a language that has separate basic colour terms for light blue and dark blue.</p><p>The results showed that <strong>35 out of 50 speakers</strong> categorised colour chips differently from English speakers.</p><p><em>\"Calculate the percentage of speakers who categorised colours differently based on their language,\"</em> the researcher instructs.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Identify the part and the whole.<br>Speakers who categorised differently = 35 · Total speakers = 50</p><p><strong>Step 2:</strong> Apply the percentage formula.<br>Percentage = (35 ÷ 50) × 100</p>"}, "question": "What percentage of speakers categorised colours differently based on their language?", "unit": "%", "answer": 70, "tolerance": 0, "maxAttempts": 2, "hintText": "Divide 35 by 50 and multiply by 100.", "feedbackCorrect": "Seventy percent. A striking majority of speakers categorised colours in ways that aligned with their language's colour terms.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is 70%. Thirty-five out of fifty speakers: (35 ÷ 50) × 100 = 70%.", "consequence": "<strong>The researcher highlights the result.</strong> <em>\"Seventy percent. It does not prove linguistic determinism — these speakers can still see all the same colours. But their language appears to make certain distinctions more cognitively salient. Language does not build walls around thought, but it does build paths.\"</em>", "next": "q3", "bloomsLevel": "Analyse"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — The Strong Version", "title": "Linguistic Determinism", "scene": "scene1", "body": "<p>Your data analysis is complete. The researcher now asks you to define the most extreme version of the theory you have been testing.</p><p><em>\"What is the strong version of the Sapir-Whorf hypothesis?\"</em> she asks. <em>\"Be precise — the distinction between the strong and weak versions is crucial.\"</em></p>", "question": "What is the strong version of the Sapir-Whorf hypothesis?", "options": [{"text": "Language influences thought by making certain concepts easier to express, but does not prevent speakers from thinking about any concept", "correct": false}, {"text": "Linguistic determinism — language determines thought, meaning speakers of different languages literally think differently and cannot perceive concepts their language lacks", "correct": true}, {"text": "All languages share a universal grammar that shapes thought in identical ways regardless of surface differences", "correct": false}, {"text": "Language and thought are entirely separate cognitive systems that do not influence each other at all", "correct": false}], "maxAttempts": 2, "hintText": "The strong version is called linguistic determinism. 'Determinism' means language does not merely influence thought — it determines it entirely.", "feedbackCorrect": "The strong version is linguistic determinism: language determines thought, meaning speakers of different languages literally think differently and cannot perceive concepts their language lacks.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The correct answer is: linguistic determinism — language determines thought, meaning speakers of different languages literally think differently and cannot perceive concepts their language lacks.", "consequence": "<strong>The researcher closes her notebook.</strong> <em>\"Linguistic determinism is a bold claim — and our data does not fully support it. But the weak version — that language influences thought — is increasingly supported by experimental evidence. Your numbers today added to that case.\"</em>", "next": "end", "examTip": "In the exam, always quote briefly from the text and explain the effect of specific word choices. Use terminology like 'connotation' and 'tone'.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Exceptional cross-cultural analysis. You quantified the lexical gap, calculated the perception study results, and defined linguistic determinism with precision. The lab has compelling new data.", "partial": "You engaged with some key aspects of the Sapir-Whorf hypothesis, but your analysis needed refinement. Return to deepen your understanding of linguistic relativity.", "retry": "Every researcher benefits from a second look at the data. Try again to achieve a perfect score."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
