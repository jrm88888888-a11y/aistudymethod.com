<script>const STORY_DATA = {"meta": {"title": "The Politeness Strategy: Brown & Levinson", "subtitle": "Every conversation is a negotiation of face. Can you decode the strategies speakers use to protect it?", "subject": "English Language", "topic": "Brown & Levinson's Politeness Theory", "level": "A-Level", "tags": ["📝 English Language", "A-Level", "Brown & Levinson", "~10 min", "3 questions"], "intro": "You have been invited to observe a mediation session at a workplace dispute centre. Every word spoken is a calculated move — designed to protect the speaker's own face or threaten someone else's. Your task is to count the politeness strategies used, calculate proportions, and show that you understand the concept that makes confrontation so linguistically complex."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='250' y='60' width='200' height='120' fill='#8a7868'/><rect x='270' y='80' width='160' height='5' fill='#a09080'/><rect x='270' y='95' width='140' height='5' fill='#a09080'/><rect x='270' y='110' width='150' height='5' fill='#a09080'/><circle cx='150' cy='130' r='35' fill='#8a7868'/><circle cx='550' cy='130' r='35' fill='#8a7868'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='80' y='60' width='250' height='140' fill='#8a7868'/><rect x='370' y='60' width='250' height='140' fill='#8a7868'/><rect x='100' y='80' width='80' height='80' fill='#b0a898'/><rect x='200' y='80' width='80' height='110' fill='#b0a898'/><rect x='390' y='80' width='80' height='50' fill='#b0a898'/><rect x='490' y='80' width='80' height='100' fill='#b0a898'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='150' y='40' width='400' height='170' fill='#8a7868'/><polygon points='350,60 280,130 420,130' fill='#a09080' stroke='#706860' stroke-width='2'/><rect x='200' y='140' width='300' height='50' fill='#a09080'/><rect x='220' y='155' width='260' height='5' fill='#706860'/><rect x='220' y='170' width='240' height='5' fill='#706860'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Mediation Room", "scene": "scene1", "body": "<p>You take your seat behind the observation glass at the Workplace Dispute Centre. In the room beyond, two colleagues face each other across a table, a mediator between them. The tension is palpable — but what strikes you is how carefully each person chooses their words.</p><p><em>\"Politeness is not just about being nice,\"</em> your supervisor explains. <em>\"Brown and Levinson showed that every interaction involves a negotiation of face — your public self-image. Speakers use positive politeness strategies to make others feel valued, and negative politeness strategies to respect their autonomy. Your job is to count them.\"</em></p><p>In Brown and Levinson's framework, <strong>positive politeness</strong> attends to the hearer's desire to be liked and approved of, while <strong>negative politeness</strong> attends to their desire not to be imposed upon.</p>", "factBox": {"label": "Key Concept — Politeness Theory", "text": "Brown and Levinson's Politeness Theory proposes that all competent speakers have 'face' — a public self-image. Positive face is the desire to be approved of and valued by others. Negative face is the desire for autonomy and freedom from imposition. Speakers use politeness strategies to manage threats to face during interaction, choosing positive strategies (compliments, in-group language, agreement) or negative strategies (hedging, apologising, being indirect) depending on context."}, "formulaBox": {"label": "Totals and Percentages", "formula": "Total = Positive + Negative", "vars": "Percentage = (Part ÷ Total) × 100"}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Total Strategies", "title": "Counting Politeness Strategies", "scene": "scene2", "body": "<p>You begin your analysis of the mediation transcript. Using Brown and Levinson's framework, you classify every politeness strategy used by both speakers.</p><p>You identify <strong>8 positive politeness strategies</strong> — instances where speakers used compliments, sought agreement, or used inclusive language like <em>\"we\"</em>. You also identify <strong>5 negative politeness strategies</strong> — instances of hedging, indirect requests, and apologies for imposing.</p><p><em>\"What is the total number of politeness strategies used?\"</em> your supervisor asks.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Identify the two categories.<br>Positive strategies = 8 · Negative strategies = 5</p><p><strong>Step 2:</strong> Add them together.<br>Total = 8 + 5</p>"}, "question": "How many politeness strategies were used in total?", "unit": "strategies", "answer": 13, "tolerance": 0, "maxAttempts": 2, "hintText": "Add the positive strategies to the negative strategies: 8 plus 5.", "feedbackCorrect": "Thirteen strategies in total. That is a high density of face-work for a single conversation — every utterance is carefully calibrated to manage the interpersonal dynamics.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is 13. There are 8 positive and 5 negative politeness strategies: 8 + 5 = 13.", "consequence": "<strong>Your supervisor marks the tally.</strong> <em>\"Thirteen strategies. In a mediation context, that density is expected — both speakers are acutely aware that one wrong word could escalate the dispute. Language becomes armour.\"</em>", "next": "q2", "bloomsLevel": "Analyse"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Negative Proportion", "title": "The Negative Politeness Ratio", "scene": "scene3", "body": "<p>Your supervisor wants a more granular breakdown. Of the <strong>13 total strategies</strong>, <strong>5 were negative politeness</strong> — hedging, indirectness, and apologies for imposition.</p><p><em>\"Calculate the percentage of strategies that were negative politeness,\"</em> she instructs. <em>\"Round to the nearest whole number.\"</em></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Identify the part and the whole.<br>Negative strategies = 5 · Total strategies = 13</p><p><strong>Step 2:</strong> Apply the percentage formula.<br>Percentage = (5 ÷ 13) × 100 ≈ 38.46%</p><p><strong>Step 3:</strong> Round to the nearest whole number.</p>"}, "question": "What percentage of the strategies were negative politeness? (Round to nearest whole number)", "unit": "%", "answer": 38, "tolerance": 1, "maxAttempts": 2, "hintText": "Divide 5 by 13 and multiply by 100. Round your answer to the nearest whole number.", "feedbackCorrect": "Approximately 38%. Just over a third of the strategies were negative politeness — hedging and indirectness designed to protect the hearer's autonomy.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is approximately 38%. Calculate: (5 ÷ 13) × 100 ≈ 38.5%, which rounds to 38 or 39.", "consequence": "<strong>Your supervisor examines the balance.</strong> <em>\"Around 38% negative. That means the speakers leaned more heavily on positive politeness — seeking approval and solidarity. In workplace mediations, that is often a sign that both parties still want the relationship to work.\"</em>", "next": "q3", "bloomsLevel": "Analyse"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Face-Threatening Acts", "title": "Defining the Threat", "scene": "scene1", "body": "<p>Your quantitative analysis is complete. Now your supervisor tests your theoretical understanding. She points to a moment in the transcript where one speaker directly criticised the other's work.</p><p><em>\"That moment is what Brown and Levinson call a face-threatening act,\"</em> she says. <em>\"Define it precisely.\"</em></p>", "question": "What is a \"face-threatening act\"?", "options": [{"text": "A compliment or positive remark designed to strengthen the hearer's public self-image", "correct": false}, {"text": "An utterance or action that threatens someone's public self-image — either their desire to be approved of (positive face) or their desire for autonomy (negative face)", "correct": true}, {"text": "A formal register shift that occurs when a speaker moves from casual to professional language", "correct": false}, {"text": "A conversational repair strategy used to correct misunderstandings during interaction", "correct": false}], "maxAttempts": 2, "hintText": "Think about what 'face' means in Brown and Levinson's theory — your public self-image. A face-threatening act is something that damages it.", "feedbackCorrect": "A face-threatening act is an utterance or action that threatens someone's public self-image — either their positive face (desire to be approved of) or their negative face (desire for autonomy and freedom from imposition).", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The correct answer is: an utterance or action that threatens someone's public self-image — either their desire to be approved of (positive face) or their desire for autonomy (negative face).", "consequence": "<strong>Your supervisor closes the transcript.</strong> <em>\"Every criticism, every demand, every disagreement is a potential face-threatening act. Politeness strategies exist precisely because human interaction is inherently risky — we are constantly balancing honesty against the need to protect each other's dignity.\"</em>", "next": "end", "examTip": "In the exam, always quote briefly from the text and explain the effect of specific word choices. Use terminology like 'connotation' and 'tone'.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Impeccable pragmatic analysis. You counted the strategies, calculated the ratios, and defined face-threatening acts with theoretical precision. Brown and Levinson would approve.", "partial": "You identified some key politeness patterns, but your analysis needed refinement in places. Return to strengthen your understanding of face and politeness theory.", "retry": "Every analyst benefits from re-examining the transcript. Try again to achieve a perfect score."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
