<script>const STORY_DATA = {"meta": {"title": "The Descriptive Trap: Descriptive Writing", "subtitle": "A forgotten manor house holds secrets in its walls. Can you decode the craft behind powerful description?", "subject": "English Language", "topic": "Descriptive Writing", "level": "GCSE", "tags": ["📝 English Language", "GCSE", "Descriptive Writing", "~10 min", "3 questions"], "intro": "You have been commissioned by a literary magazine to analyse a prize-winning piece of descriptive writing. The passage describes an abandoned manor house, and the judges praised its sensory richness. Your task is to count the sensory details, calculate the adjective density, and understand why descriptive writing works. Every number reveals a secret of the craft."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='200' y='60' width='300' height='160' fill='#8a7868'/><polygon points='200,60 350,15 500,60' fill='#a09080'/><rect x='280' y='130' width='60' height='90' fill='#706860'/><rect x='220' y='90' width='40' height='40' fill='#a09080'/><rect x='360' y='90' width='40' height='40' fill='#a09080'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><ellipse cx='180' cy='150' rx='60' ry='60' fill='#8a7868'/><ellipse cx='350' cy='150' rx='60' ry='60' fill='#8a7868'/><ellipse cx='520' cy='150' rx='60' ry='60' fill='#8a7868'/><circle cx='180' cy='150' r='25' fill='#706860'/><circle cx='350' cy='150' r='25' fill='#706860'/><circle cx='520' cy='150' r='25' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='100' y='50' width='500' height='160' fill='#8a7868'/><rect x='120' y='70' width='460' height='8' fill='#a09080'/><rect x='120' y='90' width='440' height='8' fill='#a09080'/><rect x='120' y='110' width='455' height='8' fill='#a09080'/><rect x='120' y='130' width='420' height='8' fill='#a09080'/><rect x='120' y='150' width='450' height='8' fill='#a09080'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Manor House Passage", "scene": "scene1", "body": "<p>You settle into the reading room of the literary magazine's offices, a cup of tea cooling beside you. The prize-winning passage is spread across the desk — three pages of dense, atmospheric prose describing an abandoned manor house.</p><p>The editor leans against the doorframe. <em>\"The judges loved this piece,\"</em> she says, <em>\"but I need you to tell me why. Count the sensory details, measure the adjective density, and explain what makes descriptive writing effective. I want numbers, not impressions.\"</em></p><p><strong>Descriptive writing</strong> uses <strong>sensory language</strong> — appealing to sight, sound, smell, touch, and taste — to create vivid images in the reader's mind. The best descriptive writers do not simply tell you a place is eerie; they make you <em>feel</em> the cold, <em>hear</em> the silence, and <em>smell</em> the damp.</p>", "factBox": {"label": "Key Concept — Sensory Language", "text": "Sensory language engages the five senses: sight, sound, smell, touch, and taste. Effective descriptive writing uses a combination of these to immerse the reader in the scene. Writers also employ figurative language (similes, metaphors, personification) and carefully chosen adjectives to build atmosphere and mood."}, "formulaBox": {"label": "Adjective Density", "formula": "Density = (Adjectives ÷ Total Words) × 100", "vars": "Measured as adjectives per 100 words"}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Sensory Details", "title": "Counting the Senses", "scene": "scene2", "body": "<p>You begin by cataloguing every sensory detail in the opening paragraph. You create five columns — one for each sense — and mark each instance as you read.</p><p>You find <strong>2 visual details</strong> (descriptions of crumbling wallpaper and dust motes in sunlight), <strong>1 auditory detail</strong> (the creak of a floorboard), <strong>1 tactile detail</strong> (the cold dampness of the air against your skin), and <strong>1 olfactory detail</strong> (the smell of rotting wood). Taste is absent from this passage.</p><p><em>\"What is the total number of sensory details in the opening paragraph?\"</em> the editor asks.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> List the sensory details by type.<br>Sight = 2 · Sound = 1 · Touch = 1 · Smell = 1 · Taste = 0</p><p><strong>Step 2:</strong> Add all categories together.<br>Total = 2 + 1 + 1 + 1 + 0</p>"}, "question": "How many sensory details appear in the opening paragraph in total?", "unit": "details", "answer": 5, "tolerance": 0, "maxAttempts": 2, "hintText": "Add up each sense: 2 (sight) + 1 (sound) + 1 (touch) + 1 (smell) + 0 (taste).", "feedbackCorrect": "Five sensory details in a single paragraph. The writer engages four of the five senses, creating an immersive experience that pulls you into the abandoned manor.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is 5. Sight (2) + Sound (1) + Touch (1) + Smell (1) = 5 sensory details.", "consequence": "<strong>The editor nods approvingly.</strong> <em>\"Five details, four senses. The writer knows that immersion comes from variety — you do not just see the manor; you hear it, feel it, smell it.\"</em>", "next": "q2", "bloomsLevel": "Apply"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Adjective Density", "title": "Measuring the Richness", "scene": "scene3", "body": "<p>Next, you measure the <strong>adjective density</strong> of the passage — how many adjectives appear per 100 words. This metric reveals how heavily the writer relies on descriptive modifiers.</p><p>The passage is <strong>300 words</strong> long and contains <strong>18 adjectives</strong>. You need to calculate the density: how many adjectives would appear if the passage were exactly 100 words long?</p><p><em>\"A density above 8 suggests rich, atmospheric prose,\"</em> the editor notes. <em>\"Below 4, and the writing feels bare. What is this passage's density?\"</em></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Identify the values.<br>Adjectives = 18 · Total words = 300</p><p><strong>Step 2:</strong> Apply the density formula.<br>Density = (18 ÷ 300) × 100</p>"}, "question": "What is the adjective density (adjectives per 100 words)?", "unit": "per 100 words", "answer": 6, "tolerance": 0, "maxAttempts": 2, "hintText": "Divide 18 by 300 and multiply by 100 to find the adjectives per 100 words.", "feedbackCorrect": "Six adjectives per 100 words. This places the passage in a moderate range — rich enough to build atmosphere without overwhelming the reader with decoration.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is 6. (18 ÷ 300) × 100 = 6 adjectives per 100 words.", "consequence": "<strong>The editor makes a note.</strong> <em>\"Six per hundred. Restrained but effective. The best descriptive writers know that every adjective must earn its place — too many, and the prose becomes cluttered.\"</em>", "next": "q3", "bloomsLevel": "Apply"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Purpose", "title": "The Purpose of Sensory Language", "scene": "scene1", "body": "<p>Your analysis is nearly complete. The sensory details are counted, the adjective density measured. Now the editor asks you to articulate the fundamental purpose of sensory language in descriptive writing.</p><p><em>\"Your review needs a clear statement about why writers use sensory language,\"</em> she says. <em>\"Not what it is — why it matters.\"</em></p><p>You reflect on the passage. The crumbling wallpaper, the creaking floorboard, the cold air — each detail served a purpose beyond mere decoration.</p>", "question": "What is the purpose of sensory language in descriptive writing?", "options": [{"text": "To increase the word count and make the writing appear more sophisticated", "correct": false}, {"text": "To create vivid images and immerse the reader in the scene by engaging their senses", "correct": true}, {"text": "To replace the need for a plot or narrative structure in the writing", "correct": false}, {"text": "To demonstrate the writer's vocabulary range for examination purposes", "correct": false}], "maxAttempts": 2, "hintText": "Think about the effect on the reader. Sensory language is not about showing off — it is about making the reader experience the scene.", "feedbackCorrect": "Sensory language creates vivid images and immerses the reader by engaging their senses. It transforms description from telling into showing — the reader does not just learn about the place; they experience it.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is: to create vivid images and immerse the reader in the scene by engaging their senses. Sensory language is about reader experience, not word count or vocabulary display.", "consequence": "<strong>The editor smiles.</strong> <em>\"Exactly. Sensory language is the difference between reading about a place and feeling as though you are standing in it. That is why this passage won the prize.\"</em>", "next": "end", "examTip": "In the exam, vary your sentence structures deliberately. Short sentences create tension; complex sentences build atmosphere.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Outstanding literary analysis. You quantified the craft of descriptive writing with precision — sensory details counted, density measured, purpose defined. The review is ready for publication.", "partial": "You grasped some elements of descriptive craft, but your analysis needed tightening in places. Return to refine your understanding of sensory language.", "retry": "The best critics revisit their analysis. Try again to achieve a perfect score."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
