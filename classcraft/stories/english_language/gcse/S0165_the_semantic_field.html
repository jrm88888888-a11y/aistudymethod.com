<script>const STORY_DATA = {"meta": {"title": "The Semantic Field: Semantic Fields", "subtitle": "A poem is hiding its meaning in clusters of related words. Can you map the semantic field?", "subject": "English Language", "topic": "Semantic Fields", "level": "GCSE", "tags": ["📝 English Language", "GCSE", "Semantic Fields", "~10 min", "3 questions"], "intro": "You have been asked to deliver a workshop on language analysis at a summer school for aspiring writers. The centrepiece is a 200-word passage from a war poem, and your task is to map its semantic field — the clusters of related words that reveal the writer's deeper meaning. Every calculation you make exposes another layer of the text's hidden architecture."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><circle cx='350' cy='130' r='80' fill='none' stroke='#8a7868' stroke-width='2'/><circle cx='280' cy='110' r='50' fill='none' stroke='#706860' stroke-width='2'/><circle cx='420' cy='110' r='50' fill='none' stroke='#706860' stroke-width='2'/><circle cx='350' cy='170' r='50' fill='none' stroke='#706860' stroke-width='2'/><circle cx='280' cy='110' r='8' fill='#8a7868'/><circle cx='420' cy='110' r='8' fill='#8a7868'/><circle cx='350' cy='170' r='8' fill='#8a7868'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='80' y='180' width='60' height='30' fill='#8a7868'/><rect x='180' y='140' width='60' height='70' fill='#8a7868'/><rect x='280' y='100' width='60' height='110' fill='#8a7868'/><rect x='380' y='120' width='60' height='90' fill='#8a7868'/><rect x='480' y='150' width='60' height='60' fill='#8a7868'/><line x1='110' y1='180' x2='210' y2='140' stroke='#706860' stroke-width='2'/><line x1='210' y1='140' x2='310' y2='100' stroke='#706860' stroke-width='2'/><line x1='310' y1='100' x2='410' y2='120' stroke='#706860' stroke-width='2'/><line x1='410' y1='120' x2='510' y2='150' stroke='#706860' stroke-width='2'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><circle cx='250' cy='130' r='70' fill='#8a7868'/><circle cx='450' cy='130' r='70' fill='#8a7868'/><ellipse cx='350' cy='130' rx='40' ry='70' fill='#706860'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Workshop Brief", "scene": "scene1", "body": "<p>You stand at the front of a bright, sun-filled classroom. Twenty students sit before you, notebooks open, pens ready. On the whiteboard behind you, you have projected a 200-word extract from a war poem — dense, dark, and heavy with meaning.</p><p><em>\"Today we are going to learn about semantic fields,\"</em> you begin. <em>\"A semantic field is a group of words in a text that are all related to the same theme or idea. When a writer fills a passage with words from the same semantic field, it creates a cumulative effect — the meaning builds, layer upon layer, until it becomes overwhelming.\"</em></p><p>You tap the board. <em>\"This passage contains words from three semantic fields: violence, nature, and death. Your job is to count them, calculate their density, and understand what the writer is doing beneath the surface.\"</em></p>", "factBox": {"label": "Key Concept — Semantic Fields", "text": "A semantic field is a set of words in a text that are related in meaning and belong to the same conceptual category. For example, sword, blood, wound, and battle all belong to the semantic field of violence. Writers use semantic fields to reinforce themes, create atmosphere, and build meaning through repetition and association."}, "formulaBox": {"label": "Calculating Percentage Density", "formula": "Density = (Semantic Words ÷ Total Words) × 100", "vars": "Semantic Words = words belonging to the identified field · Total Words = word count of the passage"}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Density", "title": "Mapping the War Field", "scene": "scene2", "body": "<p>You begin the exercise. The students have highlighted every word in the passage that belongs to the semantic field of <strong>violence</strong>. You count the highlights: <strong>12 words</strong> out of the passage's total <strong>200 words</strong> belong to this semantic field.</p><p><em>\"Now calculate the density,\"</em> you instruct the class. <em>\"What percentage of the total words belong to the semantic field of violence?\"</em></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Identify the values.<br>Semantic field words (violence) = 12 · Total words = 200</p><p><strong>Step 2:</strong> Apply the density formula.<br>Density = (12 ÷ 200) × 100</p>"}, "question": "What percentage of the passage belongs to the semantic field of violence?", "unit": "%", "answer": 6, "tolerance": 0, "maxAttempts": 2, "hintText": "Divide 12 by 200 and multiply by 100.", "feedbackCorrect": "Six percent. Roughly one in every seventeen words relates to violence — a significant concentration that creates a persistent undercurrent throughout the passage.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is 6%. (12 ÷ 200) × 100 = 6%.", "consequence": "<strong>A student raises her hand.</strong> <em>\"Six percent does not sound like much.\"</em> You smile. <em>\"But imagine reading a passage where every seventeenth word reminds you of violence. It is like a drumbeat — quiet, but relentless.\"</em>", "next": "q2", "bloomsLevel": "Apply"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Total Count", "title": "Combining the Fields", "scene": "scene3", "body": "<p>Now you ask the students to map all three semantic fields in the passage. They have already counted <strong>12 words</strong> in the field of violence. They now count <strong>8 words</strong> in the field of nature and <strong>5 words</strong> in the field of death.</p><p><em>\"What is the total number of words across all three semantic fields?\"</em> you ask.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> List the counts for each field.<br>Violence = 12 · Nature = 8 · Death = 5</p><p><strong>Step 2:</strong> Add them together.<br>Total = 12 + 8 + 5</p>"}, "question": "How many words in total belong to the three semantic fields?", "unit": "words", "answer": 25, "tolerance": 0, "maxAttempts": 2, "hintText": "Add all three counts together: 12 + 8 + 5.", "feedbackCorrect": "Twenty-five words across three semantic fields. That is one-eighth of the entire passage devoted to these interlocking themes.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is 25. Violence (12) + Nature (8) + Death (5) = 25 words total.", "consequence": "<strong>The classroom buzzes with recognition.</strong> <em>\"Twenty-five words — twelve and a half percent of the passage — form a web of violence, nature, and death. The poet is not just describing war; they are building it into the very fabric of the language.\"</em>", "next": "q3", "bloomsLevel": "Apply"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Definition", "title": "Defining the Concept", "scene": "scene1", "body": "<p>The workshop is drawing to a close. You ask the students to write a definition of the key concept they have been exploring all session.</p><p><em>\"In your own words,\"</em> you say, <em>\"what is a semantic field?\"</em></p>", "question": "What is a semantic field?", "options": [{"text": "A technique where the writer uses the same word repeatedly for emphasis", "correct": false}, {"text": "A group of words in a text that are related in meaning, belonging to the same theme or concept", "correct": true}, {"text": "The dictionary definition of a word as opposed to its connotative meaning", "correct": false}, {"text": "A paragraph in which every sentence begins with the same grammatical structure", "correct": false}], "maxAttempts": 2, "hintText": "Think about the clusters of related words you mapped in the passage. A semantic field is about words sharing a common theme.", "feedbackCorrect": "A semantic field is a group of words in a text that share a common theme or meaning. Writers use them to reinforce ideas, create atmosphere, and build layered significance.", "feedbackWrong": "A common mistake is paraphrasing the text instead of analysing it. Focus on how language creates meaning, not just what it says. The answer is: a group of words in a text that are related in meaning, belonging to the same theme or concept.", "consequence": "<strong>The student grins.</strong> <em>\"So it is like a hidden map of meaning inside the text?\"</em> You nod. <em>\"Exactly. And now you know how to read it.\"</em>", "next": "end", "examTip": "In the exam, always quote briefly from the text and explain the effect of specific word choices. Use terminology like 'connotation' and 'tone'.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Brilliant workshop delivery. You mapped semantic fields with precision, calculated densities, and defined the concept clearly. Your students leave with a powerful new analytical tool.", "partial": "You introduced semantic fields effectively, but some of your calculations or definitions needed refinement. Return to strengthen your analysis.", "retry": "The best teachers revisit their lessons. Try again to achieve a perfect score."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
