<script>const STORY_DATA = {"meta": {"title": "The Suffragette", "subtitle": "London, 1912. Women are fighting for the right to vote — and the struggle will demand sacrifice, courage, and mathematics.", "subject": "History", "topic": "Women's Suffrage Movement", "level": "KS3", "tags": ["📜 History", "KS3 · Year 7–9", "Suffragettes", "~10 min", "3 questions"], "intro": "You are a young woman in 1912 London, caught between two movements. The suffragists campaign peacefully for women's right to vote. The suffragettes use militant action — smashing windows, chaining themselves to railings, going on hunger strike. Both want the same thing: the vote. You must understand the timeline of their struggle, the numbers behind partial victory, and the crucial difference between the two movements."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='200' width='700' height='62' fill='#706860'/><rect x='100' y='80' width='500' height='120' fill='#8a7868'/><rect x='120' y='60' width='460' height='25' fill='#a09080'/><rect x='300' y='100' width='100' height='100' fill='#706860'/><rect x='140' y='110' width='40' height='40' fill='#706860'/><rect x='200' y='110' width='40' height='40' fill='#706860'/><rect x='460' y='110' width='40' height='40' fill='#706860'/><rect x='520' y='110' width='40' height='40' fill='#706860'/><polygon points='345,60 350,35 355,60' fill='#a09080'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><line x1='100' y1='130' x2='600' y2='130' stroke='#8a7868' stroke-width='3'/><circle cx='200' cy='130' r='15' fill='#8a7868'/><circle cx='400' cy='130' r='15' fill='#706860'/><line x1='200' y1='130' x2='200' y2='80' stroke='#8a7868' stroke-width='2'/><line x1='400' y1='130' x2='400' y2='80' stroke='#706860' stroke-width='2'/><rect x='170' y='60' width='60' height='20' fill='#8a7868'/><rect x='370' y='60' width='60' height='20' fill='#706860'/><circle cx='100' cy='130' r='8' fill='#b0a898'/><circle cx='600' cy='130' r='8' fill='#b0a898'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='210' width='700' height='52' fill='#706860'/><rect x='100' y='60' width='200' height='140' fill='#8a7868'/><rect x='400' y='60' width='200' height='140' fill='#706860'/><circle cx='200' cy='110' r='25' fill='#a09080'/><circle cx='500' cy='110' r='25' fill='#8a7868'/><rect x='130' y='150' width='140' height='30' fill='#706860'/><rect x='430' y='150' width='140' height='30' fill='#a09080'/><line x1='300' y1='130' x2='400' y2='130' stroke='#a09080' stroke-width='2' stroke-dasharray='6,4'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "Deeds Not Words", "scene": "scene1", "body": "<p>You stand outside the Houses of Parliament, watching a line of women march past with banners and sashes. Some carry placards demanding the vote. Others are more confrontational — their leader, Emmeline Pankhurst, has declared that <em>\"deeds, not words\"</em> will win the fight.</p><p>The campaign for women's suffrage has been building for decades. Peaceful petitions have been ignored. Now the movement has split into two branches: those who campaign within the system and those who believe only militant action will force change.</p><p>You must understand the timeline. When did women first gain the vote? When did they achieve equal voting rights? And what distinguished the two branches of the movement?</p>", "factBox": {"label": "The struggle for women's suffrage", "text": "Women in Britain campaigned for decades to win the right to vote. The Representation of the People Act 1918 gave the vote to women over 30 who met property qualifications — around 8.4 million women. Full equal suffrage came in 1928, when all women over 21 gained the vote on the same terms as men."}, "formulaBox": {"label": "Measuring the gap to equality", "formula": "Gap = Year of equal suffrage − Year of partial suffrage", "vars": "Partial suffrage (women over 30): 1918 · Equal suffrage (women over 21): 1928"}, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Women's Suffrage", "title": "The Gap", "scene": "scene2", "body": "<p>The first victory comes in <strong>1918</strong>: women over 30 who meet certain property qualifications are granted the vote. It is a partial victory — millions of younger women are still excluded. Full equal suffrage, where all women over 21 can vote on the same terms as men, arrives in <strong>1928</strong>.</p><p>How many years separated partial and full equal suffrage?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculating the gap", "steps": "<p>Partial suffrage (women over 30): <strong>1918</strong></p><p>Full equal suffrage (women over 21): <strong>1928</strong></p><p>Gap = 1928 − 1918 = <strong>? years</strong></p>"}, "question": "How many years between partial and full equal suffrage?", "unit": "years", "answer": 10, "tolerance": 0, "maxAttempts": 2, "hintText": "Subtract 1918 from 1928.", "feedbackCorrect": "10 years. A decade between the first partial victory and full equality at the ballot box. For the women who had fought so hard, every one of those ten years was a reminder that the struggle was not yet over.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The answer is 10 years. 1928 − 1918 = 10. It took a further decade after partial suffrage to achieve full voting equality.", "consequence": "<strong>Ten years.</strong> Ten years of continued campaigning after the first partial victory. The women who won the vote in 1918 knew they had not achieved equality — only women over 30 could vote, while men could vote from 21. The fight continued.", "next": "q2", "bloomsLevel": "Apply"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Women's Suffrage", "title": "The Percentage", "scene": "scene1", "body": "<p>When the 1918 Act passed, approximately <strong>8.4 million women</strong> became eligible to vote. But the total adult female population of the UK was approximately <strong>13 million</strong>. Many younger women and those who did not meet property qualifications were excluded.</p><p>What percentage of adult women were enfranchised in 1918? Round to the nearest whole number.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculating the percentage", "steps": "<p>Women who could vote: <strong>8.4 million</strong></p><p>Total adult women: <strong>13 million</strong></p><p>Percentage = (8.4 ÷ 13) × 100</p><p>8.4 ÷ 13 ≈ 0.646</p><p>0.646 × 100 ≈ <strong>?%</strong></p>"}, "question": "What percentage of adult women were enfranchised in 1918?", "unit": "%", "answer": 65, "tolerance": 2, "maxAttempts": 2, "hintText": "Divide 8.4 by 13, then multiply by 100. 8.4/13 is close to 8/12 = 2/3 ≈ 66%. The exact answer is around 65%.", "feedbackCorrect": "Approximately 65%. Nearly two-thirds of adult women could now vote — but one-third were still excluded. The 1918 Act was progress, but not equality.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The answer is approximately 65%. (8.4 ÷ 13) × 100 ≈ 64.6%, which rounds to about 65%. A significant step, but not full equality.", "consequence": "<strong>Sixty-five percent.</strong> Two in three women can now vote. But what about the other third? The young women, the working-class women without property? The 1918 Act deliberately excluded them. The fight for full equality will take another decade.", "next": "q3", "bloomsLevel": "Apply"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Women's Suffrage", "title": "The Two Movements", "scene": "scene3", "body": "<p>A journalist asks you to explain the difference between the two main branches of the suffrage movement. <em>\"Aren't they all the same?\"</em> he asks dismissively. They are not — and the distinction matters.</p><p>What was the difference between suffragists and suffragettes?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What was the difference between suffragists and suffragettes?", "options": [{"text": "Suffragists wanted votes for all women; suffragettes only wanted votes for wealthy women", "correct": false}, {"text": "Suffragists (NUWSS) used peaceful, constitutional methods; suffragettes (WSPU) used militant direct action including property destruction and hunger strikes", "correct": true}, {"text": "Suffragists were based in London; suffragettes operated only in northern industrial cities", "correct": false}, {"text": "Suffragists were men who supported women's rights; suffragettes were the women themselves", "correct": false}], "maxAttempts": 2, "hintText": "Both groups wanted the same thing — votes for women. The difference was in their methods. One group used peaceful campaigning; the other used more extreme tactics.", "feedbackCorrect": "Correct. The suffragists (NUWSS, led by Millicent Fawcett) used peaceful methods — petitions, marches, and political lobbying. The suffragettes (WSPU, led by Emmeline Pankhurst) used militant direct action — smashing windows, arson, chaining themselves to railings, and hunger strikes in prison.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The correct answer is: suffragists (NUWSS) used peaceful, constitutional methods; suffragettes (WSPU) used militant direct action including property destruction and hunger strikes. Both sought the same goal through different means.", "consequence": "<strong>You correct the journalist firmly.</strong> The two movements shared a goal but differed profoundly in tactics. Whether it was peaceful persuasion or militant action that ultimately won the vote remains one of history's great debates.", "next": "end", "examTip": "In the exam, support every point with specific factual evidence — dates, names, statistics. Explain the significance of each fact rather than just stating it.", "bloomsLevel": "Understand"}], "ending": {"perfect": "Every date recalled, every percentage calculated, every distinction understood. You grasped the full story of women's suffrage — the timeline, the partial victories, and the tactical divide that defined the movement.", "partial": "The suffrage movement was complex, and some details eluded you. Remember: 10 years between partial and full suffrage, 65% enfranchised in 1918, and the crucial difference between peaceful suffragists and militant suffragettes.", "retry": "Want to revisit the suffrage movement and perfect your understanding?"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
