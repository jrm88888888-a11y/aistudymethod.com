<script>const STORY_DATA = {"meta": {"title": "The Cultural Revolution", "subtitle": "Beijing, 1966. Chairman Mao has unleashed the Red Guards. As a teacher, you must navigate the chaos — or be consumed by it.", "subject": "History", "topic": "Mao's China", "level": "A-Level", "tags": ["📜 History", "A-Level", "Mao's China", "~12 min", "3 questions"], "intro": "You are a school teacher in Beijing in the summer of 1966. Chairman Mao Zedong has launched the Great Proletarian Cultural Revolution — a campaign to purge 'bourgeois' and 'revisionist' elements from Chinese society. Students have formed Red Guard units and are turning on their teachers, parents, and party officials. You must understand the scale, the timeline, and the ideology of this catastrophe as you try to survive it."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='190' width='400' height='60' fill='#706860'/><rect x='80' y='50' width='240' height='140' fill='#8a7868'/><rect x='100' y='30' width='200' height='25' fill='#a09080'/><rect x='120' y='70' width='40' height='80' fill='#706860'/><rect x='180' y='70' width='40' height='80' fill='#706860'/><rect x='240' y='70' width='40' height='80' fill='#706860'/><rect x='80' y='160' width='240' height='10' fill='#b0a898'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><circle cx='100' cy='100' r='40' fill='#8a7868'/><circle cx='200' cy='100' r='40' fill='#706860'/><circle cx='300' cy='100' r='40' fill='#8a7868'/><line x1='140' y1='100' x2='160' y2='100' stroke='#c8b8a8' stroke-width='2'/><line x1='240' y1='100' x2='260' y2='100' stroke='#c8b8a8' stroke-width='2'/><rect x='50' y='170' width='300' height='20' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='100' y='40' width='200' height='150' fill='#8a7868'/><rect x='120' y='60' width='60' height='60' fill='#706860'/><rect x='220' y='60' width='60' height='60' fill='#b0a898'/><rect x='120' y='130' width='160' height='40' fill='#706860'/><line x1='200' y1='40' x2='200' y2='120' stroke='#c8b8a8' stroke-width='1' stroke-dasharray='3,3'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Red Guards", "scene": "scene1", "body": "<p>In May 1966, Mao Zedong launches the <strong>Great Proletarian Cultural Revolution</strong>. His stated goal is to purge the Chinese Communist Party of 'capitalist roaders' and 'revisionists' — those he accuses of abandoning revolutionary principles. His real goal is to reassert his personal authority after the disastrous Great Leap Forward.</p><p>Students form <strong>Red Guard</strong> units. Armed with copies of the <em>Little Red Book</em> of Mao's quotations, they attack teachers, intellectuals, party officials, and anyone associated with 'old' culture. Schools and universities close. Books are burned. Temples are destroyed. People are publicly humiliated, beaten, and killed.</p><p>As a teacher, you are automatically suspect. The educated are enemies of the revolution. You must understand what is happening — in numbers — if you are to survive.</p>", "factBox": {"label": "The Cultural Revolution — 1966–1976", "text": "The Cultural Revolution lasted a full decade, though the most violent phase was 1966–1969. Mao mobilised young people against the party establishment to regain power he had lost after the Great Leap Forward famine (1958–62). The Chinese Communist Party itself later officially described the Cultural Revolution as a 'catastrophe' and 'the most severe setback' since the founding of the People's Republic."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Cultural Revolution", "title": "The Death Toll", "scene": "scene1", "body": "<p>Estimates of deaths during the Cultural Revolution vary enormously due to the difficulty of obtaining reliable data from China. Most historians estimate that between <strong>500,000</strong> and <strong>2 million</strong> people were killed during the decade of turmoil (1966–1976).</p><p>Taking the commonly cited middle estimate of <strong>1.5 million</strong> deaths over <strong>10 years</strong>, what was the average number of deaths per year?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculating annual deaths", "steps": "<p>Estimated deaths: <strong>1,500,000</strong></p><p>Duration: <strong>10 years</strong></p><p>Annual average = 1,500,000 ÷ 10 = ?</p>"}, "question": "What was the average number of Cultural Revolution deaths per year?", "unit": "per year", "answer": 150000, "tolerance": 5000, "maxAttempts": 2, "hintText": "Divide 1,500,000 by 10.", "feedbackCorrect": "150,000 per year. And this figure likely underestimates the true toll, as many deaths were never recorded. Beyond those killed directly, millions more were imprisoned, tortured, sent to labour camps, or driven to suicide.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The answer is 150,000 per year (1,500,000 ÷ 10 = 150,000). An average of over 400 people dying every day for a decade — and many historians believe the true figure is much higher.", "consequence": "<strong>One hundred and fifty thousand per year.</strong> You hear the Red Guards chanting outside your school. Colleagues have already been dragged to 'struggle sessions' — public humiliation rituals where victims are forced to confess imaginary crimes. The mathematics of survival are grim.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "The Lost Generation", "title": "The Schools Close", "scene": "scene2", "body": "<p>One of the Cultural Revolution's most devastating effects was on education. Schools and universities across China were closed for years. Students were sent to the countryside to 'learn from the peasants.' An entire generation lost their education.</p><p>These young people — known as the <strong>\"sent-down youth\"</strong> or <strong>zhiqing</strong> — numbered in the millions. They were dispatched from cities to remote rural areas where they performed manual labour, often for years.</p><p>The loss of an educated generation had consequences that lasted decades.</p>", "factBox": {"label": "The Sent-Down Youth", "text": "Between 1968 and 1980, approximately 17 million urban youth were sent to the countryside. Many spent years in rural areas, losing their education and career prospects. Some never returned to the cities. The policy created a 'lost generation' whose lack of education hampered China's development for decades."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Cultural Revolution", "title": "The Sent-Down Youth", "scene": "scene2", "body": "<p>Approximately <strong>17 million</strong> urban youth were sent to the countryside during the Cultural Revolution era. China's total urban population in the late 1960s was approximately <strong>130 million</strong>.</p><p>What percentage of the urban population was 'sent down'? Round to the nearest whole number.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculating the percentage", "steps": "<p>Sent-down youth: <strong>17 million</strong></p><p>Urban population: <strong>130 million</strong></p><p>Percentage = (17 ÷ 130) × 100 = ?</p>"}, "question": "What percentage of China's urban population was 'sent down'?", "unit": "%", "answer": 13, "tolerance": 1, "maxAttempts": 2, "hintText": "Divide 17 by 130 and multiply by 100. 17/130 ≈ 0.13.", "feedbackCorrect": "Approximately 13%. One in eight urban residents was uprooted and sent to the countryside. Virtually every urban family was affected. The social and economic consequences were felt for decades.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The answer is approximately 13% (17 ÷ 130 × 100 = 13.1%). Over one in eight urban Chinese were displaced — a social upheaval of staggering proportions.", "consequence": "<strong>Thirteen percent.</strong> One in eight. You watch as your students — the brightest and most promising — are loaded onto trucks bound for remote provinces. They will spend years planting rice and digging ditches instead of studying. China is destroying its own future.", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Assessment", "title": "After Mao", "scene": "scene3", "body": "<p>Mao died in September 1976, and the Cultural Revolution officially ended. The <strong>Gang of Four</strong> — Mao's closest radical allies, including his wife Jiang Qing — were arrested and put on trial.</p><p>In 1981, the Chinese Communist Party issued its official verdict on Mao: he was <strong>70% correct and 30% wrong</strong>. The Cultural Revolution was declared a catastrophe — but Mao's legacy was carefully managed to preserve the party's legitimacy.</p><p>For A-Level, you must engage with the historiographical debate about Mao's responsibility and the Cultural Revolution's significance.</p>", "factBox": {"label": "The 1981 Resolution", "text": "The CCP's 1981 'Resolution on Certain Questions in the History of Our Party' was a carefully crafted document. It condemned the Cultural Revolution while preserving Mao's overall legacy. This '70/30' formula allowed the party to move forward under Deng Xiaoping's reforms while maintaining ideological continuity with its revolutionary past."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Cultural Revolution", "title": "The Interpretation", "scene": "scene3", "body": "<p>An exam asks: <em>\"The Cultural Revolution was primarily a power struggle, not an ideological movement.\" How far do you agree?</em></p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Which approach best analyses the nature of the Cultural Revolution?", "options": [{"text": "Agree completely — it was purely Mao's attempt to regain personal power and had nothing to do with ideology", "correct": false}, {"text": "Disagree completely — it was purely an ideological movement to create a classless society and had nothing to do with power politics", "correct": false}, {"text": "Argue that power and ideology were inseparable — Mao used genuine ideological convictions to mobilise the masses for a power struggle, and the two elements cannot be neatly separated", "correct": true}, {"text": "Dismiss the question as unanswerable because insufficient evidence exists from inside China", "correct": false}], "maxAttempts": 2, "hintText": "The best A-Level analysis avoids false dichotomies. Can a movement be both a power struggle AND ideologically driven at the same time?", "feedbackCorrect": "Correct. Mao's desire to regain power and his ideological vision of permanent revolution were not separate motives — they reinforced each other. He genuinely believed in continuous class struggle, and he used that belief to mobilise millions against his political rivals. The best analysis recognises this interconnection.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The strongest answer argues that power and ideology were inseparable in the Cultural Revolution. Mao used genuine ideological convictions as weapons in a power struggle — the two dimensions reinforced each other.", "consequence": "<strong>You see through the false dichotomy.</strong> The Cultural Revolution was both a cynical power grab and a sincere ideological campaign — and recognising that these two things are not contradictory is the key to understanding Mao. He believed in revolution AND he wanted power. The tragedy is that millions suffered for both.", "next": "end", "examTip": "In the exam, support every point with specific factual evidence — dates, names, statistics. Explain the significance of each fact rather than just stating it.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Remarkable analysis. You calculated the human cost, understood the scale of social disruption, and navigated the complex relationship between ideology and power in Mao's China. You survived the Cultural Revolution with your analytical skills intact.", "partial": "Some gaps remain. Remember: 150,000 deaths per year, 13% of urban population sent down, and the Cultural Revolution was both a power struggle and an ideological movement simultaneously. These insights are essential for A-Level.", "retry": "Want to return to 1966 Beijing and face the Red Guards again?"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
