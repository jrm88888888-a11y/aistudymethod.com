<script>const STORY_DATA = {"meta": {"title": "The Source Problem", "subtitle": "The archive room. A historian's most powerful weapon is also their greatest vulnerability: the source.", "subject": "History", "topic": "Historical Evidence & Reliability", "level": "A-Level", "tags": ["📜 History", "A-Level", "Source Analysis", "~12 min", "3 questions"], "intro": "You are an A-Level student learning to evaluate historical sources — the fundamental skill of the historian. Using a specific case study — British government sources about the Amritsar Massacre of 1919 — you will learn to cross-examine sources for bias, provenance, reliability, and utility. The numbers behind the massacre reveal how sources can distort the truth."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='50' y='50' width='130' height='140' fill='#8a7868'/><rect x='220' y='50' width='130' height='140' fill='#8a7868'/><rect x='65' y='65' width='100' height='30' fill='#706860'/><rect x='65' y='105' width='100' height='5' fill='#a09080'/><rect x='65' y='115' width='100' height='5' fill='#a09080'/><rect x='65' y='125' width='100' height='5' fill='#a09080'/><rect x='65' y='135' width='70' height='5' fill='#a09080'/><rect x='235' y='65' width='100' height='30' fill='#b0a898'/><rect x='235' y='105' width='100' height='5' fill='#a09080'/><rect x='235' y='115' width='100' height='5' fill='#a09080'/><rect x='235' y='125' width='100' height='5' fill='#a09080'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='80' y='40' width='240' height='150' fill='#8a7868'/><rect x='100' y='60' width='200' height='40' fill='#706860'/><rect x='100' y='110' width='200' height='40' fill='#b0a898'/><line x1='200' y1='100' x2='200' y2='110' stroke='#c8b8a8' stroke-width='2'/><circle cx='150' cy='80' r='10' fill='#a09080'/><circle cx='250' cy='130' r='10' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='60' y='40' width='280' height='150' fill='#8a7868'/><rect x='80' y='60' width='80' height='50' fill='#706860'/><rect x='180' y='60' width='80' height='50' fill='#a09080'/><rect x='160' y='130' width='80' height='50' fill='#706860'/><line x1='120' y1='110' x2='200' y2='130' stroke='#c8b8a8' stroke-width='1'/><line x1='220' y1='110' x2='200' y2='130' stroke='#c8b8a8' stroke-width='1'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Massacre", "scene": "scene1", "body": "<p>On 13 April 1919, British troops under the command of Brigadier-General Reginald Dyer opened fire on an unarmed crowd gathered at <strong>Jallianwala Bagh</strong> in Amritsar, Punjab. The crowd had assembled peacefully for the Sikh festival of Baisakhi and to protest recent British repressive measures.</p><p>Dyer ordered his troops to fire without warning into the densely packed enclosure, which had few exits. The shooting continued for approximately <strong>10 minutes</strong>. The official and unofficial accounts of the death toll diverge dramatically — and this divergence is your case study in source reliability.</p><p>Two sources tell very different stories. The British government's <strong>Hunter Commission</strong> and the Indian National Congress conducted separate investigations. Comparing them reveals how the same event can be recorded very differently depending on who is doing the recording.</p>", "factBox": {"label": "Jallianwala Bagh — 13 April 1919", "text": "Jallianwala Bagh was a walled garden with only a few narrow entrances. When Dyer's troops opened fire, the crowd had almost no means of escape. Dyer later stated he would have used machine guns if he could have got them through the narrow entrance. He expressed no regret, saying his purpose was to produce a 'sufficient moral effect' across the Punjab."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Source Analysis", "title": "The Death Toll Discrepancy", "scene": "scene1", "body": "<p>The British <strong>Hunter Commission</strong> (1920) — the official government inquiry — recorded <strong>379</strong> dead. The <strong>Indian National Congress</strong> investigation estimated approximately <strong>1,000</strong> dead.</p><p>By how many deaths do the two sources differ?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculating the discrepancy", "steps": "<p>Indian National Congress estimate: <strong>1,000</strong></p><p>Hunter Commission figure: <strong>379</strong></p><p>Difference = 1,000 − 379 = ?</p>"}, "question": "By how many deaths do the two sources differ?", "unit": "deaths", "answer": 621, "tolerance": 5, "maxAttempts": 2, "hintText": "Subtract 379 from 1,000.", "feedbackCorrect": "621 deaths — a massive discrepancy. The difference between the two sources is nearly double the official British figure. This is not a minor disagreement — it reflects fundamentally different approaches to counting, verifying, and recording the dead.", "feedbackWrong": "A common mistake is taking sources at face value. Always consider who created the source, when, and for what purpose — this affects its reliability. The answer is 621 (1,000 − 379 = 621). The two sources differ by more than 600 deaths — a discrepancy that demands explanation.", "consequence": "<strong>Six hundred and twenty-one.</strong> The gap between the two figures is staggering. How can two investigations of the same event produce numbers so radically different? This is the source problem at its most acute — and understanding why the numbers differ is more important than knowing which one is 'correct.'", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Evaluating the Sources", "title": "Why the Numbers Differ", "scene": "scene2", "body": "<p>Understanding the discrepancy requires analysing each source's <strong>provenance</strong>, <strong>purpose</strong>, and <strong>limitations</strong>:</p><p>The <strong>Hunter Commission</strong> was appointed by the British government. It relied primarily on official military records and testimony from British officials. Its purpose was to investigate — but also to manage the political fallout. Many Indian witnesses were intimidated and reluctant to testify to a British inquiry. The commission counted only identified bodies.</p><p>The <strong>Indian National Congress</strong> investigation was conducted by Indian nationalists, including a young Mohandas Gandhi. It gathered testimony from Indian witnesses and survivors. Its purpose was explicitly to document British atrocity and build the case for self-rule. It included estimates of the wounded who later died.</p><p>Both sources are valuable. Neither is neutral.</p>", "factBox": {"label": "Source Analysis Framework", "text": "When evaluating any historical source, ask: (1) Provenance — who created it and when? (2) Purpose — why was it created? (3) Content — what does it say? (4) Tone — how does it say it? (5) Limitations — what might be missing or distorted? (6) Cross-reference — does other evidence support or contradict it?"}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Source Analysis", "title": "The Ammunition Count", "scene": "scene2", "body": "<p>One piece of evidence that both sources agree on is the <strong>ammunition expenditure</strong>. Dyer's troops fired <strong>1,650 rounds</strong> in approximately <strong>10 minutes</strong>. The Hunter Commission recorded 379 dead and approximately <strong>1,200 wounded</strong>.</p><p>Using the Hunter Commission's own figures, what is the total number of casualties (dead plus wounded)?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculating total casualties", "steps": "<p>Dead (Hunter Commission): <strong>379</strong></p><p>Wounded: <strong>1,200</strong></p><p>Total casualties = 379 + 1,200 = ?</p>"}, "question": "What was the total number of casualties according to the Hunter Commission?", "unit": "casualties", "answer": 1579, "tolerance": 5, "maxAttempts": 2, "hintText": "Simply add the dead and wounded: 379 + 1,200.", "feedbackCorrect": "1,579 casualties from 1,650 rounds. That means almost every bullet fired hit someone — evidence of how densely packed the crowd was and how ruthlessly the troops fired. This calculation itself is a powerful analytical tool for evaluating the source.", "feedbackWrong": "A common mistake is taking sources at face value. Always consider who created the source, when, and for what purpose — this affects its reliability. The answer is 1,579 (379 + 1,200 = 1,579). Compare this to the 1,650 rounds fired — nearly every bullet found a human target.", "consequence": "<strong>One thousand five hundred and seventy-nine casualties from 1,650 rounds.</strong> The mathematics is damning. A hit rate of over 95% means the troops were firing point-blank into a crowd so dense that missing was almost impossible. This numerical analysis — using the British government's own figures — undermines any suggestion that the shooting was measured or discriminate.", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Lesson", "title": "Using Sources Critically", "scene": "scene3", "body": "<p>The Amritsar case teaches several key lessons about source analysis:</p><p><strong>No source is neutral.</strong> Both the Hunter Commission and the Congress investigation had political purposes that shaped their findings.</p><p><strong>Numbers can be manipulated.</strong> The choice of what to count — identified bodies versus all probable deaths — can dramatically alter the recorded toll.</p><p><strong>Cross-referencing is essential.</strong> Using the ammunition count to test the casualty figures reveals inconsistencies within the official account itself.</p><p><strong>Silence is evidence.</strong> What the sources do not say — the experiences of those too terrified to testify — is as important as what they do say.</p>", "factBox": {"label": "The Legacy", "text": "The Amritsar Massacre was a turning point in Indian nationalism. It convinced many Indians — including Gandhi — that British rule could not be reformed and must be ended. The Hunter Commission's attempt to manage the narrative ultimately failed: the massacre became a symbol of colonial brutality that energised the independence movement."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Source Analysis", "title": "The Evaluation", "scene": "scene3", "body": "<p>An A-Level exam presents you with the Hunter Commission report as a source and asks: <em>\"How useful is this source for understanding the Amritsar Massacre?\"</em> Which approach demonstrates the strongest analysis?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Which approach best evaluates the Hunter Commission as a historical source?", "options": [{"text": "Dismiss it entirely as biased British propaganda that tells us nothing about what actually happened", "correct": false}, {"text": "Accept it uncritically as the official government report and therefore the most reliable account", "correct": false}, {"text": "Evaluate its utility by analysing provenance, purpose, and limitations — noting that while its bias limits its reliability as a factual account, it is highly useful as evidence of how the British government sought to frame the massacre, and its own internal data (ammunition count vs casualties) can be used to challenge its conclusions", "correct": true}, {"text": "Compare it only with the Indian National Congress source and choose whichever has the higher number as more accurate", "correct": false}], "maxAttempts": 2, "hintText": "The best source evaluation does not simply ask 'is this source reliable?' but 'what is this source useful for?' Even a biased source can be valuable — the bias itself is evidence.", "feedbackCorrect": "Correct. The strongest evaluation recognises that a source's bias does not make it useless — it makes it useful for different things. The Hunter Commission is unreliable as a neutral factual account but highly useful as evidence of British attitudes and cover-up strategies. Using its own data to challenge its conclusions is sophisticated cross-referencing.", "feedbackWrong": "A common mistake is taking sources at face value. Always consider who created the source, when, and for what purpose — this affects its reliability. The best answer evaluates the source's utility rather than simply its reliability. The Hunter Commission is useful as evidence of British framing, and its internal data can be used to challenge its own conclusions. Neither dismissing nor accepting a source uncritically is adequate at A-Level.", "consequence": "<strong>You have mastered the fundamental skill of the historian.</strong> Sources are never simply 'reliable' or 'unreliable.' They are useful for different purposes depending on how you interrogate them. A biased source is still evidence — evidence of the bias itself. The Hunter Commission tells us less about what happened at Amritsar and more about what the British government wanted the world to believe.", "next": "end", "examTip": "In the exam, evaluate sources by considering their origin, purpose, and context. State what makes the source useful AND what its limitations are.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Exceptional source analysis. You quantified the discrepancy between sources, used internal evidence to challenge official claims, and demonstrated the sophisticated evaluative skills that A-Level demands. Every source you encounter from now on should face this level of scrutiny.", "partial": "Some refinement needed. Remember: the sources differ by 621 deaths, the total casualties were 1,579 from 1,650 rounds, and the best source analysis evaluates utility rather than simply reliability. These skills are the foundation of all historical study.", "retry": "Want to return to the archive and cross-examine the sources again?"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
