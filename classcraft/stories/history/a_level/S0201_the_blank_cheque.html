<script>const STORY_DATA = {"meta": {"title": "The Blank Cheque", "subtitle": "Berlin, July 1914. Germany has pledged unconditional support to Austria-Hungary. Has this guarantee made a European war inevitable?", "subject": "History", "topic": "Origins of WW1 & Alliance Systems", "level": "A-Level", "tags": ["📜 History", "A-Level", "Origins of WW1", "~12 min", "3 questions"], "intro": "You are a diplomatic historian examining the July Crisis of 1914. On 5 July, Kaiser Wilhelm II gave Austria-Hungary a 'blank cheque' — unconditional support for whatever action it took against Serbia after the assassination of Archduke Franz Ferdinand. Your task is to assess whether this pledge made war inevitable by analysing the timeline, the alliance system, and the competing historical interpretations."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='80' y='50' width='240' height='150' fill='#8a7868'/><rect x='100' y='70' width='90' height='100' fill='#706860'/><rect x='210' y='70' width='90' height='100' fill='#a09080'/><line x1='190' y1='120' x2='210' y2='120' stroke='#c8b8a8' stroke-width='3'/><polygon points='200,50 80,50 100,70' fill='#a09080'/><polygon points='200,50 320,50 300,70' fill='#a09080'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><circle cx='100' cy='100' r='40' fill='#8a7868'/><circle cx='200' cy='100' r='40' fill='#706860'/><circle cx='300' cy='100' r='40' fill='#8a7868'/><line x1='140' y1='100' x2='160' y2='100' stroke='#c8b8a8' stroke-width='2'/><line x1='240' y1='100' x2='260' y2='100' stroke='#c8b8a8' stroke-width='2'/><circle cx='100' cy='180' r='30' fill='#706860'/><circle cx='300' cy='180' r='30' fill='#706860'/><line x1='100' y1='140' x2='100' y2='150' stroke='#b0a898' stroke-width='1'/><line x1='300' y1='140' x2='300' y2='150' stroke='#b0a898' stroke-width='1'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='50' y='40' width='300' height='150' fill='#8a7868'/><rect x='70' y='60' width='120' height='50' fill='#706860'/><rect x='210' y='60' width='120' height='50' fill='#a09080'/><rect x='70' y='130' width='120' height='50' fill='#a09080'/><rect x='210' y='130' width='120' height='50' fill='#706860'/><line x1='190' y1='85' x2='210' y2='85' stroke='#c8b8a8' stroke-width='1'/><line x1='190' y1='155' x2='210' y2='155' stroke='#c8b8a8' stroke-width='1'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The July Crisis", "scene": "scene1", "body": "<p>On 28 June 1914, Archduke Franz Ferdinand of Austria-Hungary was assassinated in Sarajevo by Gavrilo Princip, a Bosnian Serb nationalist. Austria-Hungary blamed Serbia and sought German backing before taking action.</p><p>On <strong>5 July 1914</strong>, Kaiser Wilhelm II and his chancellor Bethmann-Hollweg gave Austria-Hungary what historians call the <strong>\"blank cheque\"</strong> — an assurance of unconditional German support regardless of what Austria-Hungary decided to do.</p><p>This set in motion a chain of events. Austria-Hungary issued an ultimatum to Serbia on 23 July. Serbia's response was conciliatory but not complete. Austria-Hungary declared war on Serbia on 28 July. Within a week, the alliance system had dragged most of Europe into war.</p><p>Was the blank cheque the moment that made the Great War unavoidable?</p>", "factBox": {"label": "The Alliance System in 1914", "text": "By 1914, Europe was divided into two alliance blocs. The Triple Alliance linked Germany, Austria-Hungary, and Italy (though Italy would later switch sides). The Triple Entente connected France, Russia, and Britain. These alliances meant that a conflict between two nations could rapidly escalate into a continental war — which is exactly what happened."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — The July Crisis", "title": "The Countdown to War", "scene": "scene1", "body": "<p>The assassination of Franz Ferdinand occurred on <strong>28 June 1914</strong>. Britain — the last major power to enter the war — declared war on Germany on <strong>4 August 1914</strong> after the German invasion of Belgium.</p><p>How many days elapsed between the assassination and Britain's declaration of war?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Counting the days", "steps": "<p>28 June to 30 June = <strong>2 days</strong></p><p>July = <strong>31 days</strong></p><p>1 August to 4 August = <strong>4 days</strong></p><p>Total = 2 + 31 + 4 = ?</p>"}, "question": "How many days from the assassination to Britain's declaration of war?", "unit": "days", "answer": 37, "tolerance": 0, "maxAttempts": 2, "hintText": "Count carefully: 2 remaining days in June, all 31 days of July, then 4 days in August.", "feedbackCorrect": "37 days. Just over five weeks separated a political assassination in the Balkans from a continental war involving the world's greatest empires. The speed of the escalation shocked contemporaries and continues to fascinate historians.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The answer is 37 days. June 28 to June 30 (2 days) + July (31 days) + August 1-4 (4 days) = 37 days. Five weeks from assassination to world war.", "consequence": "<strong>Thirty-seven days.</strong> Five weeks and two days. That is all it took for one assassination to become a world war. The blank cheque was issued on day seven. The ultimatum to Serbia on day twenty-five. Each step in the chain seemed logical to those taking it — yet together they led to catastrophe.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "The Alliance Chain", "title": "The Dominos Fall", "scene": "scene2", "body": "<p>The sequence of events after the blank cheque reveals how the alliance system transformed a regional crisis into a world war:</p><p>Austria-Hungary declared war on Serbia (28 July). Russia mobilised in support of Serbia (30 July). Germany demanded Russia stop mobilising (31 July). Russia refused. Germany declared war on Russia (1 August) and then on France (3 August). Germany invaded Belgium to attack France, bringing Britain into the war (4 August).</p><p>Historian Fritz Fischer argued in 1961 that Germany deliberately engineered the war, using the blank cheque to provoke a conflict it wanted. Other historians disagree, arguing that all powers shared responsibility. The numbers of nations involved tell their own story.</p>", "factBox": {"label": "The Fischer Thesis (1961)", "text": "German historian Fritz Fischer argued in 'Griff nach der Weltmacht' (Germany's Aims in the First World War) that Germany bore primary responsibility for WW1, having deliberately used the July Crisis to launch a war of aggression for territorial expansion. This thesis was hugely controversial in Germany and sparked a major historiographical debate that continues to this day."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — The July Crisis", "title": "The Nations at War", "scene": "scene2", "body": "<p>By the time the war ended in November 1918, a total of <strong>32</strong> nations had been drawn into the conflict on the Allied side or joined later (including the USA in 1917). The Central Powers consisted of <strong>4</strong> nations: Germany, Austria-Hungary, the Ottoman Empire, and Bulgaria.</p><p>How many nations in total were involved in World War One?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Adding the combatants", "steps": "<p>Allied and associated powers: <strong>32</strong></p><p>Central Powers: <strong>4</strong></p><p>Total = ?</p>"}, "question": "How many nations in total fought in World War One?", "unit": "nations", "answer": 36, "tolerance": 2, "maxAttempts": 2, "hintText": "Simply add the Allied nations to the Central Powers nations: 32 + 4.", "feedbackCorrect": "Approximately 36 nations. What began as a dispute between Austria-Hungary and Serbia ultimately involved nations from every inhabited continent. The alliance system, colonial obligations, and strategic interests drew the entire world into the conflict.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The answer is 36 nations (32 Allied + 4 Central Powers). A crisis between two Balkan nations engulfed the entire world.", "consequence": "<strong>Thirty-six nations.</strong> From a quarrel between Austria-Hungary and Serbia to a war involving six continents. The blank cheque was one link in a chain — but it was a crucial one. Without German backing, would Austria-Hungary have dared to push Serbia so hard? Without the ultimatum, would Russia have mobilised? Each domino fell because the one before it had already toppled.", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Historiographical Debate", "title": "Who Was Responsible?", "scene": "scene3", "body": "<p>The question of responsibility for World War One has generated one of the longest-running debates in modern historiography. At A-Level, you are expected to engage with competing interpretations:</p><p><strong>Fischer (1961)</strong>: Germany planned the war and used the blank cheque deliberately to provoke it.</p><p><strong>Clark (2012)</strong>: All powers were 'sleepwalkers' who stumbled into war through miscalculation rather than deliberate planning.</p><p><strong>McMeekin (2011)</strong>: Russia bears significant responsibility for the rapid escalation through its early mobilisation.</p><p>Your final question tests whether you can distinguish between these interpretive frameworks.</p>", "factBox": {"label": "The War Guilt Clause", "text": "Article 231 of the Treaty of Versailles (1919) — the 'War Guilt Clause' — placed sole responsibility for the war on Germany and its allies. This clause was deeply resented in Germany and contributed to the rise of Nazism. Modern historians generally reject the idea of sole German guilt, though they disagree about how responsibility should be distributed."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — The July Crisis", "title": "The Interpretation", "scene": "scene3", "body": "<p>An exam question asks you to evaluate the following statement: <em>\"The blank cheque made World War One inevitable.\"</em> Which of the following responses best demonstrates A-Level historical analysis?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Which response best demonstrates A-Level analysis of the blank cheque's role?", "options": [{"text": "The blank cheque was entirely responsible for WW1 because without it Austria-Hungary would never have acted against Serbia", "correct": false}, {"text": "The blank cheque was a significant escalatory factor, but the war resulted from multiple causes including the alliance system, imperial rivalries, militarism, and miscalculation by several powers — its importance is debated by historians such as Fischer, Clark, and McMeekin", "correct": true}, {"text": "The blank cheque was irrelevant because the alliance system made war inevitable regardless of any individual decision", "correct": false}, {"text": "The blank cheque proves that Kaiser Wilhelm II personally planned and started World War One as an act of deliberate aggression", "correct": false}], "maxAttempts": 2, "hintText": "A-Level answers should engage with multiple interpretations, acknowledge complexity, and avoid single-cause explanations. Which answer does this?", "feedbackCorrect": "Correct. The best A-Level analysis recognises the blank cheque as a significant factor while placing it within the broader context of structural causes and competing historiographical interpretations. Single-cause explanations are too simplistic for A-Level work.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The best answer acknowledges the blank cheque as significant while engaging with multiple causes and competing historians' interpretations. A-Level history requires nuanced, multi-causal analysis — not single-factor explanations.", "consequence": "<strong>You have demonstrated the analytical skill that A-Level demands.</strong> The blank cheque mattered — but it mattered within a web of alliances, rivalries, and miscalculations. Fischer blamed Germany, Clark blamed everyone, McMeekin pointed at Russia. The truth likely lies in the complex interaction of all these factors. History rarely has a single cause.", "next": "end", "examTip": "In the exam, support every point with specific factual evidence — dates, names, statistics. Explain the significance of each fact rather than just stating it.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Outstanding historiographical analysis. You traced the timeline from assassination to world war, counted the nations drawn in, and demonstrated the nuanced multi-causal thinking that A-Level demands. The examiners would be impressed.", "partial": "Your analysis needs refinement. Remember: 37 days from assassination to British entry, 36 nations eventually involved, and A-Level analysis requires engaging with multiple historians and avoiding single-cause explanations.", "retry": "Want to re-examine the July Crisis with fresh eyes?"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
