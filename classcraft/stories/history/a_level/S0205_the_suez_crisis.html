<script>const STORY_DATA = {"meta": {"title": "The Suez Crisis", "subtitle": "Downing Street, October 1956. Eden plans a secret invasion. You must advise: is Suez worth the risk?", "subject": "History", "topic": "Decline of British Power", "level": "A-Level", "tags": ["📜 History", "A-Level", "Suez Crisis", "~12 min", "3 questions"], "intro": "You are a Foreign Office adviser to Prime Minister Anthony Eden in October 1956. Egyptian President Gamal Abdel Nasser has nationalised the Suez Canal. Eden, comparing Nasser to Hitler and Mussolini, is planning a secret military intervention in collusion with France and Israel. You must assess the strategic, economic, and political dimensions of this fateful decision."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='180' width='400' height='70' fill='#706860'/><rect x='180' y='30' width='40' height='150' fill='#8a7868'/><rect x='150' y='80' width='100' height='20' fill='#a09080'/><polygon points='170,30 200,10 230,30' fill='#a09080'/><rect x='50' y='140' width='80' height='40' fill='#8a7868'/><rect x='270' y='140' width='80' height='40' fill='#8a7868'/><ellipse cx='200' cy='200' rx='150' ry='15' fill='#a09080'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='170' y='40' width='60' height='160' fill='#8a7868'/><line x1='200' y1='40' x2='200' y2='200' stroke='#706860' stroke-width='2'/><rect x='50' y='80' width='100' height='80' fill='#706860'/><rect x='250' y='80' width='100' height='80' fill='#706860'/><polygon points='150,120 170,110 170,130' fill='#c8b8a8'/><polygon points='250,120 230,110 230,130' fill='#c8b8a8'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='60' y='50' width='280' height='140' fill='#8a7868'/><circle cx='140' cy='120' r='40' fill='#706860'/><circle cx='260' cy='120' r='40' fill='#a09080'/><line x1='180' y1='120' x2='220' y2='120' stroke='#c8b8a8' stroke-width='2' stroke-dasharray='5,5'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Nationalisation", "scene": "scene1", "body": "<p>On 26 July 1956, President Nasser of Egypt nationalises the Suez Canal Company — seizing control of the waterway that connects the Mediterranean to the Red Sea and the Indian Ocean beyond. For Britain, this is an economic and imperial crisis.</p><p>The canal is a vital artery for British trade, especially oil from the Persian Gulf. Britain and France are the canal's largest shareholders. Eden views Nasser as a dictator who must be stopped, just as Hitler should have been stopped in the 1930s.</p><p>In secret, Britain, France, and Israel concoct a plan: Israel will invade Egypt, and Britain and France will intervene as 'peacekeepers' to 'separate' the combatants — while actually seizing the canal. It is a conspiracy that will define the end of British imperial power.</p>", "factBox": {"label": "The Suez Canal", "text": "The Suez Canal was opened in 1869 and was 120 miles long, connecting Port Said on the Mediterranean to Suez on the Red Sea. In 1955, approximately 14,666 ships passed through the canal. Britain had purchased a 44% share in the canal company in 1875 under Disraeli. The canal was the lifeline of the British Empire's eastern trade routes."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Suez Crisis", "title": "The Oil Dependency", "scene": "scene1", "body": "<p>In 1955, approximately <strong>two-thirds</strong> of Western Europe's oil passed through the Suez Canal. Britain imported approximately <strong>70 million tons</strong> of oil annually, and about <strong>60%</strong> of that came through Suez.</p><p>How many million tons of Britain's annual oil imports passed through the Suez Canal?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculating oil through Suez", "steps": "<p>Total British oil imports: <strong>70 million tons</strong></p><p>Percentage through Suez: <strong>60%</strong></p><p>Through Suez = 70 × 0.60 = ?</p>"}, "question": "How many million tons of British oil imports came through Suez annually?", "unit": "million tons", "answer": 42, "tolerance": 1, "maxAttempts": 2, "hintText": "Calculate 60% of 70: 70 × 0.6 = ?", "feedbackCorrect": "42 million tons. Britain's dependence on Suez for oil was enormous — losing control of the canal threatened to cripple the British economy. This economic vulnerability was Eden's strongest argument for intervention.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The answer is 42 million tons (70 × 0.60 = 42). Britain's massive oil dependency on the Suez route made the nationalisation feel like an existential threat.", "consequence": "<strong>Forty-two million tons.</strong> The numbers are stark. Without Suez, Britain's oil supply — and therefore its economy, transport, and military capability — is critically vulnerable. Eden uses this figure to justify intervention. But the question is whether military force is the right response in the era of the United Nations and superpower diplomacy.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "The Invasion", "title": "Operation Musketeer", "scene": "scene2", "body": "<p>On 29 October 1956, Israel invades the Sinai Peninsula as planned. On 31 October, Britain and France issue an ultimatum demanding both sides withdraw from the canal zone — knowing Egypt cannot comply. Anglo-French forces bomb Egyptian airfields and paratroopers land at Port Said on 5 November.</p><p>Militarily, the operation succeeds. But politically, it is a disaster. The United States — not consulted about the invasion — is furious. President Eisenhower threatens to crash the pound sterling by selling America's reserves of British currency. The Soviet Union makes vague nuclear threats. The United Nations demands a ceasefire.</p><p>Within days, Britain is forced into a humiliating withdrawal.</p>", "factBox": {"label": "The American Response", "text": "Eisenhower was enraged that Britain had acted without consulting the US. He refused to support a UN resolution defending Britain, and the US Treasury threatened to withhold emergency loans to support the pound. This financial pressure — not military defeat — forced Britain to withdraw. It was a brutal demonstration of where real power now lay."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Suez Crisis", "title": "The Sterling Crisis", "scene": "scene2", "body": "<p>During the Suez Crisis, Britain lost approximately <strong>$279 million</strong> from its gold and dollar reserves in November 1956 alone. Britain's total reserves at the start of the crisis were approximately <strong>$2.2 billion</strong>.</p><p>What percentage of Britain's reserves were lost in just one month? Round to the nearest whole number.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Calculating the loss", "steps": "<p>Lost in November: <strong>$279 million</strong></p><p>Total reserves: <strong>$2,200 million</strong></p><p>Percentage = (279 ÷ 2,200) × 100 = ?</p>"}, "question": "What percentage of Britain's reserves were lost in November 1956?", "unit": "%", "answer": 13, "tolerance": 1, "maxAttempts": 2, "hintText": "Divide 279 by 2,200 and multiply by 100. 279/2200 ≈ 0.127.", "feedbackCorrect": "Approximately 13%. Losing an eighth of your foreign reserves in a single month was catastrophic. The pound was under severe pressure, and without American support, Britain faced a full currency crisis. Financial reality, not military failure, ended the Suez adventure.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The answer is approximately 13% (279 ÷ 2,200 × 100 = 12.7%). Britain was haemorrhaging reserves at a rate that threatened national bankruptcy.", "consequence": "<strong>Thirteen percent in a single month.</strong> The financial haemorrhage is unsustainable. Chancellor Harold Macmillan — who had initially supported the invasion — now tells Eden that Britain must withdraw or face economic ruin. America holds the financial weapon that no bombs can answer. The age of British imperial power is over.", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Aftermath", "title": "The End of Empire", "scene": "scene3", "body": "<p>Eden resigns in January 1957, broken by the crisis. Macmillan succeeds him and immediately begins rebuilding the American relationship. The lesson is clear: Britain can no longer act as an independent great power without American support.</p><p>Suez accelerates decolonisation. In 1960, Macmillan delivers his <strong>\"Wind of Change\"</strong> speech, acknowledging that the age of empire is over. Over the next decade, Britain grants independence to most of its remaining colonies.</p><p>Historians debate whether Suez caused the decline of British power or merely revealed a decline that had already occurred.</p>", "factBox": {"label": "Suez and Decolonisation", "text": "After Suez, British decolonisation accelerated dramatically. Ghana became independent in 1957, followed by Nigeria, Kenya, Tanzania, and many others in the 1960s. By 1970, the British Empire had largely ceased to exist. Suez did not cause this process — wartime exhaustion and nationalist movements were the deeper causes — but it removed any illusion that Britain could resist it."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Suez Crisis", "title": "The Significance", "scene": "scene3", "body": "<p>An A-Level question asks: <em>\"Suez was the moment Britain ceased to be a great power.\" How far do you agree?</em></p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Which analysis best evaluates Suez as a turning point in British power?", "options": [{"text": "Agree completely — Suez single-handedly ended British power and caused decolonisation", "correct": false}, {"text": "Disagree completely — Suez was a minor incident with no lasting significance for British global influence", "correct": false}, {"text": "Argue that Suez revealed rather than caused British decline — it exposed the reality that Britain's great power status had already been undermined by WW2, economic weakness, and American dominance, while accelerating processes like decolonisation that were already underway", "correct": true}, {"text": "Argue that Suez strengthened British power by demonstrating military capability, even though the withdrawal was forced", "correct": false}], "maxAttempts": 2, "hintText": "The best A-Level analysis distinguishes between causes and symptoms. Did Suez cause British decline, or did it reveal a decline that already existed?", "feedbackCorrect": "Correct. Suez was a symptom more than a cause. Britain's great power status had been fatally weakened by two world wars, enormous debts, and the rise of the superpowers. Suez did not end British power — it exposed the fact that British power had already ended. The distinction between cause and catalyst is crucial for A-Level analysis.", "feedbackWrong": "A common mistake is making general statements without specific evidence. Always support your points with precise dates, names, facts, or quotations from sources. The best answer argues that Suez revealed rather than caused British decline. Britain's power had already been undermined by WW2, debt, and the rise of the superpowers. Suez was the moment the illusion was shattered — a catalyst, not a cause.", "consequence": "<strong>You understand the distinction between cause and catalyst.</strong> Suez did not end British power — the Second World War did that. But Suez stripped away the last illusions. After 1956, Britain could no longer pretend to be an independent great power. The future lay in alignment with America and, eventually, Europe.", "next": "end", "examTip": "In the exam, support every point with specific factual evidence — dates, names, statistics. Explain the significance of each fact rather than just stating it.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Outstanding analysis. You understood the economic dependency on Suez, the financial crisis that forced withdrawal, and the crucial distinction between Suez as cause versus catalyst of British decline. The Foreign Office would value your clarity.", "partial": "Some areas need work. Remember: 42 million tons of oil through Suez, 13% of reserves lost in one month, and Suez revealed rather than caused British decline. These facts and distinctions are essential for A-Level success.", "retry": "Want to return to Downing Street and reassess the Suez decision?"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
