stroke='#c8b8a8' stroke-width='2' stroke-dasharray='5,5'/><rect x='60' y='160' width='280' height='40' fill='#8a7868'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "Signs and Symbols", "scene": "scene1", "body": "<p>Your A-Level critical essay requires semiotic analysis — reading an artwork as a system of <strong>signs</strong>. Your tutor, Dr Okonkwo, explains: <em>\"Semiotics, founded by Ferdinand de Saussure and Charles Sanders Peirce, studies how meaning is created and communicated through signs.\"</em></p><p>In semiotics, a <strong>sign</strong> consists of two parts: the <strong>signifier</strong> (the physical form — what you see, hear or read) and the <strong>signified</strong> (the concept or meaning it represents). A red rose (signifier) might signify love (signified).</p><p>Peirce identified three types of signs: <strong>icons</strong> (resemble what they represent), <strong>indexes</strong> (have a direct connection to what they represent), and <strong>symbols</strong> (have an arbitrary, culturally learned meaning).</p>", "factBox": {"label": "Peirce's Three Sign Types", "text": "Icon: resembles its referent (a portrait resembles the person). Index: has a causal or physical connection (smoke is an index of fire). Symbol: meaning is arbitrary and culturally agreed (a dove symbolises peace by convention, not by resemblance). Most artworks contain all three types of signs working together."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Semiotics", "title": "Counting Sign Types", "scene": "scene1", "body": "<p>Dr Okonkwo shows you an artwork containing these elements: a <strong>realistic portrait</strong> (icon), <strong>tears on the face</strong> (index of sadness), a <strong>crown</strong> (symbol of power), <strong>chains</strong> (index of captivity), a <strong>dove</strong> (symbol of peace), and a <strong>mirror reflection</strong> (icon).</p><p><em>\"How many of these six elements are symbols — signs whose meaning is culturally agreed rather than based on resemblance or direct connection?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Classify each element:</p><p>Portrait → icon (resembles). Tears → index (caused by). Crown → symbol (cultural). Chains → index (connected to). Dove → symbol (cultural). Mirror → icon (resembles).</p><p>Count the symbols.</p>"}, "question": "How many of the six elements are symbols?", "unit": "symbols", "answer": 2, "tolerance": 0, "maxAttempts": 2, "hintText": "Symbols have culturally agreed meanings (not based on resemblance or physical connection). Which elements are understood by convention?", "feedbackCorrect": "2 symbols — the crown and the dove. Their meanings are culturally constructed, not based on physical resemblance or causal connection.", "feedbackWrong": "A common mistake is describing what you see without analysing how and why the artist made those choices. Focus on the effect of techniques, not just identifying them. The answer is 2. The crown (power) and dove (peace) are symbols — their meanings are culturally agreed conventions, not based on resemblance (icon) or physical connection (index).", "consequence": "<strong>You annotate your essay with precision.</strong> Two symbols identified and classified — your semiotic vocabulary is sharp.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Deeper Reading", "title": "Denotation and Connotation", "scene": "scene2", "body": "<p>Dr Okonkwo introduces the next layer of semiotic analysis: <strong>denotation</strong> and <strong>connotation</strong>, concepts developed by Roland Barthes.</p><p><strong>Denotation</strong> is the literal, surface-level meaning of a sign — what it simply shows. <strong>Connotation</strong> is the deeper, culturally influenced meaning — what it suggests or implies.</p><p>For example, a photograph of a red door: denotation = a door painted red; connotation = danger, passion, warning, or (in Chinese culture) good fortune.</p>", "factBox": {"label": "Barthes' Orders of Signification", "text": "First order (denotation): the literal, descriptive level. What does the image show? Second order (connotation): the associative, cultural level. What does it suggest? Third order (myth): the ideological level. What cultural beliefs or values does it reinforce? Barthes argued that connotations are never neutral — they always serve particular cultural or political purposes."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Semiotics", "title": "Layers of Meaning", "scene": "scene2", "body": "<p>Dr Okonkwo asks you to analyse a single image — a black-and-white photograph of an empty chair in a spotlight. She identifies <strong>1 denotative meaning</strong> (an empty chair), <strong>3 connotative meanings</strong> (absence, loss, waiting), and <strong>1 mythic meaning</strong> (the cultural belief that emptiness signifies something lost).</p><p><em>\"How many total layers of meaning have we identified across all three orders of signification?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Denotative meanings: 1</p><p>Connotative meanings: 3</p><p>Mythic meanings: 1</p><p>Total = 1 + 3 + 1 = ?</p>"}, "question": "How many total layers of meaning are identified?", "unit": "layers", "answer": 5, "tolerance": 0, "maxAttempts": 2, "hintText": "Add up all the meanings across the three orders: 1 + 3 + 1.", "feedbackCorrect": "5 layers of meaning from a single image — that's the power of semiotic analysis. One photograph, five distinct readings.", "feedbackWrong": "A common mistake is describing what you see without analysing how and why the artist made those choices. Focus on the effect of techniques, not just identifying them. The answer is 5. Denotation (1) + connotation (3) + myth (1) = 5 total layers of meaning.", "consequence": "<strong>Your essay demonstrates sophisticated multi-layered reading.</strong> Dr Okonkwo marks it as university-level analysis.", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "Critical Application", "title": "Applying to Art", "scene": "scene3", "body": "<p>The final section of your essay applies semiotic theory to a specific artwork. Dr Okonkwo asks you to identify which semiotic concept is most useful for analysing how artworks communicate meaning to different cultures.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Semiotics", "title": "Cultural Codes", "scene": "scene3", "body": "<p>Dr Okonkwo asks: <em>\"Why might the same artwork be interpreted differently by viewers from different cultures?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Why do different cultures interpret the same artwork differently?", "options": [{"text": "Because some cultures have better eyesight than others", "correct": false}, {"text": "Because connotations and symbols are culturally constructed — different cultures assign different meanings to the same signs", "correct": true}, {"text": "Because denotation changes depending on who is looking at the artwork", "correct": false}, {"text": "Because artworks only have one correct interpretation that some cultures get wrong", "correct": false}], "maxAttempts": 2, "hintText": "Think about the second order of signification — connotation. Are connotative meanings universal or culturally specific?", "feedbackCorrect": "Connotations are culturally constructed. A white dress denotes a garment but connotes purity in Western weddings and mourning in some East Asian cultures. Semiotic analysis reveals these culturally specific readings.", "feedbackWrong": "A common mistake is describing what you see without analysing how and why the artist made those choices. Focus on the effect of techniques, not just identifying them. The correct answer is that connotations and symbols are culturally constructed. The same sign can carry entirely different meanings in different cultural contexts — this is a fundamental principle of semiotics.", "consequence": "<strong>Your essay concludes with a nuanced discussion of cultural coding.</strong> Dr Okonkwo writes in the margin: <em>\"Exceptional semiotic analysis — this demonstrates genuine critical thinking.\"</em>", "next": "end", "examTip": "In the exam, analyse artworks using the four frames: subjective, structural, cultural, and postmodern. Support your analysis with specific visual evidence.", "bloomsLevel": "Evaluate"}], "ending": {"title": "The Semiotics", "perfect": "Rigorous semiotic analysis, Rowan. Your classification of sign types, multi-layered reading, and understanding of cultural coding demonstrate the critical sophistication A-Level examiners seek.", "partial": "Your semiotic analysis shows good engagement with theory, though some classifications and concepts needed refining. Keep practising with Peirce and Barthes.", "retry": "Want to try the semiotic analysis again?", "topic": "Semiotics in Art"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
