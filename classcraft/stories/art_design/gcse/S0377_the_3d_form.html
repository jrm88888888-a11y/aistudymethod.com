<script>const STORY_DATA = {"meta": {"title": "The 3D Form", "subtitle": "A sculpture project demands understanding of form, structure and material. Calculate dimensions and choose construction methods.", "subject": "Art & Design", "topic": "3D Construction & Sculpture", "level": "GCSE", "tags": ["🎨 Art & Design", "GCSE", "3D Sculpture", "~10 min", "3 questions"], "intro": "You are Oscar, building a wire and plaster sculpture for your GCSE 3D project. The brief says 'Natural Forms' — you've chosen to create a larger-than-life seed pod. You must calculate material quantities, understand structural armatures, and select the right construction method."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><ellipse cx='200' cy='125' rx='100' ry='60' fill='none' stroke='#706860' stroke-width='2'/><line x1='100' y1='125' x2='300' y2='125' stroke='#8a7868' stroke-width='1'/><line x1='200' y1='65' x2='200' y2='185' stroke='#8a7868' stroke-width='1'/><ellipse cx='200' cy='125' rx='100' ry='60' fill='none' stroke='#a09080' stroke-width='1' stroke-dasharray='4,4' transform='rotate(45,200,125)'/><ellipse cx='200' cy='125' rx='100' ry='60' fill='none' stroke='#a09080' stroke-width='1' stroke-dasharray='4,4' transform='rotate(90,200,125)'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><ellipse cx='200' cy='140' rx='80' ry='50' fill='#8a7868'/><ellipse cx='200' cy='140' rx='80' ry='50' fill='none' stroke='#c8b8a8' stroke-width='1'/><line x1='120' y1='140' x2='280' y2='140' stroke='#b0a898' stroke-width='1' stroke-dasharray='3,3'/><ellipse cx='200' cy='130' rx='70' ry='40' fill='#b0a898' opacity='0.4'/><rect x='180' y='60' width='40' height='80' fill='none' stroke='#706860' stroke-width='1' stroke-dasharray='4,4'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='50' y='180' width='300' height='40' fill='#706860'/><ellipse cx='200' cy='120' rx='90' ry='55' fill='#8a7868'/><ellipse cx='200' cy='115' rx='80' ry='45' fill='#a09080'/><line x1='160' y1='90' x2='240' y2='90' stroke='#c8b8a8' stroke-width='1'/><line x1='150' y1='110' x2='250' y2='110' stroke='#c8b8a8' stroke-width='1'/><line x1='155' y1='130' x2='245' y2='130' stroke='#c8b8a8' stroke-width='1'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Seed Pod Sculpture", "scene": "scene1", "body": "<p>The 3D workshop is set up with wire, plaster bandage, mod-roc and tools. Your teacher, Mrs Park, explains: <em>\"Every sculpture needs an armature — an internal skeleton that supports the external form. For organic shapes, chicken wire bent over a frame works well.\"</em></p><p>Your seed pod sculpture will be <strong>40 cm long, 25 cm wide and 20 cm tall</strong>. You need to calculate material quantities and understand how 3D form differs from 2D shape.</p><p><strong>Form</strong> is the three-dimensional equivalent of shape — it has height, width and depth. Sculptures occupy real space and can be viewed from multiple angles, unlike 2D artworks.</p>", "factBox": {"label": "3D Construction Methods", "text": "Additive: building up material (clay modelling, plaster application). Subtractive: removing material (carving stone or wood). Constructive: assembling separate pieces (welding, joining). Casting: pouring liquid material into a mould. Most GCSE 3D work uses additive or constructive methods with wire armatures, mod-roc, plaster, clay or card."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — 3D Construction", "title": "Wire Length", "scene": "scene1", "body": "<p>Your armature needs <strong>3 wire hoops</strong> that wrap around the seed pod form. Each hoop follows the elliptical cross-section which has a circumference of approximately <strong>70 cm</strong>.</p><p>You also need <strong>2 lengthwise wires</strong> running from end to end, each <strong>50 cm long</strong> (including extra for bending).</p><p><em>\"What is the total length of wire needed for the armature?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Wire for hoops = 3 × 70 cm = 210 cm</p><p>Wire for lengthwise = 2 × 50 cm = 100 cm</p><p>Total = 210 + 100 = ?</p>"}, "question": "What total length of wire is needed?", "unit": "cm", "answer": 310, "tolerance": 0, "maxAttempts": 2, "hintText": "Add the hoop wire (3 × 70) to the lengthwise wire (2 × 50).", "feedbackCorrect": "310 cm of wire — just over 3 metres. You cut the lengths and begin bending the armature into shape.", "feedbackWrong": "A common mistake is describing what you see without analysing how and why the artist made those choices. Focus on the effect of techniques, not just identifying them. The answer is 310 cm. Hoops: 3 × 70 = 210. Lengthwise: 2 × 50 = 100. Total: 210 + 100 = 310 cm.", "consequence": "<strong>You measure and cut 310 cm of wire.</strong> The armature takes shape — three hoops crossed by two spines, forming the skeleton of the seed pod.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Building Up", "title": "Applying Mod-Roc", "scene": "scene2", "body": "<p>With the wire armature complete, you wrap it in chicken wire mesh for surface coverage, then apply <strong>mod-roc</strong> (plaster-impregnated bandage) over the top. The mod-roc is dipped in water, draped over the mesh, and smoothed into place.</p><p>Mrs Park explains: <em>\"Apply at least 3 layers of mod-roc for structural strength. Each layer should dry before the next is applied. The surface can then be sanded, painted or left white.\"</em></p><p>You need to estimate how many strips of mod-roc are needed.</p>", "factBox": {"label": "Mod-Roc Properties", "text": "Mod-roc (modroc) is plaster of Paris impregnated into gauze bandage. When dipped in warm water, it becomes pliable and adhesive. It sets hard in 5–10 minutes and fully cures in 24 hours. Multiple layers increase structural strength. The surface can be sanded smooth or left textured. It's non-toxic and ideal for GCSE 3D work."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — 3D Construction", "title": "Mod-Roc Strips", "scene": "scene2", "body": "<p>Each strip of mod-roc covers approximately <strong>50 cm²</strong> of surface area. The total surface area of your seed pod is approximately <strong>3,000 cm²</strong>. You need <strong>3 layers</strong> for strength.</p><p><em>\"How many total strips of mod-roc do you need?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Strips per layer = surface area ÷ coverage per strip</p><p>= 3000 ÷ 50 = 60 strips per layer</p><p>Total = 60 × 3 layers = ?</p>"}, "question": "How many total mod-roc strips are needed for 3 layers?", "unit": "strips", "answer": 180, "tolerance": 0, "maxAttempts": 2, "hintText": "First find strips per layer (3000 ÷ 50), then multiply by 3 layers.", "feedbackCorrect": "180 strips — a methodical, layered build-up. Each strip overlaps the last, creating a strong, seamless shell.", "feedbackWrong": "A common mistake is describing what you see without analysing how and why the artist made those choices. Focus on the effect of techniques, not just identifying them. The answer is 180. Strips per layer = 3000 ÷ 50 = 60. Total = 60 × 3 = 180 strips.", "consequence": "<strong>One hundred and eighty strips later, the seed pod is solid and sculptural.</strong> Three layers of mod-roc create a rigid shell around the wire armature. Mrs Park tests it — strong as bone.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Finishing", "title": "Surface Treatment", "scene": "scene3", "body": "<p>The sculpture is structurally complete. Now you must decide on the surface treatment. Mrs Park explains the options: leave it white (minimal), paint it (to add colour and detail), or add textural elements (sand, tissue, found materials).</p><p>She asks about the fundamental difference between 2D and 3D work that should influence your finishing decisions.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — 3D Construction", "title": "Form vs Shape", "scene": "scene3", "body": "<p>Mrs Park asks: <em>\"What is the key difference between form and shape in art terminology?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "What is the key difference between form and shape?", "options": [{"text": "Shape is 3D and form is 2D — shape has depth while form is flat", "correct": false}, {"text": "Form is 3D (has height, width and depth) while shape is 2D (has only height and width)", "correct": true}, {"text": "There is no difference — form and shape mean the same thing", "correct": false}, {"text": "Form refers only to geometric objects while shape refers only to organic objects", "correct": false}], "maxAttempts": 2, "hintText": "Think about dimensions: a circle is a 2D _____, while a sphere is a 3D _____.", "feedbackCorrect": "Form is three-dimensional (height, width, depth) while shape is two-dimensional (height, width only). Your seed pod is a form — it occupies real space and can be viewed from all angles.", "feedbackWrong": "A common mistake is describing what you see without analysing how and why the artist made those choices. Focus on the effect of techniques, not just identifying them. The correct answer is: form is 3D (height, width, depth) and shape is 2D (height, width). A circle is a shape; a sphere is a form.", "consequence": "<strong>You finish the seed pod with a subtle earth-tone wash.</strong> The form sits on its plinth — organic, tactile, three-dimensional. Mrs Park calls it the strongest 3D piece in the class.", "next": "end", "examTip": "In the exam, analyse artworks using the four frames: subjective, structural, cultural, and postmodern. Support your analysis with specific visual evidence.", "bloomsLevel": "Analyse"}], "ending": {"title": "The 3D Form", "perfect": "Sculptural excellence, Oscar. Your wire calculations, mod-roc planning, and understanding of form versus shape produced a seed pod sculpture that demonstrates real 3D craftsmanship.", "partial": "Your sculpture shows good construction skills, though some material calculations and terminology needed refining. Keep building in 3D — it's the best way to learn.", "retry": "Want to try the sculpture project again?", "topic": "3D Construction & Sculpture"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
