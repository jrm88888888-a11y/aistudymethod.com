<script>const STORY_DATA = {"meta": {"title": "The Colour Mix", "subtitle": "A mural project is fading fast. Only your understanding of colour theory can restore it before the gallery opens.", "subject": "Art & Design", "topic": "Colour Theory", "level": "KS3", "tags": ["🎨 Art & Design", "KS3 · Year 7–9", "Colour Theory", "~10 min", "3 questions"], "intro": "You are Mika, a young artist chosen to restore a community mural. The original painter mixed every colour from just three primaries, but rain has washed sections away. You must understand how primary, secondary and tertiary colours work to remix the right hues before the unveiling tonight."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='30' y='30' width='340' height='180' fill='#8a7868'/><circle cx='120' cy='100' r='35' fill='#a09080'/><circle cx='200' cy='100' r='35' fill='#706860'/><circle cx='280' cy='100' r='35' fill='#c8b8a8'/><rect x='80' y='160' width='60' height='30' fill='#706860'/><rect x='170' y='160' width='60' height='30' fill='#a09080'/><rect x='260' y='160' width='60' height='30' fill='#8a7868'/><rect x='30' y='210' width='340' height='10' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='50' y='20' width='300' height='200' fill='#8a7868'/><circle cx='140' cy='90' r='40' fill='#b0a898' opacity='0.7'/><circle cx='200' cy='90' r='40' fill='#706860' opacity='0.7'/><circle cx='170' cy='130' r='40' fill='#c8b8a8' opacity='0.7'/><ellipse cx='170' cy='105' rx='20' ry='15' fill='#a09080'/><rect x='250' y='70' width='80' height='120' fill='#706860'/><rect x='260' y='80' width='60' height='15' fill='#b0a898'/><rect x='260' y='105' width='60' height='15' fill='#a09080'/><rect x='260' y='130' width='60' height='15' fill='#c8b8a8'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='20' y='40' width='360' height='170' fill='#c8b8a8'/><circle cx='80' cy='100' r='25' fill='#a09080'/><circle cx='160' cy='100' r='25' fill='#706860'/><circle cx='240' cy='100' r='25' fill='#8a7868'/><circle cx='320' cy='100' r='25' fill='#b0a898'/><circle cx='120' cy='160' r='20' fill='#706860'/><circle cx='200' cy='160' r='20' fill='#a09080'/><circle cx='280' cy='160' r='20' fill='#8a7868'/><rect x='20' y='210' width='360' height='5' fill='#706860'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Faded Mural", "scene": "scene1", "body": "<p>The community centre mural stretches twelve metres across the wall, but entire sections have been bleached by months of rain. The gallery director meets you at the door: <em>\"Mika, we have six hours. The paints are in the back — but they're only primaries. You'll need to mix everything else.\"</em></p><p>You examine the damage. Three large panels need restoring: one in orange, one in green, one in violet. The original artist left notes about the <strong>colour wheel</strong> — a system that shows how all colours relate to one another.</p><p>The <strong>three primary colours</strong> — red, blue and yellow — cannot be made by mixing. But every other colour on the wheel can be created from combinations of these three.</p>", "factBox": {"label": "The Colour Wheel", "text": "Primary colours (red, blue, yellow) mix in pairs to create secondary colours: red + yellow = orange, blue + yellow = green, red + blue = violet. Tertiary colours are made by mixing a primary with an adjacent secondary. There are 3 primaries, 3 secondaries, and 6 tertiaries on a standard 12-part colour wheel."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Colour Theory", "title": "Counting Secondaries", "scene": "scene2", "body": "<p>You set out the three primary paint pots: red, blue and yellow. The notes say that each <strong>secondary colour</strong> is made by mixing exactly two different primaries together in equal parts.</p><p>Before you start mixing, you need to plan. <strong>How many unique secondary colours can you create</strong> by pairing two different primaries?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>List all possible pairs of primaries:</p><p>Red + Blue, Red + Yellow, Blue + Yellow</p><p>Count them up — how many unique pairs is that?</p>"}, "question": "How many secondary colours can be mixed from three primaries?", "unit": "colours", "answer": 3, "tolerance": 0, "maxAttempts": 2, "hintText": "Each pair of primaries gives one secondary. How many ways can you pick 2 items from 3?", "feedbackCorrect": "Exactly 3 secondary colours: orange (red+yellow), green (blue+yellow), and violet (red+blue). You reach for the first pair of pots.", "feedbackWrong": "A common mistake is describing what you see without analysing how and why the artist made those choices. Focus on the effect of techniques, not just identifying them. The answer is 3. The three pairs are: red+yellow = orange, red+blue = violet, blue+yellow = green.", "consequence": "<strong>Three secondaries mixed and ready.</strong> You line up the orange, green and violet pots beside the primaries. The palette is growing.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "The Restoration Continues", "title": "Tertiary Tones", "scene": "scene2", "body": "<p>With the three secondary colours mixed, you turn to the finer details. The mural's sky uses a <strong>blue-green</strong> wash, and the sunset border is <strong>red-orange</strong>. These are <strong>tertiary colours</strong> — made by mixing a primary with the secondary next to it on the colour wheel.</p><p>You consult the artist's original colour chart. On a standard 12-part colour wheel, there are 6 tertiary colours, each named with both its parent colours: yellow-orange, red-orange, red-violet, blue-violet, blue-green, and yellow-green.</p><p>Now the director calls over with another challenge — working out the <strong>tonal value</strong> of the background.</p>", "factBox": {"label": "Tonal Value", "text": "Tonal value measures how light or dark a colour appears, on a scale from 1 (lightest) to 10 (darkest). Artists use tonal contrast to create depth and focal points. A high-contrast piece might jump from value 2 to value 9, while a low-contrast piece stays within a narrow range."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Colour Theory", "title": "The Tonal Range", "scene": "scene3", "body": "<p>The original mural notes describe the background as having a <strong>lightest tone of value 2</strong> and a <strong>darkest tone of value 8</strong> on a 1–10 tonal scale.</p><p>The director asks: <em>\"What's the tonal range of the background? I need to know how much contrast we're dealing with.\"</em></p><p>The <strong>tonal range</strong> is simply the difference between the darkest and lightest tonal values used.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p><strong>Tonal range = darkest value − lightest value</strong></p><p>Darkest = 8, Lightest = 2</p><p>Range = 8 − 2 = ?</p>"}, "question": "What is the tonal range of the background?", "unit": "", "answer": 6, "tolerance": 0, "maxAttempts": 2, "hintText": "Subtract the lightest value from the darkest: 8 minus 2.", "feedbackCorrect": "A tonal range of 6 — that's a strong contrast, giving the mural real depth and drama.", "feedbackWrong": "A common mistake is describing what you see without analysing how and why the artist made those choices. Focus on the effect of techniques, not just identifying them. The answer is 6. Tonal range = darkest − lightest = 8 − 2 = 6.", "consequence": "<strong>You mix the tones carefully.</stro e from the other two primaries. Blue's complement = red + yellow = ?", "feedbackCorrect": "Orange is the complement of blue. Placed side by side, they create maximum vibrance — exactly what the mural's centrepiece needs.", "feedbackWrong": "A common mistake is describing what you see without analysing how and why the artist made those choices. Focus on the effect of techniques, not just identifying them. The correct answer is orange. Blue's complement is made from the other two primaries: red + yellow = orange. They sit opposite on the colour wheel.", "consequence": "<strong>The sun blazes in orange against the deep blue sky.</strong> The volunteer gasps — the contrast is stunning. The mural looks better than the original.", "next": "end", "examTip": "In the exam, use formal art analysis vocabulary — discuss how the artist uses the elements of art (line, tone, colour, form, texture) to create meaning.", "bloomsLevel": "Understand"}], "ending": {"title": "The Colour Mix", "perfect": "Masterful work, Mika. Your command of colour theory — primaries, secondaries, tonal values and complementary pairs — restored the mural to its full glory. The gallery opening is a triumph.", "partial": "The mural is restored, though some colour choices needed a second attempt. Review the colour wheel relationships and you'll mix with confidence next time.", "retry": "Want to try restoring the mural again with perfect colour mixing?", "topic": "Colour Theory"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
