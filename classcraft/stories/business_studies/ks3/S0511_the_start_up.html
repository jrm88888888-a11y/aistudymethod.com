<script>const STORY_DATA = {"meta": {"title": "The Start-Up", "subtitle": "A new business is born in the heart of the city. Can you steer it towards its objectives?", "subject": "Business Studies", "topic": "Business Objectives", "level": "KS3", "tags": ["💼 Business Studies", "KS3 · Year 7–9", "Business Objectives", "~10 min", "3 questions"], "intro": "You are Ava Chen, a young entrepreneur launching a street-food stall. Your savings are limited, your rivals are fierce, and the local market only has room for the bold. Every business needs clear objectives — survival, profit, growth. Can you set the right targets and hit them?"}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='190' width='400' height='60' fill='#706860'/><rect x='50' y='100' width='120' height='90' fill='#8a7868'/><rect x='60' y='80' width='100' height='25' fill='#a09080'/><rect x='70' y='120' width='30' height='40' fill='#706860'/><rect x='110' y='120' width='30' height='40' fill='#706860'/><rect x='220' y='120' width='80' height='70' fill='#8a7868'/><rect x='230' y='105' width='60' height='20' fill='#a09080'/><rect x='240' y='135' width='20' height='25' fill='#706860'/><rect x='270' y='135' width='20' height='25' fill='#706860'/><circle cx='340' cy='70' r='25' fill='#c8b8a8'/><rect x='310' y='170' width='60' height='20' fill='#a09080'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='80' y='60' width='240' height='140' fill='#8a7868'/><rect x='100' y='45' width='200' height='20' fill='#b0a898'/><rect x='120' y='90' width='40' height='50' fill='#706860'/><rect x='180' y='90' width='40' height='50' fill='#706860'/><rect x='240' y='90' width='40' height='50' fill='#706860'/><rect x='130' y='160' width='140' height='30' fill='#b0a898'/><circle cx='200' cy='170' r='8' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><rect x='50' y='180' width='40' height='30' fill='#8a7868'/><rect x='110' y='150' width='40' height='60' fill='#8a7868'/><rect x='170' y='120' width='40' height='90' fill='#8a7868'/><rect x='230' y='90' width='40' height='120' fill='#8a7868'/><rect x='290' y='60' width='40' height='150' fill='#a09080'/><line x1='70' y1='180' x2='310' y2='60' stroke='#706860' stroke-width='2' stroke-dasharray='6,4'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Big Idea", "scene": "scene1", "body": "<p>The morning sun hits the high street as you unlock your new stall for the very first time. <strong>Ava's Kitchen</strong> — specialising in handmade dumplings — is open for business.</p><p>But a business without objectives is like a ship without a compass. You need to decide: what are you aiming for? In the first year, most businesses focus on <strong>survival</strong> — simply covering their costs. After that, the goal shifts to <strong>profit</strong>, and eventually <strong>growth</strong>.</p><p>Your mentor, Mr Kapoor, hands you a notebook. <em>\"Write down your numbers, Ava. If you can't measure it, you can't manage it.\"</em></p>", "factBox": {"label": "Business Objectives", "text": "Common business objectives include: survival (covering costs to stay open), profit maximisation (earning as much profit as possible), growth (expanding the business), and market share (capturing a bigger slice of the market). In the early stages, survival is usually the priority."}, "formulaBox": {"label": "Profit formula", "formula": "Profit = Total Revenue − Total Costs", "vars": "Revenue = price × quantity sold · Costs = fixed + variable"}, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Bu ", "text": "The break-even point is where total revenue equals total costs — the business makes neither a profit nor a loss. Selling above break-even means profit; selling below means a loss."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Business Objectives", "title": "The Break-Even Target", "scene": "scene3", "body": "<p>With the second stall, Ava's total weekly costs rise to <strong>£680</strong>. She still sells each dumpling for <strong>£3</strong>. She needs to sell at least <strong>enough dumplings to cover £680</strong>.</p><p>Mr Kapoor taps his calculator: <em>\"How many dumplings must you sell per week to break even? Remember — if your costs are covered, your variable cost per dumpling is already baked into that £680 figure. Revenue per dumpling is £3.\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Break-even quantity = Total Costs ÷ Price per unit</p><p>= £680 ÷ £3</p><p>Round up to the nearest whole dumpling (you can't sell a fraction!).</p>"}, "question": "How many dumplings must Ava sell to break even?", "unit": "dumplings", "answer": 227, "tolerance": 0, "maxAttempts": 2, "hintText": "£680 ÷ £3 = 226.67. Since you can't sell part of a dumpling, round up to the next whole number.", "feedbackCorrect": "227 dumplings exactly — because 226 would leave her just short. Rounding up ensures every penny of cost is covered.", "feedbackWrong": "A common mistake is making general business statements without applying them to the specific case study scenario. Always use the data given. The answer is 227. £680 ÷ £3 = 226.67, rounded up to 227. You must always round up to cover all costs.", "consequence": "<strong>227 dumplings per week across two stalls.</strong> That's roughly 33 per day. Ava grabs her recipe book — time to scale up production.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Story Continues", "title": "The Stakeholder Question", "scene": "scene1", "body": "<p>Business is booming. But growth brings new pressures. The local council wants Ava to reduce packaging waste. Her employees want higher wages. Her customers want lower prices. Mr Kapoor reminds her: <em>\"Every business has stakeholders — people with an interest in what you do. And they don't always agree.\"</em></p><p>Ava must understand which objective matters most right now.</p>", "factBox": {"label": "Stakeholders & Objectives", "text": "Stakeholders include owners, employees, customers, suppliers, the local community, and government. Each group may want different things — higher profits vs higher wages vs lower prices. A good business balances these competing interests."}, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Business Objectives", "title": "The Objective Dilemma", "scene": "scene3", "body": "<p>Ava's business is now six months old and profitable. She has £2,000 in savings from the business. The council is pressuring her to switch to eco-friendly packaging (costing an extra £50/week), her staff want a pay rise, and a rival stall has just opened nearby.</p><p>Mr Kapoor asks: <em>\"For a small business facing new competition, which objective should take priority right now?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Which business objective should Ava prioritise given new competition?", "options": [{"text": "Profit maximisation — focus only on cutting costs as low as possible", "correct": false}, {"text": "Survival — ensure the business can compete and keep covering its costs", "correct": true}, {"text": "Market share — immediately open five more stalls across the city", "correct": false}, {"text": "Social objective — spend all savings on eco-friendly packaging immediately", "correct": false}], "maxAttempts": 2, "hintText": "When a new competitor appears, the immediate threat is to your sales. What objective focuses on staying in business?", "feedbackCorrect": "With a new rival, survival comes first. Ava must ensure she retains enough customers to cover costs before pursuing growth or social goals.", "feedbackWrong": "A common mistake is making general business statements without applying them to the specific case study scenario. Always use the data given. The correct answer is survival. When competition increases, a small business must first ensure it can keep trading before chasing other objectives.", "consequence": "<strong>Ava refocuses on survival.</strong> She tweaks her menu, improves quality, and builds customer loyalty. The rival stall struggles — Ava's Kitchen endures.", "next": "end", "examTip": "In the exam, structure your answer with clear business reasoning: point, explanation, application to the case study, evaluation of alternatives.", "bloomsLevel": "Understand"}], "ending": {"title": "The Start-Up", "perfect": "Outstanding business acumen, Ava! You understood survival, calculated profit and break-even, and made smart strategic choices. Your stall is thriving.", "partial": "Ava's Kitchen survived, but some calculations need polishing. Review profit, break-even, and business objectives — then try the mission again.", "retry": "Want to relaunch Ava's Kitchen and aim for a perfect score?", "topic": "Business Objectives"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
