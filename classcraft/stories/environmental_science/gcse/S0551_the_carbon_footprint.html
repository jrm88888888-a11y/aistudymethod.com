<script>const STORY_DATA = {"meta": {"title": "The Carbon Footprint", "subtitle": "Every product has a hidden climate cost. Calculate the full life cycle emissions before the audit deadline.", "subject": "Environmental Science", "topic": "Life Cycle Assessment", "level": "GCSE", "tags": ["🌍 Environmental Science", "GCSE · Year 10–11", "Life Cycle Assessment", "~10 min", "3 questions"], "intro": "You are a sustainability analyst at GreenMetrics, hired by a clothing company to perform a life cycle assessment (LCA) on their bestselling cotton t-shirt. The board wants to know the total carbon footprint — from raw cotton in the field to the shirt on the shelf — before they publish their sustainability report."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='190' width='400' height='60' fill='#706860'/><rect x='30' y='100' width='70' height='90' fill='#8a7868'/><rect x='45' y='130' width='15' height='25' fill='#706860'/><rect x='70' y='130' width='15' height='25' fill='#706860'/><rect x='50' y='80' width='30' height='10' fill='#706860'/><circle cx='65' cy='70' r='8' fill='#c8b8a8'/><rect x='160' y='110' width='80' height='80' fill='#a09080'/><rect x='175' y='135' width='20' height='30' fill='#706860'/><rect x='205' y='135' width='20' height='30' fill='#706860'/><rect x='300' y='120' width='70' height='70' fill='#8a7868'/><rect x='315' y='140' width='20' height='25' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><line x1='60' y1='80' x2='60' y2='180' stroke='#8a7868' stroke-width='2'/><line x1='60' y1='180' x2='340' y2='180' stroke='#8a7868' stroke-width='2'/><rect x='80' y='100' width='50' height='80' fill='#8a7868'/><rect x='150' y='120' width='50' height='60' fill='#706860'/><rect x='220' y='90' width='50' height='90' fill='#8a7868'/><rect x='290' y='140' width='50' height='40' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><circle cx='100' cy='120' r='40' fill='#a09080'/><circle cx='200' cy='120' r='40' fill='#8a7868'/><circle cx='300' cy='120' r='40' fill='#a09080'/><line x1='140' y1='120' x2='160' y2='120' stroke='#706860' stroke-width='3'/><line x1='240' y1='120' x2='260' y2='120' stroke='#706860' stroke-width='3'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "Cradle to Shelf", "scene": "scene1", "body": "<p>The clothing company's boardroom is tense. Consumers are demanding transparency on environmental impact. A <strong>Life Cycle Assessment (LCA)</strong> tracks the environmental cost of a product from raw material extraction ('cradle') through manufacturing, transport, use, and disposal ('grave').</p><p>Your LCA will focus on <strong>carbon footprint</strong> — the total greenhouse gas emissions, measured in kg CO₂ equivalent (kg CO₂e), at every stage of the t-shirt's life.</p><p>The stages: growing cotton, manufacturing fabric, dyeing, sewing, and transporting the finished product.</p>", "factBox": {"label": "Life Cycle Assessment", "text": "An LCA evaluates environmental impacts across a product's entire life: raw material extraction, manufacturing, distribution, use, and end-of-life disposal or recycling. Carbon footprint is one metric; others include water use, energy consumption, and waste generation. LCAs help identify which stage causes the most damage."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Life Cycle Assessment", "title": "Total Emissions", "scene": "scene2", "body": "<p>Your research identifies the following CO₂ emissions for one t-shirt:</p><p>• Cotton farming: <strong>2.1 kg CO₂ sing sea freight over air freight can all reduce the footprint."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Life Cycle Assessment", "title": "Annual Carbon Cost", "scene": "scene2", "body": "<p>Each t-shirt produces <strong>7 kg CO₂e</strong>. The company makes <strong>500,000 t-shirts</strong> per year.</p><p>What are the <strong>total annual emissions</strong> from t-shirt production, in tonnes? (1 tonne = 1,000 kg)</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Total kg = 7 × 500,000 = 3,500,000 kg</p><p>Convert to tonnes: 3,500,000 ÷ 1,000 = ?</p>"}, "question": "What are the total annual emissions in tonnes CO₂e?", "unit": "tonnes CO₂e", "answer": 3500, "tolerance": 0, "maxAttempts": 2, "hintText": "7 × 500,000 = 3,500,000 kg. Divide by 1,000 to convert to tonnes.", "feedbackCorrect": "3,500 tonnes of CO₂e per year — just from one product line. That's equivalent to about 700 return flights from London to New York.", "feedbackWrong": "A common mistake is making sweeping statements without evidence. Use specific data, percentages, or examples to support environmental arguments. The answer is 3,500 tonnes. 7 × 500,000 = 3,500,000 kg = 3,500 tonnes CO₂e per year.", "consequence": "<strong>Three thousand five hundred tonnes annually.</strong> The sustainability director immediately asks about reduction strategies. Your LCA has identified manufacturing as the hotspot.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Final Challenge", "title": "The Reduction Strategy", "scene": "scene1", "body": "<p>The board wants to reduce their carbon footprint by targeting the highest-impact stage. Your LCA data clearly shows where to focus — but they want you to confirm which stage offers the greatest opportunity.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Life Cycle Assessment", "title": "The Hotspot", "scene": "scene3", "body": "<p>The CEO asks: <em>\"Based on your LCA, which stage of the t-shirt's life cycle should we prioritise for emission reductions?\"</em></p><p>Recall the breakdown: cotton farming (2.1 kg), manufacturing & dyeing (3.8 kg), transport (0.9 kg), packaging (0.2 kg).</p>", "question": "Which stage should be prioritised for carbon footprint reduction?", "options": [{"text": "Retail packaging (0.2 kg CO₂e)", "correct": false}, {"text": "Transport by ship and truck (0.9 kg CO₂e)", "correct": false}, {"text": "Manufacturing and dyeing (3.8 kg CO₂e)", "correct": true}, {"text": "All stages contribute equally and should be treated the same", "correct": false}], "maxAttempts": 2, "hintText": "Look at the numbers. Which stage produces the most CO₂e per t-shirt?", "feedbackCorrect": "Correct. Manufacturing and dyeing at 3.8 kg CO₂e is the largest contributor — over half the total footprint. Switching to renewable energy in factories or using low-impact dyes would have the greatest effect.", "feedbackWrong": "A common mistake is making sweeping statements without evidence. Use specific data, percentages, or examples to support environmental arguments. The answer is manufacturing and dyeing (3.8 kg CO₂e). It's the largest single contributor, so improving this stage offers the biggest reduction opportunity.", "consequence": "<strong>The board commits to renewable-powered manufacturing.</strong> Your LCA has given them the data to act strategically rather than guessing. The sustainability report will show a clear path forward.", "next": "end", "examTip": "In the exam, support environmental arguments with specific data — percentages, quantities, dates. Evaluate solutions by considering effectiveness, cost, and feasibility.", "bloomsLevel": "Analyse"}], "ending": {"title": "The Carbon Footprint", "perfect": "Exceptional LCA work. You calculated the full cradle-to-shelf footprint, scaled it to annual production, and identified the reduction hotspot. Data-driven sustainability at its finest.", "partial": "Good work on the life cycle assessment. Some calculations need refining, but you understand how LCA identifies environmental hotspots across a product's life.", "retry": "Want to run the life cycle assessment again with sharper numbers?", "topic": "Life Cycle Assessment"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
