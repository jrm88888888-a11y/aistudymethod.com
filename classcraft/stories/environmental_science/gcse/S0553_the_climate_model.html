<script>const STORY_DATA = {"meta": {"title": "The Climate Model", "subtitle": "The evidence is mounting. Analyse the data and calculate the warming trend.", "subject": "Environmental Science", "topic": "Climate Change Evidence", "level": "GCSE", "tags": ["🌍 Environmental Science", "GCSE · Year 10–11", "Climate Change", "~10 min", "3 questions"], "intro": "You are a climate data analyst at the Met Office. Global temperature records from the past 150 years are on your desk. The government needs a clear summary: how much has the planet warmed, what's the trend, and what's driving it? Your analysis will inform national policy."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='40' y='50' width='320' height='140' fill='#a09080'/><line x1='40' y1='190' x2='360' y2='190' stroke='#8a7868' stroke-width='2'/><line x1='40' y1='50' x2='40' y2='190' stroke='#8a7868' stroke-width='2'/><line x1='60' y1='170' x2='120' y2='165' stroke='#706860' stroke-width='2'/><line x1='120' y1='165' x2='180' y2='155' stroke='#706860' stroke-width='2'/><line x1='180' y1='155' x2='240' y2='130' stroke='#706860' stroke-width='2'/><line x1='240' y1='130' x2='300' y2='100' stroke='#706860' stroke-width='2'/><line x1='300' y1='100' x2='350' y2='80' stroke='#706860' stroke-width='2'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><rect x='50' y='60' width='300' height='140' fill='#b0a898'/><rect x='70' y='80' width='40' height='100' fill='#8a7868'/><rect x='130' y='90' width='40' height='90' fill='#706860'/><rect x='190' y='75' width='40' height='105' fill='#8a7868'/><rect x='250' y='65' width='40' height='115' fill='#706860'/><rect x='310' y='70' width='30' height='110' fill='#8a7868'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><circle cx='200' cy='120' r='70' fill='#a09080'/><circle cx='200' cy='120' r='50' fill='#8a7868'/><circle cx='200' cy='120' r='30' fill='#706860'/><line x1='130' y1='40' x2='150' y2='70' stroke='#c8b8a8' stroke-width='2'/><line x1='270' y1='40' x2='250' y2='70' stroke='#c8b8a8' stroke-width='2'/><line x1='200' y1='190' x2='200' y2='210' stroke='#c8b8a8' stroke-width='2' stroke-dasharray='4,3'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Warming Record", "scene": "scene1", "body": "<p>Your screen fills with data: global mean surface temperature records stretching back to 1870. The trend is unmistakable — a clear upward curve, steepening sharply after 1950.</p><p>The evidence for climate change comes from multiple sources: <strong>temperature records</strong>, <strong>ice core data</strong> showing CO₂ levels over millennia, <strong>retreating glaciers</strong>, <strong>rising sea levels</strong>, and <strong>shifting seasons</strong>. Together, they paint a consistent picture of a warming planet.</p><p>Your task: quantify the warming, link it to CO₂, and present the evidence to policymakers.</p>", "factBox": {"label": "Climate Change Evidence", "text": "Key evidence includes: global mean temperature has risen ~1.1°C since pre-industrial times; atmospheric CO₂ has increased from ~280 ppm to over 420 ppm; Arctic sea ice has declined by ~40% since 1979; global sea level has risen ~20 cm since 1900; glaciers worldwide are retreating. Ice core records show CO₂ and temperature have been closely linked for at least 800,000 years."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Climate Evidence", "title": "The Temperature Rise", "scene": "scene1", "body": "<p>Your dataset shows that the global mean temperature in 1900 was <strong>13.7°C</strong>. In 2020, it was <strong>14.9°C</strong>.</p><p>What is the <strong>temperature increase</strong> over this 120-year period?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Increase = <strong>final temperature − initial temperature</strong></p><p>= 14.9 − 13.7</p><p>= ?</p>"}, "question": "What is the temperature increase from 1900 to 2020?", "unit": "°C", "answer": 1.2, "tolerance": 0.1, "maxAttempts": 2, "hintText": "14.9 − 13.7: subtract the tenths first (9 − 7 = 2), then the units (14 − 13 = 1).", "feedbackCorrect": "1.2°C of warming over 120 years. It sounds small, but this is a global average — enough to drive sea level rise, intensify storms, and shift climate zones.", "feedbackWrong": "A common mistake is making sweeping statements without evidence. Use specific data, percentages, or examples to support environmental arguments. The answer is 1.2°C. 14.9 − 13.7 = 1.2°C of global warming over 120 years.", "consequence": "<strong>1.2 degrees — a planetary fever.</strong> The Paris Agreement aims to limit warming to 1.5°C above pre-industrial levels. We're already dangerously close.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "The Investigation Continues", "title": "The CO₂ Connection", "scene": "scene2", "body": "<p>You overlay CO₂ concentration data onto the temperature graph. The correlation is striking: as CO₂ rises, temperature follows. Ice core data from Antarctica confirms this relationship extends back 800,000 years.</p><p>Pre-industrial CO₂ was about 280 ppm. Today it exceeds 420 ppm — a 50% increase, almost entirely from burning fossil fuels.</p>", "factBox": {"label": "The Greenhouse Effect", "text": "CO₂, methane, and other greenhouse gases absorb infrared radiation emitted by Earth's surface and re-radiate it in all directions, warming the atmosphere. This natural greenhouse effect keeps Earth habitable (~15°C vs ~-18°C without it). But human emissions have enhanced this effect, trapping more heat and causing global warming."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Climate Evidence", "title": "CO₂ Increase", "scene": "scene2", "body": "<p>Atmospheric CO₂ has risen from a pre-industrial level of <strong>280 ppm</strong> to the current level of <strong>420 ppm</strong>.</p><p>What is the <strong>percentage increase</strong> in CO₂ concentration?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Increase = 420 − 280 = <strong>140 ppm</strong></p><p>Percentage increase = (increase ÷ original) × 100</p><p>= (140 ÷ 280) × 100 = ?</p>"}, "question": "What is the percentage increase in atmospheric CO₂?", "unit": "%", "answer": 50, "tolerance": 1, "maxAttempts": 2, "hintText": "140 ÷ 280 = 0.5. Multiply by 100 to get the percentage.", "feedbackCorrect": "50% increase in CO₂. A 50% rise in a key greenhouse gas over just 200 years — an eyeblink in geological terms — is unprecedented in the ice core record.", "feedbackWrong": "A common mistake is making sweeping statements without evidence. Use specific data, percentages, or examples to support environmental arguments. The answer is 50%. (420 − 280) ÷ 280 × 100 = 140 ÷ 280 × 100 = 50% increase.", "consequence": "<strong>A fifty percent increase in atmospheric CO₂.</strong> The last time concentrations were this high was over 3 million years ago, when sea levels were metres higher than today.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Final Challenge", "title": "The Policy Briefing", "scene": "scene3", "body": "<p>You present your analysis to the Environment Secretary. The graphs are clear: temperature is rising, CO₂ is the driver, and the trend is accelerating. One critical question remains.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Climate Evidence", "title": "The Primary Driver", "scene": "scene1", "body": "<p>The Secretary asks: <em>\"What is the primary human activity driving the increase in atmospheric CO₂?\"</em></p>", "question": "What is the main human cause of rising atmospheric CO₂?", "options": [{"text": "Deforestation of tropical rainforests", "correct": false}, {"text": "Burning fossil fuels (coal, oil, and natural gas)", "correct": true}, {"text": "Agriculture and livestock farming", "correct": false}, {"text": "Industrial production of cement", "correct": false}], "maxAttempts": 2, "hintText": "While deforestation and agriculture contribute, one activity dominates global CO₂ emissions — the combustion of what fuels our power stations, vehicles, and factories?", "feedbackCorrect": "Correct. Burning fossil fuels accounts for roughly 75% of global CO₂ emissions. Coal, oil, and gas combustion release carbon that was stored underground for millions of years.", "feedbackWrong": "A common mistake is making sweeping statements without evidence. Use specific data, percentages, or examples to support environmental arguments. The answer is burning fossil fuels. While deforestation, agriculture, and cement production all contribute, fossil fuel combustion is by far the largest source of CO₂ emissions.", "consequence": "<strong>The Secretary commits to accelerated decarbonisation targets.</strong> Your data analysis has provided the evidence base for policy action. The numbers speak for themselves.", "next": "end", "examTip": "In the exam, support environmental arguments with specific data — percentages, quantities, dates. Evaluate solutions by considering effectiveness, cost, and feasibility.", "bloomsLevel": "Analyse"}], "ending": {"title": "The Climate Model", "perfect": "Outstanding climate analysis. You quantified the warming, calculated the CO₂ rise, and identified the primary driver. Clear data, clear conclusions, clear call to action.", "partial": "Good climate data analysis. Some calculations need tightening, but you understand the core evidence linking fossil fuel emissions to global warming.", "retry": "Want to analyse the climate data again with more precision?", "topic": "Climate Change Evidence"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
