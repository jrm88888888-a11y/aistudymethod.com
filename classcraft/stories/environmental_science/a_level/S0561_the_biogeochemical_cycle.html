<script>const STORY_DATA = {"meta": {"title": "The Biogeochemical Cycle", "subtitle": "Nitrogen flows through air, soil, and water — but human activity has doubled the natural flux. Quantify the disruption.", "subject": "Environmental Science", "topic": "Nitrogen Cycle & Disruption", "level": "A-Level", "tags": ["🌍 Environmental Science", "A-Level · Year 12–13", "Nitrogen Cycle", "~10 min", "3 questions"], "intro": "You are a biogeochemist investigating how human nitrogen inputs have disrupted the global nitrogen cycle. The Haber process, fertiliser runoff, and fossil fuel combustion have doubled the rate at which reactive nitrogen enters the biosphere. You must calculate the anthropogenic nitrogen flux and assess its environmental consequences."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='180' width='400' height='70' fill='#706860'/><rect x='0' y='150' width='400' height='30' fill='#8a7868'/><circle cx='80' cy='100' r='15' fill='#a09080'/><circle cx='200' cy='80' r='20' fill='#a09080'/><circle cx='320' cy='90' r='18' fill='#a09080'/><line x1='80' y1='115' x2='80' y2='150' stroke='#706860' stroke-width='2' stroke-dasharray='4,3'/><line x1='200' y1='100' x2='200' y2='150' stroke='#706860' stroke-width='2' stroke-dasharray='4,3'/><line x1='320' y1='108' x2='320' y2='150' stroke='#706860' stroke-width='2' stroke-dasharray='4,3'/><circle cx='80' cy='165' r='5' fill='#c8b8a8'/><circle cx='200' cy='165' r='5' fill='#c8b8a8'/><circle cx='320' cy='165' r='5' fill='#c8b8a8'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='200' width='400' height='50' fill='#706860'/><rect x='40' y='50' width='320' height='140' fill='#b0a898'/><line x1='40' y1='190' x2='360' y2='190' stroke='#8a7868' stroke-width='2'/><line x1='40' y1='50' x2='40' y2='190' stroke='#8a7868' stroke-width='2'/><rect x='70' y='90' width='50' height='100' fill='#8a7868'/><rect x='150' y='60' width='50' height='130' fill='#706860'/><rect x='230' y='110' width='50' height='80' fill='#8a7868'/><rect x='310' y='130' width='40' height='60' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><circle cx='100' cy='80' r='30' fill='#a09080'/><circle cx='300' cy='80' r='30' fill='#8a7868'/><circle cx='200' cy='170' r='30' fill='#706860'/><line x1='125' y1='95' x2='175' y2='150' stroke='#8a7868' stroke-width='2'/><line x1='275' y1='95' x2='225' y2='150' stroke='#8a7868' stroke-width='2'/><line x1='130' y1='80' x2='270' y2='80' stroke='#8a7868' stroke-width='2'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "Breaking the Nitrogen Balance", "scene": "scene1", "body": "<p>Nitrogen makes up 78% of the atmosphere as inert N₂ gas. In the natural nitrogen cycle, bacteria convert N₂ into reactive forms (NH₃, NO₃⁻) through <strong>biological nitrogen fixation</strong> at a rate of approximately <strong>140 Tg N/year</strong> (teragrams of nitrogen per year).</p><p>But since the invention of the <strong>Haber-Bosch process</strong> in the early 20th century, humans have been creating reactive nitrogen at an industrial scale for fertilisers, plus releasing NOₓ from fossil fuel combustion. The anthropogenic input now rivals — and exceeds — the natural cycle.</p><p>Your task: quantify the disruption.</p>", "factBox": {"label": "The Nitrogen Cycle", "text": "Key processes: nitrogen fixation (N₂ → NH₃, by bacteria or the Haber process); nitrification (NH₃ → NO₂⁻ → NO₃⁻, by Nitrosomonas and Nitrobacter); assimilation (plants absorb NO₃⁻); ammonification (decomposers release NH₃ from organic matter); denitrification (NO₃⁻ → N₂, by anaerobic bacteria, returning N to the atmosphere). Human disruption has accelerated fixation while denitrification hasn't kept pace."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Nitrogen Cycle", "title": "Anthropogenic Nitrogen Input", "scene": "scene2", "body": "<p>Human activities add reactive nitrogen from three main sources:</p><p>• Haber-Bosch fertiliser production: <strong>120 Tg N/year</strong><br/>• Fossil fuel combustion (NOₓ): <strong>30 Tg N/year</strong><br/>• Cultivation-induced biological fixation: <strong>40 Tg N/year</strong></p><p>What is the <strong>total anthropogenic reactive nitrogen input</strong>?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Total = <strong>120 + 30 + 40</strong></p><p>= ?</p>"}, "question": "What is the total anthropogenic nitrogen input?", "unit": "Tg N/year", "answer": 190, "tolerance": 0, "maxAttempts": 2, "hintText": "120 + 30 + 40 = ?", "feedbackCorrect": "190 Tg N/year — compared to the natural biological fixation of 140 Tg N/year, humans have more than doubled the total reactive nitrogen entering the biosphere.", "feedbackWrong": "A common mistake is making sweeping statements without evidence. Use specific data, percentages, or examples to support environmental arguments. The answer is 190 Tg N/year. 120 + 30 + 40 = 190 Tg N/year of anthropogenic nitrogen.", "consequence": "<strong>One hundred and ninety teragrams of reactive nitrogen per year from human activity alone.</strong> Added to natural fixation, the total input is 330 Tg N/year — far exceeding what denitrification can return to the atmosphere.", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "The Investigation Continues", "title": "Cascade of Consequences", "scene": "scene3", "body": "<p>Excess reactive nitrogen doesn't stay put. A single nitrogen atom can cascade through multiple environmental systems: from fertiliser to soil, to groundwater, to rivers, to coastal waters (causing eutrophication), to the atmosphere (as N₂O, a potent greenhouse gas), and eventually back to land in acid rain.</p><p>This is the <strong>nitrogen cascade</strong> — one atom of reactive nitrogen causes damage in multiple environments before finally being denitrified back to N₂.</p>", "factBox": {"label": "The Nitrogen Cascade", "text": "A single molecule of reactive nitrogen can: reduce soil biodiversity; contaminate drinking water; cause eutrophication in rivers and coastal dead zones; contribute to acid rain; deplete stratospheric ozone; and act as a greenhouse gas (N₂O has 273× the warming potential of CO₂ over 100 years). This sequential impact is called the nitrogen cascade."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Nitrogen Cycle", "title": "Fertiliser Efficiency", "scene": "scene2", "body": "<p>A farmer applies <strong>200 kg of nitrogen fertiliser per hectare</strong>. Research shows that crops typically take up only <strong>40%</strong> of applied nitrogen; the rest is lost to the environment through leaching, runoff, volatilisation, and denitrification.</p><p>How many <strong>kg of nitrogen per hectare</strong> are lost to the environment?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Nitrogen taken up = 200 × 40% = 80 kg</p><p>Nitrogen lost = <strong>200 − 80</strong></p><p>= ?</p>"}, "question": "How many kg of nitrogen per hectare are lost to the environment?", "unit": "kg/ha", "answer": 120, "tolerance": 0, "maxAttempts": 2, "hintText": "If 40% is taken up, 60% is lost. 60% of 200 = ?", "feedbackCorrect": "120 kg/ha lost to the environment. That's 60% of all applied nitrogen escaping into waterways, groundwater, and the atmosphere — driving eutrophication, acid rain, and climate change.", "feedbackWrong": "A common mistake is making sweeping statements without evidence. Use specific data, percentages, or examples to support environmental arguments. The answer is 120 kg/ha. 200 − (200 × 0.4) = 200 − 80 = 120 kg/ha lost.", "consequence": "<strong>One hundred and twenty kilograms per hectare wasted.</strong> Globally, with billions of hectares under cultivation, the scale of nitrogen pollution is staggering. Precision agriculture could dramatically improve this ratio.", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Final Challenge", "title": "The Planetary Boundary", "scene": "scene1", "body": "<p>The Stockholm Resilience Centre identifies nitrogen cycling as one of nine <strong>planetary boundaries</strong> — thresholds beyond which Earth systems may destabilise. The nitrogen boundary has already been exceeded. One final question to frame the policy response.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Nitrogen Cycle", "title": "The Denitrification Role", "scene": "scene3", "body": "<p>A policy adviser asks: <em>\"Which microbial process is responsible for removing reactive nitrogen from ecosystems by converting it back to atmospheric N₂?\"</em></p>", "question": "Which process converts reactive nitrogen back to atmospheric N₂?", "options": [{"text": "Nitrification — conversion of NH₃ to NO₃⁻", "correct": false}, {"text": "Ammonification — release of NH₃ from organic matter", "correct": false}, {"text": "Denitrification — conversion of NO₃⁻ to N₂ by anaerobic bacteria", "correct": true}, {"text": "Nitrogen fixation — conversion of N₂ to NH₃", "correct": false}], "maxAttempts": 2, "hintText": "Which process is the reverse of fixation — taking reactive nitrogen OUT of the biosphere and returning it to the atmosphere as N₂?", "feedbackCorrect": "Correct. Denitrification by anaerobic bacteria (e.g., Pseudomonas) converts nitrate (NO₃⁻) back to N₂ gas. It's the only natural process that removes reactive nitrogen from the biosphere, and it cannot keep pace with current anthropogenic inputs.", "feedbackWrong": "A common mistake is making sweeping statements without evidence. Use specific data, percentages, or examples to support environmental arguments. The answer is denitrification. Anaerobic bacteria convert NO₃⁻ → NO₂⁻ → NO → N₂O → N₂, returning nitrogen to the atmosphere. It's the critical counterbalance to fixation.", "consequence": "<strong>The policy paper recommends three interventions:</strong> precision fertiliser application to reduce waste, constructed wetlands to enhance denitrification, and regulatory limits on industrial nitrogen emissions. The cycle must be rebalanced.", "next": "end", "examTip": "In the exam, support environmental arguments with specific data — percentages, quantities, dates. Evaluate solutions by considering effectiveness, cost, and feasibility.", "bloomsLevel": "Evaluate"}], "ending": {"title": "The Biogeochemical Cycle", "perfect": "Outstanding biogeochemistry. You quantified the anthropogenic nitrogen flux, calculated fertiliser losses, and identified the key removal pathway. The nitrogen cycle's disruption is now clearly documented.", "partial": "Good work on the nitrogen cycle analysis. Some calculations need refining, but you understand how human activity has disrupted this critical biogeochemical cycle.", "retry": "Want to analyse the nitrogen cycle disruption again?", "topic": "Nitrogen Cycle & Disruption"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
