<script>const STORY_DATA = {"meta": {"title": "The Psychological Skills", "subtitle": "A young swimmer needs clear goals to stay motivated through a gruelling training programme.", "subject": "PE & Sport Science", "topic": "Goal Setting & Motivation", "level": "GCSE", "tags": ["🏃 PE & Sport Science", "GCSE", "Goal Setting & Motivation", "~10 min", "3 questions"], "intro": "You are a sport psychologist working with a 15-year-old competitive swimmer. She has talent but is losing motivation after a disappointing regional championship. Your task is to rebuild her confidence using SMART goal-setting."}, "scenes": {"scene1": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='180' width='400' height='70' fill='#a09080'/><rect x='30' y='180' width='50' height='5' fill='#706860'/><rect x='90' y='180' width='50' height='5' fill='#706860'/><rect x='150' y='180' width='50' height='5' fill='#706860'/><rect x='210' y='180' width='50' height='5' fill='#706860'/><rect x='270' y='180' width='50' height='5' fill='#706860'/><rect x='330' y='180' width='50' height='5' fill='#706860'/><rect x='0' y='175' width='400' height='5' fill='#8a7868'/><rect x='380' y='140' width='15' height='40' fill='#706860'/><rect x='383' y='130' width='9' height='12' fill='#c8b8a8'/></svg>", "scene2": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#a09080'/><rect x='0' y='210' width='400' height='40' fill='#706860'/><rect x='60' y='40' width='280' height='160' fill='#8a7868'/><rect x='70' y='50' width='260' height='140' fill='#b0a898'/><rect x='90' y='70' width='220' height='25' fill='#c8b8a8'/><rect x='90' y='105' width='220' height='25' fill='#c8b8a8'/><rect x='90' y='140' width='220' height='25' fill='#c8b8a8'/><rect x='90' y='70' width='132' height='25' fill='#706860'/><rect x='90' y='105' width='88' height='25' fill='#706860'/><rect x='90' y='140' width='44' height='25' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 400 250' xmlns='http://www.w3.org/2000/svg'><rect width='400' height='250' fill='#b0a898'/><rect x='0' y='190' width='400' height='60' fill='#706860'/><rect x='100' y='40' width='200' height='140' fill='#8a7868'/><rect x='110' y='50' width='180' height='120' fill='#a09080'/><polygon points='200,65 210,90 235,90 215,105 222,130 200,115 178,130 185,105 165,90 190,90' fill='#c8b8a8'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Demotivated Swimmer", "scene": "scene1", "body": "<p>Lily sits across from you, arms folded. She finished 5th at the regional championships after hoping for a podium place. Her 200m freestyle time was <strong>2 minutes 18 seconds</strong> — six seconds off the winner.</p><p><em>\"What's the point? I'll never close that gap,\"</em> she mutters.</p><p>You know that what Lily needs is not sympathy but <strong>structure</strong>. SMART goals will give her a clear path forward and reignite her motivation.</p>", "factBox": {"label": "SMART Goals", "text": "SMART stands for: Specific (clear and precise), Measurable (you can track progress with numbers), Achievable (challenging but realistic), Realistic (relevant to the performer's ability and resources), and Time-bound (has a deadline). Research shows that performers with SMART goals are significantly more motivated and show greater improvement than those with vague goals like 'get better'."}, "formulaBox": null, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Goal Setting & Motivation", "title": "The Time Target", "scene": "scene2", "body": "<p>Lily's current 200m time is <strong>138 seconds</strong> (2:18). A realistic 6-month improvement for a swimmer at her level is <strong>3%</strong>. You want to set a target time.</p><p>Calculate the <strong>number of seconds</strong> she should aim to reduce by.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p><strong>Reduction = Current time × 0.03</strong></p><p>= 138 × 0.03 = ?</p>"}, "question": "How many seconds should Lily aim to reduce her time by?", "unit": "seconds", "answer": 4.14, "tolerance": 0.1, "maxAttempts": 2, "hintText": "Calculate 3% of 138. Multiply 138 by 0.03. Think: 1% of 138 = 1.38, so 3% = 1.38 × 3 = ?", "feedbackCorrect": "4.14 seconds — bringing her target time to about 2:13.9. A challenging but achievable goal.", "feedbackWrong": "A common mistake is giving generic answers without specific sporting examples. Apply the concept to a named sport, position, or movement. The answer is 4.14 seconds. 138 × 0.03 = 4.14.", "consequence": "<strong>4.14 seconds.</strong> Lily's eyes widen. <em>\"That would put me at 2:14. That's close to the podium time!\"</em> You see the first spark of motivation returning.", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Breaking It Down", "title": "Process and Performance Goals", "scene": "scene2", "body": "<p>You explain that there are three types of goal: <strong>outcome goals</strong> (winning a medal), <strong>performance goals</strong> (achieving a specific time), and <strong>process goals</strong> (improving technique or training habits).</p><p>Outcome goals depend on others' performance, so they can feel uncontrollable. Process goals focus on what Lily can control — her effort, technique, and consistency.</p><p><em>\"So instead of aiming to win, I should aim to nail my technique and the results will follow?\"</em> she asks.</p>", "factBox": {"label": "Intrinsic vs Extrinsic Motivation", "text": "Intrinsic motivation comes from within — enjoyment, satisfaction, personal challenge. Extrinsic motivation comes from external rewards — medals, praise, money. Research shows intrinsic motivation leads to longer-term commitment and greater enjoyment. Process goals tend to boost intrinsic motivation because they focus on personal improvement rather than external rewards."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Goal Setting & Motivation", "title": "Training Sessions", "scene": "scene2", "body": "<p>Lily's training plan involves <strong>8 pool sessions per week</strong> over a <strong>24-week</strong> programme. To track her process goal of improving stroke technique, she needs to complete at least <strong>75%</strong> of all planned sessions.</p><p>How many sessions must she complete as a minimum?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Total sessions = 8 × 24 = 192</p><p><strong>Minimum = 192 × 0.75 = ?</strong></p>"}, "question": "What is the minimum number of sessions Lily must complete?", "unit": "sessions", "answer": 144, "tolerance": 0, "maxAttempts": 2, "hintText": "Total = 8 × 24 = 192. Then 75% of 192: multiply 192 by 0.75.", "feedbackCorrect": "144 sessions. That is 6 out of every 8 sessions per week — allowing some flexibility for rest and illness.", "feedbackWrong": "A common mistake is giving generic answers without specific sporting examples. Apply the concept to a named sport, position, or movement. The answer is 144. Total = 192, 75% = 192 × 0.75 = 144.", "consequence": "<strong>144 sessions minimum.</strong> Lily nods. <em>\"That means I can miss about two sessions a week if I'm ill or need rest, but no more. I can do that.\"</em>", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Mental Game", "title": "Psychological Strategies", "scene": "scene3", "body": "<p>Beyond goal-setting, you teach Lily three more psychological skills: <strong>visualisation</strong> (mentally rehearsing a perfect race), <strong>positive self-talk</strong> (replacing \"I can't\" with \"I'm improving\"), and <strong>relaxation techniques</strong> (controlled breathing before races).</p><p>Combined with SMART goals, these tools form a complete mental skills programme.</p>", "factBox": {"label": "Self-Determination Theory", "text": "According to Deci and Ryan's Self-Determination Theory, motivation thrives when three basic needs are met: Autonomy (feeling in control of choices), Competence (feeling capable and improving), and Relatedness (feeling connected to coaches and teammates). SMART goals support competence by providing measurable evidence of improvement."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Goal Setting & Motivation", "title": "Applying SMART", "scene": "scene3", "body": "<p>Lily writes her first goal. You need to check it meets the SMART criteria. Which of these goals is a proper SMART goal?</p>", "question": "Which of the following is the best example of a SMART goal for Lily?", "options": [{"text": "Get better at swimming this year", "correct": false}, {"text": "Reduce my 200m freestyle time from 2:18 to 2:14 within 6 months by attending 75% of training sessions", "correct": true}, {"text": "Win the regional championships next season", "correct": false}, {"text": "Try harder in every training session from now on", "correct": false}], "maxAttempts": 2, "hintText": "A SMART goal must be Specific (what exactly?), Measurable (what numbers?), Achievable, Realistic, and Time-bound (by when?). Which option ticks all five boxes?", "feedbackCorrect": "Correct. This goal is Specific (200m freestyle time), Measurable (2:18 to 2:14), Achievable and Realistic (3% improvement), and Time-bound (6 months). It also includes a process target (75% attendance).", "feedbackWrong": "A common mistake is giving generic answers without specific sporting examples. Apply the concept to a named sport, position, or movement. The correct answer is the goal with a specific time target and deadline. 'Get better' is too vague, 'win' depends on others, and 'try harder' is not measurable.", "consequence": "<strong>Lily writes it on her wall at home.</strong> <em>\"2:14 in six months. I can see it now.\"</em> The spark is back. Your work as a sport psychologist has given her direction and purpose.", "next": "end", "examTip": "In the exam, apply theoretical concepts to practical sporting examples. Name specific sports, movements, and muscle groups.", "bloomsLevel": "Analyse"}], "ending": {"title": "The Psychological Skills", "perfect": "Outstanding sports psychology work. You calculated time targets and training thresholds accurately and applied SMART goal-setting principles perfectly. Lily has a clear path back to the podium.", "partial": "Good understanding of goal-setting but some calculations need work. Review SMART criteria and practise percentage calculations.", "retry": "Want to set Lily's goals again?", "topic": "Goal Setting & Motivation"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
