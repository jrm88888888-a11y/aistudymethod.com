t": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Aerobic Capacity & VO2 Max", "title": "Calculating Relative VO2 Max", "scene": "scene2", "body": "<p>Sophie completes the test. The gas analyser shows her peak oxygen consumption was <strong>2800 ml/min</strong>. She weighs <strong>56 kg</strong>.</p><p>Her coach leans in: <em>\"What's her relative VO2 max?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Use: <strong>Relative VO2 max = Peak O₂ consumption ÷ Body mass</strong></p><p>Peak O₂ = 2800 ml/min, Body mass = 56 kg</p><p>VO2 max = 2800 ÷ 56 = ?</p>"}, "question": "What is Sophie's relative VO2 max?", "unit": "ml/kg/min", "answer": 50, "tolerance": 0.5, "maxAttempts": 2, "hintText": "Divide the total oxygen consumed per minute (2800 ml/min) by her body mass (56 kg). 2800 ÷ 56 = ?", "feedbackCorrect": "50 ml/kg/min — an excellent score for a 16-year-old female distance runner. This places her well above average.", "feedbackWrong": "A common mistake is giving generic answers without specific sporting examples. Apply the concept to a named sport, position, or movement. The answer is 50 ml/kg/min. Relative VO2 max = 2800 ÷ 56 = 50.", "consequence": "<strong>50 ml/kg/min.</strong> Sophie's coach nods approvingly. <em>\"That's well above average for her age. She has real aerobic potential.\"</em>", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Training Zones", "title": "Setting the Intensity", "scene": "scene1", "body": "<p>With Sophie's VO2 max confirmed, you can now calculate her training zones. Endurance coaches typically set aerobic threshold training at around <strong>70–80%</strong> of VO2 max.</p><p><em>\"If she trains too hard every session she'll burn out,\"</em> the coach explains. <em>\"Too easy and she won't improve. We need the sweet spot.\"</em></p><p>Sophie towels off from the test, eager to know what numbers she should aim for in training.</p>", "factBox": {"label": "Training Zones", "text": "Training intensity is often expressed as a percentage of VO2 max. Recovery runs are typically at 60–65% VO2 max, aerobic base training at 70–80%, threshold work at 80–90%, and VO2 max intervals at 95–100%. Spending the right proportion of time in each zone is key to improvement."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Aerobic Capacity & VO2 Max", "title": "The Training Threshold", "scene": "scene2", "body": "<p>The coach wants Sophie to do her long runs at <strong>75%</strong> of her VO2 max. You need to calculate what oxygen consumption rate this corresponds to so you can set the treadmill speed accordingly.</p><p>Sophie's absolute VO2 max was <strong>2800 ml/min</strong>.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Find 75% of the absolute VO2 max:</p><p><strong>Target O₂ = 2800 × 0.75</strong></p><p>Target O₂ = ?</p>"}, "question": "What oxygen consumption rate should Sophie target for her long runs?", "unit": "ml/min", "answer": 2100, "tolerance": 10, "maxAttempts": 2, "hintText": "Calculate 75% of 2800. Multiply 2800 by 0.75. Break it down: 2800 × 0.5 = 1400, then 2800 × 0.25 = 700, so 1400 + 700 = ?", "feedbackCorrect": "2100 ml/min. This is the oxygen consumption rate that corresponds to 75% of her VO2 max — an ideal long-run intensity.", "feedbackWrong": "A common mistake is giving generic answers without specific sporting examples. Apply the concept to a named sport, position, or movement. The answer is 2100 ml/min. 75% of 2800 = 2800 × 0.75 = 2100.", "consequence": "<strong>2100 ml/min.</strong> You programme the treadmill to the corresponding speed. <em>\"Perfect,\"</em> the coach says. <em>\"We'll monitor her heart rate at this intensity to give her a wearable target.\"</em>", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Bigger Picture", "title": "Comparing Athletes", "scene": "scene3", "body": "<p>The coach pulls out data from another athlete — a male 800m runner named James. He weighs 70 kg and recorded a VO2 max of 4200 ml/min in a previous test.</p><p><em>\"People always ask who's fitter — the big lad or the lightweight. That's why we use relative VO2 max, right?\"</em></p><p>You nod. Absolute VO2 max favours larger athletes because they have more muscle mass consuming oxygen. <strong>Relative VO2 max</strong> levels the playing field by dividing by body mass.</p>", "factBox": {"label": "Absolute vs Relative VO2 Max", "text": "Absolute VO2 max (L/min or ml/min) measures total oxygen consumption. Larger athletes tend to score higher simply due to greater body size. Relative VO2 max (ml/kg/min) accounts for body mass, allowing fair comparison between athletes of different sizes. For endurance sports where athletes carry their own weight (running, cycling), relative VO2 max is the better predictor of performance."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Aerobic Capacity & VO2 Max", "title": "Who Is Fitter?", "scene": "scene3", "body": "<p>James (70 kg) has an absolute VO2 max of <strong>4200 ml/min</strong>, giving him a relative VO2 max of <strong>60 ml/kg/min</strong>. Sophie (56 kg) has a relative VO2 max of <strong>50 ml/kg/min</strong>.</p><p>The coach asks: <em>\"So which statement best explains the comparison?\"</em></p>", "question": "Which statement best explains the VO2 max comparison between James and Sophie?", "options": [{"text": "James is fitter because his absolute VO2 max (4200 ml/min) is higher than Sophie's (2800 ml/min)", "correct": false}, {"text": "James has a higher relative VO2 max (60 vs 50 ml/kg/min), meaning he uses more oxygen per kg of body mass during maximal exercise", "correct": true}, {"text": "Sophie is fitter because she weighs less and therefore needs less oxygen", "correct": false}, {"text": "They are equally fit because VO2 max does not account for differences in sport", "correct": false}], "maxAttempts": 2, "hintText": "Relative VO2 max (ml/kg/min) is the fairest comparison because it accounts for body mass. Compare 60 vs 50 — which is higher and what does it mean?", "feedbackCorrect": "Correct. James's relative VO2 max of 60 ml/kg/min is higher than Sophie's 50, meaning he consumes more oxygen per kilogram during maximal effort — he has superior aerobic fitness per unit of body mass.", "feedbackWrong": "A common mistake is giving generic answers without specific sporting examples. Apply the concept to a named sport, position, or movement. The correct answer is that James has a higher relative VO2 max (60 vs 50 ml/kg/min). Relative VO2 max is the fair comparison because it accounts for body mass differences.", "consequence": "<strong>The coach smiles.</strong> <em>\"That's why James runs 800m at national level. But Sophie's improving fast — another year of training and she could close that gap.\"</em>", "next": "end", "examTip": "In the exam, apply theoretical concepts to practical sporting examples. Name specific sports, movements, and muscle groups.", "bloomsLevel": "Analyse"}], "ending": {"title": "The VO2 Max", "perfect": "Flawless work in the performance lab. You calculated relative VO2 max accurately, determined training zones with precision, and demonstrated a clear understanding of how to compare aerobic fitness between athletes. Sophie's training programme is in excellent hands.", "partial": "Good effort in the lab. You grasped the basics of VO2 max but missed some calculations. Review the formula — VO2 max = O₂ consumed ÷ body mass — and practise percentage calculations for training zones.", "retry": "Want to run the VO2 max test again with perfect accuracy?", "topic": "Aerobic Capacity & VO2 Max"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
</html>
