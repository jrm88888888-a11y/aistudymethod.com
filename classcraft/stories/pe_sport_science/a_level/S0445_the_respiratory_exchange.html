idth='400' height='60' fill='#706860'/><rect x='60' y='50' width='280' height='130' fill='#8a7868'/><rect x='70' y='60' width='260' height='110' fill='#a09080'/><rect x='90' y='80' width='100' height='15' fill='#c8b8a8'/><rect x='90' y='80' width='70' height='15' fill='#706860'/><rect x='90' y='110' width='100' height='15' fill='#c8b8a8'/><rect x='90' y='110' width='30' height='15' fill='#706860'/><rect x='210' y='80' width='100' height='70' fill='#706860'/><rect x='215' y='85' width='90' height='60' fill='#a09080'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Metabolic Test", "scene": "scene1", "body": "<p>Your lab's metabolic cart measures the volume of oxygen consumed (VO₂) and carbon dioxide produced (VCO₂) during exercise. The ratio of these two values — the <strong>respiratory exchange ratio (RER)</strong> — tells you which fuel substrate the body is primarily using.</p><p>The marathon runner, Ava, needs to know her fuel utilisation at different intensities to plan her in-race nutrition.</p>", "factBox": {"label": "Respiratory Exchange Ratio", "text": "RER = VCO₂ ÷ VO₂. An RER of 0.70 indicates 100% fat oxidation. An RER of 1.00 indicates 100% carbohydrate oxidation. Values between 0.70 and 1.00 indicate a mixture of both fuels. RER above 1.00 indicates anaerobic metabolism (excess CO₂ from buffering of lactic acid). At low exercise intensities, fat is the predominant fuel. As intensity increases, the body shifts towards carbohydrate reliance."}, "formulaBox": {"label": "RER", "formula": "RER = VCO₂ ÷ VO₂", "vars": "VCO₂ = CO₂ produced (L/min) · VO₂ = O₂ consumed (L/min)"}, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — RER & Fuel Use", "title": "Calculating RER", "scene": "scene2", "body": "<p>At marathon race pace, Ava's gas analysis shows: <strong>VCO₂ = 2.4 L/min</strong> and <strong>VO₂ = 2.8 L/min</strong>. Calculate her RER.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p><strong>RER = VCO₂ ÷ VO₂</strong></p><p>= 2.4 ÷ 2.8 = ?</p>"}, "question": "What is Ava's RER at marathon race pace?", "unit": "", "answer": 0.86, "tolerance": 0.01, "maxAttempts": 2, "hintText": "Divide 2.4 by 2.8. Think: 2.4/2.8 = 24/28 = 6/7 ≈ ?", "feedbackCorrect": "0.86 — indicating a mixture of fat and carbohydrate oxidation, with carbohydrates contributing a higher proportion. Typical for marathon pace.", "feedbackWrong": "A common mistake is giving generic answers without specific sporting examples. Apply the concept to a named sport, position, or movement. The answer is approximately 0.86. RER = 2.4 ÷ 2.8 = 0.857 ≈ 0.86.", "consequence": "<strong>RER of 0.86.</strong> <em>\"That means I'm burning a mix of fat and carbs at race pace,\"</em> Ava notes. <em>\"How do I shift more towards fat to save my glycogen stores?\"</em>", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Fuel Utilisation", "title": "Fat vs Carbohydrate", "scene": "scene1", "body": "<p>You explain the crossover concept: at low intensities, fat is the dominant fuel. As intensity increases, the body progressively shifts to carbohydrate. The <strong>crossover point</strong> — where carbohydrate becomes the dominant fuel — occurs at roughly 60-75% of VO₂ max in trained individuals.</p><p>Training adaptations can shift this crossover point to a higher intensity, meaning the athlete burns more fat at faster speeds and preserves glycogen for longer.</p>", "factBox": {"label": "The Crossover Concept", "text": "Brooks' Crossover Concept (1994) describes how fuel utilisation shifts with exercise intensity. At rest and low intensity, fat oxidation dominates. As intensity rises, carbohydrate oxidation increases while fat oxidation peaks then declines. The crossover point is where carbohydrate contribution exceeds fat. Endurance training shifts this point rightward (to higher intensities) by increasing mitochondrial fat oxidation capacity, improving fat transport to muscles, and enhancing enzyme activity for beta-oxidation."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — RER & Fuel Use", "title": "Energy from Fat", "scene": "scene2", "body": "<p>At an RER of 0.86, the estimated energy contribution is approximately <strong>46% from fat</strong> and <strong>54% from carbohydrate</strong>. If Ava's total energy expenditure at marathon pace is <strong>800 kcal/hour</strong>, how many kilocalories per hour come from <strong>fat oxidation</strong>?</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p><strong>Fat kcal = Total kcal × 0.46</strong></p><p>= 800 × 0.46 = ?</p>"}, "question": "How many kcal per hour come from fat oxidation?", "unit": "kcal/hr", "answer": 368, "tolerance": 5, "maxAttempts": 2, "hintText": "Multiply 800 by 0.46. Think: 800 × 0.5 = 400, minus 800 × 0.04 = 32, so 400 − 32 = ?", "feedbackCorrect": "368 kcal/hr from fat. The remaining 432 kcal/hr comes from carbohydrate, which must be replenished during the race through nutrition.", "feedbackWrong": "A common mistake is giving generic answers without specific sporting examples. Apply the concept to a named sport, position, or movement. The answer is 368 kcal/hr. 800 × 0.46 = 368.", "consequence": "<strong>368 kcal from fat, 432 from carbs.</strong> <em>\"So I'm burning about 432 kcal of carbs per hour. With glycogen stores of roughly 2000 kcal, I'll run out around 4.5 hours without fuelling. That's why I need gels!\"</em>", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "Implications", "title": "Race Nutrition Strategy", "scene": "scene3", "body": "<p>Based on the RER data, you design Ava's race nutrition plan: consume <strong>60-90 grams of carbohydrate per hour</strong> during the marathon to supplement the 432 kcal/hr carbohydrate burn. This will delay glycogen depletion and prevent 'hitting the wall'.</p><p>You also recommend fat-adaptation training — some long runs performed in a carb-depleted state to upregulate fat oxidation enzymes.</p>", "factBox": {"label": "RER Above 1.00", "text": "When RER exceeds 1.00, it indicates that CO₂ production has exceeded O₂ consumption. This occurs during high-intensity anaerobic exercise because lactic acid is buffered by bicarbonate, releasing extra CO₂. An RER above 1.00 is sometimes used as a criterion for confirming that a true VO₂ max test has been achieved. It cannot be sustained for prolonged periods."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — RER & Fuel Use", "title": "RER Interpretation", "scene": "scene3", "body": "<p>Ava asks: <em>\"If my RER during the sprint finish of a 5K race is measured at 1.05, what does that tell us about my metabolism at that point?\"</em></p>", "question": "What does an RER of 1.05 indicate about fuel metabolism?", "options": [{"text": "The athlete is burning 100% fat — the most efficient fuel source for sprinting", "correct": false}, {"text": "The metabolic cart is malfunctioning — RER cannot exceed 1.00", "correct": false}, {"text": "Anaerobic metabolism is dominant — excess CO₂ is being produced from lactic acid buffering by bicarbonate", "correct": true}, {"text": "The athlete is in perfect metabolic balance between fat and carbohydrate oxidation", "correct": false}], "maxAttempts": 2, "hintText": "RER above 1.00 means VCO₂ exceeds VO₂. Where does extra CO₂ come from during intense exercise? Think about what happens when lactic acid is buffered.", "feedbackCorrect": "Correct. An RER above 1.00 indicates significant anaerobic contribution. Lactic acid produced during high-intensity exercise is buffered by bicarbonate (NaHCO₃), releasing additional CO₂ beyond that produced by aerobic metabolism.", "feedbackWrong": "A common mistake is giving generic answers without specific sporting examples. Apply the concept to a named sport, position, or movement. The correct answer is anaerobic metabolism. RER above 1.00 occurs because buffering of lactic acid by bicarbonate produces extra CO₂, pushing the ratio above what aerobic metabolism alone would produce.", "consequence": "<strong>Ava understands.</strong> <em>\"So above 1.00 means I've gone fully anaerobic. That's the sprint finish zone — not sustainable for a marathon. Got it.\"</em>", "next": "end", "examTip": "In the exam, apply theoretical concepts to practical sporting examples. Name specific sports, movements, and muscle groups.", "bloomsLevel": "Evaluate"}], "ending": {"title": "The Respiratory Exchange", "perfect": "Excellent metabolic analysis. You calculated RER accurately, determined fuel contributions, and interpreted high RER values correctly. Ava's race nutrition strategy is based on solid science.", "partial": "Good understanding of RER but some calculations need refinement. Review the RER formula and fuel contribution percentages.", "retry": "Want to reanalyse the metabolic data?", "topic": "RER & Fuel Use"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
