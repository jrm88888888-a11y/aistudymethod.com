<script>const STORY_DATA = {"meta": {"title": "The Metaphor Mission", "subtitle": "Figurative language is the enemy's secret weapon. Decode the devices to neutralise the threat.", "subject": "English Literature", "topic": "Figurative Language", "level": "KS3", "tags": ["📖 English Literature", "KS3 · Year 7–9", "Figurative Language", "~10 min", "3 questions"], "intro": "You are a language specialist recruited by a secret agency. The enemy communicates using figurative language — metaphors, similes, and personification woven into seemingly innocent letters. You must count the devices, calculate their density, and distinguish between simile and metaphor to crack the code."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='150' y='50' width='400' height='160' fill='#8a7868'/><rect x='170' y='70' width='160' height='8' fill='#a09080'/><rect x='170' y='88' width='140' height='8' fill='#a09080'/><rect x='170' y='106' width='155' height='8' fill='#a09080'/><rect x='170' y='124' width='130' height='8' fill='#a09080'/><rect x='170' y='142' width='150' height='8' fill='#a09080'/><rect x='170' y='160' width='145' height='8' fill='#a09080'/><rect x='170' y='178' width='140' height='8' fill='#a09080'/><rect x='400' y='80' width='120' height='80' fill='#706860'/><circle cx='460' cy='120' r='25' fill='#a09080'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='210' width='700' height='52' fill='#706860'/><rect x='100' y='60' width='500' height='140' fill='#8a7868'/><circle cx='180' cy='130' r='30' fill='#706860'/><circle cx='350' cy='130' r='30' fill='#706860'/><circle cx='520' cy='130' r='30' fill='#706860'/><line x1='210' y1='130' x2='320' y2='130' stroke='#b0a898' stroke-width='2'/><line x1='380' y1='130' x2='490' y2='130' stroke='#b0a898' stroke-width='2'/><rect x='160' y='80' width='40' height='8' fill='#b0a898'/><rect x='330' y='80' width='40' height='8' fill='#b0a898'/><rect x='500' y='80' width='40' height='8' fill='#b0a898'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='100' y='50' width='220' height='160' fill='#8a7868'/><rect x='120' y='70' width='180' height='8' fill='#a09080'/><rect x='120' y='88' width='160' height='8' fill='#a09080'/><rect x='120' y='106' width='170' height='8' fill='#a09080'/><rect x='380' y='50' width='220' height='160' fill='#8a7868'/><rect x='400' y='70' width='180' height='8' fill='#a09080'/><rect x='400' y='88' width='160' height='8' fill='#a09080'/><rect x='400' y='106' width='170' height='8' fill='#a09080'/><rect x='290' y='100' width='120' height='40' fill='#706860'/><rect x='300' y='108' width='100' height='8' fill='#b0a898'/><rect x='300' y='120' width='80' height='8' fill='#b0a898'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Coded Letters", "scene": "scene1", "body": "<p>You arrive at the agency's decryption lab. On the table: a stack of intercepted letters, each filled with vivid figurative language. Your handler slides them toward you.</p><p><em>\"The enemy hides messages inside literary devices,\"</em> he explains. <em>\"Metaphors, similes, personification — each one carries a piece of the puzzle. You need to identify and count every device.\"</em></p><p>You know the basics. A <strong>metaphor</strong> says something IS something else ('the world is a stage'). A <strong>simile</strong> compares using 'like' or 'as' ('brave as a lion'). <strong>Personification</strong> gives human qualities to non-human things ('the wind whispered').</p><p>Your mission: quantify the figurative language and crack the code.</p>", "factBox": {"label": "Figurative Language Devices", "text": "Metaphor: a direct comparison (X is Y). Simile: a comparison using 'like' or 'as' (X is like Y). Personification: giving human traits to non-human things. Hyperbole: extreme exaggeration. Oxymoron: contradictory terms paired together. These devices add layers of meaning to writing."}, "formulaBox": {"label": "Device Density", "formula": "Words per device = total words ÷ number of devices", "vars": "Lower numbers mean more frequent use of figurative language"}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Figurative Language", "title": "The Device Count", "scene": "scene2", "body": "<p>You begin cataloguing every figurative device in the first intercepted letter. Working through each paragraph systematically, you find:</p><p><strong>3 metaphors</strong> in the opening section, <strong>5 similes</strong> in the middle section, and <strong>2 examples of personification</strong> in the closing section.</p><p>Your handler needs the <strong>total count of figurative devices</strong> in the letter.</p>", "workedBox": {"label": "How to approach it", "steps": "<p>Count each type of device:</p><p><strong>Metaphors:</strong> 3</p><p><strong>Similes:</strong> 5</p><p><strong>Personification:</strong> 2</p><p>Total = 3 + 5 + 2 = ?</p>"}, "question": "How many figurative devices are in the letter?", "unit": "devices", "answer": 10, "tolerance": 0, "maxAttempts": 2, "hintText": "Add all three types together: 3 + 5 + 2.", "feedbackCorrect": "10 figurative devices in a single letter. That's an unusually high concentration — every device is a potential coded instruction.", "feedbackWrong": "A common mistake is retelling the plot instead of analysing it. Focus on how and why the writer makes specific choices, not just what happens. The answer is 10. Metaphors (3) + similes (5) + personification (2) = 10 total devices.", "consequence": "<strong>You highlight all 10 devices on the letter.</strong> Each one glows under the UV lamp — the code is embedded in the figurative language itself.", "next": "q2", "bloomsLevel": "Apply"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Figurative Language", "title": "The Density Calculation", "scene": "scene3", "body": "<p>The letter contains <strong>200 words</strong> in total and <strong>8 metaphors</strong> (you've now counted the metaphors across the entire letter more carefully). Your handler wants to know the <strong>device density</strong> — how many words appear between each metaphor on average.</p><p><em>\"If metaphors are packed too tightly, the letter looks suspicious. Calculate the average number of words per metaphor.\"</em></p>", "workedBox": {"label": "How to approach it", "steps": "<p>Use: <strong>Words per device = total words ÷ number of devices</strong></p><p>Total words: 200. Metaphors: 8.</p><p>So: 200 ÷ 8 = ?</p>"}, "question": "On average, how many words per metaphor?", "unit": "words", "answer": 25, "tolerance": 0, "maxAttempts": 2, "hintText": "Divide the total word count by the number of metaphors: 200 ÷ 8.", "feedbackCorrect": "25 words per metaphor. One metaphor every 25 words — that's a very high density for ordinary prose. Suspicious indeed.", "feedbackWrong": "A common mistake is retelling the plot instead of analysing it. Focus on how and why the writer makes specific choices, not just what happens. The answer is 25. 200 words ÷ 8 metaphors = 25 words per metaphor on average.", "consequence": "<strong>You flag the density in your report.</strong> A metaphor every 25 words is far above normal — this letter is practically screaming its hidden message.", "next": "q3", "bloomsLevel": "Apply"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Figurative Language", "title": "Simile vs Metaphor", "scene": "scene1", "body": "<p>As you finalise your analysis, a trainee agent asks for clarification. <em>\"I keep mixing up similes and metaphors. What's the actual difference?\"</em></p><p>You set down your pen. This is fundamental — getting it wrong could mean misclassifying a device and missing a coded instruction entirely.</p>", "question": "What is the key difference between a simile and a metaphor?", "options": [{"text": "A simile is longer than a metaphor", "correct": false}, {"text": "A simile uses 'like' or 'as' to compare; a metaphor states something IS something else", "correct": true}, {"text": "A metaphor is always about nature; a simile is always about people", "correct": false}, {"text": "There is no difference — they are interchangeable terms", "correct": false}], "maxAttempts": 2, "hintText": "Think about the connecting words. 'She is a lion' vs 'She is like a lion.' Which word signals the difference?", "feedbackCorrect": "A simile uses 'like' or 'as' — it openly compares. A metaphor removes the comparison word and states the identity directly.", "feedbackWrong": "A common mistake is retelling the plot instead of analysing it. Focus on how and why the writer makes specific choices, not just what happens. The correct answer is: a simile uses 'like' or 'as' to compare, while a metaphor states something IS something else directly.", "consequence": "<strong>The trainee nods, understanding at last.</strong> With your analysis complete, the agency can now decode every figurative device in the enemy's correspondence.", "next": "end", "examTip": "In the exam, embed short quotations into your sentences and analyse individual word choices. Link your points to the writer's intentions and context.", "bloomsLevel": "Understand"}], "ending": {"perfect": "Exceptional fieldwork. You counted devices, calculated density, and distinguished simile from metaphor with the precision of a master codebreaker.", "partial": "The coded letters have been partially decoded. Review the definitions of metaphor, simile, and personification to sharpen your classification skills.", "retry": "Want to try decoding the figurative language again with perfect accuracy?"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
