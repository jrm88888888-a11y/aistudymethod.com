<script>const STORY_DATA = {"meta": {"title": "The Inspector's Trap: Dramatic Irony", "subtitle": "An Inspector calls — but do the characters realise what the audience already knows?", "subject": "English Literature", "topic": "Dramatic Irony", "level": "GCSE", "tags": ["📖 English Literature", "GCSE", "An Inspector Calls", "~10 min", "3 questions"], "intro": "You are backstage at the Birling household, watching the events of J.B. Priestley's An Inspector Calls unfold from the wings. You can see what the characters cannot: the Inspector's true purpose, the connections between their actions, and the moral reckoning that awaits them. This privileged position is called dramatic irony — and tonight, you must analyse it with precision."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='200' y='80' width='300' height='140' fill='#8a7868'/><rect x='250' y='100' width='60' height='80' fill='#706860'/><rect x='340' y='100' width='60' height='80' fill='#706860'/><rect x='430' y='100' width='60' height='80' fill='#706860'/><rect x='300' y='60' width='100' height='25' fill='#a09080'/><line x1='200' y1='80' x2='500' y2='80' stroke='#706860' stroke-width='2'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='150' y='80' width='100' height='140' fill='#8a7868'/><rect x='300' y='80' width='100' height='140' fill='#8a7868'/><rect x='450' y='80' width='100' height='140' fill='#8a7868'/><rect x='175' y='130' width='50' height='40' fill='#706860'/><rect x='325' y='130' width='50' height='40' fill='#706860'/><rect x='475' y='130' width='50' height='40' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='100' y='60' width='500' height='150' fill='#8a7868'/><circle cx='250' cy='135' r='40' fill='#706860'/><circle cx='350' cy='135' r='40' fill='#a09080'/><circle cx='450' cy='135' r='40' fill='#706860'/><rect x='200' y='110' width='300' height='4' fill='#b0a898'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "Backstage at the Birlings", "scene": "scene1", "body": "<p>You stand in the wings of a theatre, watching the Birling family celebrate Sheila's engagement. The dining room glows with warmth. Mr Birling raises his glass and declares that war is impossible, that the Titanic is unsinkable, that progress is unstoppable.</p><p>You know better. The audience knows better. The play was <strong>written in 1945</strong> but <strong>set in 1912</strong> — before two world wars, before the Titanic sank, before everything Mr Birling confidently predicts is proved catastrophically wrong.</p><p>This is <strong>dramatic irony</strong>: when the audience possesses knowledge that the characters on stage do not. It is one of Priestley's most powerful tools, and tonight you must analyse how he uses it across the play's <strong>three acts</strong>.</p>", "factBox": {"label": "Key Concept — Dramatic Irony", "text": "Dramatic irony occurs when the audience knows something that a character on stage does not. In An Inspector Calls, Priestley exploits the gap between 1912 (when the play is set) and 1945 (when it was written) to make Mr Birling's confident predictions seem foolish and arrogant. The audience's superior knowledge creates tension, humour, and moral judgement."}, "formulaBox": {"label": "Percentage Formula", "formula": "Percentage = (Part ÷ Whole) × 100", "vars": "Part = the portion you're measuring · Whole = the total"}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Structure", "title": "The Inspector's Reach", "scene": "scene2", "body": "<p>You study the play's structure. An Inspector Calls is divided into <strong>3 acts</strong>. The Inspector — that mysterious, unsettling figure — appears in <strong>every single act</strong>, from his arrival in Act 1 to his devastating final speech in Act 3.</p><p><em>\"How many acts does the Inspector appear in?\"</em> your director asks from the shadows. <em>\"His presence across the entire play is deliberate — Priestley never gives the Birlings a moment to escape his scrutiny.\"</em></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> The play has 3 acts.</p><p><strong>Step 2:</strong> The Inspector appears in all of them.</p><p>Count the number of acts in which he is present.</p>"}, "question": "In how many acts does the Inspector appear?", "unit": "acts", "answer": 3, "tolerance": 0, "maxAttempts": 2, "hintText": "The passage states the Inspector appears in every single act. The play has 3 acts.", "feedbackCorrect": "3 acts. The Inspector is present throughout the entire play — his relentless questioning spans all three acts, giving the Birlings no respite from his moral examination.", "feedbackWrong": "A common mistake is retelling the plot instead of analysing it. Focus on how and why the writer makes specific choices, not just what happens. The answer is 3. The Inspector appears in all 3 acts of the play.", "consequence": "<strong>Your director nods.</strong> <em>\"Three acts, and the Inspector dominates every one. Priestley ensures there is no escape — the Birlings are trapped in his investigation from start to finish.\"</em>", "next": "q2", "bloomsLevel": "Apply"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Responsibility", "title": "The Acceptance Rate", "scene": "scene3", "body": "<p>The Inspector interrogates <strong>7 characters</strong> over the course of the play. By the end, <strong>5</strong> of them accept some degree of responsibility for Eva Smith's death — though the sincerity of their acceptance varies.</p><p><em>\"What percentage of the characters accept responsibility?\"</em> your director asks. <em>\"The gap between those who accept and those who refuse is at the heart of Priestley's message.\"</em></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Part = 5 (characters who accept) · Whole = 7 (characters interrogated)</p><p><strong>Step 2:</strong> Percentage = (5 ÷ 7) × 100 = 71.4…</p><p><strong>Step 3:</strong> Round to the nearest whole number.</p>"}, "question": "What percentage of interrogated characters accept responsibility? (Round to nearest whole number)", "unit": "%", "answer": 71, "tolerance": 1, "maxAttempts": 2, "hintText": "Divide 5 by 7 and multiply by 100. Round your answer.", "feedbackCorrect": "Approximately 71%. Five out of seven characters accept responsibility — but the two who refuse (Mr and Mrs Birling) represent the older generation's stubborn refusal to change, which is central to Priestley's social message.", "feedbackWrong": "A common mistake is retelling the plot instead of analysing it. Focus on how and why the writer makes specific choices, not just what happens. The answer is 71% (or 72%). (5 ÷ 7) × 100 ≈ 71.4%, which rounds to 71%.", "consequence": "<strong>You mark your notes.</strong> <em>\"Seventy-one per cent accept responsibility — but the twenty-nine per cent who refuse are arguably the play's most important characters. Their refusal is Priestley's warning: some people will never change.\"</em>", "next": "q3", "bloomsLevel": "Apply"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Key Term", "title": "The Audience's Advantage", "scene": "scene1", "body": "<p>As the final act reaches its climax, Mr Birling dismisses the Inspector's visit as a hoax. He is triumphant, convinced he has escaped judgement. But the phone rings — a real inspector is on the way.</p><p>Throughout the play, you — the audience — have known what the characters could not: that Mr Birling's predictions are wrong, that each character is connected to Eva Smith, that the Inspector's judgement is inescapable.</p><p>Your director asks you to name this technique — the one that has given you, the audience, power over the characters all evening.</p>", "question": "What is dramatic irony?", "options": [{"text": "When a character directly addresses the audience to share their thoughts", "correct": false}, {"text": "When the audience knows something that a character on stage does not", "correct": true}, {"text": "When a play uses exaggerated or unrealistic events for comic effect", "correct": false}, {"text": "When the setting of a play reflects the mood of the characters", "correct": false}], "maxAttempts": 2, "hintText": "Think about who has the knowledge advantage — the audience or the characters?", "feedbackCorrect": "Dramatic irony is when the audience knows something that a character on stage does not. In An Inspector Calls, this creates tension, dark humour, and moral judgement throughout the play.", "feedbackWrong": "A common mistake is retelling the plot instead of analysing it. Focus on how and why the writer makes specific choices, not just what happens. The answer is: when the audience knows something that a character on stage does not. This is dramatic irony — one of Priestley's most powerful tools.", "consequence": "<strong>The curtain falls.</strong> <em>\"Dramatic irony — the audience's secret weapon. You knew what the Birlings did not, and that knowledge made every one of Mr Birling's confident declarations a small tragedy in itself.\"</em>", "next": "end", "examTip": "In the exam, embed short quotations into your sentences and analyse individual word choices. Link your points to the writer's intentions and context.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "A flawless performance. You analysed the Inspector's reach, calculated the moral arithmetic, and named the technique that gives the audience its power. Priestley would approve.", "partial": "You grasped the essence of dramatic irony, though some of your analysis needs refining. Return to the theatre and try again.", "retry": "Every great critic watches the play more than once. Try again to achieve a perfect score."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
