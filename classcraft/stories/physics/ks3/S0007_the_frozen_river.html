<script>const STORY_DATA = {"meta": {"title": "The Frozen River", "subtitle": "Trust the physics — not your gut.", "subject": "Physics", "topic": "Density & Floating (ρ = m ÷ V)", "level": "KS3", "tags": ["🔬 Physics", "KS3 · Year 7–9", "Density & Floating", "~10 min", "3 questions"], "intro": "Your Arctic expedition team must cross a frozen river. The ice looks solid — but looks deceive. Only density calculations and knowledge of how objects float can tell you whether the ice will hold. One wrong step and everything goes into the water."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='150' width='700' height='112' fill='#8a7868'/><rect x='0' y='145' width='700' height='20' fill='#c0b8a8'/><rect x='0' y='140' width='700' height='8' fill='#b0a898'/><rect x='50' y='80' width='80' height='65' fill='#a09080'/><rect x='570' y='70' width='80' height='75' fill='#a09080'/><polygon points='50,80 90,40 130,80' fill='#b0a898'/><polygon points='570,70 610,30 650,70' fill='#b0a898'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='170' width='700' height='92' fill='#706860'/><rect x='0' y='155' width='700' height='20' fill='#b0a898'/><rect x='200' y='130' width='300' height='30' fill='#c0b8a8'/><rect x='250' y='100' width='200' height='35' fill='#b0a898' opacity='0.6'/><line x1='100' y1='162' x2='600' y2='162' stroke='#a09080' stroke-width='2' stroke-dasharray='10,8'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='180' width='700' height='82' fill='#8a7868'/><rect x='0' y='165' width='700' height='20' fill='#c0b8a8'/><rect x='150' y='140' width='400' height='28' fill='#b0a898'/><circle cx='230' cy='155' r='15' fill='#706860'/><circle cx='350' cy='155' r='15' fill='#706860'/><circle cx='470' cy='155' r='15' fill='#706860'/><rect x='100' y='60' width='80' height='90' fill='#a09080'/><rect x='520' y='60' width='80' height='90' fill='#a09080'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Crossing", "scene": "scene1", "body": "<p>The frozen river is 80 metres wide. Your team of four, each weighing around 80 kg, must cross carrying supplies. The ice is <strong>20 cm thick</strong> (0.2 m). But will it float — or will it crack?</p><p>Objects float when their density is <em>less</em> than the fluid they're in. Ice floats on water because its density is slightly less than liquid water. The key question: will the ice layer support the weight of your team?</p>", "factBox": {"label": "Density and floating", "text": "Density = mass ÷ volume. An object floats in a fluid if its density is less than the fluid's density. Ice has density ~917 kg/m³; liquid water is 1,000 kg/m³ — so ice floats on water."}, "formulaBox": {"label": "Key formula", "formula": "ρ = m ÷ V", "vars": "ρ = density (kg/m³) · m = mass (kg) · V = volume (m³)"}, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "mcq", "chapter": "Question 1 of 3 — Density & Floating", "title": "Why does ice float on liquid water?", "scene": "scene2", "body": "<p>Ice density: approximately <strong>917 kg/m³</strong>. Liquid water density: <strong>1,000 kg/m³</strong>.</p><p>Use your knowledge of density and floating to select the correct explanation.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Why does ice float on liquid water?", "options": [{"text": "Ice is colder, and cold objects always float", "correct": false}, {"text": "Ice is less dense than liquid water (917 < 1000 kg/m³), so the upthrust is greater than ice's weight", "correct": true}, {"text": "Ice is harder than water, so it rests on the surface", "correct": false}, {"text": "Ice contains air bubbles that lift it above the water", "correct": false}], "maxAttempts": 2, "hintText": "Compare the two densities: 917 kg/m³ vs 1,000 kg/m³. Which is smaller?", "feedbackCorrect": "Correct — ice is less dense than water, so buoyancy supports it.", "feedbackWrong": "A common mistake is forgetting to convert units. Pressure calculations need consistent units — check whether area is in m² or cm². Ice floats because its density (917 kg/m³) is less than water (1,000 kg/m³). Lower density = floats.", "consequence": "<strong>The ice floats — but that doesn't tell you if it can bear your weight.</strong>", "next": "bridge1", "nextWrong": "bridge1", "examTip": "In the exam, write the formula first, substitute with units, and watch for unit conversions — especially cm³ to m³.", "bloomsLevel": "Understand"}, {"id": "bridge1", "type": "story", "chapter": "Act II — Load Bearing", "title": "Can It Take the Weight?", "scene": "scene2", "body": "<p>Floating is one thing — supporting a load is another. A section of ice <strong>2 m long, 1 m wide and 0.2 m thick</strong> can support the weight of one person on a sled. You need to calculate the mass of this ice section first.</p><p>Ice density: <strong>917 kg/m³</strong>. Volume = length × width × thickness.</p>", "factBox": {"label": "Calculating mass from density", "text": "Rearrange ρ = m ÷ V to get mass: m = ρ × V. Find volume first, then multiply by density."}, "formulaBox": null, "workedBox": null, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Density & Mass", "title": "What is the mass of the ice section?", "scene": "scene2", "body": "<p>Ice density: <strong>917 kg/m³</strong>. Dimensions: <strong>2 m × 1 m × 0.2 m</strong>.</p><p>Calculate the volume first, then find the mass.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "Structure your working", "steps": "<p>Step 1: Volume = 2 × 1 × 0.2 = 0.4 m³</p><p>Step 2: mass = density × volume = 917 × 0.4 = ?</p>"}, "question": "What is the mass of this ice section?", "unit": "kg", "answer": 366.8, "tolerance": 1, "maxAttempts": 2, "hintText": "Volume = 2 × 1 × 0.2 = 0.4 m³. Then m = 917 × 0.4.", "feedbackCorrect": "366.8 kg. A hefty section of ice — and it needs to support about 80 kg of person.", "feedbackWrong": "A common mistake is forgetting to convert units. Pressure calculations need consistent units — check whether area is in m² or cm². Volume = 0.4 m³. Mass = 917 × 0.4 = 366.8 kg.", "consequence": "<strong>The ice section weighs over 360 kg and needs to support 80 kg. The ratio looks safe — but you spread the load just in case.</strong>", "next": "bridge2", "nextWrong": "bridge2", "bloomsLevel": "Apply"}, {"id": "bridge2", "type": "story", "chapter": "Act III — The Final Test", "title": "A Suspicious Section", "scene": "scene3", "body": "<p>Halfway across, the ice changes colour — slightly darker, more blue-grey. You tap it with your pole. It's thinner here. You estimate this section is only <strong>0.05 m thick</strong> over the same 2 m × 1 m area.</p><p>Which object from your kit could you use to test whether this section will bear weight without risking a person?</p>", "factBox": null, "formulaBox": {"label": "Volume of thinner section", "formula": "V = 2 × 1 × 0.05 = 0.1 m³", "vars": "Much less ice — much less support"}, "workedBox": null, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Floating & Safety", "title": "How do you test the ice safely?", "scene": "scene3", "body": "<p>The ice is thinner here. You have a <strong>10 kg equipment case</strong>, a <strong>5 kg rope coil</strong>, and an <strong>80 kg sledge</strong>. You want to test the ice's load-bearing capacity without risking a life.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Which object should you use to test the thinner ice section first?", "options": [{"text": "The 5 kg rope coil — lightest object, safest test of a weak section", "correct": true}, {"text": "The 80 kg sledge — biggest load, gives the most realistic test", "correct": false}, {"text": "A team member — they can jump back if it cracks", "correct": false}, {"text": "The 10 kg equipment case — heavier test, still safe enough", "correct": false}], "maxAttempts": 2, "hintText": "If the ice is weak, you want to test with the smallest load first to avoid catastrophic failure.", "feedbackCorrect": "Correct — the lightest object first. If it holds 5 kg, gradually increase to check the limit safely.", "feedbackWrong": "A common mistake is forgetting to convert units. Pressure calculations need consistent units — check whether area is in m² or cm². Start with the lightest load. The 5 kg rope is the safest first test.", "consequence": "<strong>The rope sits on the ice. It holds. You cross one by one, spread out wide to distribute weight — and make it safely to the far bank.</strong>", "next": "end", "nextWrong": "end", "examTip": "In the exam, write the formula first, substitute with units, and watch for unit conversions — especially cm³ to m³.", "bloomsLevel": "Understand"}], "ending": {"title": "Safe Crossing", "perfect": "Excellent — you applied density reasoning correctly, calculated mass from density and volume, and made the safest field decision.", "partial": "Good field instinct. Remember: ρ = m ÷ V, and objects float when their density is less than the surrounding fluid.", "topic": "You practised using ρ = m ÷ V to calculate density and mass, and applied the floating rule (less dense = floats).", "retry": "Cross again — every Arctic mission sharpens your physics."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
