oke=\"#706860\" stroke-width=\"2\"/><line x1=\"450\" y1=\"140\" x2=\"600\" y2=\"120\" stroke=\"#706860\" stroke-width=\"2\"/><line x1=\"350\" y1=\"220\" x2=\"200\" y2=\"250\" stroke=\"#706860\" stroke-width=\"2\"/><line x1=\"450\" y1=\"220\" x2=\"600\" y2=\"250\" stroke=\"#706860\" stroke-width=\"2\"/><circle cx=\"200\" cy=\"120\" r=\"10\" fill=\"#706860\" opacity=\"0.5\"/><circle cx=\"600\" cy=\"120\" r=\"10\" fill=\"#706860\" opacity=\"0.5\"/><circle cx=\"200\" cy=\"250\" r=\"10\" fill=\"#706860\" opacity=\"0.5\"/><circle cx=\"600\" cy=\"250\" r=\"10\" fill=\"#706860\" opacity=\"0.5\"/></svg>"}, "nodes": [{"id": "intro_scene", "chapter": "Scene 1 — The Neurology Lab", "title": "The Nervous System Relay", "scene": "neurolab", "body": "<p>You enter the neurology lab where a worried patient sits on the examination table. She stepped on a sharp piece of glass yesterday but felt <strong>no pain</strong> and had <strong>no reflex withdrawal</strong> in her left foot. Something is wrong with her reflex arc — the rapid, automatic pathway that should protect her from injury.</p><p>The senior neurologist turns to you. <strong>\"We need to trace the entire reflex arc — from the receptor in the toe, through the sensory neuron to the spinal cord, across the relay neuron, and back down the motor neuron to the effector muscle. Calculate the distances and timings. Find where the signal is failing.\"</strong></p><p>You know that nerve impulses travel at incredible speeds, but even a tiny disruption along the pathway can shut down the entire reflex.</p>", "factBox": {"label": "Key Concept — The Reflex Arc", "text": "A reflex arc is the nerve pathway involved in a reflex action. It consists of: a receptor (detects the stimulus), a sensory neuron (carries impulse to spinal cord), a relay neuron (in the spinal cord, connects sensory to motor), a motor neuron (carries impulse to effector), and an effector (muscle or gland that responds). Reflex arcs bypass the brain, making them extremely fast — essential for protective responses like pulling your hand away from a hot surface."}, "formulaBox": {"label": "Speed, Distance & Time", "formula": "Time = Distance ÷ Speed", "vars": "Distance in metres, Speed in metres per second, Time in seconds"}, "type": "story", "next": "q1"}, {"id": "q1", "chapter": "Question 1 — Impulse Travel Time", "title": "Racing Along the Nerve", "scene": "reflex", "body": "<p>You begin your analysis. The nerve impulse must travel from the <strong>receptor in the patient's toe</strong> all the way to the <strong>spinal cord</strong> — a distance of <strong>6 metres</strong> through the long sensory neuron pathway in her leg and spine. Medical textbooks tell you that nerve impulses in myelinated neurons travel at approximately <strong>120 metres per second</strong>.</p><p>You need to calculate exactly how long this journey takes.</p>", "workedBox": {"label": "Worked Example — Calculating Time", "steps": "<p><strong>Step 1:</strong> Write down the formula.<br>Time = Distance ÷ Speed</p><p><strong>Step 2:</strong> Substitute the values.<br>Time = 6 ÷ 120</p><p><strong>Step 3:</strong> Calculate.<br>Time = <strong>0.05 seconds</strong></p><p>That's just 50 milliseconds — faster than the blink of an eye!</p>"}, "type": "numeric", "question": "A nerve impulse travels at 120 m/s. How many seconds does it take to travel 6 metres?", "unit": "seconds", "answer": 0.05, "tolerance": 0.001, "maxAttempts": 2, "hintText": "Use the formula: Time = Distance ÷ Speed. So Time = 6 ÷ 120.", "feedbackCorrect": "Correct — the impulse takes just 0.05 seconds (50 milliseconds) to travel from toe to spinal cord. Nerves are astonishingly fast.", "feedbackWrong": "A common mistake is using vague language like 'it helps the body'. Always specify what structure or process you mean and explain the mechanism. The correct answer was 0.05 seconds. Calculate: 6 ÷ 120 = 0.05.", "consequence": "<strong>The neurologist nods.</strong> \"0.05 seconds — that's how fast the signal should reach the spinal cord. The fact that our patient had no reflex response means the signal is being blocked somewhere along the arc. Let's calculate the total distance.\"", "next": "q2", "bloomsLevel": "Apply"}, {"id": "q2", "chapter": "Question 2 — Total Arc Distance", "title": "Mapping the Full Pathway", "scene": "spine", "body": "<p>You now need to map the <strong>total distance</strong> the nerve impulse travels through the entire reflex arc. The arc consists of three neurons connected in series:</p><p>• <strong>Sensory neuron:</strong> 0.8 metres (from receptor in toe to spinal cord)<br>• <strong>Relay neuron:</strong> 0.02 metres (within the spinal cord — very short)<br>• <strong>Motor neuron:</strong> 0.6 metres (from spinal cord back to leg muscle)</p><p>You must add these distances to find the total pathway length.</p>", "workedBox": {"label": "Worked Example — Adding Distances", "steps": "<p><strong>Step 1:</strong> List all three neuron lengths.<br>Sensory = 0.8 m, Relay = 0.02 m, Motor = 0.6 m</p><p><strong>Step 2:</strong> Add them together.<br>0.8 + 0.02 + 0.6 = <strong>1.42 m</strong></p>"}, "type": "numeric", "question": "The sensory neuron is 0.8 m, the relay neuron is 0.02 m, and the motor neuron is 0.6 m. What is the total distance?", "unit": "metres", "answer": 1.42, "tolerance": 0.01, "maxAttempts": 2, "hintText": "Add all three neuron lengths: 0.8 + 0.02 + 0.6.", "feedbackCorrect": "Correct — the total reflex arc distance is 1.42 metres. The signal must travel this entire distance in a fraction of a second.", "feedbackWrong": "A common mistake is using vague language like 'it helps the body'. Always specify what structure or process you mean and explain the mechanism. The correct answer was 1.42 metres. Add: 0.8 + 0.02 + 0.6 = 1.42.", "consequence": "<strong>You trace the pathway on the diagnostic screen.</strong> \"1.42 metres total — and our scans show the signal is reaching the spinal cord normally via the sensory neuron, and the relay neuron is intact. That means the damage must be on the motor neuron — the return path. The signal gets to the spinal cord but never makes it back to the muscle.\"", "next": "q3", "bloomsLevel": "Apply"}, {"id": "q3", "chapter": "Question 3 — Purpose of Reflexes", "title": "Why Reflexes Matter", "scene": "neurolab", "body": "<p>With the injury located, the neurologist schedules treatment for the damaged motor neuron. But before you leave, she asks you to explain to the patient <strong>why</strong> having a working reflex arc is so important. The patient wants to understand what her body was supposed to do when she stepped on that glass.</p>", "type": "mcq", "question": "What is the purpose of a reflex arc?", "options": [{"text": "To send sensory information to the brain for conscious decision-making", "correct": false}, {"text": "To produce a fast, automatic protective response without involving the brain", "correct": true}, {"text": "To store memories of painful experiences for future avoidance", "correct": false}, {"text": "To increase blood flow to injured areas for faster healing", "correct": false}], "maxAttempts": 2, "hintText": "Think about why reflexes bypass the brain entirely. What is the advantage of not waiting for a conscious decision?", "feedbackCorrect": "Correct — reflex arcs produce fast, automatic responses that protect the body without waiting for the brain to process the information. This speed is crucial — by the time you consciously feel pain, your foot has already pulled away from the danger.", "feedbackWrong": "A common mistake is using vague language like 'it helps the body'. Always specify what structure or process you mean and explain the mechanism. The correct answer is: To produce a fast, automatic protective response without involving the brain. Reflexes bypass the brain to save time — speed is essential for protection.", "consequence": "<strong>The patient nods slowly.</strong> \"So my reflex arc should have pulled my foot away from the glass before I even felt the pain — but because the motor neuron is damaged, the signal never reached the muscle. My foot stayed on the glass.\" <strong>\"Exactly,\"</strong> you reply. <strong>\"But we've found the problem, and treatment starts tomorrow.\"</strong>", "next": "end", "examTip": "In the exam, distinguish clearly between nervous and hormonal responses. State the pathway: stimulus → receptor → coordinator → effector → response.", "bloomsLevel": "Understand"}], "ending": {"perfect": "Exceptional diagnostic work, Neurologist. You calculated nerve impulse timing, mapped the full reflex arc distance, and pinpointed the motor neuron injury. The patient's treatment is scheduled, and her reflex response should be fully restored within weeks.", "partial": "The injury was eventually located, but your calculation errors caused delays. Review the speed-distance-time formula and the structure of the reflex arc. In neurology, precision is everything.", "retry": "Want to attempt the mission again and achieve a perfect score?"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
