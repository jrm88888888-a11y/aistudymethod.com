2='160' stroke='#706860' stroke-width='2'/><circle cx='230' cy='170' r='30' fill='#8a7868'/><circle cx='470' cy='170' r='30' fill='#8a7868'/><line x1='205' y1='195' x2='170' y2='220' stroke='#706860' stroke-width='2'/><line x1='255' y1='195' x2='290' y2='220' stroke='#706860' stroke-width='2'/><line x1='445' y1='195' x2='410' y2='220' stroke='#706860' stroke-width='2'/><line x1='495' y1='195' x2='530' y2='220' stroke='#706860' stroke-width='2'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='225' width='700' height='37' fill='#706860'/><rect x='150' y='40' width='160' height='100' fill='#8a7868'/><rect x='390' y='40' width='160' height='100' fill='#8a7868'/><line x1='195' y1='60' x2='195' y2='90' stroke='#b0a898' stroke-width='3'/><line x1='210' y1='60' x2='210' y2='90' stroke='#706860' stroke-width='3'/><line x1='240' y1='65' x2='240' y2='95' stroke='#b0a898' stroke-width='3'/><line x1='255' y1='65' x2='255' y2='95' stroke='#706860' stroke-width='3'/><line x1='435' y1='60' x2='435' y2='90' stroke='#706860' stroke-width='3'/><line x1='450' y1='60' x2='450' y2='90' stroke='#b0a898' stroke-width='3'/><line x1='480' y1='65' x2='480' y2='95' stroke='#b0a898' stroke-width='3'/><line x1='495' y1='65' x2='495' y2='95' stroke='#706860' stroke-width='3'/><rect x='310' y='70' width='80' height='40' fill='#a09080'/><polygon points='350,55 365,70 335,70' fill='#a09080'/><polygon points='350,125 365,110 335,110' fill='#a09080'/><rect x='200' y='170' width='300' height='50' fill='#8a7868'/><rect x='220' y='180' width='260' height='30' fill='#a09080'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "The Anomaly", "scene": "scene1", "body": "<p>The referral letter sits on your desk, clinical and precise: <em>\"Prenatal karyotype screening has identified a potential trisomy. Please advise on mechanism and recurrence risk.\"</em></p><p>You pull up the patient file. The couple — both healthy, no family history of genetic disorders — are anxious and confused. How could this happen?</p><p>The answer lies in <strong>meiosis</strong>, the specialised form of cell division that produces sex cells — <strong>gametes</strong> (sperm and eggs). Unlike mitosis, which produces identical copies, meiosis halves the chromosome number. A human body cell has <strong>46 chromosomes</strong> (23 pairs). Meiosis must reduce this to <strong>23</strong> — one from each pair — so that when sperm meets egg, the full set of 46 is restored.</p><p>But meiosis also introduces <strong>genetic variation</strong> through crossing over and independent assortment. And sometimes, it makes mistakes. A single error — chromosomes failing to separate — can result in a gamete with too many or too few chromosomes.</p><p>You must trace the numbers, calculate the outputs, and explain the biology.</p>", "factBox": {"label": "Meiosis — Halving the Chromosome Number", "text": "Meiosis is a two-stage division (meiosis I and meiosis II) that produces four genetically different haploid gametes from one diploid cell. In meiosis I, homologous pairs separate (halving the number). In meiosis II, sister chromatids separate (like mitosis). Crossing over in prophase I and independent assortment in metaphase I create genetic variation in the offspring."}, "formulaBox": {"label": "Gamete Production", "formula": "1 cell → meiosis → 4 gametes", "vars": "Diploid cell (2n) → four haploid gametes (n) · In humans: 2n = 46, n = 23"}, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Meiosis & Genetic Variation", "title": "The Chromosome Count", "scene": "scene2", "body": "<p>You begin your explanation to the couple with the fundamentals. You draw a simple diagram on the whiteboard: a human body cell with its full set of <strong>46 chromosomes</strong> — 23 pairs, one set inherited from each parent.</p><p><em>\"When your body makes sperm or egg cells,\"</em> you explain, <em>\"it must halve this number. Otherwise, the baby would end up with 92 chromosomes, then 184 in the next generation, and so on — it would be chaos.\"</em></p><p>The couple nods. You point to the diagram. <em>\"So after meiosis, how many chromosomes does each gamete contain?\"</em></p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>A human body cell has <strong>46 chromosomes</strong> (diploid, 2n).</p><p>Meiosis halves the chromosome number to produce haploid (n) gametes.</p><p>So: 46 ÷ 2 = ?</p>"}, "question": "How many chromosomes does each gamete have after meiosis?", "unit": "chromosomes", "answer": 23, "tolerance": 0, "maxAttempts": 2, "hintText": "Meiosis halves the chromosome number. If the body cell has 46, divide by 2.", "feedbackCorrect": "23 chromosomes. Each gamete carries exactly half the genetic information — one chromosome from each homologous pair.", "feedbackWrong": "A common mistake is confusing genes, chromosomes, and DNA. A gene is a section of DNA; chromosomes are long DNA molecules containing many genes. The answer is 23. A diploid human cell has 46 chromosomes; meiosis halves this to 23 in each gamete.", "consequence": "<strong>Twenty-three.</strong> The couple's expressions sharpen with understanding. You continue: <em>\"When sperm meets egg, 23 + 23 = 46. The full set is restored. But if meiosis makes an error and a gamete ends up with 24 instead of 23...\"</em> You let the implication hang in the air.", "next": "q2", "bloomsLevel": "Apply"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Meiosis & Genetic Variation", "title": "The Gamete Factory", "scene": "scene1", "body": "<p>The couple has a practical question. The husband asks: <em>\"You said meiosis produces four gametes from each cell. If we're talking about egg production — say 50 cells undergo meiosis — how many egg cells does that produce in total?\"</em></p><p>You appreciate the question. In reality, egg production is more complex (only one of the four cells becomes a functional egg), but for the purpose of understanding meiosis mathematically, the calculation is straightforward.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Each cell that undergoes meiosis produces <strong>4 gametes</strong>.</p><p>Number of cells = 50</p><p>Total gametes = 50 × 4 = ?</p>"}, "question": "How many gametes are produced if 50 cells undergo meiosis?", "unit": "gametes", "answer": 200, "tolerance": 0, "maxAttempts": 2, "hintText": "Each cell produces 4 gametes. Multiply: 50 × 4 = ?", "feedbackCorrect": "200 gametes. Each original cell divides twice during meiosis (meiosis I and meiosis II), producing four haploid daughter cells.", "feedbackWrong": "A common mistake is confusing genes, chromosomes, and DNA. A gene is a section of DNA; chromosomes are long DNA molecules containing many genes. The answer is 200. Each cell produces 4 gametes through meiosis: 50 × 4 = 200.", "consequence": "<strong>Two hundred gametes from fifty cells.</strong> You explain that each of these 200 gametes is genetically unique — thanks to crossing over and independent assortment. This variation is the raw material of evolution.", "next": "q3", "bloomsLevel": "Apply"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Meiosis & Genetic Variation", "title": "The Source of Variation", "scene": "scene3", "body": "<p>The couple now understands the basics. But the wife has one more question — the crucial one.</p><p><em>\"You said every gamete is genetically different. How? If they all come from the same cell, why aren't they identical like in mitosis?\"</em></p><p>This is the heart of meiosis — the mechanism that generates the staggering diversity of life. You take a deep breath and prepare to explain the two key processes that make every gamete unique.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "How does meiosis contribute to genetic variation?", "options": [{"text": "By copying DNA exactly, so every gamete is identical to the parent cell", "correct": false}, {"text": "Through crossing over (recombination) in prophase I and independent assortment of chromosomes in metaphase I", "correct": true}, {"text": "By randomly mutating genes during DNA replication in interphase", "correct": false}, {"text": "By combining chromosomes from two different organisms during cell division", "correct": false}], "maxAttempts": 2, "hintText": "Think about what happens to homologous chromosomes in meiosis I. In prophase I, sections of DNA are swapped between chromosomes. In metaphase I, which chromosome from each pair goes to which side is random.", "feedbackCorrect": "Exactly right. Crossing over shuffles alleles between homologous chromosomes, and independent assortment means each gamete receives a random combination of maternal and paternal chromosomes. Together, they create immense genetic diversity.", "feedbackWrong": "A common mistake is confusing genes, chromosomes, and DNA. A gene is a section of DNA; chromosomes are long DNA molecules containing many genes. The correct answer is: through crossing over (recombination) in prophase I and independent assortment of chromosomes in metaphase I. These two processes ensure every gamete is genetically unique.", "consequence": "<strong>The couple exchanges a glance of understanding.</strong> Genetic variation is not a flaw — it's the engine of life's diversity. But occasionally, the machinery of meiosis slips, and an extra chromosome ends up in a gamete. That's what happened here. Armed with understanding, they face the future with clarity.", "next": "end", "examTip": "In the exam, draw a Punnett square to show inheritance patterns. Define 'genotype' and 'phenotype' separately — each earns a mark.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Outstanding genetic analysis. Your understanding of meiosis was flawless — chromosome numbers, gamete production, and the sources of variation. The couple left with clarity and confidence.", "partial": "The genetics consultation tested your knowledge, and some questions proved challenging. But your grasp of meiosis helped explain the situation. Review crossing over, independent assortment, and chromosome numbers.", "retry": "Want to return to the Whitfield Laboratory and work through the meiosis calculations again?"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>

<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
</html>
