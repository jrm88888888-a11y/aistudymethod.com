80' cy='208' r='4' fill='#a09080'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><rect x='0' y='200' width='700' height='62' fill='#706860'/><rect x='100' y='60' width='500' height='140' fill='#8a7868'/><rect x='120' y='45' width='460' height='20' fill='#b0a898'/><rect x='150' y='90' width='60' height='80' fill='#706860'/><rect x='250' y='90' width='60' height='80' fill='#706860'/><rect x='350' y='90' width='60' height='80' fill='#706860'/><rect x='450' y='90' width='60' height='80' fill='#706860'/><circle cx='180' cy='120' r='8' fill='#b0a898'/><circle cx='280' cy='115' r='8' fill='#b0a898'/><circle cx='380' cy='125' r='8' fill='#b0a898'/><circle cx='480' cy='118' r='8' fill='#b0a898'/><rect x='130' y='180' width='440' height='3' fill='#b0a898'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><rect x='80' y='40' width='3' height='180' fill='#8a7868'/><rect x='80' y='220' width='540' height='3' fill='#8a7868'/><circle cx='160' cy='180' r='10' fill='#706860'/><circle cx='260' cy='140' r='14' fill='#706860'/><circle cx='360' cy='90' r='18' fill='#8a7868'/><circle cx='460' cy='60' r='22' fill='#a09080'/><line x1='160' y1='180' x2='260' y2='140' stroke='#706860' stroke-width='2'/><line x1='260' y1='140' x2='360' y2='90' stroke='#706860' stroke-width='2'/><line x1='360' y1='90' x2='460' y2='60' stroke='#706860' stroke-width='2'/><rect x='550' y='80' width='60' height='40' fill='#8a7868'/><rect x='550' y='130' width='60' height='40' fill='#a09080'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "Vanishing Beetles", "scene": "scene1", "body": "<p>The morning mist clings to Thornmere Nature Reserve as you pull on your Wellington boots and step into the ancient woodland. Something is wrong. The forest floor, once teeming with ground beetles, feels eerily quiet beneath your feet.</p><p>The head ranger meets you at the field station, worry etched across her face: <em>\"We've barely seen any beetles this season. The board wants numbers — real numbers — before they'll release the emergency funding.\"</em></p><p>You nod. There's only one reliable way to estimate a wild population without counting every single organism: the <strong>mark-recapture method</strong>, also known as the <strong>Lincoln Index</strong>. You'll capture a sample, mark them, release them, then capture again — and use mathematics to reveal the hidden truth.</p><p>Your pitfall traps are already set. It's time to crunch the numbers.</p>", "factBox": {"label": "Mark-Recapture Method", "text": "The mark-recapture method estimates population size by capturing a sample, marking them, releasing them back, then capturing a second sample. The proportion of marked individuals in the second sample reflects the proportion of marked individuals in the whole population. This only works if marked animals mix randomly and there is no immigration, emigration, births, or deaths between samples."}, "formulaBox": {"label": "Lincoln Index", "formula": "N = (n₁ × n₂) ÷ m", "vars": "N = estimated population · n₁ = number captured and marked first time · n₂ = number captured second time · m = number in second sample that are marked"}, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Mark-Recapture", "title": "The First Survey", "scene": "scene2", "body": "<p>You haul up the pitfall traps at dawn. The first capture yields <strong>40 ground beetles</strong>. You carefully mark each one with a tiny dot of non-toxic paint on the underside of their elytra, then release them back into the leaf litter.</p><p>Two days later — enough time for the marked beetles to mix back into the population — you set the traps again. This time you capture <strong>50 beetles</strong>. You flip each one over, heart pounding. Exactly <strong>10 of them bear your paint mark</strong>.</p><p>The ranger watches over your shoulder as you pull out your calculator. The entire conservation plan hinges on this number.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Use: <strong>N = (n₁ × n₂) ÷ m</strong></p><p>n₁ = 40 (captured and marked first time)</p><p>n₂ = 50 (captured second time)</p><p>m = 10 (marked in second sample)</p><p>So: N = (40 × 50) ÷ 10 = ?</p>"}, "question": "What is the estimated total population of beetles?", "unit": "beetles", "answer": 200, "tolerance": 0, "maxAttempts": 2, "hintText": "Multiply n₁ by n₂ first: 40 × 50 = 2000. Then divide by m: 2000 ÷ 10 = ?", "feedbackCorrect": "200 beetles. The population is larger than it first appeared — but is it large enough to sustain itself? Only further surveys will tell.", "feedbackWrong": "A common mistake is using vague language like 'it helps the body'. Always specify what structure or process you mean and explain the mechanism. The answer is 200. N = (40 × 50) ÷ 10 = 2000 ÷ 10 = 200.", "consequence": "<strong>Two hundred beetles.</strong> The ranger frowns. Last year's estimate was over 500. The population has crashed by more than half. You need more data from a second survey site.", "next": "q2", "bloomsLevel": "Apply"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Mark-Recapture", "title": "The Second Survey", "scene": "scene3", "body": "<p>You move to the eastern woodland — a wilder, more overgrown section of the reserve. The traps go down again.</p><p>First capture: <strong>60 beetles</strong> are caught and marked with a different colour paint, then released. Two days later, the second capture pulls in <strong>80 beetles</strong>. You examine each one under your hand lens. This time, <strong>12 carry the mark</strong>.</p><p>The ranger leans in. <em>\"Is it better here? Please tell me it's better here.\"</em></p><p>You steady your hands and run the calculation.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Use: <strong>N = (n₁ × n₂) ÷ m</strong></p><p>n₁ = 60, n₂ = 80, m = 12</p><p>So: N = (60 × 80) ÷ 12 = ?</p>"}, "question": "What is the estimated population at the eastern site?", "unit": "beetles", "answer": 400, "tolerance": 0, "maxAttempts": 2, "hintText": "Multiply 60 × 80 = 4800. Then divide by 12: 4800 ÷ 12 = ?", "feedbackCorrect": "400 beetles — double the western site. The eastern woodland is healthier, but still below historical levels.", "feedbackWrong": "A common mistake is using vague language like 'it helps the body'. Always specify what structure or process you mean and explain the mechanism. The answer is 400. N = (60 × 80) ÷ 12 = 4800 ÷ 12 = 400.", "consequence": "<strong>Four hundred beetles in the east.</strong> Better than the west, but the ranger shakes her head. <em>\"Five years ago, both sites had over a thousand. Something is killing them.\"</em> You compile your report for the emergency board meeting.", "next": "q3", "bloomsLevel": "Apply"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Mark-Recapture", "title": "The Assumption", "scene": "scene1", "body": "<p>You stand before the conservation board, your data projected on the screen. The chair leans forward, adjusting his glasses.</p><p><em>\"These numbers are estimates, not certainties. What assumption must hold true for your mark-recapture data to be reliable?\"</em></p><p>Every eye in the room turns to you. If you can't defend your method, the funding dies — and so might the beetles.</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "Which assumption must be true for mark-recapture to give an accurate estimate?", "options": [{"text": "The beetles must all be the same age and size", "correct": false}, {"text": "Marked organisms mix randomly with unmarked ones, and there is no immigration, emigration, births, or deaths between samples", "correct": true}, {"text": "The second sample must always be larger than the first", "correct": false}, {"text": "The paint marks must be visible to predators so they avoid marked beetles", "correct": false}], "maxAttempts": 2, "hintText": "Think about what could make your second sample unrepresentative of the whole population. What if marked beetles clustered together, or some left the area?", "feedbackCorrect": "Exactly right. If marked organisms don't mix randomly, or if the population changes between samples, the proportion of marked individuals in the second sample won't reflect the true population ratio.", "feedbackWrong": "A common mistake is using vague language like 'it helps the body'. Always specify what structure or process you mean and explain the mechanism. The correct answer is: marked organisms must mix randomly with unmarked ones, and there must be no immigration, emigration, births, or deaths between samples. Without these conditions, the ratio in the second sample is unreliable.", "consequence": "<strong>The board nods approvingly.</strong> Your methodology is sound, your assumptions clearly stated. The emergency funding is approved. Thornmere's beetles have a fighting chance.", "next": "end", "examTip": "In the exam, use precise biological terminology and always link structure to function. Explain mechanisms step by step.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Outstanding fieldwork. Your mark-recapture calculations were flawless, and you defended your methodology with precision. The conservation board has approved full emergency funding for Thornmere Nature Reserve.", "partial": "The survey tested your skills, and some calculations proved tricky. But your understanding of the Lincoln Index helped build the case for conservation. Review the formula and you'll nail it next time.", "retry": "Want to return to Thornmere and run the survey again with perfect accuracy?"}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
</html>
