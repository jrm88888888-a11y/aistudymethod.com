circle cx=\"160\" cy=\"200\" r=\"4\" fill=\"#706860\"/></svg>"}, "nodes": [{"id": "intro_scene", "chapter": "Chapter 1 — The Neuroscience Lab", "title": "Resting and Threshold", "scene": "neuro", "body": "<p>You place a microelectrode inside a single neuron. The oscilloscope screen shows a steady <strong>resting potential of −70 mV</strong>. This is the voltage difference across the membrane when the neuron is at rest — maintained by the sodium-potassium pump and potassium leak channels.</p><p>Your supervisor explains: to fire an action potential, the membrane must be depolarised to the <strong>threshold potential of −55 mV</strong>. Only then will voltage-gated sodium channels open in a rapid cascade.</p>", "factBox": {"label": "Key Concept", "text": "The resting potential of a neuron is typically around −70 mV. Depolarisation means the membrane potential becomes less negative. If depolarisation reaches the threshold (about −55 mV), an action potential is triggered."}, "formulaBox": {"label": "Depolarisation Required", "formula": "Depolarisation = Threshold − Resting Potential", "vars": "Threshold ≈ −55 mV · Resting potential ≈ −70 mV · Depolarisation = change in mV needed"}, "type": "story", "next": "q1"}, {"id": "q1", "chapter": "Chapter 2 — Reaching Threshold", "title": "How Much Depolarisation?", "body": "<p>You apply a small electrical stimulus to the neuron through your electrode. The membrane potential begins to shift from its resting value of <strong>−70 mV</strong> towards the threshold of <strong>−55 mV</strong>.</p><p>You need to calculate exactly how many millivolts of depolarisation are required to reach threshold. Remember: depolarisation is a <em>positive</em> change — the membrane becomes less negative.</p>", "workedBox": {"label": "Worked Example — Calculating depolarisation", "steps": "<p><strong>Given:</strong> Resting potential = −70 mV, Threshold = −55 mV</p><p><strong>Step 1:</strong> Depolarisation needed = Threshold − Resting potential</p><p><strong>Step 2:</strong> = −55 − (−70) = −55 + 70 = <strong>?</strong></p>"}, "type": "numeric", "question": "How many millivolts of depolarisation are needed to reach threshold?", "unit": "mV", "answer": 15, "tolerance": 0, "maxAttempts": 2, "hintText": "Subtract the resting potential from the threshold: −55 − (−70). Remember that subtracting a negative number is the same as adding.", "feedbackCorrect": "Correct — 15 mV of depolarisation is needed. The membrane must shift from −70 mV to −55 mV, a change of +15 mV.", "feedbackWrong": "A common mistake is using vague language like 'it helps the body'. Always specify what structure or process you mean and explain the mechanism. The correct answer is 15 mV. Threshold (−55) minus resting potential (−70) = −55 + 70 = 15 mV.", "consequence": "<strong>The oscilloscope confirms it.</strong> As you increase the stimulus, the moment the membrane depolarises by 15 mV, voltage-gated sodium channels fly open and the action potential fires — a rapid spike to +40 mV.", "next": "q2", "bloomsLevel": "Analyse"}, {"id": "q2", "chapter": "Chapter 3 — Firing Frequency", "title": "Time Spent in Action Potentials", "body": "<p>Your supervisor now asks you to think about <strong>firing frequency</strong>. A neuron fires <strong>200 action potentials per second</strong>. Each action potential lasts approximately <strong>2 milliseconds</strong> (0.002 seconds).</p><p>You need to work out what percentage of each second is occupied by action potentials. This is important for understanding the neuron's <strong>refractory period</strong> and its maximum firing rate.</p>", "workedBox": {"label": "Worked Example — Calculating time occupied", "steps": "<p><strong>Given:</strong> 200 action potentials per second, each lasting 0.002 s</p><p><strong>Step 1:</strong> Total time in APs = 200 × 0.002 = 0.4 s</p><p><strong>Step 2:</strong> Percentage of 1 second = (0.4 / 1.0) × 100 = <strong>?</strong>%</p>"}, "type": "numeric", "question": "What percentage of each second is spent in action potentials?", "unit": "%", "answer": 40, "tolerance": 0, "maxAttempts": 2, "hintText": "Multiply the number of action potentials (200) by the duration of each one (0.002 s) to get total time. Then convert to a percentage of 1 second.", "feedbackCorrect": "Correct — 200 × 0.002 = 0.4 seconds, which is 40% of each second. The remaining 60% is spent in refractory periods and at rest.", "feedbackWrong": "A common mistake is using vague language like 'it helps the body'. Always specify what structure or process you mean and explain the mechanism. The correct answer is 40%. Total time = 200 × 0.002 = 0.4 s, and (0.4 / 1.0) × 100 = 40%.", "consequence": "<strong>You note the implications.</strong> At 200 Hz, the neuron spends 40% of its time firing. This means there is still capacity for higher firing rates — but the absolute refractory period sets an upper limit.", "next": "q3", "bloomsLevel": "Analyse"}, {"id": "q3", "chapter": "Chapter 4 — The All-or-Nothing Principle", "title": "Why Not Bigger?", "body": "<p>You increase the stimulus strength dramatically — double, then triple the original current. Yet on the oscilloscope, every action potential looks <strong>exactly the same height</strong>. The peak is always +40 mV, no matter how strong the stimulus.</p><p>Your supervisor asks you to explain this fundamental principle of neuronal signalling.</p>", "type": "mcq", "question": "Why does a stronger stimulus NOT produce a bigger action potential?", "options": [{"text": "Because the neuron runs out of sodium ions after the first few impulses", "correct": false}, {"text": "Because the electrode cannot deliver enough current to increase the amplitude", "correct": false}, {"text": "The all-or-nothing principle — once threshold is reached, the action potential always fires at the same magnitude regardless of stimulus strength", "correct": true}, {"text": "Because stronger stimuli are absorbed by the myelin sheath before reaching the axon", "correct": false}], "maxAttempts": 2, "hintText": "Think about what happens once threshold is reached: ALL voltage-gated sodium channels open. The size of the stimulus above threshold doesn't change how many channels open.", "feedbackCorrect": "Exactly — the all-or-nothing principle. Once depolarisation reaches threshold, all available voltage-gated sodium channels open. A stronger stimulus cannot open them 'more'. The action potential is always the same size.", "feedbackWrong": "A common mistake is using vague language like 'it helps the body'. Always specify what structure or process you mean and explain the mechanism. The correct answer is the all-or-nothing principle. Once threshold is reached, the action potential fires at full magnitude regardless of stimulus strength. The neuron either fires completely or not at all.", "consequence": "<strong>The principle clicks into place.</strong> You realise that the nervous system encodes stimulus intensity not by bigger action potentials, but by <em>higher frequency</em> of firing. A louder sound means more impulses per second, not larger impulses.", "next": "end", "examTip": "In the exam, use precise biological terminology and always link structure to function. Explain mechanisms step by step.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Excellent neuroscience. You've mastered resting potential, threshold, firing frequency, and the all-or-nothing principle.", "partial": "Good work. The action potential involves several interlinked concepts — review the threshold calculation and all-or-nothing principle, then try again.", "retry": "Want to strengthen your understanding of nerve impulses? Return to the neuroscience lab."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
