<script>const STORY_DATA = {"meta": {"title": "The Drone Path", "subtitle": "Programme the vector. Miss the target, lose the drone.", "subject": "Mathematics", "topic": "Vectors", "level": "GCSE", "tags": ["📐 Mathematics", "GCSE · Ages 14–16", "Vectors", "~10 min", "3 questions"], "intro": "You are the pilot of a reconnaissance drone deep behind enemy lines. Every movement is programmed as a vector — a quantity with both magnitude and direction. One miscalculation and the drone drifts off course into hostile airspace. Calculate the vectors, combine the paths, and bring the drone home."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><rect x='0' y='220' width='700' height='42' fill='#706860'/><circle cx='150' cy='130' r='20' fill='none' stroke='#8a7868' stroke-width='2'/><line x1='170' y1='130' x2='230' y2='130' stroke='#8a7868' stroke-width='1.5'/><line x1='170' y1='125' x2='230' y2='125' stroke='#a09080' stroke-width='1'/><polygon points='250,115 280,130 250,145' fill='#706860'/><line x1='280' y1='130' x2='500' y2='130' stroke='#706860' stroke-width='2' stroke-dasharray='8,4'/><circle cx='530' cy='130' r='8' fill='#8a7868'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#a09080'/><line x1='100' y1='200' x2='400' y2='200' stroke='#706860' stroke-width='1' stroke-dasharray='4,4'/><line x1='100' y1='200' x2='100' y2='50' stroke='#706860' stroke-width='1' stroke-dasharray='4,4'/><line x1='100' y1='200' x2='340' y2='80' stroke='#8a7868' stroke-width='3'/><polygon points='335,85 350,75 340,95' fill='#8a7868'/><line x1='100' y1='200' x2='340' y2='200' stroke='#b0a898' stroke-width='1.5'/><line x1='340' y1='200' x2='340' y2='80' stroke='#b0a898' stroke-width='1.5'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b0a898'/><line x1='100' y1='200' x2='280' y2='80' stroke='#8a7868' stroke-width='2.5'/><polygon points='275,85 290,75 280,95' fill='#8a7868'/><line x1='280' y1='80' x2='200' y2='20' stroke='#706860' stroke-width='2.5'/><polygon points='205,25 195,15 210,30' fill='#706860'/><line x1='100' y1='200' x2='200' y2='20' stroke='#a09080' stroke-width='2' stroke-dasharray='6,3'/><polygon points='205,25 195,15 200,30' fill='#a09080'/></svg>"}, "nodes": [{"id": "intro_scene", "type": "story", "chapter": "Mission Briefing", "title": "Vector Navigation", "scene": "scene1", "body": "<p>The drone sits on the launch pad, rotors humming. Your screen displays a coordinate grid — every movement must be entered as a <strong>column vector</strong>, specifying horizontal and vertical displacement.</p><p>Your first objective: fly the drone from base to the observation point. But the route isn't straight — you'll need to calculate <strong>magnitudes</strong> and <strong>combine vectors</strong> to navigate around obstacles.</p><p>The mission clock is ticking. Programme the first vector.</p>", "factBox": {"label": "Key Concept — Vectors", "text": "A vector has both magnitude (size) and direction. The column vector (3, 4) means move 3 units right and 4 units up. The magnitude (length) is found using Pythagoras: |v| = √(x² + y²)."}, "formulaBox": {"label": "Magnitude of a Vector", "formula": "|v| = √(x² + y²)", "vars": "x = horizontal component · y = vertical component"}, "workedBox": null, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Vectors", "title": "First Flight Leg", "scene": "scene2", "body": "<p>The first leg of the drone's flight is programmed as vector <strong>a = (3, 4)</strong>. Before launching, you must confirm the <strong>magnitude</strong> — the actual distance the drone will travel.</p><p>Use Pythagoras to find |a|.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>|a| = √(x² + y²) = √(3² + 4²)</p><p>= √(9 + 16) = √25</p><p>What is √25?</p>"}, "question": "What is the magnitude of vector a = (3, 4)?", "unit": "", "answer": 5, "tolerance": 0, "maxAttempts": 2, "hintText": "|a| = √(3² + 4²) = √(9 + 16) = √25. What is the square root of 25?", "feedbackCorrect": "Magnitude = 5. This is the classic 3-4-5 Pythagorean triple.", "feedbackWrong": "A common mistake is rushing to an answer without showing working. Write out each step — errors often hide in skipped steps. The answer is 5. |a| = √(9 + 16) = √25 = 5.", "consequence": "<strong>Five units — the drone's first leg is confirmed.</strong> You lock in the vector and the drone lifts off, tracing a clean diagonal across the grid.", "next": "q2", "nextWrong": "q2", "bloomsLevel": "Apply"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Vectors", "title": "Combined Course", "scene": "scene3", "body": "<p>The drone must now fly two legs in sequence: <strong>a = (3, 4)</strong> followed by <strong>b = (−1, 2)</strong>. The <strong>resultant vector</strong> a + b gives the drone's total displacement from the start.</p><p>First, add the vectors: a + b = (3 + (−1), 4 + 2) = (2, 6).</p><p>Now find the <strong>magnitude</strong> of the resultant.</p>", "factBox": null, "formulaBox": null, "workedBox": {"label": "How to approach it", "steps": "<p>Resultant = a + b = (3 + (−1), 4 + 2) = <strong>(2, 6)</strong>.</p><p>|resultant| = √(2² + 6²) = √(4 + 36) = √40.</p><p>√40 = √(4 × 10) = 2√10. As a decimal, 2 × 3.162 = ?</p>"}, "question": "What is the magnitude of the resultant vector? (Round to 2 d.p.)", "unit": "", "answer": 6.32, "tolerance": 0.1, "maxAttempts": 2, "hintText": "√40 ≈ 6.32. You can also compute √40 = √(4×10) = 2√10 ≈ 2 × 3.162.", "feedbackCorrect": "√40 ≈ 6.32. The drone's total displacement from base is about 6.32 units.", "feedbackWrong": "A common mistake is rushing to an answer without showing working. Write out each step — errors often hide in skipped steps. The answer is 6.32. |resultant| = √(4 + 36) = √40 ≈ 6.32.", "consequence": "<strong>6.32 units from base.</strong> The drone's combined path takes it further than either leg alone — but not as far as the sum of both magnitudes, because the direction changed.", "next": "q3", "nextWrong": "q3", "bloomsLevel": "Apply"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Vectors", "title": "The Negative Vector", "scene": "scene3", "body": "<p>Mission control orders an emergency recall. To bring the drone straight back, you need the <strong>negative vector</strong> — the vector that reverses the direction.</p><p>If the drone's current displacement is <strong>v = (−3, 4)</strong>, what is <strong>−v</strong>?</p>", "factBox": null, "formulaBox": null, "workedBox": null, "question": "If v = (−3, 4), what is −v?", "options": [{"text": "(3, 4) — this only negates the x-component", "correct": false}, {"text": "(−3, −4) — this only negates the y-component", "correct": false}, {"text": "(3, −4) — both components are negated", "correct": true}, {"text": "(4, −3) — this swaps the components", "correct": false}], "maxAttempts": 2, "hintText": "The negative of a vector negates BOTH components: −(x, y) = (−x, −y).", "feedbackCorrect": "−v = (3, −4). Negating a vector reverses both components, sending the drone back to base.", "feedbackWrong": "A common mistake is rushing to an answer without showing working. Write out each step — errors often hide in skipped steps. The answer is (3, −4). −(−3, 4) = (3, −4) — negate both components.", "consequence": "<strong>Vector (3, −4) confirmed.</strong> The drone pivots and streaks back toward base. It touches down on the landing pad with fuel to spare. Mission accomplished.", "next": "end", "nextWrong": "end", "examTip": "In the exam, show all working clearly — method marks can be awarded even if the final answer is wrong. Check your answer makes sense in context.", "bloomsLevel": "Analyse"}], "ending": {"title": "Mission Complete", "perfect": "Flawless navigation. You calculated vector magnitudes using Pythagoras, combined vectors by adding components, and correctly identified the negative vector. The drone is home safe.", "partial": "The drone returned, but review your vector operations. Remember: magnitude uses √(x² + y²), vectors add component-wise, and the negative reverses both components.", "topic": "You practised vector magnitude (Pythagoras), adding vectors component-wise to find resultants, and negating vectors.", "retry": "Relaunch the drone — recalculate the vectors."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],    // {question, correct, userAnswer}
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} — AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission →</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      /* Eyebrow + title */
      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      /* Scene illustration */
      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      /* Prose body */
      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      /* Fact box */
      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">📚 ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      /* Formula box */
      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">🔢 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      /* Worked example */
      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">✏️ ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      /* Answer zone */
      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer →</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      } else {
        /* Story node — just a continue button */
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue →</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      /* Allow Enter key on numeric input */
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      /* Disable all buttons */
      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      /* Highlight chosen */
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '✓ Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        /* Still have attempts left — show hint */
        showFeedback('wrong', '✗ Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        /* Re-enable submit for numeric */
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        /* Re-enable MCQ options */
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
              if (b && !b.disabled) { /* already grayed — don't re-enable chosen wrong */ }
            }
          });
        }
        /* Mark pip wrong */
        markPip(state.attempts - 1, false, true);
      } else {
        /* Out of attempts */
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '✗ Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">💡 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '✓' : '✗'}</span>
          <div>${esc(entry.question)} — ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">📚 What you practised</span>
          <p>The distance–speed–time formula (<em>d = s × t</em>) can be rearranged to find any of the three quantities depending on what you know. Real-world problems — navigation, timing, speed limits — all use this relationship. You also practised rearranging: time = d ÷ s and speed = d ÷ t.</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">← Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
