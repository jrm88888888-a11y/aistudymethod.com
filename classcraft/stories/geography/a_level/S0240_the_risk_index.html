<script>const STORY_DATA = {"meta": {"title": "The Risk Index", "subtitle": "Earthquakes, poverty, and governance collide. Can you calculate a country's disaster risk?", "subject": "Geography", "topic": "Disaster Risk Reduction", "level": "A-Level", "tags": ["Geography", "A-Level", "Hazards", "~12 min", "3 questions"], "intro": "You are a disaster risk analyst for the United Nations Office for Disaster Risk Reduction (UNDRR). Your task is to calculate a composite Disaster Risk Index (DRI) for the fictional country of Valdesia, combining hazard exposure, vulnerability, and coping capacity into a single score."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='200' width='700' height='62' fill='#b0a898'/>\n<polygon points='200,200 275,60 350,200' fill='none' stroke='#a07060' stroke-width='2.5'/>\n<polygon points='350,200 425,80 500,200' fill='none' stroke='#a09080' stroke-width='2.5'/>\n<polygon points='130,200 200,100 270,200' fill='none' stroke='#706860' stroke-width='2'/>\n<circle cx='275' cy='140' r='8' fill='#a07060'/>\n<circle cx='425' cy='140' r='8' fill='#a09080'/>\n<circle cx='200' cy='155' r='6' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='200' width='700' height='62' fill='#b0a898'/>\n<polygon points='200,200 275,60 350,200' fill='none' stroke='#a07060' stroke-width='2.5'/>\n<polygon points='350,200 425,80 500,200' fill='none' stroke='#a09080' stroke-width='2.5'/>\n<polygon points='130,200 200,100 270,200' fill='none' stroke='#706860' stroke-width='2'/>\n<circle cx='275' cy='140' r='8' fill='#a07060'/>\n<circle cx='425' cy='140' r='8' fill='#a09080'/>\n<circle cx='200' cy='155' r='6' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='180' width='700' height='82' fill='#8a7868'/>\n<rect x='60' y='80' width='50' height='100' fill='#706860'/>\n<rect x='130' y='50' width='40' height='130' fill='#a09080'/>\n<rect x='190' y='100' width='55' height='80' fill='#b0a898'/>\n<rect x='270' y='60' width='35' height='120' fill='#706860'/>\n<rect x='330' y='90' width='60' height='90' fill='#8a7868'/>\n<rect x='420' y='40' width='45' height='140' fill='#a09080'/>\n<rect x='490' y='70' width='50' height='110' fill='#706860'/>\n<rect x='560' y='110' width='70' height='70' fill='#b0a898'/>\n<circle cx='650' cy='50' r='25' fill='#b89878'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Three Components", "scene": "scene1", "body": "<p>The UNDRR Disaster Risk Index combines three components, each scored from 0 to 10:</p><p><strong>Hazard Exposure (H):</strong> Valdesia scores <strong>8.2</strong> — it sits on a major fault line and in a cyclone belt.</p><p><strong>Vulnerability (V):</strong> Valdesia scores <strong>7.5</strong>.</p><p><strong>Coping Capacity (C):</strong> Valdesia scores <strong>3.8</strong> (higher = better capacity).</p><p>The DRI formula is: <strong>DRI = (H × V) ÷ C</strong></p>", "factBox": {"label": "Risk Equation", "text": "Risk = Hazard × Vulnerability ÷ Capacity. This framework shows that risk is not just about the physical hazard — it depends equally on human vulnerability and the ability to cope."}, "formulaBox": {"label": "Disaster Risk Index", "formula": "DRI = (H × V) ÷ C", "vars": "H = hazard exposure, V = vulnerability, C = coping capacity"}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Calculating the DRI", "title": "Valdesia's Risk Score", "scene": "scene1", "body": "<p>H = <strong>8.2</strong>, V = <strong>7.5</strong>, C = <strong>3.8</strong></p><p>DRI = (H × V) ÷ C</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> H × V = 8.2 × 7.5 = 61.5</p><p><strong>Step 2:</strong> DRI = 61.5 ÷ 3.8</p><p>Round to one decimal place.</p>"}, "question": "What is Valdesia's Disaster Risk Index? (Round to 1 decimal place)", "unit": "", "answer": 16.2, "tolerance": 0.2, "maxAttempts": 2, "hintText": "8.2 × 7.5 = 61.5. Then 61.5 ÷ 3.8.", "feedbackCorrect": "Correct — approximately 16.2. This places Valdesia in the 'extreme risk' category (DRI > 15).", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is approximately 16.2. DRI = (8.2 × 7.5) ÷ 3.8 = 61.5 ÷ 3.8 = 16.18 ≈ 16.2.", "consequence": "<strong>Your UNDRR supervisor flags the score.</strong> <em>\"16.2 — extreme risk. Valdesia's coping capacity is dangerously low relative to its hazard exposure.\"</em>", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Improving Capacity", "title": "The Intervention Plan", "scene": "scene2", "body": "<p>The UNDRR proposes an intervention programme to improve Valdesia's coping capacity. If successful, the programme would raise Valdesia's <strong>coping capacity score from 3.8 to 6.0</strong>. Calculate the <strong>new DRI</strong>.</p>", "factBox": {"label": "The Sendai Framework", "text": "The Sendai Framework for Disaster Risk Reduction (2015–2030) sets global targets for reducing disaster mortality and economic losses. It emphasises that reducing vulnerability and increasing coping capacity are more cost-effective than post-disaster response."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Risk After Intervention", "title": "The New DRI", "scene": "scene2", "body": "<p>After intervention: H = <strong>8.2</strong> (unchanged), V = <strong>7.5</strong> (unchanged), C = <strong>6.0</strong> (improved)</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> H × V = 8.2 × 7.5 = 61.5 (unchanged)</p><p><strong>Step 2:</strong> New DRI = 61.5 ÷ 6.0</p><p>Round to one decimal place.</p>"}, "question": "What is the new DRI after improving coping capacity to 6.0? (Round to 1 decimal place)", "unit": "", "answer": 10.3, "tolerance": 0.2, "maxAttempts": 2, "hintText": "61.5 ÷ 6.0. The numerator is unchanged.", "feedbackCorrect": "Correct — approximately 10.3. The DRI has dropped from 16.2 to 10.3 — a significant reduction. Improving coping capacity by just 2.2 points reduced overall risk by over a third.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is approximately 10.3. New DRI = 61.5 ÷ 6.0 = 10.25 ≈ 10.3.", "consequence": "<strong>The programme coordinator notes the improvement.</strong> <em>\"From 16.2 to 10.3 — that is a 37% reduction in disaster risk. Capacity-building alone moved the needle dramatically.\"</em>", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Policy Evaluation", "title": "Where to Invest?", "scene": "scene3", "body": "<p>Your final task is to evaluate the <strong>most cost-effective approach</strong> to disaster risk reduction. You cannot easily change a country's hazard exposure, but you can change vulnerability and coping capacity through policy interventions.</p>", "factBox": {"label": "Prevention vs Response", "text": "Studies show that every $1 invested in disaster risk reduction saves $4–7 in post-disaster response and reconstruction. Building earthquake-resistant buildings is far cheaper than rebuilding destroyed ones."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Investment Priority", "title": "Where Does the Money Go?", "scene": "scene3", "body": "<p>Consider which investment would produce the greatest reduction in disaster risk for countries like Valdesia.</p>", "question": "Which investment approach would most cost-effectively reduce disaster risk in a country like Valdesia?", "options": [{"text": "Invest in technology to reduce hazard exposure by preventing earthquakes and cyclones from occurring", "correct": false}, {"text": "Focus spending on post-disaster emergency response teams that can react quickly after events occur", "correct": false}, {"text": "Invest in building coping capacity: early warning systems, earthquake-resistant construction, community preparedness training, and governance reform", "correct": true}, {"text": "Relocate the entire population to a region with lower hazard exposure to eliminate risk entirely", "correct": false}], "maxAttempts": 2, "hintText": "You cannot prevent earthquakes or cyclones. Post-disaster response treats symptoms. Which approach proactively reduces risk?", "feedbackCorrect": "Correct. Investing in coping capacity is by far the most cost-effective strategy. You cannot stop earthquakes, and post-disaster response is far more expensive than preparation.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The correct answer is investing in coping capacity. You cannot prevent natural hazards, and post-disaster response is far more expensive than preparation. Capacity-building is the most cost-effective way to reduce the DRI.", "consequence": "<strong>You present your final recommendation to the UNDRR.</strong> <em>\"Valdesia cannot change its geology or its climate. But it can build schools that withstand earthquakes, install warning systems that save lives, and train communities that respond effectively. Every dollar invested in capacity saves seven in reconstruction.\"</em>", "next": "end", "examTip": "In the exam, refer to specific case studies with place names, dates, and statistics. Annotate any maps or diagrams provided.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Exceptional disaster risk analysis. You calculated the DRI, modelled the impact of capacity-building, and identified the most cost-effective investment strategy.", "partial": "You engaged with disaster risk calculation, but some elements need refinement. Return to strengthen your understanding of the DRI formula and risk reduction strategies.", "retry": "Disaster risk analysis requires both mathematical precision and policy understanding. Try again to achieve a perfect score.", "topic": "Disaster risk reduction — the risk equation (hazard × vulnerability ÷ capacity), calculating the Disaster Risk Index, the Sendai Framework, capacity-building strategies, and cost-effectiveness of prevention versus response."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} \u2014 AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission \u2192</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">\ud83d\udcda ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">\ud83d\udd22 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">\u270f\ufe0f ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer \u2192</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else {
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '\u2713 Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        showFeedback('wrong', '\u2717 Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
            }
          });
        }
        markPip(state.attempts - 1, false, true);
      } else {
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '\u2717 Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">\ud83d\udca1 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '\u2713' : '\u2717'}</span>
          <div>${esc(entry.question)} \u2014 ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">\ud83d\udcda What you practised</span>
          <p>${esc(S.ending.topic)}</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">\u2190 Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
</html>
