<script>const STORY_DATA = {"meta": {"title": "The Glacial Budget", "subtitle": "A glacier's survival depends on its mass balance. Can you calculate whether it is growing or shrinking?", "subject": "Geography", "topic": "Glacier Mass Balance", "level": "A-Level", "tags": ["Geography", "A-Level", "Glaciation", "~12 min", "3 questions"], "intro": "You are a glaciologist studying the Storbreen glacier in central Norway. Each year, the glacier gains mass through snowfall (accumulation) and loses mass through melting and calving (ablation). The difference — the glacial budget — determines whether the glacier advances or retreats. Your measurements will reveal the glacier's fate."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b8c8d0'/>\n<polygon points='0,262 0,100 200,50 400,80 500,60 700,120 700,262' fill='#c0ccd4'/>\n<polygon points='0,262 100,180 250,160 400,170 550,150 700,190 700,262' fill='#a8b8c4'/>\n<rect x='0' y='220' width='700' height='42' fill='#7a99aa'/>\n<polygon points='150,160 200,110 250,160' fill='#d8e0e8'/>\n<polygon points='400,170 450,130 500,170' fill='#d0d8e0'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b8c8d0'/>\n<polygon points='0,262 0,100 200,50 400,80 500,60 700,120 700,262' fill='#c0ccd4'/>\n<polygon points='0,262 100,180 250,160 400,170 550,150 700,190 700,262' fill='#a8b8c4'/>\n<rect x='0' y='220' width='700' height='42' fill='#7a99aa'/>\n<polygon points='150,160 200,110 250,160' fill='#d8e0e8'/>\n<polygon points='400,170 450,130 500,170' fill='#d0d8e0'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b8c8d0'/>\n<polygon points='0,262 0,100 200,50 400,80 500,60 700,120 700,262' fill='#c0ccd4'/>\n<polygon points='0,262 100,180 250,160 400,170 550,150 700,190 700,262' fill='#a8b8c4'/>\n<rect x='0' y='220' width='700' height='42' fill='#7a99aa'/>\n<polygon points='150,160 200,110 250,160' fill='#d8e0e8'/>\n<polygon points='400,170 450,130 500,170' fill='#d0d8e0'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "Arrival at Storbreen", "scene": "scene1", "body": "<p>You set up your monitoring station at the <strong>equilibrium line altitude (ELA)</strong> of the Storbreen glacier — the boundary between the zone of accumulation above and the zone of ablation below. Your instruments have recorded a full year of data.</p><p>Annual accumulation (snowfall converted to water equivalent): <strong>2.8 metres</strong><br>Annual ablation (melting and calving): <strong>3.5 metres</strong></p><p>The glacier covers an area of <strong>5.2 km²</strong>. You must calculate the <strong>net mass balance</strong> to determine whether Storbreen is advancing or retreating.</p>", "factBox": {"label": "Glacial Budget", "text": "The glacial budget (mass balance) = accumulation − ablation. A positive budget means the glacier gains more mass than it loses (advancing). A negative budget means the glacier is losing mass (retreating). The equilibrium line altitude (ELA) separates the accumulation and ablation zones."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Net Mass Balance", "title": "Is the Glacier Growing or Shrinking?", "scene": "scene1", "body": "<p>Annual accumulation: <strong>2.8 metres water equivalent</strong><br>Annual ablation: <strong>3.5 metres water equivalent</strong></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Net balance = accumulation − ablation</p><p><strong>Step 2:</strong> = 2.8 − 3.5</p><p>A negative value indicates the glacier is losing mass.</p>"}, "question": "What is the net annual mass balance of Storbreen (in metres water equivalent)?", "unit": "m w.e.", "answer": -0.7, "tolerance": 0.01, "maxAttempts": 2, "hintText": "Net balance = accumulation − ablation = 2.8 − 3.5. The answer will be negative.", "feedbackCorrect": "Correct — −0.7 metres water equivalent. The glacier is in deficit: it loses more mass each year than it gains. Storbreen is retreating, consistent with the trend observed across most mid-latitude glaciers due to rising global temperatures.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is −0.7 m w.e. Net balance = 2.8 − 3.5 = −0.7. The negative value confirms the glacier is retreating.", "consequence": "<strong>Your field assistant records the reading.</strong> <em>\"Minus 0.7. That is the fourth consecutive year of negative balance. If this continues, we can project the retreat timeline.\"</em>", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "Retreat Projection", "title": "Predicting the Future", "scene": "scene2", "body": "<p>With a consistent negative mass balance, the glacier's <strong>snout</strong> (front edge) is retreating. Historical records show that in 1960, the snout was at an elevation of <strong>1,200 metres</strong>. Today, it has retreated to <strong>1,480 metres</strong> elevation — a vertical rise of 280 metres in 64 years.</p><p>You need to calculate the <strong>average rate of vertical snout retreat</strong> per decade to model future change.</p>", "factBox": {"label": "ELA and Climate", "text": "As global temperatures rise, the equilibrium line altitude (ELA) moves upward. This shrinks the accumulation zone and expands the ablation zone, accelerating glacier retreat. A 1°C temperature rise typically shifts the ELA upward by 100–150 metres."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Retreat Rate", "title": "The Pace of Retreat", "scene": "scene2", "body": "<p>In 1960, the snout was at <strong>1,200 m</strong> elevation. Today (2024), it is at <strong>1,480 m</strong>.<br>Time elapsed: <strong>64 years</strong>.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Total vertical retreat = 1,480 − 1,200 = 280 m</p><p><strong>Step 2:</strong> Rate per year = 280 ÷ 64 = 4.375 m/year</p><p><strong>Step 3:</strong> Rate per decade = 4.375 × 10</p>"}, "question": "What is the average rate of vertical snout retreat per decade (to the nearest whole number)?", "unit": "metres per decade", "answer": 44, "tolerance": 1, "maxAttempts": 2, "hintText": "280 metres over 64 years. Divide to get metres per year, then multiply by 10 for metres per decade.", "feedbackCorrect": "Correct — approximately 44 metres per decade. At this rate, the glacier's accumulation zone is shrinking rapidly. If the ELA continues to rise, a tipping point will be reached where the entire glacier surface lies within the ablation zone.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is approximately 44 metres per decade. 280 ÷ 64 = 4.375 m/year. Per decade: 4.375 × 10 = 43.75, which rounds to 44.", "consequence": "<strong>You plot the retreat curve on your chart.</strong> <em>\"Forty-four metres of vertical retreat per decade. If this rate holds, the snout will reach the upper cirque within 50 years. After that, there may be no glacier left.\"</em>", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Bigger Picture", "title": "Glaciers and Global Systems", "scene": "scene3", "body": "<p>Your research has wider implications. Glaciers are not just ice — they are <strong>freshwater reservoirs</strong>, supplying rivers that billions of people depend on. They also regulate <strong>albedo</strong> (the reflectivity of Earth's surface) and contribute to <strong>sea-level rise</strong> when they melt.</p><p>A colleague asks you to consider the systemic feedback mechanism that accelerates glacier retreat.</p>", "factBox": {"label": "Ice-Albedo Feedback", "text": "Ice and snow have high albedo — they reflect 80–90% of solar radiation back to space. When ice melts, it exposes darker rock or water (albedo 10–30%), which absorbs more heat, causing more melting. This is a positive feedback loop that accelerates warming."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Feedback Mechanisms", "title": "The Acceleration Trap", "scene": "scene3", "body": "<p>Consider why glacier retreat tends to accelerate over time rather than proceeding at a constant rate.</p>", "question": "Which feedback mechanism best explains why glacier retreat accelerates over time?", "options": [{"text": "Negative feedback: as the glacier retreats, less meltwater enters rivers, reducing erosion and stabilising the glacier's base", "correct": false}, {"text": "Positive feedback: as ice melts it exposes darker surfaces with lower albedo, which absorb more solar radiation and cause further melting", "correct": true}, {"text": "Negative feedback: as the glacier shrinks, it becomes lighter and moves uphill to cooler altitudes where accumulation increases", "correct": false}, {"text": "Positive feedback: as ice melts, the increased weight of meltwater pushes the glacier forward, expanding its area", "correct": false}], "maxAttempts": 2, "hintText": "Think about what happens when white, reflective ice is replaced by dark rock or water. How does this affect the absorption of solar energy?", "feedbackCorrect": "Exactly. The ice-albedo positive feedback loop is one of the most powerful mechanisms in climate science. As ice retreats, darker surfaces absorb more heat, accelerating further melting. This self-reinforcing cycle is why many climate models project non-linear, accelerating glacier loss in coming decades.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The correct answer is the ice-albedo positive feedback. When ice melts, the darker surfaces beneath absorb more solar radiation, causing more warming and more melting — a self-reinforcing cycle.", "consequence": "<strong>You close your field notebook.</strong> <em>\"The ice-albedo feedback means our linear projections are optimistic. The real retreat rate will accelerate. Storbreen's days are numbered in decades, not centuries.\"</em>", "next": "end", "examTip": "In the exam, refer to specific case studies with place names, dates, and statistics. Annotate any maps or diagrams provided.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Exceptional glaciological analysis. You calculated the mass balance, projected the retreat rate, and identified the critical feedback mechanism driving accelerating glacier loss.", "partial": "You engaged with the key concepts of glacier mass balance, but some calculations or theoretical understanding needed refinement. Return to strengthen your analysis of glacial systems.", "retry": "Glaciology demands precision. Try again to achieve a perfect score.", "topic": "Glacier mass balance — accumulation, ablation, net budget calculation, equilibrium line altitude (ELA), glacier retreat rates, ice-albedo positive feedback, and the implications of cryosphere change for global systems."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} \u2014 AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission \u2192</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">\ud83d\udcda ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">\ud83d\udd22 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">\u270f\ufe0f ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer \u2192</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else {
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '\u2713 Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        showFeedback('wrong', '\u2717 Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
            }
          });
        }
        markPip(state.attempts - 1, false, true);
      } else {
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '\u2717 Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">\ud83d\udca1 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '\u2713' : '\u2717'}</span>
          <div>${esc(entry.question)} \u2014 ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">\ud83d\udcda What you practised</span>
          <p>${esc(S.ending.topic)}</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">\u2190 Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
