<script>const STORY_DATA = {"meta": {"title": "The Gini Coefficient", "subtitle": "Income inequality defines nations. Can you calculate the number that measures it?", "subject": "Geography", "topic": "Inequality & Gini Coefficient", "level": "A-Level", "tags": ["Geography", "A-Level", "Inequality", "~12 min", "3 questions"], "intro": "You are an economic geographer working for the World Bank, tasked with comparing income inequality in two countries: Estania (a rapidly industrialising nation) and Nordholm (a mature welfare state). Using Lorenz curves and Gini coefficients, you will quantify the gap between rich and poor."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='200' width='700' height='62' fill='#b0a898'/>\n<line x1='100' y1='200' x2='600' y2='200' stroke='#706860' stroke-width='2'/>\n<line x1='100' y1='200' x2='100' y2='40' stroke='#706860' stroke-width='2'/>\n<line x1='100' y1='200' x2='600' y2='40' stroke='#a09080' stroke-width='1.5' stroke-dasharray='6,4'/>\n<path d='M100,200 Q300,195 400,180 Q500,150 550,100 Q580,60 600,40' fill='none' stroke='#a07060' stroke-width='2.5'/>\n<circle cx='100' cy='200' r='4' fill='#706860'/>\n<circle cx='600' cy='40' r='4' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='200' width='700' height='62' fill='#b0a898'/>\n<line x1='100' y1='200' x2='600' y2='200' stroke='#706860' stroke-width='2'/>\n<line x1='100' y1='200' x2='100' y2='40' stroke='#706860' stroke-width='2'/>\n<line x1='100' y1='200' x2='600' y2='40' stroke='#a09080' stroke-width='1.5' stroke-dasharray='6,4'/>\n<path d='M100,200 Q300,195 400,180 Q500,150 550,100 Q580,60 600,40' fill='none' stroke='#a07060' stroke-width='2.5'/>\n<circle cx='100' cy='200' r='4' fill='#706860'/>\n<circle cx='600' cy='40' r='4' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='180' width='700' height='82' fill='#8a7868'/>\n<rect x='60' y='80' width='50' height='100' fill='#706860'/>\n<rect x='130' y='50' width='40' height='130' fill='#a09080'/>\n<rect x='190' y='100' width='55' height='80' fill='#b0a898'/>\n<rect x='270' y='60' width='35' height='120' fill='#706860'/>\n<rect x='330' y='90' width='60' height='90' fill='#8a7868'/>\n<rect x='420' y='40' width='45' height='140' fill='#a09080'/>\n<rect x='490' y='70' width='50' height='110' fill='#706860'/>\n<rect x='560' y='110' width='70' height='70' fill='#b0a898'/>\n<circle cx='650' cy='50' r='25' fill='#b89878'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Inequality Report", "scene": "scene1", "body": "<p>Your briefing pack contains Lorenz curve data for both countries. The <strong>Lorenz curve</strong> plots the cumulative share of income (y-axis) against the cumulative share of the population (x-axis). A perfectly equal society would follow the 45° line of equality.</p><p>For <strong>Estania</strong>, the area between the line of equality and the Lorenz curve (Area A) has been calculated as <strong>0.22</strong>. The total area under the line of equality (Area A + Area B) is always <strong>0.5</strong>.</p>", "factBox": {"label": "Gini Coefficient", "text": "The Gini coefficient = A / (A + B), where A is the area between the line of equality and the Lorenz curve, and A + B = 0.5. It ranges from 0 (perfect equality) to 1 (perfect inequality). Most countries fall between 0.25 and 0.60."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Estania's Gini", "title": "Calculating Inequality", "scene": "scene1", "body": "<p>For Estania:<br>Area A (between line of equality and Lorenz curve) = <strong>0.22</strong><br>Area A + B (total area under the line of equality) = <strong>0.50</strong></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Gini coefficient = A ÷ (A + B)</p><p><strong>Step 2:</strong> = 0.22 ÷ 0.50</p>"}, "question": "What is Estania's Gini coefficient?", "unit": "", "answer": 0.44, "tolerance": 0.01, "maxAttempts": 2, "hintText": "Gini = A ÷ (A + B) = 0.22 ÷ 0.50.", "feedbackCorrect": "Correct — 0.44. This places Estania in the range of moderate-to-high inequality, similar to countries like Mozambique or the United States.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is 0.44. Gini = A ÷ (A + B) = 0.22 ÷ 0.50 = 0.44.", "consequence": "<strong>Your World Bank colleague reviews the figure.</strong> <em>\"0.44 — that is high. Rapid industrialisation often concentrates wealth before redistributive policies catch up. This is textbook Kuznets curve behaviour.\"</em>", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "The Comparison", "title": "Nordholm's Story", "scene": "scene2", "body": "<p>Now you turn to <strong>Nordholm</strong>, a Scandinavian-style welfare state with strong progressive taxation and universal public services. Nordholm's Gini coefficient is <strong>0.26</strong>.</p><p>You need to calculate <strong>how many times more unequal</strong> Estania is compared to Nordholm, to quantify the disparity in your report.</p>", "factBox": {"label": "Gini in Context", "text": "Gini coefficients vary widely: South Africa ≈ 0.63 (very high inequality), Brazil ≈ 0.53, USA ≈ 0.41, UK ≈ 0.35, Denmark ≈ 0.28, Slovakia ≈ 0.25. Lower values indicate more equal income distribution."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Inequality Ratio", "title": "Comparing Two Nations", "scene": "scene2", "body": "<p>Estania's Gini coefficient: <strong>0.44</strong><br>Nordholm's Gini coefficient: <strong>0.26</strong></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Ratio = Estania's Gini ÷ Nordholm's Gini</p><p><strong>Step 2:</strong> = 0.44 ÷ 0.26</p><p>Round to one decimal place.</p>"}, "question": "How many times higher is Estania's Gini coefficient compared to Nordholm's? (Round to 1 decimal place)", "unit": "times", "answer": 1.7, "tolerance": 0.1, "maxAttempts": 2, "hintText": "Divide Estania's Gini by Nordholm's Gini: 0.44 ÷ 0.26.", "feedbackCorrect": "Correct — approximately 1.7 times. Estania's inequality is nearly 70% higher than Nordholm's. This stark difference reflects the impact of Nordholm's redistributive policies.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is approximately 1.7. 0.44 ÷ 0.26 = 1.692, which rounds to 1.7.", "consequence": "<strong>You add the comparison to your report.</strong> <em>\"Estania's Gini is 1.7 times Nordholm's. The gap illustrates how welfare state policies can dramatically compress income distribution — but it also reflects Estania's stage of economic development.\"</em>", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Policy Question", "title": "Reducing Inequality", "scene": "scene3", "body": "<p>Your report concludes with a policy analysis. The Estanian government has asked the World Bank for advice on reducing its Gini coefficient. Several strategies are under discussion.</p>", "factBox": {"label": "Kuznets Curve", "text": "Simon Kuznets proposed that inequality initially increases during industrialisation but then decreases as the economy matures and redistributive policies are introduced. This produces an inverted-U relationship between development and inequality."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Policy Evaluation", "title": "The Best Strategy for Estania", "scene": "scene3", "body": "<p>Consider which approach would be most effective at reducing Estania's Gini coefficient from 0.44 toward a more equitable level.</p>", "question": "Which policy would most directly reduce Estania's Gini coefficient?", "options": [{"text": "Reduce corporation tax to attract foreign investment, which will eventually benefit all citizens through trickle-down economics", "correct": false}, {"text": "Introduce progressive income taxation combined with universal public services in education and healthcare to redistribute income more evenly", "correct": true}, {"text": "Increase military spending to project geopolitical power, which will raise the country's global standing and attract wealth", "correct": false}, {"text": "Deregulate the financial sector to encourage entrepreneurship, which will naturally spread wealth across society", "correct": false}], "maxAttempts": 2, "hintText": "The Gini coefficient measures income distribution. Which policy directly changes how income is distributed across the population?", "feedbackCorrect": "Correct. Progressive taxation and universal public services directly redistribute income from higher earners to the broader population. This is the mechanism that explains Nordholm's low Gini coefficient.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The correct answer is progressive taxation combined with universal public services. This directly redistributes income and provides equal access to essential services.", "consequence": "<strong>The Estanian finance minister reads your recommendation.</strong> <em>\"Progressive taxation and universal services. It is the Nordholm model. We understand the theory — now we must find the political will to implement it.\"</em>", "next": "end", "examTip": "In the exam, refer to specific case studies with place names, dates, and statistics. Annotate any maps or diagrams provided.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Excellent economic geography. You calculated the Gini coefficient, quantified the inequality gap between nations, and identified the most effective redistributive policy.", "partial": "You engaged with inequality measurement, but some calculations or policy analysis need refinement. Return to strengthen your understanding of the Gini coefficient.", "retry": "Inequality analysis requires both mathematical precision and policy awareness. Try again to achieve a perfect score.", "topic": "Inequality and the Gini coefficient — Lorenz curves, calculating Gini coefficients, comparing inequality between nations, the Kuznets curve, and redistributive policy strategies."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} \u2014 AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission \u2192</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">\ud83d\udcda ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">\ud83d\udd22 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">\u270f\ufe0f ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer \u2192</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else {
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '\u2713 Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        showFeedback('wrong', '\u2717 Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
            }
          });
        }
        markPip(state.attempts - 1, false, true);
      } else {
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '\u2717 Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">\ud83d\udca1 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '\u2713' : '\u2717'}</span>
          <div>${esc(entry.question)} \u2014 ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">\ud83d\udcda What you practised</span>
          <p>${esc(S.ending.topic)}</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">\u2190 Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
</html>
