<script>const STORY_DATA = {"meta": {"title": "The Biome Shift", "subtitle": "As the planet warms, biome boundaries are on the move. Can you predict where the treeline will be in 2080?", "subject": "Geography", "topic": "Biome Change & Climate Models", "level": "A-Level", "tags": ["Geography", "A-Level", "Biomes", "~12 min", "3 questions"], "intro": "You are an ecologist studying the boreal forest-tundra boundary in northern Scandinavia. Climate models predict that rising temperatures will push biome boundaries poleward. Using temperature projections, you must calculate how far the treeline will shift and evaluate the ecological consequences."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='180' width='700' height='82' fill='#6a8a6a'/>\n<polygon points='80,180 100,100 120,180' fill='#5a7a5a'/>\n<polygon points='150,180 175,80 200,180' fill='#4a6a4a'/>\n<polygon points='230,180 260,60 290,180' fill='#3a5a3a'/>\n<polygon points='340,180 370,90 400,180' fill='#5a7a5a'/>\n<polygon points='440,180 460,120 480,180' fill='#6a8a6a'/>\n<polygon points='520,180 540,140 560,180' fill='#c8b898'/>\n<polygon points='600,180 620,150 640,180' fill='#c8b898'/>\n<circle cx='620' cy='50' r='25' fill='#b89878'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='180' width='700' height='82' fill='#6a8a6a'/>\n<polygon points='80,180 100,100 120,180' fill='#5a7a5a'/>\n<polygon points='150,180 175,80 200,180' fill='#4a6a4a'/>\n<polygon points='230,180 260,60 290,180' fill='#3a5a3a'/>\n<polygon points='340,180 370,90 400,180' fill='#5a7a5a'/>\n<polygon points='440,180 460,120 480,180' fill='#6a8a6a'/>\n<polygon points='520,180 540,140 560,180' fill='#c8b898'/>\n<polygon points='600,180 620,150 640,180' fill='#c8b898'/>\n<circle cx='620' cy='50' r='25' fill='#b89878'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='180' width='700' height='82' fill='#6a8a6a'/>\n<polygon points='80,180 100,100 120,180' fill='#5a7a5a'/>\n<polygon points='150,180 175,80 200,180' fill='#4a6a4a'/>\n<polygon points='230,180 260,60 290,180' fill='#3a5a3a'/>\n<polygon points='340,180 370,90 400,180' fill='#5a7a5a'/>\n<polygon points='440,180 460,120 480,180' fill='#6a8a6a'/>\n<polygon points='520,180 540,140 560,180' fill='#c8b898'/>\n<polygon points='600,180 620,150 640,180' fill='#c8b898'/>\n<circle cx='620' cy='50' r='25' fill='#b89878'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Moving Treeline", "scene": "scene1", "body": "<p>You set up your monitoring station at the current <strong>boreal forest-tundra ecotone</strong> in northern Norway, at latitude <strong>69°N</strong>. The treeline here is defined by the <strong>10°C July isotherm</strong> — trees cannot grow where the warmest month averages below 10°C.</p><p>Current July temperature at the treeline: <strong>10°C</strong><br>Projected warming by 2080 (RCP 4.5 scenario): <strong>+3°C</strong><br>Temperature lapse rate moving northward: <strong>0.6°C per degree of latitude</strong></p>", "factBox": {"label": "Biome Boundaries", "text": "Biome boundaries are primarily determined by temperature and precipitation. The boreal forest (taiga) gives way to tundra where summer temperatures are too low for tree growth. As global temperatures rise, these boundaries shift poleward and to higher elevations."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Treeline Shift", "title": "How Far North?", "scene": "scene1", "body": "<p>Temperature increase by 2080: <strong>3°C</strong><br>Temperature decrease per degree of latitude northward: <strong>0.6°C</strong></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> The treeline shifts north until the 3°C warming is offset by the cooler climate at higher latitudes.</p><p><strong>Step 2:</strong> Shift in degrees = warming ÷ lapse rate = 3 ÷ 0.6</p>"}, "question": "How many degrees of latitude northward will the treeline shift by 2080?", "unit": "degrees latitude", "answer": 5, "tolerance": 0, "maxAttempts": 2, "hintText": "Shift = 3°C warming ÷ 0.6°C per degree latitude = ?", "feedbackCorrect": "Correct — 5 degrees of latitude. The treeline would shift from 69°N to approximately 74°N — roughly 550 km northward.", "feedbackWrong": "A common mistake is confusing weather and climate. Weather describes short-term atmospheric conditions; climate is the average over 30+ years. The answer is 5 degrees. Shift = 3 ÷ 0.6 = 5 degrees of latitude northward.", "consequence": "<strong>You mark the projected boundary on your map.</strong> <em>\"Five degrees north — from 69 to 74. Current tundra at 72°N would become forest. The species that depend on open tundra will have nowhere to go.\"</em>", "next": "mid1", "bloomsLevel": "Analyse"}, {"id": "mid1", "type": "story", "chapter": "The Distance Calculation", "title": "Kilometres of Change", "scene": "scene2", "body": "<p>You need to convert the latitudinal shift into a distance. One degree of latitude corresponds to approximately <strong>111 km</strong> on Earth's surface.</p>", "factBox": {"label": "Migration Lag", "text": "Biome boundaries on maps may shift quickly in climate models, but actual forest migration is much slower. Trees take decades to mature and spread. Many ecologists predict a 'migration lag' where the climate shifts faster than forests can follow."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Distance in Kilometres", "title": "The Scale of Migration", "scene": "scene2", "body": "<p>Treeline shift: <strong>5 degrees of latitude</strong><br>Distance per degree of latitude: <strong>111 km</strong></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Distance = shift in degrees × km per degree</p><p><strong>Step 2:</strong> = 5 × 111</p>"}, "question": "How far north will the treeline shift in kilometres?", "unit": "km", "answer": 555, "tolerance": 0, "maxAttempts": 2, "hintText": "5 degrees × 111 km per degree.", "feedbackCorrect": "Correct — 555 km. That is roughly the distance from London to Edinburgh. An entire biome boundary shifting that far in 60 years is unprecedented.", "feedbackWrong": "A common mistake is confusing weather and climate. Weather describes short-term atmospheric conditions; climate is the average over 30+ years. The answer is 555 km. 5 × 111 = 555 km northward.", "consequence": "<strong>Your colleague processes the number.</strong> <em>\"Five hundred and fifty-five kilometres. But the trees cannot actually migrate that fast. There will be a growing gap between where the climate supports forest and where forest actually exists.\"</em>", "next": "mid2", "bloomsLevel": "Analyse"}, {"id": "mid2", "type": "story", "chapter": "The Ecological Impact", "title": "Winners and Losers", "scene": "scene3", "body": "<p>Your report must evaluate the ecological consequences of biome boundary shifts. Some species will benefit as their habitat expands; others will face extinction as their habitat contracts.</p>", "factBox": {"label": "Ecotones Under Stress", "text": "An ecotone is the transition zone between two biomes. Under rapid climate change, ecotones become zones of ecological disruption: established species decline before replacement species arrive."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Ecological Consequences", "title": "The Disruption", "scene": "scene3", "body": "<p>Consider why biome boundary shifts caused by climate change are more ecologically disruptive than natural shifts that occurred at the end of ice ages.</p>", "question": "Why is the current rate of biome boundary shift more ecologically damaging than past natural shifts?", "options": [{"text": "Past biome shifts did not involve any changes to temperature or precipitation patterns", "correct": false}, {"text": "The current rate of climate change is far faster than past natural changes, meaning species cannot migrate or adapt quickly enough to keep pace", "correct": true}, {"text": "Modern biomes are fundamentally different from ice-age biomes and are therefore more resistant to change", "correct": false}, {"text": "Past climate changes were caused by natural factors, which ecosystems can adapt to, whereas human-caused changes are chemically different", "correct": false}], "maxAttempts": 2, "hintText": "Think about the speed of change. Post-ice-age warming occurred over thousands of years. Current warming is happening over decades.", "feedbackCorrect": "Correct. The critical factor is the rate of change. Post-glacial warming occurred over millennia, giving species time to migrate and adapt. Current anthropogenic warming is occurring 10–100 times faster.", "feedbackWrong": "A common mistake is confusing weather and climate. Weather describes short-term atmospheric conditions; climate is the average over 30+ years. The correct answer is that the current rate of change is far faster than past natural shifts. Species simply cannot migrate or adapt quickly enough.", "consequence": "<strong>You finalise your ecological report.</strong> <em>\"It is not the direction of change that matters — biomes have always shifted. It is the speed. We are asking ecosystems to migrate in decades what previously took millennia.\"</em>", "next": "end", "examTip": "In the exam, distinguish between weather (short-term) and climate (long-term averages). Support claims with data from the resource material.", "bloomsLevel": "Evaluate"}], "ending": {"perfect": "Exceptional ecological analysis. You calculated the treeline shift in both degrees and kilometres, and demonstrated a clear understanding of why the rate of change determines ecological impact.", "partial": "You engaged with biome shift modelling, but some calculations or ecological reasoning need strengthening. Return to refine your understanding.", "retry": "Biome modelling requires both mathematical precision and ecological understanding. Try again to achieve a perfect score.", "topic": "Biome change and climate models — treeline migration, temperature lapse rates, latitudinal shift calculation, migration lag, ecotone disruption, and the ecological consequences of rapid climate change."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} \u2014 AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission \u2192</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">\ud83d\udcda ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">\ud83d\udd22 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">\u270f\ufe0f ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer \u2192</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else {
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '\u2713 Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        showFeedback('wrong', '\u2717 Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
            }
          });
        }
        markPip(state.attempts - 1, false, true);
      } else {
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '\u2717 Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">\ud83d\udca1 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '\u2713' : '\u2717'}</span>
          <div>${esc(entry.question)} \u2014 ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">\ud83d\udcda What you practised</span>
          <p>${esc(S.ending.topic)}</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">\u2190 Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
