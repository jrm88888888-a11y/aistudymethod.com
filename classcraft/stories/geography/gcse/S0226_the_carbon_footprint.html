<script>const STORY_DATA = {"meta": {"title": "The Carbon Footprint", "subtitle": "Can you calculate a city's carbon emissions and evaluate the strategies that might bring them down?", "subject": "Geography", "topic": "Climate Change & Mitigation", "level": "GCSE", "tags": ["Geography", "GCSE", "Climate Change", "~10 min", "3 questions"], "intro": "You have been appointed as a junior climate analyst for the city of Millhaven. With a population of 250,000 and growing industrial output, the council needs hard numbers on carbon emissions before it can choose a mitigation strategy. Your calculations will shape the city's climate action plan."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#d8cfc3'/>\n<rect x='0' y='170' width='700' height='92' fill='#8a7868'/>\n<rect x='80' y='90' width='120' height='80' fill='#706860'/>\n<rect x='100' y='40' width='15' height='50' fill='#a09080'/>\n<rect x='170' y='30' width='15' height='60' fill='#a09080'/>\n<ellipse cx='108' cy='35' rx='18' ry='12' fill='#c8b8a8'/>\n<ellipse cx='178' cy='25' rx='22' ry='14' fill='#c8b8a8'/>\n<rect x='300' y='110' width='150' height='60' fill='#b0a898'/>\n<rect x='340' y='70' width='12' height='40' fill='#706860'/>\n<ellipse cx='346' cy='65' rx='15' ry='10' fill='#c8b8a8'/>\n<rect x='520' y='130' width='100' height='40' fill='#706860'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='180' width='700' height='82' fill='#8a7868'/>\n<rect x='60' y='80' width='50' height='100' fill='#706860'/>\n<rect x='130' y='50' width='40' height='130' fill='#a09080'/>\n<rect x='190' y='100' width='55' height='80' fill='#b0a898'/>\n<rect x='270' y='60' width='35' height='120' fill='#706860'/>\n<rect x='330' y='90' width='60' height='90' fill='#8a7868'/>\n<rect x='420' y='40' width='45' height='140' fill='#a09080'/>\n<rect x='490' y='70' width='50' height='110' fill='#706860'/>\n<rect x='560' y='110' width='70' height='70' fill='#b0a898'/>\n<circle cx='650' cy='50' r='25' fill='#b89878'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='170' width='700' height='92' fill='#6a8a6a'/>\n<rect x='80' y='140' width='540' height='30' fill='#b0a898'/>\n<line x1='80' y1='140' x2='620' y2='140' stroke='#706860' stroke-width='2'/>\n<circle cx='150' cy='140' r='5' fill='#a07060'/>\n<circle cx='250' cy='140' r='5' fill='#a07060'/>\n<circle cx='350' cy='140' r='5' fill='#a07060'/>\n<circle cx='450' cy='140' r='5' fill='#a07060'/>\n<circle cx='550' cy='140' r='5' fill='#a07060'/>\n<rect x='300' y='50' width='100' height='70' fill='#a09080'/>\n<polygon points='300,50 350,20 400,50' fill='#706860'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Climate Analyst's Office", "scene": "scene1", "body": "<p>You arrive at Millhaven Council's environment office. On the desk lies a report: the city's three main sectors — <strong>transport</strong>, <strong>industry</strong>, and <strong>domestic energy</strong> — produced the following CO₂ emissions last year:</p><p>Transport: <strong>1.2 million tonnes</strong>. Industry: <strong>2.3 million tonnes</strong>. Domestic energy: <strong>1.0 million tonnes</strong>.</p><p>The council leader needs you to calculate the city's total carbon footprint and then work out the <strong>per capita emissions</strong> so Millhaven can be compared with the national average of 5.4 tonnes per person.</p>", "factBox": {"label": "Key Concept", "text": "A carbon footprint measures the total greenhouse gas emissions caused by an individual, event, organisation, or place, expressed as tonnes of CO₂ equivalent."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Per Capita Emissions", "title": "Millhaven's Carbon Intensity", "scene": "scene1", "body": "<p>The total emissions from all three sectors combined is <strong>4.5 million tonnes of CO₂</strong>. Millhaven's population is <strong>250,000</strong>.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Total emissions = 1.2 + 2.3 + 1.0 = 4.5 million tonnes</p><p><strong>Step 2:</strong> Per capita = total emissions ÷ population<br>= 4,500,000 ÷ 250,000</p>"}, "question": "What are Millhaven's per capita CO₂ emissions in tonnes per person?", "unit": "tonnes per person", "answer": 18, "tolerance": 0, "maxAttempts": 2, "hintText": "Divide 4,500,000 by 250,000. Think of it as 4500 ÷ 250.", "feedbackCorrect": "Exactly 18 tonnes per person — more than three times the UK national average of 5.4 tonnes. Millhaven's heavy industrial sector is clearly driving this figure upward.", "feedbackWrong": "A common mistake is confusing weather and climate. Weather describes short-term atmospheric conditions; climate is the average over 30+ years. The answer is 18 tonnes per person. 4,500,000 ÷ 250,000 = 18.", "consequence": "<strong>The council leader looks alarmed.</strong> <em>\"Eighteen tonnes per person — that puts us well above the national average. We need to act fast.\"</em>", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "The Mitigation Plan", "title": "Choosing a Strategy", "scene": "scene2", "body": "<p>Armed with the data, you attend a council meeting. The environment officer presents two mitigation strategies:</p><p><strong>Strategy A</strong> — Switch 40% of domestic energy to renewable sources. This would cut domestic emissions by <strong>40%</strong>.</p><p><strong>Strategy B</strong> — Introduce a congestion charge and invest in public transport. This would cut transport emissions by <strong>25%</strong>.</p><p>The council wants to know: if <strong>both strategies</strong> are implemented, what would the <strong>new total emissions</strong> be?</p>", "factBox": {"label": "Mitigation vs Adaptation", "text": "Mitigation means reducing the causes of climate change (cutting emissions). Adaptation means adjusting to the effects (flood defences, drought-resistant crops). Both are needed."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Emissions After Mitigation", "title": "The New Total", "scene": "scene2", "body": "<p>Current emissions: Transport = <strong>1.2 million tonnes</strong>, Industry = <strong>2.3 million tonnes</strong>, Domestic = <strong>1.0 million tonnes</strong>.</p><p>Strategy A cuts domestic emissions by 40%. Strategy B cuts transport emissions by 25%.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> New domestic = 1.0 − (0.40 × 1.0) = 0.6 million tonnes</p><p><strong>Step 2:</strong> New transport = 1.2 − (0.25 × 1.2) = 0.9 million tonnes</p><p><strong>Step 3:</strong> New total = 0.6 + 2.3 + 0.9</p>"}, "question": "What would the new total emissions be (in million tonnes) if both strategies are implemented?", "unit": "million tonnes", "answer": 3.8, "tolerance": 0.1, "maxAttempts": 2, "hintText": "Domestic drops to 0.6, transport drops to 0.9, industry stays at 2.3. Add them up.", "feedbackCorrect": "Correct — 3.8 million tonnes. That is a reduction of 0.7 million tonnes, or about 15.6% of the original total. A meaningful step, though industry remains the largest emitter.", "feedbackWrong": "A common mistake is confusing weather and climate. Weather describes short-term atmospheric conditions; climate is the average over 30+ years. The answer is 3.8 million tonnes. Domestic: 1.0 × 0.60 = 0.6. Transport: 1.2 × 0.75 = 0.9. Total: 0.6 + 2.3 + 0.9 = 3.8.", "consequence": "<strong>The finance director nods.</strong> <em>\"A 15% cut is a start — but the industrial sector still accounts for over 60% of our emissions. We will need a Phase 2 plan.\"</em>", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Policy Debate", "title": "Beyond the Numbers", "scene": "scene3", "body": "<p>The meeting turns to a broader question. A local business owner argues that cutting industrial emissions will cost jobs. An environmental campaigner counters that the economic cost of climate change — flooding, heatwaves, crop failure — will be far greater.</p><p>The council leader turns to you for a final assessment. Which of the following best describes why <strong>international cooperation</strong> is essential for tackling climate change?</p>", "factBox": {"label": "Paris Agreement 2015", "text": "196 countries agreed to limit global warming to well below 2°C above pre-industrial levels. Each country submitted nationally determined contributions (NDCs) setting out their emission reduction targets."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — International Cooperation", "title": "Why Go Global?", "scene": "scene3", "body": "<p>Consider why tackling climate change requires cooperation between countries, not just action by individual cities like Millhaven.</p>", "question": "Which statement best explains why international cooperation is essential for tackling climate change?", "options": [{"text": "Climate change only affects developing countries, so richer nations must help them adapt", "correct": false}, {"text": "Greenhouse gases spread through the global atmosphere regardless of where they are emitted, so no single country can solve the problem alone", "correct": true}, {"text": "International trade means all countries produce the same amount of CO₂ per person", "correct": false}, {"text": "Renewable energy technology can only be developed by international organisations, not individual governments", "correct": false}], "maxAttempts": 2, "hintText": "Think about what happens to CO₂ once it enters the atmosphere — does it stay in one country?", "feedbackCorrect": "Exactly. Greenhouse gases mix throughout the global atmosphere. CO₂ emitted in China warms the planet just as much as CO₂ emitted in the UK. This is why unilateral action, while important, is insufficient without international agreements.", "feedbackWrong": "A common mistake is confusing weather and climate. Weather describes short-term atmospheric conditions; climate is the average over 30+ years. The correct answer is that greenhouse gases spread through the global atmosphere regardless of where they are emitted. No single country can solve this alone because emissions from anywhere affect everywhere.", "consequence": "<strong>The council leader stands.</strong> <em>\"Our city will do its part — but you have reminded us that this is a global challenge. We will push for stronger national commitments too.\"</em>", "next": "end", "examTip": "In the exam, distinguish between weather (short-term) and climate (long-term averages). Support claims with data from the resource material.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Outstanding analysis. You calculated per capita emissions, modelled the impact of mitigation strategies, and demonstrated a clear understanding of why climate change requires global cooperation. Millhaven's climate action plan is in safe hands.", "partial": "You made progress on Millhaven's carbon footprint analysis, but some calculations need refining. Return to strengthen your understanding of emissions data and mitigation strategies.", "retry": "Climate data rewards careful calculation. Try again to achieve a perfect score.", "topic": "Climate change and mitigation — calculating carbon footprints, per capita emissions, percentage reductions from mitigation strategies, and the importance of international cooperation (Paris Agreement)."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} \u2014 AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission \u2192</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">\ud83d\udcda ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">\ud83d\udd22 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">\u270f\ufe0f ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer \u2192</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else {
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '\u2713 Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        showFeedback('wrong', '\u2717 Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
            }
          });
        }
        markPip(state.attempts - 1, false, true);
      } else {
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '\u2717 Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">\ud83d\udca1 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '\u2713' : '\u2717'}</span>
          <div>${esc(entry.question)} \u2014 ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">\ud83d\udcda What you practised</span>
          <p>${esc(S.ending.topic)}</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">\u2190 Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
</html>
