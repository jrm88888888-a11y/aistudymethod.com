<script>const STORY_DATA = {"meta": {"title": "The Tropical Storm", "subtitle": "A Category 4 hurricane is bearing down on a Caribbean island. Can you predict its path and save lives?", "subject": "Geography", "topic": "Tropical Storms & Their Impacts", "level": "GCSE", "tags": ["Geography", "GCSE", "Tropical Storms", "~10 min", "3 questions"], "intro": "You are the disaster response coordinator for the Caribbean island of Santa Lucia (population 185,000). Hurricane Mara — a Category 4 storm with sustained winds of 230 km/h — is currently 480 km east of the island and moving west at 20 km/h. You must calculate the time to landfall and coordinate the evacuation."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#8a95a0'/>\n<rect x='0' y='180' width='700' height='82' fill='#7a99aa'/>\n<ellipse cx='350' cy='100' rx='180' ry='80' fill='#707a85'/>\n<ellipse cx='320' cy='90' rx='120' ry='55' fill='#606a75'/>\n<ellipse cx='380' cy='80' rx='80' ry='40' fill='#505a65'/>\n<line x1='300' y1='150' x2='280' y2='180' stroke='#c8b8a8' stroke-width='2'/>\n<line x1='400' y1='140' x2='420' y2='180' stroke='#c8b8a8' stroke-width='2'/>\n<line x1='350' y1='155' x2='345' y2='180' stroke='#c8b8a8' stroke-width='1.5'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#8a95a0'/>\n<rect x='0' y='180' width='700' height='82' fill='#7a99aa'/>\n<ellipse cx='350' cy='100' rx='180' ry='80' fill='#707a85'/>\n<ellipse cx='320' cy='90' rx='120' ry='55' fill='#606a75'/>\n<ellipse cx='380' cy='80' rx='80' ry='40' fill='#505a65'/>\n<line x1='300' y1='150' x2='280' y2='180' stroke='#c8b8a8' stroke-width='2'/>\n<line x1='400' y1='140' x2='420' y2='180' stroke='#c8b8a8' stroke-width='2'/>\n<line x1='350' y1='155' x2='345' y2='180' stroke='#c8b8a8' stroke-width='1.5'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='180' width='700' height='82' fill='#8a7868'/>\n<rect x='60' y='80' width='50' height='100' fill='#706860'/>\n<rect x='130' y='50' width='40' height='130' fill='#a09080'/>\n<rect x='190' y='100' width='55' height='80' fill='#b0a898'/>\n<rect x='270' y='60' width='35' height='120' fill='#706860'/>\n<rect x='330' y='90' width='60' height='90' fill='#8a7868'/>\n<rect x='420' y='40' width='45' height='140' fill='#a09080'/>\n<rect x='490' y='70' width='50' height='110' fill='#706860'/>\n<rect x='560' y='110' width='70' height='70' fill='#b0a898'/>\n<circle cx='650' cy='50' r='25' fill='#b89878'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Storm Approaches", "scene": "scene1", "body": "<p>The satellite image on your screen shows Hurricane Mara — a massive swirling system with a clearly defined <strong>eye</strong> at its centre. The meteorological data reads:</p><p>Current position: <strong>480 km east</strong> of Santa Lucia<br>Movement: <strong>due west at 20 km/h</strong><br>Category: <strong>4</strong> (sustained winds 230 km/h)<br>Storm surge prediction: <strong>4–6 metres</strong></p><p>The island's emergency protocol requires <strong>24 hours</strong> to complete a full evacuation of coastal areas. You need to calculate whether there is enough time.</p>", "factBox": {"label": "How Tropical Storms Form", "text": "Tropical storms form over warm ocean water (above 27°C) between 5° and 30° latitude. Warm, moist air rises rapidly, creating an area of low pressure. The Coriolis effect causes the system to spin. They are called hurricanes in the Atlantic, typhoons in the Pacific, and cyclones in the Indian Ocean."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Time to Landfall", "title": "How Long Do We Have?", "scene": "scene1", "body": "<p>Hurricane Mara is <strong>480 km</strong> east of Santa Lucia, travelling <strong>due west at 20 km/h</strong>.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Use the formula: time = distance ÷ speed</p><p><strong>Step 2:</strong> time = 480 ÷ 20</p>"}, "question": "How many hours until Hurricane Mara makes landfall on Santa Lucia?", "unit": "hours", "answer": 24, "tolerance": 0, "maxAttempts": 2, "hintText": "Distance ÷ speed = time. 480 ÷ 20 = ?", "feedbackCorrect": "Exactly 24 hours. This means the evacuation must begin immediately — there is no margin for delay. Every hour counts.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is 24 hours. Time = distance ÷ speed = 480 ÷ 20 = 24 hours.", "consequence": "<strong>You grab the emergency radio.</strong> <em>\"We have exactly 24 hours. That is the absolute minimum needed for full coastal evacuation. Issue the order now.\"</em>", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "The Evacuation", "title": "Moving to Higher Ground", "scene": "scene2", "body": "<p>The evacuation order goes out. Coastal communities begin moving inland and to higher ground. But there is a complication: the storm surge prediction is <strong>4–6 metres</strong>, and much of Santa Lucia's population lives in the <strong>coastal lowlands</strong> below 10 metres elevation.</p><p>Your team estimates that <strong>65%</strong> of the island's <strong>185,000</strong> residents live in the storm surge risk zone and will need to evacuate. You must calculate how many people need to move.</p>", "factBox": {"label": "Storm Surge", "text": "A storm surge is an abnormal rise in sea level caused by a storm's low pressure and strong winds pushing water onshore. Storm surges cause more deaths than the wind itself — they can flood coastal areas rapidly with little warning."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Evacuation Numbers", "title": "The Population at Risk", "scene": "scene2", "body": "<p>Total population of Santa Lucia: <strong>185,000</strong><br>Percentage living in the storm surge risk zone: <strong>65%</strong></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Convert percentage to decimal: 65% = 0.65</p><p><strong>Step 2:</strong> Number at risk = 185,000 × 0.65</p>"}, "question": "How many people need to be evacuated? Give your answer to the nearest thousand.", "unit": "people", "answer": 120000, "tolerance": 500, "maxAttempts": 2, "hintText": "185,000 × 0.65. Try breaking it down: 185,000 × 0.6 = 111,000, then add 185,000 × 0.05 = 9,250.", "feedbackCorrect": "Correct — approximately 120,250 people, or about 120,000 to the nearest thousand. Moving this many people in 24 hours requires every bus, truck, and emergency vehicle on the island.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is approximately 120,000 (120,250 exactly). 185,000 × 0.65 = 120,250.", "consequence": "<strong>The transport coordinator stares at the number.</strong> <em>\"A hundred and twenty thousand people. We have 200 buses. This will be the largest evacuation in Santa Lucia's history.\"</em>", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Aftermath Question", "title": "After the Storm", "scene": "scene3", "body": "<p>Hurricane Mara strikes Santa Lucia with devastating force. The eye passes directly over the island. When the winds finally subside, the damage is enormous: roofs torn off, power lines down, roads flooded. But the evacuation saved thousands of lives.</p><p>In the debrief, the government asks why the impacts of tropical storms are often <strong>worse in lower-income countries</strong> than in higher-income countries.</p>", "factBox": {"label": "Primary vs Secondary Effects", "text": "Primary effects of tropical storms include high winds, storm surge, and intense rainfall. Secondary effects include flooding, landslides, contaminated water supplies, disease outbreaks, and economic disruption. Secondary effects often cause more long-term damage."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Vulnerability", "title": "Why Are Impacts Unequal?", "scene": "scene3", "body": "<p>Consider why a tropical storm of the same intensity can cause far more deaths and destruction in a lower-income country compared to a higher-income country.</p>", "question": "Which is the most important reason why tropical storms cause greater devastation in lower-income countries?", "options": [{"text": "Lower-income countries experience stronger tropical storms due to their geographic location", "correct": false}, {"text": "Lower-income countries lack the infrastructure, early warning systems, and emergency services needed to prepare for and respond to storms effectively", "correct": true}, {"text": "Higher-income countries do not experience tropical storms because they are located further from the equator", "correct": false}, {"text": "People in lower-income countries choose to live in dangerous coastal areas because they prefer the climate", "correct": false}], "maxAttempts": 2, "hintText": "Think about what helps a country prepare for and recover from a natural disaster — warning systems, building quality, emergency services, hospitals.", "feedbackCorrect": "Exactly. Vulnerability is the key concept. Lower-income countries often have weaker infrastructure, fewer emergency resources, less accurate forecasting technology, and buildings that cannot withstand extreme winds. This makes them far more vulnerable to the same hazard.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The correct answer is that lower-income countries lack the infrastructure, early warning systems, and emergency services needed to prepare for and respond effectively. Vulnerability, not hazard intensity, explains the difference in impacts.", "consequence": "<strong>The government minister speaks.</strong> <em>\"We survived this storm because we invested in early warning systems. But our infrastructure must be stronger. Resilience is not optional — it is survival.\"</em>", "next": "end", "examTip": "In the exam, refer to specific case studies with place names, dates, and statistics. Annotate any maps or diagrams provided.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Exceptional disaster management. You calculated the time to landfall, quantified the population at risk, and explained why vulnerability determines the severity of storm impacts. Your coordination saved lives.", "partial": "You responded to the hurricane threat, but some of your calculations or analysis needed improvement. Return to refine your understanding of tropical storms and their impacts.", "retry": "In disaster response, precision saves lives. Try again to achieve a perfect score.", "topic": "Tropical storms — formation conditions, storm tracking calculations, storm surge, evacuation planning, primary and secondary effects, and why impacts differ between higher-income and lower-income countries."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} \u2014 AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission \u2192</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">\ud83d\udcda ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">\ud83d\udd22 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">\u270f\ufe0f ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer \u2192</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else {
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '\u2713 Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        showFeedback('wrong', '\u2717 Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
            }
          });
        }
        markPip(state.attempts - 1, false, true);
      } else {
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '\u2717 Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">\ud83d\udca1 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '\u2713' : '\u2717'}</span>
          <div>${esc(entry.question)} \u2014 ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">\ud83d\udcda What you practised</span>
          <p>${esc(S.ending.topic)}</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">\u2190 Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
</html>
