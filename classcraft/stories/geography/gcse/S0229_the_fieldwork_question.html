='#706860'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='170' width='700' height='92' fill='#6a8a6a'/>\n<rect x='80' y='140' width='540' height='30' fill='#b0a898'/>\n<line x1='80' y1='140' x2='620' y2='140' stroke='#706860' stroke-width='2'/>\n<circle cx='150' cy='140' r='5' fill='#a07060'/>\n<circle cx='250' cy='140' r='5' fill='#a07060'/>\n<circle cx='350' cy='140' r='5' fill='#a07060'/>\n<circle cx='450' cy='140' r='5' fill='#a07060'/>\n<circle cx='550' cy='140' r='5' fill='#a07060'/>\n<rect x='300' y='50' width='100' height='70' fill='#a09080'/>\n<polygon points='300,50 350,20 400,50' fill='#706860'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "The Investigation Begins", "scene": "scene1", "body": "<p>Your class arrives at the River Thorndale with clipboards, ranging poles, tape measures, and a stopwatch. The river flows from its source on Moorland Hill down through farmland to the village of Thorndale, covering a distance of <strong>8 km</strong>.</p><p>Your teacher explains the methodology: you will measure river velocity at <strong>5 sites</strong> along the river, evenly spaced from source to mouth. At each site, you will use the <strong>float method</strong> — timing how long a float (an orange) takes to travel a measured distance of <strong>10 metres</strong>.</p><p>At Site 3 (the middle site), the orange takes <strong>25 seconds</strong> to travel 10 metres.</p>", "factBox": {"label": "The Float Method", "text": "To measure river velocity using the float method: (1) measure a 10m stretch of river, (2) release a float (e.g. an orange — it sits just below the surface), (3) time how long it takes to travel the 10m, (4) calculate velocity = distance ÷ time."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — River Velocity", "title": "Calculating Velocity at Site 3", "scene": "scene1", "body": "<p>At Site 3, the orange (float) travels <strong>10 metres</strong> in <strong>25 seconds</strong>.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Use the formula: velocity = distance ÷ time</p><p><strong>Step 2:</strong> velocity = 10 ÷ 25</p>"}, "question": "What is the river velocity at Site 3?", "unit": "m/s", "answer": 0.4, "tolerance": 0.01, "maxAttempts": 2, "hintText": "Velocity = distance ÷ time = 10 ÷ 25. Express your answer as a decimal.", "feedbackCorrect": "Correct — 0.4 m/s. That is a moderate flow speed, typical of a mid-course river section where the channel is wider and friction from the bed is reduced.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is 0.4 m/s. Velocity = distance ÷ time = 10 ÷ 25 = 0.4.", "consequence": "<strong>Your teacher records the measurement.</strong> <em>\"0.4 metres per second at Site 3. Let us see if the pattern continues downstream.\"</em>", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "Data Collection", "title": "Completing the Transect", "scene": "scene2", "body": "<p>Your team completes all five measurements. The results are:</p><p>Site 1 (near source): <strong>0.15 m/s</strong><br>Site 2: <strong>0.28 m/s</strong><br>Site 3: <strong>0.40 m/s</strong><br>Site 4: <strong>0.52 m/s</strong><br>Site 5 (near mouth): <strong>0.65 m/s</strong></p><p>The data appears to support the hypothesis. But your teacher asks you to calculate the <strong>mean velocity</strong> across all five sites to summarise the dataset.</p>", "factBox": {"label": "Why Use the Mean?", "text": "The mean is the most common measure of central tendency. It gives a single representative value for a dataset. For fieldwork, it helps summarise data and allows comparison between different rivers or different studies."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Mean Velocity", "title": "Summarising the Data", "scene": "scene2", "body": "<p>The five velocity readings are: 0.15, 0.28, 0.40, 0.52, and 0.65 m/s.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Add all values: 0.15 + 0.28 + 0.40 + 0.52 + 0.65</p><p><strong>Step 2:</strong> Divide by the number of values (5)</p>"}, "question": "What is the mean river velocity across all five sites?", "unit": "m/s", "answer": 0.4, "tolerance": 0.01, "maxAttempts": 2, "hintText": "Sum = 0.15 + 0.28 + 0.40 + 0.52 + 0.65 = 2.00. Now divide by 5.", "feedbackCorrect": "Correct — the mean velocity is 0.40 m/s. This summarises the overall flow speed of the River Thorndale, though of course the individual readings show the important downstream trend.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is 0.40 m/s. Sum = 0.15 + 0.28 + 0.40 + 0.52 + 0.65 = 2.00. Mean = 2.00 ÷ 5 = 0.40.", "consequence": "<strong>Your partner writes the figure in the results table.</strong> <em>\"Mean of 0.40 m/s. Now we need to think about reliability — how confident are we in these numbers?\"</em>", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "Evaluating the Method", "title": "Sources of Error", "scene": "scene3", "body": "<p>Your teacher now asks the class to <strong>evaluate the methodology</strong>. Good fieldwork requires you to identify <strong>sources of error</strong> and suggest improvements.</p><p>During the investigation, you noticed several issues: the orange sometimes got caught on vegetation, the person using the stopwatch had inconsistent reaction times, and the river width varied significantly between sites — meaning the float sometimes travelled a curved path rather than a straight line.</p>", "factBox": {"label": "Reliability and Accuracy", "text": "Reliability means getting consistent results when repeating the method. Accuracy means how close the result is to the true value. Taking multiple readings at each site and calculating the mean improves reliability."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Improving Reliability", "title": "Making the Data More Reliable", "scene": "scene3", "body": "<p>Consider how you could improve the reliability of the float method used in this investigation.</p>", "question": "Which improvement would most effectively increase the reliability of the velocity measurements?", "options": [{"text": "Use a longer stretch of river (50 metres instead of 10) to reduce the impact of timing errors", "correct": false}, {"text": "Repeat each measurement three times at each site and calculate the mean to reduce the effect of anomalies", "correct": true}, {"text": "Only measure velocity on sunny days when the river is calm and conditions are ideal", "correct": false}, {"text": "Ask a different student to take the measurement at each site so that multiple people are involved", "correct": false}], "maxAttempts": 2, "hintText": "Reliability means getting consistent results. What is the standard method for reducing the impact of random errors in any scientific investigation?", "feedbackCorrect": "Exactly. Repeating measurements and calculating the mean is the most effective way to improve reliability. It reduces the impact of anomalous readings caused by random errors such as reaction time differences or the float catching on vegetation.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The correct answer is to repeat each measurement three times and calculate the mean. This is the standard technique for improving reliability — it reduces the effect of random anomalies in individual readings.", "consequence": "<strong>Your teacher nods approvingly.</strong> <em>\"Repetition and averaging — the foundation of reliable fieldwork. Always take at least three readings at each site.\"</em>", "next": "end", "examTip": "In the exam, refer to specific case studies with place names, dates, and statistics. Annotate any maps or diagrams provided.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Superb fieldwork analysis. You calculated velocity accurately, determined the mean, and identified the best method for improving reliability. Your geographical enquiry skills are exam-ready.", "partial": "You engaged with the fieldwork methodology, but some of your calculations or evaluation needed refinement. Return to strengthen your geographical enquiry skills.", "retry": "Good fieldwork demands precision and critical thinking. Try again to achieve a perfect score.", "topic": "Geographical enquiry — the float method for measuring river velocity, calculating means, identifying sources of error, and improving the reliability of fieldwork data."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} \u2014 AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission \u2192</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">\ud83d\udcda ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">\ud83d\udd22 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">\u270f\ufe0f ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer \u2192</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else {
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '\u2713 Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        showFeedback('wrong', '\u2717 Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
            }
          });
        }
        markPip(state.attempts - 1, false, true);
      } else {
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '\u2717 Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">\ud83d\udca1 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '\u2713' : '\u2717'}</span>
          <div>${esc(entry.question)} \u2014 ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">\ud83d\udcda What you practised</span>
          <p>${esc(S.ending.topic)}</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">\u2190 Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
</body>
</html>
