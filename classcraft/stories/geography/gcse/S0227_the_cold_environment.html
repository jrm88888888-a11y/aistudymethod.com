<script>const STORY_DATA = {"meta": {"title": "The Cold Environment", "subtitle": "The Arctic holds vast resources beneath its ice — but at what cost to the ecosystem?", "subject": "Geography", "topic": "Polar Environments", "level": "GCSE", "tags": ["Geography", "GCSE", "Polar Environments", "~10 min", "3 questions"], "intro": "You are an environmental consultant sent to assess a proposed oil drilling operation on Svalbard, deep inside the Arctic Circle. The Norwegian government wants to balance economic opportunity with conservation. Your data analysis will inform the final decision."}, "scenes": {"scene1": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b8c8d0'/>\n<rect x='0' y='160' width='700' height='102' fill='#e0e8ee'/>\n<polygon points='50,160 130,60 210,160' fill='#d0d8e0'/>\n<polygon points='200,160 300,40 400,160' fill='#c8d0d8'/>\n<polygon points='380,160 460,80 540,160' fill='#d0d8e0'/>\n<polygon points='500,160 580,50 660,160' fill='#c0c8d0'/>\n<rect x='0' y='200' width='700' height='62' fill='#7a99aa'/>\n<ellipse cx='150' cy='220' rx='50' ry='12' fill='#e0e8ee'/>\n<ellipse cx='450' cy='230' rx='60' ry='10' fill='#e0e8ee'/></svg>", "scene2": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#e8e0d4'/>\n<rect x='0' y='170' width='700' height='92' fill='#6a8a6a'/>\n<rect x='80' y='140' width='540' height='30' fill='#b0a898'/>\n<line x1='80' y1='140' x2='620' y2='140' stroke='#706860' stroke-width='2'/>\n<circle cx='150' cy='140' r='5' fill='#a07060'/>\n<circle cx='250' cy='140' r='5' fill='#a07060'/>\n<circle cx='350' cy='140' r='5' fill='#a07060'/>\n<circle cx='450' cy='140' r='5' fill='#a07060'/>\n<circle cx='550' cy='140' r='5' fill='#a07060'/>\n<rect x='300' y='50' width='100' height='70' fill='#a09080'/>\n<polygon points='300,50 350,20 400,50' fill='#706860'/></svg>", "scene3": "<svg viewBox='0 0 700 262' xmlns='http://www.w3.org/2000/svg'><rect width='700' height='262' fill='#b8c8d0'/>\n<rect x='0' y='160' width='700' height='102' fill='#e0e8ee'/>\n<polygon points='50,160 130,60 210,160' fill='#d0d8e0'/>\n<polygon points='200,160 300,40 400,160' fill='#c8d0d8'/>\n<polygon points='380,160 460,80 540,160' fill='#d0d8e0'/>\n<polygon points='500,160 580,50 660,160' fill='#c0c8d0'/>\n<rect x='0' y='200' width='700' height='62' fill='#7a99aa'/>\n<ellipse cx='150' cy='220' rx='50' ry='12' fill='#e0e8ee'/>\n<ellipse cx='450' cy='230' rx='60' ry='10' fill='#e0e8ee'/></svg>"}, "nodes": [{"id": "start", "type": "story", "chapter": "Mission Briefing", "title": "Arrival on Svalbard", "scene": "scene1", "body": "<p>Your plane touches down at Longyearbyen, the world's northernmost settlement with a permanent population. The temperature outside is <strong>−15°C</strong>. Snow covers everything. The land is classified as <strong>tundra</strong> — a cold environment where the mean monthly temperature never exceeds 10°C.</p><p>Your briefing pack contains climate data. In Svalbard, average winter temperatures reach <strong>−16°C</strong> and summer averages peak at <strong>5°C</strong>. Annual precipitation is just <strong>190 mm</strong> — less than the Sahara receives in some years. This makes Svalbard a <strong>polar desert</strong>.</p>", "factBox": {"label": "Permafrost", "text": "Permafrost is ground that remains frozen for at least two consecutive years. In Svalbard, permafrost extends to depths of over 100 metres. It locks in organic carbon and methane — if it thaws, these greenhouse gases are released."}, "next": "q1"}, {"id": "q1", "type": "numeric", "chapter": "Question 1 of 3 — Temperature Range", "title": "The Annual Temperature Range", "scene": "scene1", "body": "<p>Your first task is to calculate the <strong>annual temperature range</strong> for Svalbard using the data provided.</p><p>Average winter temperature: <strong>−16°C</strong><br>Average summer temperature: <strong>5°C</strong></p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Identify the highest and lowest average temperatures.<br>Highest = 5°C, Lowest = −16°C</p><p><strong>Step 2:</strong> Annual range = highest − lowest<br>= 5 − (−16) = 5 + 16</p>"}, "question": "What is the annual temperature range for Svalbard?", "unit": "°C", "answer": 21, "tolerance": 0, "maxAttempts": 2, "hintText": "Remember: subtracting a negative number means adding. 5 − (−16) = 5 + 16.", "feedbackCorrect": "Correct — 21°C. This large annual range is typical of polar environments, driven by extreme variation in daylight hours between polar summer and polar winter.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is 21°C. Annual range = 5 − (−16) = 5 + 16 = 21.", "consequence": "<strong>The research station leader checks your figure.</strong> <em>\"Twenty-one degrees — and that range is increasing as Arctic warming accelerates. Winters are getting less cold, but summer thaw periods are lengthening. That is the real concern for permafrost.\"</em>", "next": "mid1", "bloomsLevel": "Apply"}, {"id": "mid1", "type": "story", "chapter": "The Resource Question", "title": "Oil Beneath the Ice", "scene": "scene2", "body": "<p>You travel by snowmobile to the proposed drilling site. The oil company estimates <strong>800 million barrels</strong> of recoverable oil. At current prices of <strong>$75 per barrel</strong>, the field could generate significant revenue for Norway.</p><p>However, your environmental report must also consider the risks: oil spills in polar waters take decades to break down because cold temperatures slow bacterial decomposition. The fragile tundra ecosystem supports Arctic fox, reindeer, and migratory bird species that breed here in summer.</p><p>The government asks: what is the <strong>estimated total value</strong> of the oil field?</p>", "factBox": {"label": "Arctic Ecosystem Fragility", "text": "Tundra ecosystems have very low biodiversity and extremely slow rates of recovery. A vehicle track across tundra can remain visible for decades because plant regrowth is so slow in the short growing season."}, "next": "q2"}, {"id": "q2", "type": "numeric", "chapter": "Question 2 of 3 — Resource Value", "title": "The Oil Field's Worth", "scene": "scene2", "body": "<p>Estimated recoverable oil: <strong>800 million barrels</strong>.<br>Price per barrel: <strong>$75</strong>.</p>", "workedBox": {"label": "How to approach it", "steps": "<p><strong>Step 1:</strong> Total value = barrels × price per barrel<br>= 800,000,000 × 75</p><p><strong>Step 2:</strong> Convert to billions: divide by 1,000,000,000</p>"}, "question": "What is the estimated total value of the oil field in billions of dollars?", "unit": "billion dollars", "answer": 60, "tolerance": 0, "maxAttempts": 2, "hintText": "800 million × 75 = 60,000 million. How many billions is that?", "feedbackCorrect": "Correct — $60 billion. A huge sum, but one that must be weighed against the environmental cost of drilling in one of the world's last pristine wilderness areas.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The answer is $60 billion. 800,000,000 × $75 = $60,000,000,000 = $60 billion.", "consequence": "<strong>The oil company representative smiles.</strong> <em>\"Sixty billion dollars. That could fund schools, hospitals, infrastructure for decades.\"</em> The environmental officer beside you shakes her head slowly.", "next": "mid2", "bloomsLevel": "Apply"}, {"id": "mid2", "type": "story", "chapter": "The Conservation Argument", "title": "Balancing Development and Protection", "scene": "scene3", "body": "<p>Back at the research station, you compile your final report. The decision comes down to a fundamental tension in geography: <strong>development versus conservation</strong>.</p><p>Supporters of drilling argue it creates jobs and wealth. Opponents argue that the Arctic is a global commons — its ice sheets regulate global climate, and its ecosystems are irreplaceable.</p><p>You must now answer a conceptual question about the management of cold environments.</p>", "factBox": {"label": "Wilderness Management", "text": "Many cold environments are managed through international agreements. The Antarctic Treaty (1959) bans military activity and mineral extraction in Antarctica. No equivalent treaty exists for the Arctic."}, "next": "q3"}, {"id": "q3", "type": "mcq", "chapter": "Question 3 of 3 — Managing Cold Environments", "title": "The Conservation Dilemma", "scene": "scene3", "body": "<p>Consider the challenges of managing cold environments like the Arctic, where economic interests compete with conservation priorities.</p>", "question": "Which of the following is the strongest argument for restricting development in Arctic environments?", "options": [{"text": "Arctic regions have no economic value, so development would be a waste of money", "correct": false}, {"text": "Cold environments have fragile ecosystems with slow recovery rates, meaning any damage could take decades or centuries to repair", "correct": true}, {"text": "All Arctic land is protected by international law, so no development is legally permitted", "correct": false}, {"text": "Indigenous communities always oppose any form of economic development in the Arctic", "correct": false}], "maxAttempts": 2, "hintText": "Think about what makes tundra and polar ecosystems different from temperate ones — what happens when they are damaged?", "feedbackCorrect": "Correct. The slow recovery rate is the key factor. Short growing seasons, thin soils, and low biodiversity mean that damage to tundra ecosystems can persist for decades or even centuries, making prevention far more effective than restoration.", "feedbackWrong": "A common mistake is giving generic answers without specific place-based detail. Always name locations, dates, and statistics from your case studies. The correct answer is that cold environments have fragile ecosystems with slow recovery rates. Tundra damage can take decades or centuries to repair due to short growing seasons and low biodiversity.", "consequence": "<strong>You submit your report.</strong> <em>\"The economic case for drilling is strong — but the environmental risks are severe and long-lasting. Any development must be subject to the strictest environmental impact assessments.\"</em>", "next": "end", "examTip": "In the exam, refer to specific case studies with place names, dates, and statistics. Annotate any maps or diagrams provided.", "bloomsLevel": "Analyse"}], "ending": {"perfect": "Excellent work. You calculated the temperature range, valued the resource, and demonstrated a nuanced understanding of the development-conservation tension in cold environments. Your report will shape Arctic policy.", "partial": "You engaged with the key issues of polar environments, but some of your analysis needs tightening. Return to refine your understanding of Arctic geography.", "retry": "The Arctic demands precision. Try again to achieve a perfect score.", "topic": "Polar environments — tundra characteristics, permafrost, temperature range calculations, resource extraction versus conservation, and wilderness management strategies."}};</script>
<script>
(function () {

    /* ── State ── */
    let state = {
      nodeIndex:   0,
      attempts:    0,
      score:       0,
      totalQ:      0,
      correctQ:    0,
      log:         [],
      pendingNext: null
    };

    const S       = STORY_DATA;
    const nodes   = S.nodes;
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    /* ── Boot ── */
    function boot() {
      document.title = `${S.meta.title} \u2014 AI Study Method`;
      const _y = document.getElementById('year'); if (_y) _y.textContent = new Date().getFullYear();
      buildIntro();
    }

    /* ── Intro screen ── */
    function buildIntro() {
      const intro = document.getElementById('intro-screen');
      intro.innerHTML = `
        <span class="eyebrow">Interactive ${S.meta.subject} Lesson</span>
        <h1 class="story-h">${S.meta.title}</h1>
        <p class="story-prose" style="margin:0 auto 0.5rem; text-align:center; max-width:52ch;">${S.meta.subtitle}</p>
        <p class="story-prose" style="margin:0 auto 1.5rem; color:var(--ink-mid); text-align:center; max-width:52ch; font-size:0.95rem;">${S.meta.intro}</p>
        <div class="meta-tags">${S.meta.tags.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>
        <button class="start-btn" onclick="startStory()">Begin mission \u2192</button>
      `;
      show(intro);
    }

    /* ── Start ── */
    window.startStory = function () {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('scene-screen').style.display = 'block';
      renderNode(nodes[0].id);
    };

    /* ── Render a node ── */
    function renderNode(id) {
      const node = nodeMap[id];
      if (!node) { showEnd(); return; }
      if (id === 'end') { showEnd(); return; }

      state.attempts    = 0;
      state.pendingNext = node.next;

      const panel = document.getElementById('scene-panel');
      panel.classList.remove('in');

      updateProgress(id);

      setTimeout(() => {
        panel.innerHTML = buildNodeHTML(node);
        panel.classList.add('in');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        bindNode(node);
      }, 320);
    }

    /* ── Progress bar ── */
    function updateProgress(id) {
      const total   = nodes.length;
      const idx     = nodes.findIndex(n => n.id === id);
      const pct     = total <= 1 ? 0 : Math.round((idx / (total - 1)) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    /* ── Build node HTML ── */
    function buildNodeHTML(node) {
      let h = '';

      h += `<span class="eyebrow">${esc(node.chapter || '')}</span>`;
      h += `<h2 class="story-h">${esc(node.title || '')}</h2>`;

      if (node.scene && S.scenes[node.scene]) {
        h += `<div class="scene">${S.scenes[node.scene]}</div>`;
      }

      if (node.body) {
        h += `<div class="story-prose">${node.body}</div>`;
      }

      if (node.factBox) {
        h += `<div class="fact-box">
          <span class="fact-label">\ud83d\udcda ${esc(node.factBox.label)}</span>
          <p>${esc(node.factBox.text)}</p>
        </div>`;
      }

      if (node.formulaBox) {
        h += `<div class="formula-box">
          <span class="formula-label">\ud83d\udd22 ${esc(node.formulaBox.label)}</span>
          <span class="formula-main">${esc(node.formulaBox.formula)}</span>
          <span class="formula-vars">${esc(node.formulaBox.vars)}</span>
        </div>`;
      }

      if (node.workedBox) {
        h += `<div class="worked">
          <span class="worked-label">\u270f\ufe0f ${esc(node.workedBox.label)}</span>
          <button class="hint-toggle" onclick="var s=this.nextElementSibling;if(s.style.display==='none'){s.style.display='block';this.textContent='Hide working ↑'}else{s.style.display='none';this.textContent='Show working ↓'}">Show working ↓</button>
          <div class="worked-steps" style="display:none">${node.workedBox.steps}</div>
        </div>`;
      }

      if (node.type === 'numeric') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="answer-numeric">
            <input type="number" id="num-input" placeholder="?" step="any" />
            <span class="answer-unit">${esc(node.unit || '')}</span>
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <br>
          <button class="submit-btn" id="submit-btn" onclick="submitNumeric()">Check answer \u2192</button>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else if (node.type === 'mcq') {
        h += `<div class="answer-zone">
          <p class="answer-prompt">${esc(node.question)}</p>
          <div class="mcq-choices" id="mcq-choices">
            ${(node.options || []).map((opt, i) =>
              `<button class="mcq-btn" id="opt-${i}" onclick="submitMCQ(${i})">${esc(opt.text)}</button>`
            ).join('')}
          </div>
          ${attemptsHTML(node.maxAttempts || 2)}
          <div id="hint-area"></div>
          <div class="feedback" id="feedback"></div>
          <div class="consequence" id="consequence"></div>
          <button class="continue-btn" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      } else {
        h += `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--rule);">
          <button class="continue-btn show" id="continue-btn" onclick="goNext()">Continue \u2192</button>
        </div>`;
      }

      return h;
    }

    /* ── Attempts pips ── */
    function attemptsHTML(max) {
      let pips = '';
      for (let i = 0; i < max; i++) {
        pips += `<div class="attempt-pip" id="pip-${i}"></div>`;
      }
      return `<div class="attempts-row">${pips}<span class="attempts-label">${max} attempt${max > 1 ? 's' : ''}</span></div>`;
    }

    /* ── Bind interactive elements ── */
    function bindNode(node) {
      const ni = document.getElementById('num-input');
      if (ni) {
        ni.addEventListener('keydown', e => {
          if (e.key === 'Enter') submitNumeric();
        });
        ni.focus();
      }
    }

    /* ── Numeric submit ── */
    window.submitNumeric = function () {
      const node  = getCurrentNode();
      const input = document.getElementById('num-input');
      const val   = parseFloat(input.value);

      if (isNaN(val)) { input.focus(); return; }

      state.attempts++;
      markPip(state.attempts - 1, true);

      const tol   = node.tolerance || 0;
      const correct = Math.abs(val - node.answer) <= tol;

      if (correct) {
        handleCorrect(node, val);
      } else {
        handleWrong(node, val);
      }
    };

    /* ── MCQ submit ── */
    window.submitMCQ = function (idx) {
      const node = getCurrentNode();
      const opt  = node.options[idx];

      state.attempts++;
      markPip(state.attempts - 1, false);

      (node.options || []).forEach((_, i) => {
        const b = document.getElementById(`opt-${i}`);
        if (b) { b.disabled = true; b.style.opacity = '0.45'; }
      });
      const chosen = document.getElementById(`opt-${idx}`);
      if (chosen) { chosen.style.opacity = '1'; chosen.style.borderColor = 'var(--accent)'; }

      if (opt.correct) {
        handleCorrect(node, opt.text);
      } else {
        handleWrong(node, opt.text);
      }
    };

    /* ── Correct answer ── */
    function handleCorrect(node, userVal) {
      state.correctQ++;
      state.totalQ++;
      state.log.push({ question: node.title, correct: true, userAnswer: userVal });

      showFeedback('correct', '\u2713 Correct', node.feedbackCorrect || 'Well done.');

      if (node.consequence) {
        showConsequence(node.consequence);
      }

      disableSubmit();
      state.pendingNext = node.next;
      showContinue();
    }

    /* ── Wrong answer ── */
    function handleWrong(node, userVal) {
      const max = node.maxAttempts || 2;

      if (state.attempts < max) {
        showFeedback('wrong', '\u2717 Not quite', 'That\'s not right. Check your working and try again.');
        if (node.hintText) {
          showHint(node.hintText);
        }
        const sub = document.getElementById('submit-btn');
        if (sub) sub.disabled = false;
        if (node.type === 'mcq') {
          (node.options || []).forEach((opt, i) => {
            if (!opt.correct) {
              const b = document.getElementById(`opt-${i}`);
            }
          });
        }
        markPip(state.attempts - 1, false, true);
      } else {
        state.totalQ++;
        state.log.push({ question: node.title, correct: false, userAnswer: userVal });

        showFeedback('wrong', '\u2717 Out of attempts', node.feedbackWrong || `The correct answer was ${node.answer}.`);

        if (node.consequence) {
          showConsequence(node.consequence);
        }

        disableSubmit();
        state.pendingNext = node.nextWrong || node.next;
        showContinue();
      }
    }

    /* ── UI helpers ── */
    function showFeedback(type, label, text) {
      const fb = document.getElementById('feedback');
      if (!fb) return;
      fb.className = `feedback show ${type}`;
      fb.innerHTML = `<span class="fb-label">${esc(label)}</span>${esc(text)}`;
    }

    function showConsequence(html) {
      const c = document.getElementById('consequence');
      if (!c) return;
      c.innerHTML = html;
      c.classList.add('show');
    }

    function showHint(text) {
      const ha = document.getElementById('hint-area');
      if (!ha) return;
      ha.innerHTML = `<div class="feedback hint show" style="margin-top:0.5rem"><span class="fb-label">\ud83d\udca1 Hint</span>${esc(text)}</div>`;
    }

    function disableSubmit() {
      const sub = document.getElementById('submit-btn');
      if (sub) sub.disabled = true;
      const ni = document.getElementById('num-input');
      if (ni) ni.disabled = true;
    }

    function showContinue() {
      const btn = document.getElementById('continue-btn');
      if (btn) btn.classList.add('show');
    }

    function markPip(idx, pending, wrong) {
      const pip = document.getElementById(`pip-${idx}`);
      if (!pip) return;
      if (wrong) {
        pip.classList.add('wrong-pip');
      } else {
        pip.classList.add('used');
      }
    }

    /* ── Navigate to next node ── */
    window.goNext = function () {
      const next = state.pendingNext;
      if (!next) return;
      state.pendingNext = null;
      if (next === 'end' || !nodeMap[next]) {
        showEnd();
      } else {
        renderNode(next);
      }
    };

    /* ── End screen ── */
    function showEnd() {
      document.getElementById('scene-screen').style.display  = 'none';
      document.getElementById('progress-fill').style.width   = '100%';

      const pct     = state.totalQ > 0 ? Math.round((state.correctQ / state.totalQ) * 100) : 100;
      const summary = pct === 100
        ? S.ending.perfect
        : pct >= 50
          ? S.ending.partial
          : S.ending.partial;

      let reviewHTML = '';
      state.log.forEach(entry => {
        reviewHTML += `<div class="review-item">
          <span class="review-icon">${entry.correct ? '\u2713' : '\u2717'}</span>
          <div>${esc(entry.question)} \u2014 ${entry.correct ? '<span style="color:#3a7020">answered correctly</span>' : '<span style="color:#8a2020">answer revealed</span>'}</div>
        </div>`;
      });

      const endEl = document.getElementById('end-screen');
      endEl.innerHTML = `
        <span class="end-badge">Mission Complete</span>
        <div class="score-display">${pct}%</div>
        <div class="score-label">accuracy score</div>
        <p class="score-summary">${esc(summary)}</p>
        ${reviewHTML ? `<div class="question-review">${reviewHTML}</div>` : ''}
        <div class="fact-box" style="text-align:left; margin-bottom:2rem;">
          <span class="fact-label">\ud83d\udcda What you practised</span>
          <p>${esc(S.ending.topic)}</p>
        </div>
        <p style="font-size:0.85rem; color:var(--ink-light); margin-bottom:1.5rem;">${esc(S.ending.retry)}</p>
        <button class="restart-btn" onclick="restartStory()">\u2190 Try again</button>
      `;
      endEl.classList.add('show');
      endEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ── Restart ── */
    window.restartStory = function () {
      state = { nodeIndex: 0, attempts: 0, score: 0, totalQ: 0, correctQ: 0, log: [], pendingNext: null };
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('end-screen').innerHTML = '';
      document.getElementById('scene-screen').style.display  = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      renderNode(nodes[0].id);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ── Helpers ── */
    function getCurrentNode() {
      const panel = document.getElementById('scene-panel');
      const ey    = panel ? panel.querySelector('.eyebrow') : null;
      const label = ey ? ey.textContent : '';
      return nodes.find(n => n.chapter === label) || nodes[0];
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function show(el) {
      setTimeout(() => el.classList.add('in'), 60);
    }

    /* ── Nav (legacy classcraft drawer — guarded; AI Study Method uses a global nav) ── */
    const toggle  = document.getElementById('nav-toggle');
    const links   = document.getElementById('nav-links');
    const overlay = document.getElementById('nav-overlay');
    if (toggle && links && overlay) {
      const open  = () => { toggle.classList.add('open');    links.classList.add('open');    overlay.classList.add('open');    document.body.style.overflow = 'hidden'; };
      const close = () => { toggle.classList.remove('open'); links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = '';       };
      toggle.addEventListener('click',   () => toggle.classList.contains('open') ? close() : open());
      overlay.addEventListener('click',  close);
      links.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    }

    /* ── Go ── */
    boot();

  })();
  </script>
<!-- Reading progress bar (site-wide story upgrade) -->
<div id="aism-readbar" aria-hidden="true" style="position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,#2d8f5a,#7b6fff);z-index:9999;pointer-events:none;"></div>
<script>
(function () {
  var bar = document.getElementById('aism-readbar');
  if (!bar) return;
  var ticking = false;
  function update() {
    ticking = false;
    var doc = document.documentElement;
    var max = doc.scrollHeight - window.innerHeight;
    if (max <= 0) { bar.style.width = '0'; return; }
    var pct = Math.min(100, Math.max(0, (window.scrollY || doc.scrollTop) / max * 100));
    bar.style.width = pct + '%';
  }
  function onScroll() {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  update();
})();
</script>
