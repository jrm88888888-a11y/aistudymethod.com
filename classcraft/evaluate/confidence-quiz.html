<style>
  .eq-wrap { max-width: 760px; margin: 0 auto; padding: calc(var(--nav-h) + 36px) 1.5rem 80px; }
  .eq-badge { display:inline-flex; align-items:center; gap:8px; background:var(--accent-soft); border:1px solid var(--border-accent); color:var(--accent); font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:4px 12px; border-radius:30px; font-family:'DM Mono',monospace; margin-bottom:14px; }
  .eq-title { font-family:'Playfair Display',serif; font-size:clamp(1.7rem,3vw,2.4rem); line-height:1.15; margin:0 0 10px; }
  .eq-sub { color:var(--text-secondary); font-size:15px; margin:0 0 22px; line-height:1.55; max-width:60ch; }
  .eq-meta { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); margin-bottom:24px; }
  .eq-card { background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:14px; padding:24px 26px; box-shadow:0 4px 14px rgba(10,107,94,0.06); margin-bottom:18px; }
  .eq-q-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--accent); font-weight:600; margin-bottom:8px; }
  .eq-q { font-size:17px; font-weight:600; color:var(--text-primary); margin:0 0 18px; line-height:1.4; }
  .eq-options { display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
  .eq-opt { background:var(--bg-primary); border:1.5px solid var(--border); border-radius:10px; padding:14px 16px; cursor:pointer; font-size:15px; transition:all 0.15s ease; text-align:left; font-family:inherit; color:var(--text-primary); }
  .eq-opt:hover { border-color:var(--accent); background:var(--accent-soft); }
  .eq-opt.selected { border-color:var(--accent); background:var(--accent-soft); }
  .eq-opt.correct { border-color:#0a6b5e; background:rgba(10,107,94,0.12); }
  .eq-opt.wrong { border-color:#c2410c; background:rgba(194,65,12,0.10); }
  .eq-confidence { margin-top:18px; }
  .eq-conf-label { display:flex; justify-content:space-between; align-items:baseline; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
  .eq-conf-label strong { color:var(--accent); font-weight:600; font-size:14px; }
  .eq-conf-slider { width:100%; -webkit-appearance:none; height:6px; border-radius:3px; background:var(--border); outline:none; cursor:pointer; }
  .eq-conf-slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--velvet-gradient); box-shadow:0 2px 8px var(--accent-glow); cursor:pointer; }
  .eq-conf-slider::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:#0a6b5e; cursor:pointer; border:none; }
  .eq-text-input { width:100%; padding:12px 14px; background:var(--bg-primary); border:1.5px solid var(--border); border-radius:10px; font-size:15px; font-family:inherit; color:var(--text-primary); box-sizing:border-box; }
  .eq-text-input:focus { outline:none; border-color:var(--accent); }
  .eq-btn { background:var(--velvet-gradient); color:#fff; border:none; padding:14px 24px; border-radius:10px; font-family:'DM Mono',monospace; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; font-weight:600; cursor:pointer; box-shadow:0 4px 12px var(--accent-glow); transition:transform 0.15s; }
  .eq-btn:hover { transform:translateY(-1px); }
  .eq-btn:disabled { opacity:0.45; cursor:not-allowed; transform:none; }
  .eq-feedback { margin-top:14px; padding:12px 14px; border-radius:10px; font-size:14px; font-family:inherit; }
  .eq-feedback.ok { background:rgba(10,107,94,0.08); color:var(--accent); border:1px solid var(--border-accent); }
  .eq-feedback.no { background:rgba(194,65,12,0.08); color:#c2410c; border:1px solid rgba(194,65,12,0.25); }
  .eq-summary { margin-top:24px; padding:28px; background:var(--bg-card); border:1px solid var(--border); border-radius:14px; }
  .eq-summary h2 { font-family:'Playfair Display',serif; font-size:1.5rem; margin:0 0 16px; }
  .eq-metric-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
  .eq-metric { background:var(--bg-primary); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
  .eq-metric-num { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; line-height:1; }
  .eq-metric-num.gap-good { color:#0a6b5e; }
  .eq-metric-num.gap-bad { color:#c2410c; }
  .eq-metric-lbl { font-family:'DM Mono',monospace; font-size:9.5px; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-muted); margin-top:5px; }
  .eq-row-table { width:100%; border-collapse:collapse; font-size:13.5px; }
  .eq-row-table th { text-align:left; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-muted); border-bottom:1px solid var(--border); padding:10px 8px; }
  .eq-row-table td { padding:10px 8px; border-bottom:1px solid var(--border); }
  .eq-row-table td.q-snip { max-width:280px; }
  .eq-row-table tr.priority { background:rgba(194,65,12,0.06); }
  .eq-row-table tr.priority td { color:#c2410c; font-weight:600; }
  .eq-insight { font-style:italic; font-size:14px; color:var(--text-secondary); margin-top:16px; padding:14px 16px; background:var(--bg-primary); border-radius:10px; border-left:3px solid var(--accent); }
  .eq-back { color:var(--accent); text-decoration:none; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; display:inline-block; margin-top:24px; }
  .eq-back:hover { text-decoration:underline; }
  .eq-error { padding:20px; background:rgba(194,65,12,0.05); border:1px solid rgba(194,65,12,0.2); border-radius:10px; color:#c2410c; font-size:14px; }
  .eq-progress { display:flex; gap:6px; margin-bottom:24px; }
  .eq-progress span { height:5px; flex:1; border-radius:3px; background:var(--border); transition:background 0.2s ease; }
  .eq-progress span.done { background:var(--accent); }
  .eq-progress span.now { background:var(--accent); opacity:0.45; }
  .eq-kbd-hint { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--text-muted); margin-top:10px; }
  @media (hover:none) { .eq-kbd-hint { display:none; } }

<script>
/* ── AISM audio + confetti (shared 'aism-muted' preference) ── */
const AISM_REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const AISM_SFX = (() => {
  let actx = null, master = null;
  let muted = false;
  try { muted = localStorage.getItem('aism-muted') === '1'; } catch (e) {}
  function ensure() {
    try {
      if (!actx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return false;
        actx = new AC();
        master = actx.createGain();
        master.gain.value = 0.28;
        master.connect(actx.destination);
      }
      if (actx.state === 'suspended') actx.resume();
      return true;
    } catch (e) { return false; }
  }
  function tone(freq, dur, type, vol, endFreq) {
    if (muted || !ensure()) return;
    try {
      const t0 = actx.currentTime;
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type || 'sine';
      o.frequency.setValueAtTime(freq, t0);
      if (endFreq) o.frequency.exponentialRampToValueAtTime(Math.max(30, endFreq), t0 + dur);
      g.gain.setValueAtTime(vol || 0.1, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      o.connect(g); g.connect(master);
      o.start(t0); o.stop(t0 + dur + 0.02);
    } catch (e) {}
  }
  return {
    unlock() { ensure(); },
    isMuted() { return muted; },
    toggleMute() {
      muted = !muted;
      try { localStorage.setItem('aism-muted', muted ? '1' : '0'); } catch (e) {}
      return muted;
    },
    ok()      { tone(587, 0.08, 'sine', 0.1); setTimeout(() => tone(740, 0.1, 'sine', 0.09), 70); },
    bad()     { tone(220, 0.15, 'sawtooth', 0.05, 165); },
    fanfare() { tone(523, 0.1, 'triangle', 0.12); setTimeout(() => tone(659, 0.1, 'triangle', 0.12), 100); setTimeout(() => tone(784, 0.2, 'triangle', 0.12), 200); },
  };
})();
function aismConfetti() {
  if (AISM_REDUCED) return;
  let st = document.getElementById('aism-confetti-style');
  if (!st) {
    st = document.createElement('style');
    st.id = 'aism-confetti-style';
    st.textContent = '@keyframes aismCfFall{from{transform:translateY(-10vh) rotate(0)}to{transform:translateY(110vh) rotate(720deg)}}.aism-cf{position:fixed;top:0;width:8px;height:12px;z-index:950;pointer-events:none;animation:aismCfFall linear both;}';
    document.head.appendChild(st);
  }
  const colours = ['#0a6b5e', '#7b6fff', '#ffd166', '#c2410c', '#5ac8ff'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'aism-cf';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colours[i % colours.length];
    c.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
    c.style.animationDelay = (Math.random() * 0.5) + 's';
    c.style.borderRadius = Math.random() < 0.5 ? '50%' : '2px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3600);
  }
}
(function aismMuteBtn() {
  function add() {
    if (document.getElementById('aism-mute')) return;
    const b = document.createElement('button');
    b.id = 'aism-mute';
    b.type = 'button';
    b.title = 'Toggle sound (M)';
    b.textContent = AISM_SFX.isMuted() ? '🔇' : '🔊';
    b.style.cssText = 'position:fixed;bottom:14px;right:14px;z-index:900;background:rgba(26,29,39,0.92);border:1px solid rgba(255,255,255,0.16);color:#e8eaf0;border-radius:10px;padding:8px 11px;font-size:15px;cursor:pointer;line-height:1;';
    b.addEventListener('click', () => { b.textContent = AISM_SFX.toggleMute() ? '🔇' : '🔊'; });
    document.body.appendChild(b);
  }
  if (document.body) add(); else window.addEventListener('DOMContentLoaded', add);
  document.addEventListener('keydown', e => {
    if ((e.key === 'm' || e.key === 'M') && !e.metaKey && !e.ctrlKey && !e.altKey) {
      const b = document.getElementById('aism-mute');
      if (b) b.click();
    }
  });
  ['pointerdown', 'keydown', 'touchstart'].forEach(ev =>
    document.addEventListener(ev, () => AISM_SFX.unlock(), { once: true, capture: true }));
})();

(async function() {
  const params = new URLSearchParams(location.search);
  const stem = params.get('spec');
  const root = document.getElementById('root');

  if (!stem) {
    root.innerHTML = '<div class="eq-error">Missing <code>?spec=</code> parameter.</div>';
    return;
  }

  // Try plain stem, then every possible colon-insertion before a dash
  const candidates = [`../adventures/_specs/${stem}.json`];
  for (let i = 0; i < stem.length; i++) {
    if (stem[i] === '-') candidates.push(`../adventures/_specs/${stem.slice(0,i)}:${stem.slice(i)}.json`);
  }
  let spec = null;
  for (const url of candidates) {
    try {
      const r = await fetch(url);
      if (r.ok) { spec = await r.json(); break; }
    } catch(e) {}
  }
  if (!spec) {
    root.innerHTML = `<div class="eq-error">Couldn't load the question bank for <code>${stem}</code>.</div>`;
    return;
  }

  // Detect placeholder content — refuse to render rather than serve template-y MCQs.
  const PLACEHOLDER_DEF_RE = /^(A central idea in |A key term you.?ll meet in |A core concept tied to |Another important idea linked to |How .+ sits within the wider |An application of the ideas in )/;
  const placeholderCount = (spec.concepts || []).filter(c => PLACEHOLDER_DEF_RE.test(c.def || '')).length;
  if (placeholderCount >= 2) {
    const topicName = spec.topic_display || spec.title || stem;
    const levelLbl = (spec.level || '').toUpperCase().replace('A-LEVEL','A-Level');
    const subjLbl = (spec.subject || '').replace(/-/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
    root.innerHTML = `
      <div class="eq-badge">E · Evaluate · Confidence Quiz</div>
      <h1 class="eq-title">${escapeHtml(topicName)}</h1>
      <p class="eq-sub">Topic-specific questions for this concept set are still being authored — generic placeholder questions wouldn't earn their place on the site. Come back soon.</p>
      <div class="eq-meta">${escapeHtml(levelLbl)} · ${escapeHtml(subjLbl)} · In production</div>
      <div class="eq-card" style="text-align:center;padding:40px 28px;">
        <div style="font-size:48px;line-height:1;margin-bottom:14px">📝</div>
        <h2 style="font-family:'Playfair Display',serif;font-size:1.4rem;margin:0 0 8px">Questions in production</h2>
        <p style="color:var(--text-secondary);margin:0 0 18px;font-size:15px;">A confidence-calibrated quiz needs distinctive, topic-specific MCQs. The question set for this exact topic hasn't been authored at the required depth yet.</p>
        <a href="../../subjects.html" style="color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;">← Back to subjects</a>
      </div>
    `;
    return;
  }

  // Meta-question filter — these stems describe the lesson's internal structure
  // ("How many key terms does this adventure introduce?") rather than testing
  // real subject knowledge. They were generated as harness defaults for ~264
  // STEM specs and would erode credibility if shown. Drop any question whose
  // stem matches one of these patterns.
  const META_Q_RE = /\b(this adventure|key terms? this|term chips?|adventure introduces?)\b/i;
  const isMetaQ = q => META_Q_RE.test(String(q || ''));

  // Build the question list: 2 MCQs + 1 numerical + 1 free-text from the spec
  const questions = [];
  (spec.mcqs || []).slice(0, 2).forEach(m => {
    if (!m.options || isMetaQ(m.q)) return;
    const opts = m.options.map(o => Array.isArray(o) ? { text: o[0], correct: !!o[1] } : o);
    const correctIdx = opts.findIndex(o => o.correct);
    questions.push({ kind: 'mcq', q: m.q, options: opts, correctIdx });
  });
  (spec.numericals || []).slice(0, 1).forEach(n => {
    if (isMetaQ(n.q)) return;
    questions.push({ kind: 'num', q: n.q, answer: n.answer, tolerance: n.tolerance || 0, unit: n.unit || '' });
  });
  (spec.free_texts || []).slice(0, 1).forEach(f => {
    if (isMetaQ(f.q)) return;
    questions.push({ kind: 'text', q: f.q, answer: String(f.answer || '').toLowerCase() });
  });

  // Refuse to render below 3 items — calibration is noisy with too few items.
  // (The Topic Radar engine has the same gate at <4 concepts.) If the spec has
  // been stripped of meta-questions or has too few authored items, surface the
  // "in production" template rather than a stub quiz.
  if (questions.length < 3) {
    const topicName = spec.topic_display || spec.title || stem;
    const levelLbl = (spec.level || '').toUpperCase().replace('A-LEVEL','A-Level');
    const subjLbl = (spec.subject || '').replace(/-/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
    root.innerHTML = `
      <div class="eq-header">
        <div class="eq-badge">E · Evaluate · Confidence Quiz</div>
        <h1 class="eq-title">${escapeHtml(topicName)}</h1>
        <p class="eq-sub">A confidence-calibrated quiz needs at least three distinctive, topic-specific questions. This topic doesn't yet have enough authored items to run reliably. Come back soon.</p>
        <div class="eq-meta">${escapeHtml(levelLbl)} · ${escapeHtml(subjLbl)}</div>
      </div>
      <div class="eq-card">
        <p style="color:var(--text-secondary);margin:0 0 18px;font-size:15px;">Try one of these working tools for now:</p>
        <a href="../../subjects.html" style="display:inline-block;margin-right:12px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);text-decoration:none;">← Browse subjects</a>
      </div>
    `;
    return;
  }

  const state = { idx: 0, answers: [] };

  const topic = spec.topic_display || spec.title || 'this topic';
  const level = (spec.level || '').toUpperCase().replace('A-LEVEL','A-Level').replace('IBDP','IBDP').replace('GCSE','GCSE').replace('KS3','KS3');
  const subj  = (spec.subject || '').replace(/-/g,' ').replace(/\b\w/g, c=>c.toUpperCase());

  function renderHeader() {
    return `
      <div class="eq-badge">E · Evaluate · Confidence Quiz</div>
      <h1 class="eq-title">${escapeHtml(topic)}</h1>
      <p class="eq-sub">Answer four short questions. After each one, rate how confident you are. The point isn't just to get answers right — it's to find out where your confidence outpaces your accuracy.</p>
      <div class="eq-meta">${escapeHtml(level)} · ${escapeHtml(subj)} · Q ${state.idx + 1} of ${questions.length}</div>
    `;
  }

  function renderQuestion() {
    const q = questions[state.idx];
    let body = '';
    if (q.kind === 'mcq') {
      body = `<div class="eq-options">` +
        q.options.map((o, i) => `<button class="eq-opt" data-idx="${i}">${escapeHtml(o.text)}</button>`).join('') +
        `</div>`;
    } else if (q.kind === 'num') {
      body = `<input type="number" step="any" class="eq-text-input" id="ans" placeholder="${q.unit ? 'Answer in '+escapeHtml(q.unit) : 'Type your answer'}">`;
    } else {
      body = `<input type="text" class="eq-text-input" id="ans" placeholder="Type your answer">`;
    }

    root.innerHTML = `
      ${renderHeader()}
      <div class="eq-progress" aria-hidden="true">${questions.map((_, i) =>
        `<span class="${i < state.idx ? 'done' : i === state.idx ? 'now' : ''}"></span>`).join('')}</div>
      <div class="eq-card">
        <div class="eq-q-label">Question ${state.idx + 1}</div>
        <div class="eq-q">${escapeHtml(q.q)}</div>
        ${body}
        <div class="eq-confidence">
          <div class="eq-conf-label"><span>How confident are you?</span><strong id="confDisp">60%</strong></div>
          <input type="range" min="0" max="100" step="5" value="60" class="eq-conf-slider" id="conf">
        </div>
        <div style="margin-top:18px"><button class="eq-btn" id="submit" disabled>Submit answer →</button></div>
        <div class="eq-kbd-hint">Keyboard: ${q.kind === 'mcq' ? '1–4 to pick · ' : ''}Enter to submit</div>
        <div id="fb"></div>
      </div>
    `;

    const submit = document.getElementById('submit');
    const conf = document.getElementById('conf');
    const confDisp = document.getElementById('confDisp');
    conf.addEventListener('input', () => confDisp.textContent = conf.value + '%');

    let chosen = null;
    let phase = 'answer'; // 'answer' or 'next'
    if (q.kind === 'mcq') {
      root.querySelectorAll('.eq-opt').forEach(b => {
        b.addEventListener('click', () => {
          if (phase !== 'answer') return;
          root.querySelectorAll('.eq-opt').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
          chosen = parseInt(b.dataset.idx);
          submit.disabled = false;
        });
      });
    } else {
      const ans = document.getElementById('ans');
      ans.addEventListener('input', () => {
        if (phase !== 'answer') return;
        chosen = ans.value;
        submit.disabled = !ans.value.trim();
      });
    }

    submit.addEventListener('click', () => {
      if (phase === 'answer') {
        // Reveal phase — assess answer + show feedback
        let correct = false;
        let userText = '';
        if (q.kind === 'mcq') {
          correct = chosen === q.correctIdx;
          userText = q.options[chosen]?.text || '';
          root.querySelectorAll('.eq-opt').forEach((b, i) => {
            b.style.pointerEvents = 'none';
            b.disabled = true;
            if (i === q.correctIdx) b.classList.add('correct');
            else if (i === chosen) b.classList.add('wrong');
          });
        } else if (q.kind === 'num') {
          const v = parseFloat(chosen);
          // Default to a 1% tolerance on the answer's magnitude so rounded answers
          // ("1.7 billion" matches a calculated 1.69) don't get rejected. The old
          // 0.0001 default was punishing for any non-integer answer.
          const tol = (q.tolerance != null && q.tolerance > 0)
            ? q.tolerance
            : Math.max(0.01, Math.abs(q.answer || 0) * 0.01);
          correct = !isNaN(v) && Math.abs(v - q.answer) <= tol;
          userText = String(chosen);
        } else {
          // Free-text grader. The old "whole-word substring" approach let
          // "I think it's prokaryote" mark correct, which destroys calibration
          // validity (the student didn't commit to one answer). We now require
          // the user's input to be the answer (or a short superset like
          // "the prokaryote") — capped at 2× the answer length.
          const u = String(chosen || '').trim().toLowerCase().replace(/[.!?,;:]+$/,'');
          const ans = String(q.answer || '').toLowerCase().trim();
          // Normalise punctuation/whitespace so "rate determining step" matches
          // "rate-determining step" and trailing spaces don't hurt.
          const norm = s => s.replace(/[-_]/g,' ').replace(/\s+/g,' ').trim();
          const uN = norm(u), ansN = norm(ans);
          let match = false;
          if (uN === ansN) match = true;
          else if (ansN.length >= 4 && uN.length <= ansN.length * 2 + 6) {
            // Allow short prefix/suffix wrappers like "the X", "X is correct"
            const safe = ansN.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            match = new RegExp(`(^|\\s)${safe}(\\s|$)`).test(uN);
          }
          correct = match;
          userText = String(chosen);
        }
        try { correct ? AISM_SFX.ok() : AISM_SFX.bad(); } catch (e) {}
        const confidence = parseInt(conf.value);
        state.answers.push({ q: q.q, correct, confidence, userText, kind: q.kind });

        const fb = document.getElementById('fb');
        fb.className = 'eq-feedback ' + (correct ? 'ok' : 'no');
        const right = q.kind === 'mcq' ? q.options[q.correctIdx].text : String(q.answer);
        fb.innerHTML = correct
          ? `<strong>Correct.</strong> You said you were ${confidence}% sure.`
          : `<strong>Not quite.</strong> Correct answer: <em>${escapeHtml(right)}</em>. You said you were ${confidence}% sure.`;

        submit.textContent = state.idx + 1 < questions.length ? 'Next →' : 'See calibration report →';
        submit.disabled = false;
        phase = 'next';
      } else {
        // Advance phase
        if (state.idx + 1 < questions.length) {
          state.idx++; renderQuestion();
        } else {
          renderSummary();
        }
      }
    });
  }

  function renderSummary() {
    const total = state.answers.length;
    const correct = state.answers.filter(a => a.correct).length;
    const accuracy = total ? Math.round((correct / total) * 100) : 0;
    const meanConf = total ? Math.round(state.answers.reduce((s,a)=>s+a.confidence,0) / total) : 0;
    const gap = meanConf - accuracy;
    const gapClass = gap > 15 ? 'gap-bad' : 'gap-good';
    try { if (accuracy >= 75) { AISM_SFX.fanfare(); aismConfetti(); } } catch (e) {}
    const gapWord = gap > 15 ? 'Overconfident' : gap < -15 ? 'Underconfident' : 'Well-calibrated';

    const rows = state.answers.map((a, i) => {
      const isPriority = !a.correct && a.confidence >= 60;
      const tickCross = a.correct ? '✓' : '✗';
      const tickColor = a.correct ? '#0a6b5e' : '#c2410c';
      return `
        <tr${isPriority ? ' class="priority"' : ''}>
          <td>Q${i+1}</td>
          <td class="q-snip">${escapeHtml(a.q).slice(0,120)}${a.q.length>120?'…':''}</td>
          <td style="color:${tickColor};font-weight:600">${tickCross}</td>
          <td>${a.confidence}%</td>
          <td>${isPriority ? 'High-confidence wrong — study first' : a.correct ? '' : 'Review'}</td>
        </tr>
      `;
    }).join('');

    let insight = '';
    if (gap > 25) insight = "You're confident on items you're actually getting wrong. The faster you trust that gap, the faster you'll fix it — start with the high-confidence wrongs.";
    else if (gap > 10) insight = 'Mild overconfidence. Look at the items you rated above 60% but missed.';
    else if (gap < -15) insight = "You know more than you think. Your confidence is dragging down what you actually got right.";
    else insight = 'Well-calibrated. You know what you know and what you don\'t — the most useful trait a student can have at this stage.';

    root.innerHTML = `
      ${renderHeader().replace(/Q \d+ of \d+/, 'Report')}
      <div class="eq-summary">
        <h2>Calibration report</h2>
        <div class="eq-metric-row">
          <div class="eq-metric"><div class="eq-metric-num">${accuracy}%</div><div class="eq-metric-lbl">Accuracy</div></div>
          <div class="eq-metric"><div class="eq-metric-num">${meanConf}%</div><div class="eq-metric-lbl">Mean confidence</div></div>
          <div class="eq-metric"><div class="eq-metric-num ${gapClass}">${gap>0?'+':''}${gap}</div><div class="eq-metric-lbl">${gapWord}</div></div>
        </div>
        <table class="eq-row-table">
          <thead><tr><th>#</th><th>Question</th><th>Result</th><th>Confidence</th><th>Priority</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="eq-insight">${insight}</div>
        <a href="../../subjects.html" class="eq-back">← Back to subjects</a>
      </div>
    `;
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Keyboard shortcuts: 1–4 pick an MCQ option, Enter submits/advances.
  // Enter works from inside the answer input too; digits never do.
  document.addEventListener('keydown', e => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const inField = e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName);
    const k = e.key;
    if (k === 'Enter') {
      if (inField && e.target.type === 'range') return;
      if (e.target && e.target.classList && e.target.classList.contains('eq-opt')) return; // let Enter activate the focused option
      const submit = document.getElementById('submit');
      if (submit && !submit.disabled) { e.preventDefault(); submit.click(); }
      return;
    }
    if (inField) return;
    const map = { '1': 0, '2': 1, '3': 2, '4': 3 };
    if (k in map) {
      const opts = root.querySelectorAll('.eq-opt');
      const b = opts[map[k]];
      if (b && !b.disabled) { e.preventDefault(); b.click(); }
    }
  });

  renderQuestion();
})();
</script>

</body>
</html>
